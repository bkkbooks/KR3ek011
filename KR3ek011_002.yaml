錢雷丸一錢蟾酥一錢草烏三錢水二鍾煎一鍾去渣取汁用生絲一錢入藥汁內以文火煮汁將干存汁一小酒鍾取起曬乾復浸汁內又曬又浸以汁盡為度曬乾包收聽用至六七月取露天蜘蛛絲做成藥線任用生肌散用線挂開者此藥收口諸瘡長肉收口爐甘石一兩煅三黃湯內七次木香降香乳香沒藥血竭兒茶黃柏黃連白芷白蘞各五錢龍骨三錢冰片一錢麝香三分赤石脂一兩煅黃丹一兩飛七次海螵蛸湯泡去皮五錢共為末用珍珠散長肉生肌收口珍珠石膏炒赤石脂輕粉各一錢白龍骨三錢冰片二分孩兒骨五分狗胎骨亦可共末收用一加象牙一錢萬憶膏即五灰所淋之汁上趙真子家傳痔漏的本終痔漏附余凡醫痔者先服涼血解毒藥三四劑如涼血地黃湯通聖散之類次服槐角地榆丸及臟連丸半斤消內毒以斷其根又下之太急或致脫肛以法上之宜收肛散如涼之太甚或致遺精以法補之宜補漏丸脈經云跗陽脈浮必腸痔下血腸痔下血風熱居多宜條芩黃連生地槐角或小薊丹參以清其熱宜當歸川芎佐以紅花以調其血宜人參枳殼升麻以順其氣因寒者加茯苓木香因酒者加葛根烏梅一個墨豆百粒夫升麻者痔症必用之藥也如不應純宜溫補用四君子湯加黃耆扁豆或參苓白朮散蓋大腸下血以胃氣收功胃氣回血自歸經矣凡用枯痔藥必先圍護周圍好肉用黃連鬱金石膏等分白芨減半蜜水調稀塗之薄紙蓋之次上枯藥或加片麝凡換枯痔藥宜用羌活獨活煎湯洗之凡痔已枯盡而不脫者用靈磁石一錢殭蠶川烏各末五分冷水調塗之立脫凡痔已脫先用甘草煎湯洗之再用荊芥文蛤煎湯洗之則不生膿脫後肉癢者煎粉甘草濃汁洗之凡痔頭大根小者以線扎之頭小根大者用藥枯之俟痔落而再醫漏無如漏孔就可收口有漏者插以藥丁通腸者挂以藥線無痔而有漏者以因肛門邊先結腫硬半年一載此塊作痛出膿成漏尤內先通腸而後外潰也必有附管治非取管挂線不能收功痔有三不醫為番花痔臟癰痔鎖肛痔也雖強治之恐未能全效凡插藥丁退管不可頂底如孔深一寸插藥七八分為度早晚插藥二次至三四日孔大加數插之至七日後患處四邊裂開大縫即搽玉紅膏再七日自落落後仍搽玉紅膏看四邊內外無黑腐時換生肌散膿稠時換珍珠散收口不可貼膏藥恐其呼膿收口必緩必內服蠟礬丸以干其膿忌食生冷犯之無效凡用挂線孔多者只先治一孔隔幾日再治一孔如線落口開者敷生肌散漏有八腎俞漏生腎俞穴瓜瓤漏形如出水西瓜瓤之類腎囊漏漏管通入於囊也纏腸漏為其管盤繞於肛門也屈曲漏為其管曲屈不直難以下藥至底也串臀漏蜂窠漏二症若皮硬色黑必內有重管雖以挂線依次穿治未免為多事通腸漏惟以此漏用挂線易於除根是以有善惡之分也再有年老氣虛者虛勞精竭者脾虛久瀉者皆為不治痔漏類方臟連丸治痔漏並腸風下血及水瀉痢疾黃連一斤槐花半斤為末用雄豬肥壯大腸以酒醋洗淨入藥扎兩頭次用韭菜五六斤一半鋪甑底藥腸盤於上一半蓋之文火蒸之以腸脂化盡腸皮如油紙薄為度去腸取藥曬乾稀糊丸桐子大每日二服每服三錢白滾湯送下中黃丸番花痔缸砂水浸半月微煅一兩條芩每斤用皂角子仁側柏各四兩水煮半日汁干為度用芩二兩黃連槐角子各二兩梔子黃花地丁各一兩青黛五錢為末用大柿餅肉為丸桐子大每服四五十丸空心清湯送下牛黃定痛丸內外諸痔牛黃五分胡黃連四錢梔子炒黑五錢槐米炒黑一兩苦食用巴豆麻油炒黃一兩為末糊丸黍米大每服三分臥時槐花湯下百草丸血箭痔百草霜四兩黃芩梔子各一兩黃連槐花地榆各五錢為末糊丸每服三錢清湯下天中散漏瘡並腸風下血粽子用陰陽瓦焙存性為末每服二錢白滾酒送下出汗為度管多者間三日再服腸風一服即愈熏洗痔漏方瓦松馬兜鈴皮硝文蛤蓮房蜂房山桃樹根共一大劑水一砂鍋煎濃汁傾淨桶內坐熏扎裙圍之俟稍溫洗之日三次一加馬汗屜子一用馬齒莧煎洗一用刺兒菜煎洗漏用楮桃兩許即榖樹子也煎湯熏洗蜂窠漏漏蘆煎湯洗三五次能退管生肌敷痔方胡黃連五錢血竭兒茶各二錢熊膽三錢冰片一錢麝香三分一加硼砂一錢一加鉛白霜一錢為末用苦食磨水調敷退管藥線類方一用白砒一錢雄黃五錢為末入罐封打三香水頻擦盞取出加乳香沒藥各五錢用白芨些須水調成線以黃柏末為衣一用白砒五錢雄黃五錢硃砂五錢水銀三錢白礬一兩為末升打如前做線加鹿斤上炒黃為末為衣入瘡不痛一用硼砂雄黃各一兩為末入罐內蓋白礬末一兩升打如前糊和成線入管內七八日抽出管易生肌藥鼠瘡取麥粒大一粒入瘡內日二次不痛發腫三日腐脫多年結毒甚效一用白砒末五錢入鐵鍋內次蓋白礬末一兩五錢火煅礬枯噴水一口於礬上即以綿紙蓋礬上再隨噴水三五口於紙上即以鍋蓋蓋之看紙上有白霜為度無霜再煅噴如有霜去紙入去油乳香沒藥末各錢許蓋礬上離火候冷取為末用飛羅面打糊成條插用以管退為度一加蠍尾七個生草烏末一錢枯痔甚佳搽如如聖散法制砒法如砒一兩用黃連黃柏黃芩各五錢甘草緑豆各半合水五碗煎湯煮砒以汁干為度次再升打若用生砒則毒氣入腹反生奄忽做條有法一用山茲菰粉打糊和條一做條時以豬鬃為心搓成條略曬抽出鬃則藥條成筒用之以通氣灸漏法久漏膿水根深者用硫黃麥面和大蒜搗為餅三分厚隨瘡大小貼之炷艾一灸一易二十一壯隔三五日方用退管藥一用螻蛄搗為餅乾者為末水調作餅貼瘡上灸之熱則易之五七壯止經七日管退而愈一用大附子末水和為餅灸之次上生肌藥一用騎竹馬法取穴灸之亦佳漏藥製法蟬蛻葉竹簡內泥固灰火煨過用蛇蛻入胡桃殼內鐵線扎之泥固煅存性蜣螂貯瓶內火煨去頭足地龍敲去腹內泥黃酒洗文火頓干新瓦炙蝸牛用肉如干者入水內泡一宿其肉自生豬懸蹄牛角腮俱酥炙十二次鵝翅翎牛膠魚鰾俱蛤粉炒刺蝟皮用酒醋童便浸炙蛤粉紫口者粳火煨露蜂房乳浸炙黑象牙酥油炙家傳痔漏方喇叭花科即二地黃苗也三月內未開花時連根採來陰乾每用五錢水三碗煎二碗滾兩三次另用韭葉五錢用酒水各一鍾煎八分空心服渣午後服隔二日再一服內外如式治之一切新久痔漏一月除根截腸症截腸者脫肛症也氣虛者用參耆歸術血虛者用歸芍第虛熱者加以黃柏下陷者佐以升麻外用薄荷煎湯洗之陳年醬蘿蔔切片托之自效但其所異者有已收些須余者漸漸結痂偶爾脫落者截腸症也無妨脫落自愈下部前便癰便癰生小腹之下夾縫之間乃精氣所出之道路屬足厥陰肝經之分野又為衝任督三經之隧道其經多血故名血疝俗呼便毒為不便處而生毒也破為魚口為行動開合如魚口也若橫痃則生於夾縫之上矣前賢云因觸景動心夢而不泄由精血交滯而成孫為果如此論則僧尼官人曠夫孀婦多患此耶蓋此症必由野合妓女陰器不潔淫火傳染所致或有云因勞倦虛火衝動精氣移外交滯而成者若因勞倦而得者則行立作痛坐臥則止為異耳雖然勞倦者百中一二而已由野合者宜先散腠膚所感之邪透骨搜風散次去肝腎經絡之毒加味神授散外以陽燧錠子灸之紺珠膏貼之如已成者托之芙蓉內托散或補中益氣湯加射干潰而不穿者加味透膿散潰而不斂者加味大補湯因勞倦而得者補中益氣湯加穿山甲因房勞不節者六味地黃湯加桃仁倍牛膝因強固其精者五苓散白朮茯苓豬苓澤瀉肉桂各一錢加牛膝二兩水煎加酒服脾血痛者婦人之症也其狀則小腹結塊或如所梗或兩拗與人門俱腫小便淋漓者是也宜雙解散如經脈不調內熱口渴食少肋脹盜汗白帶寒熱往來脈細而數者虛也加味逍遙散加味歸脾湯調理小腹重墜者補中益氣湯加青皮梔子茯苓車前子便毒主治方透骨搜風散散肌膚所感之邪透骨草白花者陰乾更佳羌活獨活牛膝紫葡萄胡桃肉生芝麻六安茶小黑豆白糖各一錢五分紅棗三枚天茄二分水三鍾煎一鍾露一宿空心熱服出汗避風一加槐子一錢生薑一錢加味神授衛生散清肝腎經絡之毒每服五錢加斑蝥一個蜈蚣一條用當歸引內加桃仁二錢牛膝二錢煎服如法外貼紺珠膏多加阿魏麝香俱見首卷芙蓉內托散治便毒已成元氣弱者芙蓉花二錢人參當歸川芎白芷穿山甲杏仁連翹木鱉子各一錢用生薑三片酒水各一鍾煎食遠服加味透膿散依原方見首卷加金銀花三錢牛膝二錢酒水煎服加味十全大補湯依原方見首卷加丹皮一錢澤瀉一錢煎服如法一用珍珠象牙各二錢為末空心生酒調服再飲至醉為度出臭汗即愈灸法用陽燧錠子於患處灸五七壯以紺珠膏蓋之已成者出水些須而消已潰者易於穿破更易於收斂一法隨患之左右量手中指為則子次自手掌盡處橫紋量起自臂當中以則子盡處是穴麥子大艾灸三壯腫消痛止一法灸足大指之端雙解散治婦人脾血痛能令毒從大便出熱從小便出黑醜炒頭末大黃各一錢五分官桂白芍澤瀉桃仁各一錢甘草七分用生薑七片水煎空心服便毒應用方陽燧錠子紺珠膏補中益氣湯六味地黃湯俱見首卷加味逍遙散加味歸脾湯俱見瘰癧門橫痃橫痃生於小腹之下夾縫之上些初起者用胡盧巴一兩酒水各一鍾煎服再飲至醉為度出汗立消已成者宜壺公妙劑散見腫毒門疳瘡疳瘡妒精瘡也一名恥瘡經云前陰者宗筋之所主又云督脈者其絡循陰器合纂間又云腎開竅於二陰是瘡生於此而屬肝督腎三經也但其名異而形殊治亦多岐生馬口之下曰下疳生莖之上曰蛀疳色紫而興舉者由房術塗抹所致淋濁而溺痛者由志欲不遂所致俱宜龍膽瀉肝湯外兼敷洗甚者蘆薈丸此症以腫痛寒熱為標肝腎陰虛為本故腫痛潰甚者八珍湯加柴胡梔子日晡倦怠者補中益氣湯加膽草梔子晡熱陰虛者六味地黃丸又莖上生瘡外皮腫脹包裹者名袖口疳久而遍潰者名蠟燭疳痛引睪丸陰囊腫墜者名雞膯疳是症皆由野合陰器不潔所致宜清肝滲濕湯甚者二子消毒散痛而多癢潰而不深形如剝皮爛杏者名瘙疳此由濕熱下注也只須外治疳久未愈便毒復生者內有梅毒也宜先解毒毒盡則疳愈宜楊梅一劑散生梅毒時誤用熏擦等藥以致腐爛者名楊梅疳或小便時尿管內痛者由服劫藥所致名楊梅內疳二症如結毒法治之用加味五寶丹或二子消毒散馬口旁有孔如棕眼眼內作癢捻之有微膿出者名鏇根疳由肝腎陰虛濕熱下注宜加味逍遙散六味地黃丸久服可愈陰挺者挺長而不收傷於熱也清之用小柴胡湯加黃連佐黃柏若莖中堅君以青皮佐以風藥洗以朴硝荊芥敷以文蛤末用絲瓜汁調塗陰縮者為陰縮入於腹內傷於寒也雖曰溫之而舌卷卵縮者死陰痿者由耗散過度傷於肝也又云腎脈大甚為陰痿又云太陰司天濕氣下臨腎氣衰而不舉也宜柴胡勝濕湯及固真湯下疳主治方龍膽瀉肝湯治肝經濕熱下注玉莖生瘡小便淋澀陰囊腫痛及便毒懸癰龍膽草連翹生地澤瀉各一錢木通車前子歸尾黃連黃芩梔子甘草各五分大便閉加大黃二錢用水二鍾煎八分食遠服清肝滲濕湯治玉莖陰囊濕腫重墜小水不利者蒼朮厚朴陳皮白朮茯苓澤瀉木通梔子花粉昆布各一錢當歸川芎各六分木香三分甘草五分紅熱加黃連膽草腫甚加商陸射干青鹽或加升麻柴胡羌活以升提之用水煎食遠服蘆薈丸治下疳潰爛作痛婦人陰蝕作癢小兒疳積發熱及口鼻生瘡牙齦蝕爛等症胡黃連黃連蘆薈白蕪荑子青皮白雷丸鶴蝨草各一兩木香三錢麝香一錢共為末蒸餅糊丸麻子大每服一錢空心清米湯送下消疳定痛散治下疳痛不可忍者黑羊角煅二錢穿山甲炒二錢乳香一錢沒藥一錢共為末作一服空心黃酒調服二子消毒散治袖口疳及楊梅等疳皂角子肥皂子殭蠶蟬蛻杏仁去皮尖各七個豬牙皂一條金銀花三錢防風荊芥牛膝各一錢豬板油二兩土茯苓半斤用水八碗煎三碗作三次服如結毒服三七日愈袖口疳加黃柏一錢肥皂子肉倍之楊梅疳加薏苡仁皂角刺各一錢側柏葉緑豆糯米各三錢楊梅內疳加海金沙五加皮白醜各一錢五分皂角子一歲用一粒下疳洗藥類方一切疳瘡金銀花槐花黃柏蒼朮茶葉水煎熏洗腫甚者加五倍子三四兩蔥頭十餘根一加射干荊芥一加白芷甘松下疳陰蝕等瘡緑豆一升煮爛入陳茶葉末一兩乘熱傾入多年淨桶內坐之圍之先熏後洗出汗為度瘙疳發癢洗方紫蘇四兩緑礬二兩水煎熏洗一切疳瘡腐盡生肌時用之收功甚速乳香沒藥兒茶輕粉各二錢為末用水五碗煎紅黃色浸洗之日用三次潰爛甚者用鮮豬蹄湯煎藥熏洗如法下疳敷藥類方消毒貴金散一切疳瘡初起熱甚者黃連六錢雞內金二個俱用豬膽汁浸炙七次輕粉三錢兒茶三錢冰片三分麝香二分為末摻用如至夜痛甚者加雄鼠糞煅存性為君波斯藏治一切疳瘡久不愈者珍珠三錢冰片二錢麝香乳香沒藥兒茶硃砂各一錢輕粉一錢無腐減半痛加血竭一錢癢加枯礬少許熱加牛黃青黛一錢毒甚加象牙煅童便內三次腐加爐甘石煅小便內三次瘀痛加大土鱉三個沿開加龍骨少許犯房勞加經布煅一錢或膽炙黃柏蝕去龜頭者加龜頭一個或鱉頭俱煅存性上製為末乾摻或人乳調搽或豬脊髓調搽形大者以生肌膏蓋之俟腐盡生肌時只以珍珠炒爆加冰片等分摻之膏蓋不必結痂肉變白色而自愈月白散治瘙疳輕粉五錢青黛五分冰片一分為末先用燒酒調飛丹敷瘡上一二時洗去敷前藥一用兒茶煅貝齒青黛各一錢冰片三分為末用一用膽炙黃柏白芨等分為末用下疳應用方八珍湯六味地黃丸補中益氣湯見潰瘍門楊梅一劑散見楊梅門加味五寶丹見倒發門加味逍遙散見瘰癧門陰濕瘡陰濕瘡生陰毛之際如疥如癬瘙癢難忍由腎虛風熱所致搽銀杏散初次痛甚忍之三日三上則不痛而全愈矣如陰毛之際如豆如餅發癢結蠟皮者梅毒也於梅毒門治之銀杏散治陰濕瘡瘙癢徹骨不可忍者雄黃乾白果粉潮腦生礦子灰等分上為末用乾燒酒調敷婦人陰瘡陰瘡運氣皆屬於寒經曰太陽之勝陰中乃瘍隱曲不利治以苦熱仲景云少陰脈滑而數者陰中生瘡少陰脈長陰中必挺出夫陰器屬足厥陰肝經任脈之會素問云督脈者其絡循陰器合纂間是屬督脈也至於足太陽外合清水內屬膀胱而通水道手太陽外合淮水內屬小腸而水道出焉則又屬手足太陽也腎主水則又屬足少陰也欲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱則又屬手太陰也素問又為前陰者宗筋之所聚太陰陽明之所合又屬脾與胃也癰瘍生於其間須細心求而責之不可專主一厥陰經而惟清肝導濕之為事斯無誤矣陰挺陰挺陰中挺出一條如蛇頭由足太陰脾虛或産後遇怒或經風所致初宜清熱疏風次朝服補中益氣湯倍升麻晚服龍膽瀉肝湯外兼敷洗陰菌陰菌肥邊腫痛中突起菌丁雞冠由肝鬱脾虛所致宜補中益氣湯歸脾湯倍加青皮梔子陰腫陰腫忽然腫而作痛名蚌疽由勞傷血分所致宜四物湯加丹皮澤瀉花粉柴胡或秦艽湯陰蝕陰蝕陰器外生疙瘩內生小蟲作癢難忍又名慝瘡由胃虛積鬱所致宜四物湯加石菖蒲龍膽草黃連木通若寒熱與虛勞相似者蟲入臟也宜逍遙散吞蘆薈丸早晚各一服外兼熏洗次以銀杏散塞入陰中殺蟲止癢若寡居患此隱忍不言必待攻刺疼痛口乾發熱形削食少者失合症也不治陰脫陰脫開而不閉也癢痛出水由憂思太過所致宜逍遙散歸脾湯俱加柴胡梔子白芍丹皮由産後得者補中益氣湯加五味子醋炒白芍俱用荊芥枳殼訶子文蛤大劑煎湯熏洗陰㿗陰㿗子宮脫出也俗名㿗葫蘆由氣血虛者用補中益氣湯去柴胡倍升麻加益母草外以萆麻子肉貼頂心再用枳殼半斤煎湯熏洗由努力負重所致者灸臍下四寸五分七壯立效由思欲不遂肝氣鬱結必先小便時堵塞因而努力久之隨努而下也令穩婆扶正葫蘆令患婦仰臥以枕墊腰吹嚏藥收之收入即緊閉陰器隨以布帛將兩腿縛之即小便亦須夾之內服大補升提之藥可以暫愈若寡居者須令進步除根陰瘡主治方素艽湯治陰戶腫痛小便澀滯甚者便如馬溺二腿拘攣秦艽六錢石菖蒲三錢當歸三錢蔥頭五個水二鍾煎一鍾食前服外用艾葉一兩防風六錢大戟五錢水煎熏洗牛膝湯陰內尿血腫痛名血結症也牛膝五兩黃酒二斤煎半斤作三次服桃仁散陰腫作癢桃仁炒為末每服二錢黃酒調服仍搗爛敷之溻癢湯洗陰蝕作癢鶴蝨一兩狼毒苦參歸尾威靈仙蛇床子各五分用河水十碗煎熟加豬膽汁二三個先熏後洗一加乾漆又方川椒一兩吳茱萸一兩蛇床子五錢藜蘆五錢陳茶葉一撮食鹽煨二兩水煎熏洗文蛤湯洗陰戶腫痛文蛤小麥皮硝白礬各一兩蔥白十根水煎熏洗銀杏散陰癢生瘡杏仁去皮尖輕粉水銀鉛製雄黃等分為末每用一錢棗肉二個和丸絲綿包裹線扎留頭在外先用前溻癢湯洗畢次入戶內如小便取出便訖再入一日一換四五個自愈一加枯礬減半用豬肝一片或雞腿一隻煮滾取出摻藥於上插入戶內冷則易之三灰散陰疳鹿角灰一錢雞內金灰一錢紅絨灰七分黃連一錢兒茶七分珍珠五分輕粉五分冰片五分麝香二分共為末一抹即愈一用硫黃一錢輕粉五分冰片三分麝香二分為末頂用黃連二兩水二碗煎一碗去渣再煎至一酒鍾調前藥鵝翎蘸掃陰內陰蝕熏方雄黃一錢硫黃五分桃仁五個木鱉子肉二個艾葉五錢一加銀硃一錢紙卷作條安灰盆內點著入馬桶內患者坐於上熏之其蟲立死陰瘡應用方補中益氣湯見首卷龍膽瀉肝湯蘆薈丸俱見疳瘡門歸脾湯逍遙散俱見瘰癧門囊癰夫囊癰者陰囊紅熱腫痛也由肝腎陰虛濕熱下注所致治以補陰為主清熱滲濕之藥佐之如初起腫痛小便澀滯者清肝滲濕湯或送六味地黃丸因寒中未經發散者用紺珠丹汗之次用滋陰清濕等藥焮腫便閉者服神授衛生散己成者托裡消毒散去桔梗加澤瀉穿山甲外用如意金黃散蔥湯和蜜調敷堅硬無膿紫色作爛欲外腐也蟾酥錠為末摻之膏蓋服滋陰藥俟腐脫搽紅黑二膏如余腫俱消惟一處不消欲作膿也托裡消毒散倍用皂角刺透之膿熱作脹針之以免遍潰其囊法以油頭繩扎住腎子開海底穴膿出自盡服十全大補湯加牛膝丹皮膿出而仍腫痛者熱未解也托裡消毒散加膽草梔子柴胡余腫俱退只一條不消者肝虛也六味地黃丸去茯苓加五味子兼補中益氣湯加茯苓口乾便數者腎虛也六味地黃丸因膀胱酒毒所乘者六味地黃丸料加車前子牛膝內熱晡熱肝虛也四物湯加參術體倦食少者脾虛也補中益氣湯膿水清稀者氣血虛也十全大補湯久而不斂者大補湯加麥冬五味子外兼豆豉餅灸之睪丸懸露者杉木灰托之紫蘇葉包之或瑩珠膏代之內外得法旬日可瘥若攻其毒則陰道愈虛投淡滲之藥則真陰愈損雖少壯者多成痼疾況虛弱者乎更誤作疝治投以熱藥必難收斂以至膿清脈大者不治囊癰與疝氣相類但癰則陰囊紅腫熱痛內熱口乾小便赤澀若疝則小腹痛牽引腎子少熱多寒好飲熱湯為異耳若水疝雖腫而光雖痛有時不紅不熱按之軟而即起為異耳宜以針引去水氣則安內服本門之藥不作忽然囊紅髮熱陰子一大一小狀若傷寒其發迅速者卵子瘟也宜灸肩尖穴七壯或九壯即愈患左灸右患右灸左取穴法立棍一條伸手扶棍以手與肩平為則則肩上有窩窩即穴也囊內睪丸上忽然突出一點堅硬如箸頭疼痛異常身發寒熱者暗疔也治見疔門因患痔漏久而串及於囊者腎囊漏也治見漏門囊癰主治方清肝滲濕湯治囊癰發熱腫痛小水不利者川芎當歸白芍生地柴胡膽草炒黑梔子花粉黃芩各一錢澤瀉木通甘草各五分用水二鍾煎一鍾食前服囊癰應用方六味地黃丸紺珠丹神授衛生散托裡消毒散如意金黃散十全大補湯補中益氣湯瑩珠膏俱見首卷蟾酥條即蟾酥丸見疔門腎囊風腎囊風者陰囊作癢甚則疙瘩頑麻破流脂水由肝經風濕所致宜龍膽瀉肝湯柴胡勝濕湯蒜豉丸服之蛇床子湯熏洗之龍膽瀉肝湯治囊風濕癢及陰腫淋澀等症膽草用柴胡拌炒黃連用吳茱萸拌炒余如常法見疳瘡門蒜豉丸治陰汗濕癢淡豆豉為末煨大蒜搗和為丸桐子大硃砂為衣每服三十丸空心用紅棗燈心湯送下蛇床子湯囊風疙瘩作癢搔之作痛蛇床子威靈仙歸尾苦參各五錢水煎熏洗一加白礬一用茄科煎洗一用溫醋洗一用薑湯洗狼毒膏治前症並一切癢瘡狼毒檳榔硫黃文蛤川椒枯礬蛇床子大風子各三錢為末用香油一大盞前滾入皮硝三錢再煎滾下公豬膽汁一個和勻調前藥擦患處腎臟風瘡腎臟風瘡即腎囊風也以其久之則有耳鳴目癢鼻赤齒浮手叉白色等症及上攻下注遍體生瘡宜三因四生散三因四生散戴院使云前症因精氣不調襲風所致白附子白蒺藜炒去刺黃耆蜜炙羌活等分為末每服二錢鹽酒送下或用豬腰子剖開摻藥加鹽煨熟食之婦人血風瘡亦驗青莧膏治前症並婦人臍下連二陰生瘡狀如馬刀痛出黃汁食減身浮二便澀滯由中下二焦風熱所致若熱氣不出當作內痔腸癰馬齒莧四兩研爛入青黛一兩再研勻塗之稍干再換消腫止痛退熱立驗內再服八正散尤佳肩部經絡肩之上廉屬手足少陽經前廉屬手陽明經後廉屬手太陽經肩疽生於肩腫赤引背靈樞為疪癰甚連腦脅治宜汗之須汗出至足無害四五日內逆𤋲之一灸會宗穴三七壯甚者灸肩真穴七壯肩癰生肩外垂骨兩接骨處恐膿深徹骨慮傷筋脈拘攣宜緩筋之藥餌之過肩疽腫發兩肩及兩膊連胛骨者一名干疽一名丁疽令人寒戰口噤身熱不赤此手足三陽交會之所由風襲熱鬱所致十日可刺無血者死太陰疽生肩胛骨上一名肩後疽屬手太陰肺經積熱所致即蓮子發也若色黑喘嗽大渴胸滿脈微者不治蜂窠疽生於肩前一二寸先熱後寒皮赤潰有四十九竅形如蜂窠灸三間穴二七壯上按症與腫瘍潰瘍總治例同法臑部自肩至肘曰臑經絡四肢者諸陽之本也陽實則肢腫陽虛則肢滿又云脾主四肢脾實則四肢不舉濕盛也脾虛則四肢不用懈惰也又臑臂須別六經究其痛在何經加以本經之藥行其氣血則症愈矣別經之法以兩手伸直貼身垂下大指居前小指居後而定之則其臂臑之前廉者屬陽明經以升麻白芷乾葛行之後廉屬太陽經以藁本羌活行之外廉屬少陽經以柴胡行之內廉屬厥陰經以柴胡青皮行之內前廉屬太陰經以升麻白芷蔥白行之內後廉屬少陰經以細辛獨活行之又薄桂味淡能橫行手臂引他藥直至痛處白薑黃之性亦同何則為非辛不能以達四肢也治肩膊風寒濕一切疼痛服蠲痛無憂散立止見諸痛門臑癰臑臂表裡俱腫色赤而堅惟肘節處差小故又名藕包毒灸少海穴七壯髎疽生肩下連腋灸會宗穴七壯樂疽生肩內堅如鵝子按之痛入骨惡風灸腋門穴三七壯肩風毒生臂上節腫連肩顒臂癰生肩外垂骨兩接骨處或從肘引至手接骨處由榮衛不調所致如膿深徹骨慮傷筋脈拳縮治宜緩筋之藥魚肚發生於臂內按上症初宜衛生散或蠲痛無憂散加羌活獨活桔梗桂枝酒水煎服若漫腫無頭服敗毒藥不消者十全大補湯加桔梗桂枝托之托之不應者由濕痰流注經絡也榮衛返魂湯加南星酒芩調之若臂痛不能舉及左右轉痛者由中脘伏痰也宜千金指迷丸九轉玉華丹導之脈細皮寒瀉利不食者為五虛雖盛暑之時托裡溫中湯之類溫之甚者臍膜冷痛昏憒灸左乳下黑肉盡處二七壯脈緊細而筋攣者肝虛而有風寒也四物湯加丹皮澤蘭白朮潰深不痛胃氣虛也膿水清稀瘡口不合氣血虛也俱大補之石榴疽生肘上寸余亦生於各經及臂初起黃粟小泡根便開大色紅堅硬腫如覆碗破翻如榴寒如瘧由少陽相火與外濕相搏所致初起宜蟾酥丸汗之外以艾灸九壯貼蟾酥餅蓋膏焮腫處敷金黃散次服消毒無憂散加菊花清之煩躁熱甚者護心散金液戊土丹九日後作稠膿痛減進食表裡俱退者可保無虞反此者逆潰後同潰瘍調理一法破後惟菊花蕊煎湯洗之最佳次以菊花燒灰存性加輕粉兌勻敷之諸藥不及此或灸天井穴肘癰生於肘尖經云心肺有邪其氣留於兩肘治同臂癰白芷升麻湯治臂腫痛乃陽明經分野由八風之變者然身半以上風受之治宜卻風邪和經脈使無壅滯亦發表之意也黃耆二錢酒芩二錢生芩一錢白芷八分連翹二錢升麻五分桔梗五分酒紅花三分炙甘草三分酒水各一鍾煎八分食遠熱服臑部應用方神授衛生散十全大補湯托裡溫中湯金黃散護心散俱見首卷蠲痛無憂散見諸痛門榮衛返魂湯見腫毒門九轉玉華丹千金指迷丸俱證治粗評蟾酥餅蟾酥丸俱見疔瘡門臂部經絡與臑部同腕癰生手屈處由手三陽風熱所致兌疽生手腕動脈之間筋寄之上痛徹手膊穿骨疽生兌疽之上三寸兩筋之間骨螻疽生於手臂陽明分野初起如粟如豆旬日內大如核桃色紫枯而痛甚由積憂鬱怒所致善於遊走發搐拘急見惡症者不治亦由陰虛之極火獨光之故發暴而死速也螻蛄串生兩手及手背內關前後初起筋骨隱痛漫腫堅硬不紅不熱或連腫數塊日久被流白漿串通諸竅腫痛仍在虛症並生由思慮傷脾氣鬱所致惟氣血澆薄者多有之始終俱宜益氣養榮湯加味逍遙散扶助元氣十中可保二三如補而不應者不治臂癰生於臂見前臑部手部經絡大拇指屬手太陰肺經食指屬手陽明大腸經中指屬手厥陰心胞絡經無名指屬手少陽三焦經小指屬手少陰心經手發背生於手背初如水刺無頭漫腫破爛至骨由二陽經風熱所致宜羌活散熱加薑黃寒加桂枝有表症者紺珠丹汗之里症者內疏黃連湯下之元氣虛者宜大補之手心毒生於手心一名穿掌毒由心胞絡經積熱所致手癰生於手心偏於掌邊一名穿埂毒二症治同手發背外用藕節煎湯浸洗再搗田螺肉敷之病蝦生於手背腫赤如蝦用消毒等藥外以鹽糟油炒令香淬以熱湯淋洗患處合谷疔生於虎口又名虎口疽丫叉毒擘蟹毒皆其名也如初生小泡疙瘩癢熱焮痛者多有紅絲上腋由手足陽明濕熱攻注初宜刺破瘡頂搽拔疔散蓋膏余腫處磨離宮錠子塗之內服蟾酥丸或紺珠丹汗之膿成脹痛者針之插蟾酥條膏蓋自愈手叉發為五指叉處結腫焮痛也治同虎口疽灸內關間使各三七壯調疽生於手大指頭若生於別指指頭則又名熛疽敦疽也初發如粟如豆漸大如桃如李青紫麻木癢痛徹心俱由肺經積熱所致四日宜刺得膿血者生黑血者死若黑色無膿不痛者則又名斷指也治宜截之與脫疽同治見足部蛇頭疔生於手指尖一名天蛇毒腫若蛇頭痛楚連心寒熱交作由心經心胞絡二經積熱所致初起用代指膏豬膽敷抹若用陽燧錠子於指頭上灸五壯反大痛少時即愈或內服蟾酥丸汗之失治破後腫仍不消者插蟾酥條黑膏蓋之腐爛者紅黑二膏貼之虛而不斂者補之蛇眼疔生於指甲兩旁蛇背疔生於指甲之下蛇腹疔又名魚肚疽生指中節前面腫如魚肚蛇節疔又名蛀節疔生指中節面背俱腫泥鰍疽其腫甚於蛀節疔俱痛連肘臂凡手部生毒膿成脹痛者即宜針之然針亦有法如手指有毒用繩或細帶先扎指根如掌背生毒用繩帶先扎手腕少時則手指掌處脹急難堪隨用鈹針劃破出膿水令完以藥水洗淨摻生肌藥令遍隨以膏藥裹之絹條縛之畢方去所扎繩帶即合口而愈代指生指甲邊焮熱腫痛結膿甚者指甲脫落症類指疽然無蘊毒故不黯黑也由血熱所致得冷藥一味漬之為佳僵螂蛀生手指中節背面通腫形如蟬肚與泥鰍癰相似然此症初起不紅不熱不痛日久方痛痛久方腐腫仍不消非若鰍癰之暴發也由手少陰痰氣凝滯而生腫則以離宮錠子塗之腐則以蟾酥餅子貼之內服滋補之藥免變虛勞是症非以年計不可以言愈也瘑瘡生於手足形如茱萸相對癢痛破流黃汁浸淫時瘥時發由風濕客於膚腠也以殺蟲為主用藜蘆膏敷之狐貍刺由手指揩著庭木痛不可忍十日後瘡口日深用蒲公英草根滴白汁塗之鵝掌風初起紫班白點久則皮枯堅厚或破裂不已由胃熱血燥兼外受風寒所致亦有因生時瘡餘毒未盡結於此宜二礬散洗之三油膏搽之或紺珠膏久貼亦愈再與楊梅門參考手部主治方羌活散治手發背及手掌毒羌活獨活前胡桔梗烏藥荊芥當歸升麻薄桂威靈仙甘草用水酒各一鍾煎一鍾食遠服代指膏治代指雄黃朴硝等分用豬膽汁少加香油調塗藜蘆膏治瘑瘡癢痛黃水浸淫藜蘆苦參各一兩豬脂半斤浸七日煎十數沸去渣入松香一兩化離火入雄黃末枯礬末各一兩攪勻塗之以瘥為度二礬散鵝掌風皮膚枯厚破裂作痛越重越妙白礬四兩皂礬四兩兒茶五錢側柏葉半斤水十碗煎數滾聽用先以桐油搽患處次以紙捻蘸桐油點著向患處熏之片時次用前湯乘熱貯淨桶內手架上用布蓋以湯氣熏之勿令泄氣特微熱傾入盆內蘸洗良久一次可愈七日不可見水一用婦人經布滾水洗下炸患處效二油膏鵝掌風及血風等瘡桕油牛油香油各一兩黃蠟一兩銀硃一兩鉛粉二錢麝香二錢成膏搽患處火烘之以油干為度手部應用方紺珠丹內疏黃連湯陽燧錠子離宮錠子俱見首卷蟾酥丸拔疔散俱見疔門股部足三陽之脈在外曰髀足三陰之脈在內曰股股部足三陽之脈在外曰髀足三陰之脈在內曰股經絡前廉足陽明胃經後廉足太陽膀胱經外廉足少陽膽經內廉足厥陰肝經內前廉足太陰脾經內後廉足少陰腎經股陰疽生股內陰囊之側形長微赤痛甚膝曲難伸上發下易治下發上難醫灸商丘穴七壯或灸膝下外廉橫骨盡處陰疽生夾縫之下三寸在左漫腫痛連陰子上及小腹下及大腿灸中都穴二七壯玄疽生夾縫之下在右灸蠡溝穴三七壯伏兔生胯下五六寸寒熱焮腫無頭疼痛徹心肚門癰生於大腿肚箕門癰生股內近膝股陽疽生股外側靈樞云腫不變色內薄於骨環跳疽生環跳穴漫腫隱痛尺脈沉緊腿不能伸按上症初起紅腫焮痛者神授衛生散漫腫大痛者內托黃耆湯痛而筋攣脈弦而緊者紺珠丹汗之痛止易以神應養真丹遍身走痛兩日後腳面結腫腿股結塊脈浮輕重緩者由寒邪外襲也紺珠丹汗之痛止則宜托裡倍加參朮歸耆焮腫便閉煩躁飲冷脈數者熱淫於內也內疏黃連湯貴金丸下之腫痛寒熱發渴脈洪數而有力飲食如常者由足三陽之濕熱壅滯也檳蘇敗毒散腫痛寒熱止易以逍遙散腫痛色不變寒熱食少體倦者由脾虛濕痰下注也補中益氣湯加茯苓半夏芍藥患此入房腫硬二便不通者六味丸料加牛膝車前二便利仍用補中湯潰而膿清者十全大補湯加牛膝外以豆豉餅灸之再瘡口紫陷者再加大附子外以附子餅灸之食少者胃弱也諸虛皆稟於胃宜六君子湯加藿香當歸俟食進更以十全大補膿出惡寒不食脈細如絲者用人參一兩附子三錢薑棗煎服潰而反痛氣血虛也峻補之補之則氣化氣化則痛自除再環跳疽者由脾移寒於肝也惟黃狗下頦方神驗兼助以胃氣更宜外刺委中穴出黑血自瘥附骨疽生大腿外側咬骨疽生大腿內側腫下而堅者發於筋骨乃陰寒入骨之病也初起則寒熱交作稍似風邪隨後筋骨作痛不紅不熱疼至徹骨甚者不能曲伸或皮肉微急洪洪如肥狀是症皆宜灸之尉之以散毒氣補陽氣溫脾氣為主灸法於痛處周圍灸之百壯起泡可治無泡難治或以箸頭點痛處墨記之艾灸百壯以爆為度又以患者覺骨中疼為效又附骨疽灸懸鐘穴七壯咬骨疽灸陰包穴三七壯環跳穴痛灸崑崙穴二七壯初起寒熱作痛者以紺珠丹汗之次以大防風湯行經絡活血補虛生於尻臀漫腫作痛者內托羌活湯生內股近膝漫腫不痛者內托耆柴湯生腿外側漫腫作痛者內托酒煎湯然必外兼灸之尉之淋洗之以助其陽蓋腎主骨腎虛則骨冷寒邪乘之則氣血凝滯但能為腫不能為膿故流注者乃傷寒之餘毒由表之未盡也附骨疽者乃流注之壞症由涼藥之誤也久之陰極生陽寒化為熱熱甚則肉腐化而為膿也欲作膿者附子八珍湯膿成脹痛者針之實者膿稠十全大補湯虛者膿清保元大成湯若氣敗者死食少體倦者香砂六君子湯脾虛寒熱者補中益氣湯久潰不已者必出朽骨視其膿膿白清稀者朽骨初脫肉深難取膿白而稠者朽骨將出肉淺可取大抵瘡疽旬日不退則宜托裡有膿針之有腐取之虛則補之方能收十全之功有因復犯房欲勞傷致令寒熱互變氣血乖違經脈橫解受病日深以成斯疾者則大腿漸漸腫如冬瓜上過胯腹下連足底牽連漫腫日久潰膿色白腥穢腫痛不減元氣日衰者終為不治腿遊風外腿忽然赤腫熱痛按之如泥不復起者由風熱相搏所致宜砭去惡血服當歸拈痛湯及紺珠丹和之股部主治方內托羌活湯治尻臀堅硬腫痛兩尺脈緊數按之無力者羌活一錢黃柏酒浸二錢防風歸尾藁本各一錢黃耆一錢五分肉桂三分連翹蒼朮陳皮甘草各六分紅花五分用酒水各一鍾煎八分食遠服內托酒煎散治寒濕發於腿外側少陽經分野患癰或附骨癰堅硬漫腫作膿或流至足陽明經者黃耆當歸各二錢柴胡一錢五分連翹肉桂大力子各一錢升麻黃柏甘草各四分用酒水各一鍾煎一鍾食前溫服大防風湯治三陰不足風邪乘於兩膝作痛久則膝愈大而腿愈細因名鶴膝風乃敗症也非此方不能治又治附骨疽皮色不變大腿通腫疼痛無奈及痢後腳痛緩弱不能行步或腿膝腫痛防風三錢人參二錢白朮黃耆杜仲牛膝當歸川芎白芍熟地羌活大附子甘草各一錢用生薑三片水二鍾煎一鍾食前服神應養真丹治足厥陰肝經為四氣所襲腳膝無力及左癱右瘓手足頑麻語言謇澀遍身疼痛當歸川芎白芍熟地酒蒸搗膏羌活天麻木瓜菟絲子等分為末入前地黃膏加蜜丸桐子大每服百丸空心溫酒鹽湯任下黃犬下頦方治肚癰小腹癰及腿內貼骨癰神效然而亦治發背大抵此方治下部癰疽更效黃狗下頦連舌連皮毛劈下入罐內鹽泥封固鐵盞封口煅一炷香覺煙清即止取出色黑如炭為度全要存性若帶白色其性已過則無用矣用時研極細末宜於屠家取已殺者制用若生取特殺則反招不祥慎之戒之豆粉俗名水寒豆又名小寒豆生用為末白蘞上三味各為末等分和勻每服以五錢為率黃酒空心調服外以此藥用香油調敷患處其驗以服藥後出臭汗及熟睡為準按此方世多用之為敷藥散腫止痛而不知可以內服為下部癰疽內消之聖藥也一轎伕環跳穴痛甚如雞啄火灼與此藥三錢酒服之未愈更進一服則霍然如失穿山甲散治癰疽漫腫不變色者能托裡排膿及附骨疽在裡能內消止痛露蜂房一兩蛇蛻二錢五分頭髮二錢五分一方等分燒存性加穿山甲二錢五分為末每服二三錢加乳香末五分溫酒調服些三生散加穿山甲也治附骨疽神效栝蔞內托散癰發於腿外側者善能活血消毒栝蔞一個半生半炒人參歸尾沒藥各五錢甘草一錢黃酒二碗煎一碗食前服還少丹治鶴膝風等症此藥補肝腎進飲食誠對症之良劑也熟地黃山藥微炒山茱萸白茯苓枸杞巴戟天酒浸牛膝酒浸五味子肉蓯蓉酒浸去鱗焙乾酥炙杜仲酒薑拌炒遠志甘草水浸湯下楮實子酒浸石菖蒲去毛忌鐵小茴香鹽酒炒續斷酒浸菟絲子酒蒸等分上為末煮紅棗肉加蜜為丸桐子大每服五六十丸空心及食前各進一服黃酒鹽湯任下追風逐濕膏治骨節疼痛濕痹麻木筋攣等症西聖膏一斤見首卷加木香胡椒各一兩白芥子二兩為末入膏內攪勻攤貼痛處外灸方治風寒濕氣腰腳疼痛良薑防己等分為末搗大蒜和為餅安痛處鋪艾灸之以痛至不痛不痛至痛為度敷腫方治膝痛並寒濕腳氣文蛤醋浸炒吳茱萸等分上為末用米醋調敷痛處汞升膏治附骨疽痛銀硃為末燒酒調敷如腫毒用生桐油調敷金蟾膏治骨疽膿汁敗壞骨從瘡口出者大蝦蟆一個亂頭髮雞子大一團豬脂油四兩煠二味煠枯去渣收用先以桑白皮烏豆煎湯淋洗瘡口拭乾搽之一治多骨疽及瘰癧瘡用密陀僧末生桐油調敷附醫案一人股內側痛久醫作痛風治月餘罔效膿熟肉厚不能穿穴因潰入腹精神昏憒粥藥不進請豫視之脈細如絲氣息奄奄欲絶曰可治以鈹針刺腹膿大泄數升然皆清膿如水瘡口如蟹吐沫疑其透膜曰無傷也投以參耆附子加以厥陰引經藥大劑服之再食前吞八味地黃丸百丸食大進日噉飯升余肉數臠旬日而愈所以知其可治者潰瘍之脈洪實者死微細者生今脈微細形症相合知其受補也所以信其不透膜即透膜亦可治者無惡候也服八味丸者使腎氣旺而上升則胃口開而納食也瀉膿雖多更進以開胃藥使多食粱肉以補之肌自速生此治潰瘍之大法也股部應用方神授衛生散紺珠丹內疏黃連湯貴金丸補中益氣湯六味地黃丸十全大補湯六君子湯刺委中穴法按穴灸法八珍湯保元大成湯香砂六君子湯俱見首卷逍遙散見瘰癧門檳蘇敗毒散膝部經絡經曰肉之小會為溪溪者二肘二膝四腕也又曰脾病在溪又曰腎有邪其氣留於兩膝諸筋皆屬於節筋病皆屬於節又屬乎肝也筋病無多食酸忌用風藥諸癰發於節而相應者不治應為內發透外也發於陽者百日死發於陰者三十日死陽為諸節之背陰為諸節膕郤間也疪疽發於膝靈樞云其狀大癰色不變寒熱而堅勿石石之者死柔之者生膝癰膝蓋腫痛也初起用衛生散加牛膝或用加味二妙散膝眼風膝之兩傍有穴名鬼眼穴初起腫痛如錐寒熱偏劇宜紺珠丹和之鶴膝風兩膝內外皆腫寒熱間作痛如虎咬股漸細而膝愈大是也屬足少陽陽明二經初宜紺珠丹汗之外以玉龍膏酒調敷之以住痛回陽如汗後腫痛不減陰寒深伏也大防風湯溫之或加乳香以住痛舒筋灸膝眼穴二七壯甚者見青筋痛引足心灸三陰交穴二七壯待膝伸直為止再甚者則於膝頂上灸七壯乃祕穴也遊膝風只一膝痛引上下為異耳發微熱不甚腫初宜紺珠丹汗之石疽腫不變色漫腫疼痛堅硬如石此寒氣之腫也或搗生商陸根加鹽少許敷之緩疽其熱緩慢積日不潰久乃黯紫皮肉俱爛二症俱宜溫補按上諸症雖云腫有淺深感有輕重其所受皆因真氣虛而邪氣得以深襲之也故附骨疽鶴膝風等症由腎虛者多有之前人用附子者為溫補腎氣又能行藥勢以散寒邪也亦有體虛露臥為冷氣所襲者則不能轉側乍熱而無汗按之其痛應骨為賊風所傷者則不甚熱而惡寒不時汗出尉之而痛少止俱服大防風湯敷玉龍膏可愈如失治則變攣曲偏枯之敗症矣又兩膝腫痛而腿筋弛長者由陰虛濕熱所乘也主以六味丸佐以八珍湯加牛膝杜仲間以補中益氣湯又脾胃虛者以補中益氣湯若精涸口乾中氣不足也加五味子頭暈頭痛陽氣不升也加蔓荊子肝腎傷者則形瘦嗜臥寢息發熱痰盛作渴小便頻數五臟虛損也俱宜六味地黃湯臍腹疼痛夜多漩溺腳膝無力頭暈吐痰腎氣冷敗也俱宜八味地黃丸膿成及潰後畏寒憎寒者陽氣虛也水清稀不生肌肉者氣血虛也虛熱往來有時而動者無根虛火也俱宜十全大補湯按上三湯俱佐以大防風湯為要再如食少腹脹脾胃虛也四君子湯面色痿黃脾胃弱也六君子湯發熱晡熱陰血虛也四物加參耆白朮發熱大渴而不欲近衣面目赤色脈大而虛者血虛發燥也當歸補血湯委中毒生膝後折紋中堅硬如石微腫微紅由膽經積熱流入膀胱也治緩則筋縮而成廢疾宜刺委中穴筋上出紫黑血又宜服逐瘀活血等藥候瘀血下自消上水魚生折紋之側結長核如魚作腫痛宜用針亂刺核上出其惡血再以活瘀之藥敷之膝部主治方加味二妙散治膝腫初起者黃柏七分蒼朮歸尾赤芍桃仁南星牛膝膽草各一錢黃芩連翹羌活各五分紅花木通甘草各三分金銀花二錢用水二鍾煎八分加薑汁二匙食前服藥酒方治鶴膝等風松節二兩青風藤虎脛骨草烏薑汁浸炒威靈仙薏苡仁杜仲五加皮黃連洗當歸牛膝川芎金銀花紅花各一兩木瓜八錢白芷穿山甲獨活沒藥乳香各五錢肥皂子仁四兩核桃仁四兩杵如泥燒酒二十斤黃蠟四兩入壇內封口重湯煮三炷香取出埋土內三日空心食前任服核桃肉過口五加皮酒方治鶴膝等風五加皮八兩當歸五兩牛膝四兩無灰酒一斗煮三香日二服以醺為度洗方治鶴膝等風蘄艾半斤水煎蒸洗洗一次消一分膝部應用方神授衛生散紺珠丹回陽玉龍膏大防風湯見股部六味地黃丸八珍湯補中益氣湯八味地黃丸十全大補湯四君子湯六君子湯俱見首卷脛部三里發生三里穴形如牛眼五七日出黑血拘急冷痛由勞力傷筋所致惟宜湯藥射其外自愈腓腨發生足小肚寒熱煩躁由腎虛積熱所致初宜衛生散加牛膝木瓜已潰用十全大補湯及腎氣丸補之出清水者死黃鰍癰生小肚內側長三四寸一名脛陰疽微紅微腫堅硬加石痛甚由脾經濕熱或肝經積憤所致初宜五香流氣飲加下部引經藥潰而出清水嘔吐不食者不治青蛇毒生足肚之下亦長二三寸寒熱不食由足少陰太陽濕熱下注蛇頭向下者順向上難治宜針蛇頭出黑血搽拔疔散腫處塗離官錠子內服藥與腓腨發同接骨發生足接骨之上足肚之下形如核桃色赤堅腫不痛宜早出膿慮其損筋附陰疽生於內踝以上三寸靈樞為兔齧初起小泡漸生赤腫痛能徹骨如無膿者不治內踝疽生於內踝骨上一名鞋帶癰靈樞為走緩色不變而石屬肝胃二經虛熱外踝疽生於外踝骨上屬膽與膀胱虛熱穿踝疽初則內踝腫痛久則串及外踝內外通腫也由足三陰經虛熱下注初宜紺珠丹榮衛返魂湯膿成者針之潰者補之補而不應者必成廢疾灸患足大指端三壯濕毒流注生於足脛狀如牛眼由風濕外浸初宜紺珠丹加下部藥瓜藤纏生於足脛結核數枚腫痛久之潰爛不已屬足太陽經濕熱初宜榮衛返魂湯加減或五香流氣飲腎氣遊風生於足肚紅腫熱痛宜紫蘇流氣飲及檳榔丸血風瘡生於脛一名爪風瘡由三陰經風虛血燥所致初發則瘙癢無度破流脂水日漸沿開宜當歸飲子加梔子柴胡忌投風藥如寒熱食少體倦者肝脾鬱火也八味逍遙散晡熱盜汗者腎肝虛也六味地黃丸若婦人則由經脈不調血氣漬於足陽明也五積散加黃柏牛膝俱外兼敷洗臁瘡女人為裙風褲口生於外臁者由三陽經濕熱易治宜胃苓湯加紫蘇牛膝以滲濕次服八珍湯加荊芥防風羌活白芷連翹金銀花以固本生於內臁者由三陰經虛熱難瘥宜補中益氣湯加茯苓白芍藥及六味地黃丸八味地黃丸外兼洗貼蒸灸等法鱔漏生於腿肚成瘡孔深出水用石灰二三升入盆內沖百沸湯先熏後洗以瘡發癢為效四彎風生於腿彎腳彎一月一發癢不可忍形如風癬搔破成瘡用大麥一升入砂鍋內水煮麥開花為度乘熱先熏後洗日二三次五七日可愈脛部主治方紫蘇流氣飲治腎氣遊風紫蘇厚朴陳皮香附檳榔大腹皮桔梗芍藥白芷甘草用水二鍾生薑三片紅棗二個煎一鍾食前服檳榔丸治症同前檳榔二兩枳殼二兩大黃四兩木瓜兩半木香一兩為末煉蜜為丸桐子大每取三十丸酒水任下當歸餅子治血燥膚癢及風熱瘡疥當歸川芎白芍生地防風荊芥白蒺藜何首烏各一錢黃耆五分甘草五分水二鍾煎一鍾食遠服搜風順氣丸見痔漏門並癩風門治腰腿疼痛風濕腳氣及下注一切惡瘡海桐皮酒治風熱腫痛海桐皮五加皮薏苡仁獨活防風全蠍炒杜仲炒牛膝各一兩生地三兩上㕮咀入布袋內浸無灰酒一斗五升密封春冬浸七日夏秋浸三日任服玄精湯洗血風瘡並賺瘡癢至徹骨者用鹽滷水溫洗之或食鹽一碗滾水沖化洗之洗去腐肉以出紅筋為度則好肉自生次用雄黃黃柏各二兩輕粉三錢和勻敷之絹帛扎之半月方解一用漏蘆煎湯洗之乳香法紙治爪風等瘡及一切寒濕瘡呈文油紙四張每張篩乳香末二錢五分雙摺卷一寸闊復作三折兩頭線扎用甘草一兩二錢水三碗煮紙須壓之煮一炷香取起去線將紙攤桌上每張用輕粉三錢不可研篩紙上用棕帚刷之令勻陰乾收用用時隨大小剪貼三日一換自然生肌如無水出不必再換銀蠟法紙治症同前厚綿紙鋪熱鐺上用黃蠟於紙上擦之令蠟化入紙內候冷用真輕粉勻篩紙上折注壓收用時隨瘡大小剪塊唾潤紙貼之一日一換即瘥柏粉膏治血風等瘡輕粉為末用生柏油調隨瘡大小攤紙上先用米泔水煎甘草洗過貼之布扎緊勿動先三日痛次二日癢再二日共七日去藥已全愈矣三益膏治血風臁瘡先用銀硃加萆麻子肉杵如泥作夾紙膏貼去黑肉令盡隨煮豬頭肉湯洗之次用青布五寸入生豬板油一兩白蠟末三錢卷條燃著按其油搽之愈生香膏臁瘡血風等症白松香四兩用蔥汁煮乾為末加生豬板油二兩搗成膏貼之次用紅粉生肌絳硼膏治下部一切寒濕血風頑臁等症香油半斤荊芥防風川椒各一兩槐枝二兩杏仁五錢浸七日煎枯去渣入黃蠟一兩溶化離火再下硼砂五錢乳香沒藥兒茶各三錢黃丹一錢血竭二錢一加樟腦五錢白花蛇炙一錢五分攪勻收用非疥藥脛瘡多年不愈者此效水銀文蛤鉛粉松香各三錢陀僧一錢銀硃五分樟腦四錢象牙二錢珍珠二分大風子三個核桃肉十三個共搗勻加香油調敷松油膏治血風等瘡諸藥罔效者枯礬十兩礬紅二兩麝香三分冰片五分熊膽一錢輕粉三錢乳香沒藥黃丹甘草黃柏大風子肉天麻子肉四味俱炒黑色各五錢雄黃蒼朮厚朴苦參各一兩上為末先用槐枝蔥艾川椒煎水洗過次用松油調敷紙蓋布扎二日一換敷洗如前取松油法取松節五六斤劈如指尖粗細用水缸一個貯水於內用銅盆一個水浸盆底與缸平上用米篩一個堆松節於篩上次用稻草灰蓋松節令密頂上置火倘松節煙出即用灰蓋之松油自下盆內瓷瓶收之勿令泄氣其松節燒過而米篩不壞為異弘濟膏治下部浸淫瘡疥及上部頭面𤼏蝕等瘡雄黑豆炒爆研破入酒瓶內與血餘相間鋪之七八分滿以鐵絲罩口或槐柳枝塞之次將方磚一個中鑿一孔以瓶口倒合於磚口內泥封密再次挖地一井井內安碗一個將磚蓋井上以瓶口對碗為要磚四圍封密勿令通風次以干馬糞堆磚上以埋過瓶底為度尖上燃火焚之過宿俟灰冷取出碗內油以鵝翎蘸掃患處頑臁蒸法取豆腐切指厚片隨瘡大小貼之腐上鋪艾灸之灸完加艾以腐水乾換腐再灸如前腐以三換艾以斤許為度則頑腐皆化次敷他藥方能獲效一用面作井圈圍瘡口井內安蠟餅一銅錢厚蠟上鋪艾灸之其蠟則化入瘡內俟火盡去艾灰其瘡之腐肉及四邊鎖口盡行挑去換生肌藥收口脛部應用方衛生散補中益氣湯十全大補湯腎氣丸八珍湯離宮錠子紺珠丹俱見首卷榮衛返魂湯見腫毒門八味逍遙散見瘰癧門拔疔散見疔瘡門五香流氣飲見流注門足部經絡足趺屬肝膽胃三經足大指屬肝脾二經次指中指俱屬胃經四指屬膽經小指屬膀胱經足跗發一名足發背屬肝胃二經之會由濕熱乘虛下注也初宜衛生散加木瓜檳榔紫蘇之類為引壯實者由風痰熱積而成宜牛黃金虎丹繼以十全大補湯托裡溫中湯陽疽發足趺膿稠可治膿清難治紫陷黑血者不治足心癰一名湧泉疽初起湧泉穴發熱乃其兆也由腎陰虛損所致宜隔蒜灸之服活命飲送六味地黃丸有表裡症者量為汗下已成者十全大補湯八味地黃丸大劑餌之取多年羊角燈燒煙燻之若黑陷不腫不潰膿穢煩渴嘔逆小便淋澀疼痛徹骨脈微代者為三陰敗症也不治脫疽生於足大指亦生手大指初起黃泡次如煮熟紅棗久則黑氣浸漫相傳五指由膏粱之變及丹石熱藥之所致此毒積於骨髓不紫黑者生未過節者可治若黑漫五指上傳足趺形枯筋練疼痛氣穢者死是症也在肉則割之在指則截之欲其筋隨骨出以泄其毒亦無痛苦若待毒筋內斷骨雖去而仍潰者亦不治也有為遺體不忍傷之而至夭者則尤傷矣然又不可一己醫治必與衆議更聽患者情意方可蓋為首尾變駁不定也截法於未延散時用頭髮十餘根纏患指本節盡處扎十餘轉漸漸緊之隨用蟾酥餅放原起米粒頭上加艾灸至肉枯瘡死為度次日本指盡黑方用利刀尋至本節縫中將患指徐順取下如血流以金刀散止之余腫以離宮錠子塗之次日倘有黑氣未盡單用蟾酥餅研末摻之膏蓋之黑氣自退其膿自生用紅黑二膏照常法生肌收口內服滋腎健脾安神補氣養血等藥須內無變症外無混雜十中可治三四若割取之後黑氣仍漫痛腫尤甚氣穢無膿口乾舌硬神昏不食者死一灸有關穴有因修甲受傷咬傷凍傷女因扎傷所致者宜各詳其因分而治之此為形似而來非穴真而受異也敦疽惟大指為脫疽其餘足指患之則為敦疽一名足指發腫痛赤色自潰者由元氣虛而濕毒壅盛也宜隔蒜灸之或陽燧錠子灸之離宮錠子塗之服無憂散托裡散已潰者十全大補湯加減八味丸灸踝骨尖數壯若先渴而後患者或先患而後渴者色黑而不潰不痛者此由高粱傷脾房勞傷腎精氣已竭也不治或治如前法亦有得生者甲疽因剪甲傷肌或甲長侵肉致使氣血沮遏而不通久之腐潰而生瘡泡或胬肉裹上指甲腫痛者此肌肉之病不循經絡亦不形於診也大抵甲疽惟宜剔甲則不藥可愈先用陳皮煎湯浸洗次用木綿旋折塞入甲內漸漸添之靸甲起以刀剪去之搽烏倍散足跟疽生於足跟骨下一名兔齧若兔之齧也此處乃督脈發源之所腎經所過之地若瘡口不合則蹺氣不能發生腎氣由此而泄惟宜大補否為終身之疾如漫腫寒熱體倦食少者脾虛下陷也補中益氣湯晡熱作痛頭目不清者脾虛陰火也補中並六味地黃丸痰涎上升口舌生瘡腎水乾涸也補中並加減地黃丸皆以滋其化源也外以鹽湯洗之白朮為末摻之二日一換厲癰生於小指延於足傍其狀不大四淫生於足上下其狀大癰二症辨形如脫疽用藥如敦疽再足指縫腫癢出水者腳心發熱作癢肌羸作渴吐痰者俱用六味地黃丸補中益氣湯以滋化源腫硬色白不潰者由陰虛為外寒所襲也大防風湯若專攻其毒未見其有生也足指縫爛至足底大塊厚皮脫去外若淺而內深痛難行步者取東行桑樹根白皮四兩搗爛同生白酒入瓶內重湯煮數十滾取服再飲以醉為度臭田螺生足指丫起白斑作爛癢痛流水甚則寒熱足面俱腫由胃經濕熱下注用甘草湯洗之嚼細茶塗之或用鵝掌皮燒存性敷之或生桐油調敷甚者蟾酥餅搽之三日後易珍珠散腫處敷金黃散牛程蹇足根腫脹皮肉頑硬由熱腳下水見風致令氣滯血枯所致初起用盆一個內安磚磚上安鴿糞糞上合罩籬以腳踏罩籬上次以滾水從旁衝入蒸之浸之冷則易之或用新磚燒紅用韭菜汁和醋潑之以腳踏之熏之內膿攻注者針之硬皮敲裂者剪之破流膿水者牛角散肉不生者絳珠膏皮不生者珍珠散土栗生足跟之旁黃腫如琉璃無膿由行路崎嶇肭傷筋骨所致宜活命飲膿熟針之冷疔生於足跟初起紫白泡疼痛徹骨漸至腐爛紫黑深孔出血水氣穢經久不瘥宜神燈照照之鐵粉散敷之腳氣瘡足膝間生瘡由腎虛風濕相搏所致久則漸增腫痛出黃水身熱經久不瘥宜服犀角散洗漏蘆湯敷龍骨散田螺泡生於足間忽如火燃隨生紫白黃泡脹痛由脾經風熱所致服解毒瀉脾湯外則挑破貼膏肉刺俗名雞眼用針撥破以蟾酥五分湯化調鉛粉一錢塗之裹之一以刀修淨厚皮取河豚魚膽塗紙上貼之二三次不發或以膽陰乾收用足部主治方牛黃金虎丹治足面生瘡下連大指上連臁骨每歲數發癢痛不常血出如湧服此丹良久大痛下硬物數十粒如鐵則痛癢頓除數日結痂而愈此方原載風門治中風痰涎壅塞今以之治臟腑久積熱毒如神牛黃五分冰片一錢膩粉五錢雄黃飛三兩白礬枯五錢金箔為衣天雄炮去皮臍二錢五分膽南星五錢或酒蒸蒸七日夜天竺黃五錢上為末煉蜜為丸重錢半金箔為衣每服一丸新汲水化下孕婦勿服百草霜腳面生瘡浸淫不已不問癢痛新舊悉效羊糞置瓦上四畔炭火燒盞覆存性為末麻油調敷癢加輕粉痛入麝香烏倍散治嵌甲草烏五錢白醜一兩龍骨二錢五分文蛤全者四兩先將三味捶碎入文蛤同炒至焦黑色只用五倍子為末麻油敷濕則乾摻牛角散治牛程蹇破流膿水牛角尖燒灰水龍骨松香輕粉等分上為末用牛骨髓調搽鐵粉散治冷疔生鐵粉即針砂如無用黑鉛四兩鐵杓化傾水中再化傾以鉛盡為度去水取末用三錢加松脂飛丹輕粉各一錢麝香一分上各為末和勻先用蔥湯洗淨以麻油調搽油紙蓋之扎之加味神燈照治脫疽敦疽依原方加蜈蚣三條番木鱉一個上為末和勻作捻熏照如常見首卷立應神燈照治漏蹄風足跟疽及楊梅結毒依原方見首卷加銀硃二錢水銀一錢黑鉛七分和勻熏照如法一方硃砂雄黃銀硃各三錢黑鉛一錢化入水銀一錢五分上為末用紅棗肉二十個杵如泥分十丸每日用一丸放小口罐內對患處燒熏勿令泄氣三日三丸即愈犀角丸治腳氣腫痛風毒生瘡心神煩躁犀角尖天麻羌活枳殼麩炒白蒺藜防風黃耆白蘚皮黃芩各七分檳榔一錢甘草炙五分烏梢蛇二錢酒浸用水鍾半生薑五片煎一鍾服漏蘆湯洗風毒腫痛濕瘡腳氣漏蘆白蘞槐白皮五加皮甘草各一兩五錢白蒺藜四兩上㕮咀每用五兩水一斗煮六升去渣淋洗龍骨散治腳疽並久遠惡瘡白龍骨輕粉各二錢五分豶豬糞新瓦焙乾燒存性五錢共為末先以口噙齏水或鹽湯洗瘡淨見紅肉次以香油調敷足部應用方衛生散十全大補湯托裡溫中湯六味地黃丸陽燧錠子離宮錠子加減八味丸補中益氣湯俱見首卷大防風湯見股部蟾酥餅見疔瘡門補遺經文肉之大會為谷肉之小會為溪溪谷之會以行榮衛以會大氣邪溢氣壅血熱肉敗榮衛不行必將為膿內消骨髓外破大膕言熱也熱則筋弛積氣留舍榮衛不養肉縮筋攣肘不得伸言寒也寒則筋攣內為骨痹外為不仁命曰大寒留於溪谷也谷者臀也溪者二肘二膝四腕也五臟有邪留於四肢節經曰心肺有邪其氣留於兩肘肝有邪其氣留於兩股脾有邪其氣留於兩髀腎有邪其氣留於兩膝又曰脾病在溪
