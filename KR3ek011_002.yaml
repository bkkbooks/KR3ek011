body:
  text: 卷二分治部上癰疽癰疽之原委順逆治法已詳首卷今之分部位者為別經絡認穴次定名色耳其症治不外乎首卷之提綱然間有稍異於總治者有專治本症之方而即以此方各附於本症條下則開卷瞭然庶無遺漏紊亂矣頭部經絡中行直鼻上巔屬督脈經又屬足太陽膀胱經傍開一寸五分為第二行是足太陽經再開一寸五分為第三行是足少陽經頭角直耳上中亦足少陽經百會疽生百會穴在巔之上初起如粟次大如錢形似葡萄堅硬色赤寒熱痛楚元氣厚者由熱毒上攻宜黃連消毒飲蟾酥丸貴金丸之類元氣弱者由虛陽浮泛宜八味地黃丸引火歸源更以附子餅置湧泉穴灸五壯以泄其毒若腫連耳項七日不穴神昏痰起者不治玉頂發一名佛頂疽生上星穴在百會疽之前由足太陽經風熱所致初起神授衛生散紺珠丹實者貴金丸虛者十全大補湯加羌活潰而黑陷脈大神昏二便閉者不治透腦疽生囟門之際在玉頂疽之前形如雞子堅而硬頭痛如斫灸缺盆穴二七壯侵腦疽生透腦疽之傍頭疼引目灸支正穴七壯二症初宜紺珠丹汗之次宜托裡散托之額疽生當額或兩額角一名赤疽腫如桃李由陽明胃經積熱所致實者貴金丸下之次以內托散托之潰者補之十日不穴潰而無膿出血者不治太陽疽生太陽穴一名勇疽狀如伏鼠腫連面目寒熱交加七日不潰毒即攻眼急宜貼破破慎風水犯則損睛屬陽明胃經治同透腦疽十一日刺得黃白膿者順清稀黑血者逆鬢疽生於鬢屬手少陽三焦此經多氣少血最忌見膿多由肝膽怒火或因風熱血虛所致初宜神授衛生散柴胡清肝湯清之次以托裡消毒散托之以速其膿膿成而至收斂時腎虛者六味地黃丸氣虛者補中益氣湯此症虛脈虛之治也若煩躁飲冷身熱脈大神昏者臟腑實也宜貴金丸所為瘡瘍實熱不利者下之是也宜灸伏兔穴二七壯此症雖屬少陽然脈症俱實者隨其壯弱瀉以重輕若守經禁而純投補劑非確論也有未見瘡時先作渴症一年半載始髮鬢疽色紫瘡黑平陷堅硬無膿毒流耳項氣穢容枯神昏不食者不治夭疽生左耳後鋭毒生右耳後俱一寸三分夭者妖變之物也屬肝木鋭者鋒利之器也屬肺金二症起於謀慮不決火鬱而成生於隱微發於不測及覺之時毒已入內矣紅活高腫易腐易膿者順堅硬伏陷未潰先黑未膿先腐臭穢易生元氣易敗此毒氣內攻也為逆微者加味逍遙散越鞠丸托裡消毒散隨時增損甚者十全大補湯非倍用參附不能以回其陽耳後疽生耳後折間屬三焦經高腫有頭者順無膿軟陷者逆甚則嗌腫頰痛肩肘俱疼初起者紺珠丹汗之熱甚者涼膈散清之已潰者如潰瘍門托之補之耳根毒生於耳根狀如痰核不動而微痛屬膽與三焦二經風熱所致宜衛生散或加升麻柴胡或貴金丸下之弱者神效栝蔞散托之因怒而耳下腫者或肋痛脈弦緊者小柴胡湯加青皮紅花桃仁牛蒡子再寒熱加荊芥防風蓋肝者內主藏血外主榮筋怒則氣逆故筋蓄結腫若不自加調攝肝迭受傷遷延結核再犯追蝕之藥因而不斂不治者多耳發生於耳輪初起如胡椒漸大如蜂房紫赤腫痛由三焦經風熱所致宜衛生散或加升麻桔梗壯者貴金丸汗之下之出黃膿者順出鮮血不食神昏狂躁者逆玉枕疽生於玉枕腦後發生玉枕稍下在風池穴形如硬癤堅而難潰痛引項肩氣粗鼻塞此足太陽膀胱經伏陽結滯而成少壯者紅腫出白膿易愈老弱者紫陷流黃水難瘥實者內疏黃連湯加羌活金銀花之類或衛生散貴金丸虛者托裡消毒散加升麻葛根酒沙黃芩梔子之類兼服蠟礬丸有頭者刺之塗拔疔散無頭者以離宮錠子塗之或灸風門穴三七壯艾如緑豆大腦鑠生於項後初起如橫木久之上至巔頂下至大椎未膿而皮先損或冷而木痛時流清水或熱如火燎痛如針刺黑如煙灶形如犬咬四畔堅若牛唇靈樞經云陽氣大發消腦溜項名曰腦鑠煩心者死此由陰精消固所致急用神妙拔根法見針門以通其竅內用十全大補湯加大附子及八味地黃丸以回其陽宜與項部偏腦疽法及腦疽醫案參酌之若攻補得法亦有得生者不可因其惡而棄之頭部主治方黃連消毒飲治百會疽由膏粱之變者惟宜苦寒禁用芳香等藥服後忌飲冷水犯之作膿而效遲黃連黃芩黃柏酒炒人參獨活防風藁本甘草炙甘草梢陳皮防己歸尾蘇木各五分知母酒炒四分羌活連翹黃耆歸身生地各一錢桔梗一錢澤瀉七分用水三鍾煎鍾半入酒少許再煎食後服柴胡清肝湯治鬢疽初起毋論陰陽表裡俱治川芎當歸白芍生地柴胡黃芩梔子天花粉防風連翹牛蒡子甘草節等分用水二鍾煎八分食遠服應用方貴金丸八味地黃丸紺珠丹神授衛生散十全大補湯托裡消毒散六味地黃丸補中益氣湯蠟礬丸越鞠丸俱見首卷蟾酥丸拔疔散見疔門神妙拔根方見針門加味逍遙散見瘰癧諸症灸法見首卷黃連救苦湯見項部面部經絡諸陽皆會於面統其所屬惟胃脈起鼻交頞中入上齒中俠口環唇循頰車上耳前過客主人穴故人之面陽明之屬也從鼻直上至額屬督脈經目內眥而上足太陽經而下足陽明經目瞳子而上足少陽經而下足陽明經目鋭眥而上手足少陽經承漿屬任脈經足陽明經顴瘍瘍則顴骨腫痛寒熱相熾由陽明風熱所致宜衛生散加升麻葛根水酒煎服或貴金丸顴疽疽之初起如松子微腫微赤微癢漸大如痰核如結毒如瘤由陽明積熱所致宜蟾酥丸及衛生散加膽制南星靈樞經云心病則顴赤宜降心火如黃連安神丸又曰腎病則顴與顏黑宜滋腎水如地黃丸是顴之為症不可專委於陽明也顴疔初起如粟麻癢堅痛色白而頂陷寒熱交作宜用挑法塗拔疔散腫處搗鮮菊花葉敷之內服蟾酥丸或灸偏歷穴二七壯面發毒面上癤癗腫痛由風熱客於陽明也宜涼膈散加羌活荊芥升麻敷清涼消毒散不腫痛者宜托裡消毒散面遊風初發微癢次如蟻行面目俱浮更兼痛楚由陽明壅熱所致宜涼膈散加升麻葛根羌活防風白芷牛蒡子之類外敷祛風潤肌之藥痄腮腫尖而色赤者風熱腫平而色淡者濕熱皆屬於胃壯者黑牛散下之或加味消毒飲散之忌用敷藥恐毒攻喉頰瘍生於耳下頰車之上一名金腮初生如粟漸大如豆亦由胃熱壯者貴金丸下之或犀角升麻湯已成者內托散加羌活獨活潰則難以收口多有附骨久必成漏宜用蒸法一灸四犢穴三七壯癝毒生頰瘍之前半寸許形如雞子堅硬難潰膿水常流經年不愈內服托裡潰堅之劑或灸天井穴三七壯骨槽風生牙叉接骨之處一名牙叉發起於耳前連及腮項筋骨隱痛久則漫腫牙關緊急寒熱如瘧此由鬱怒傷肝思慮傷脾所致初則堅硬難消久則瘡口難合初宜艾灸腫項及耳垂下五分各灸七壯膏蓋之腫處塗離宮錠子牙關內腫用線針刺去惡血搽冰硼散使內外毒氣得解服清陽散火湯如潰後於托裡藥中加麥門冬五味子藿香之類使水升火降脾健金清乃愈若誤用寒涼則非理中湯佐以薑附不能收功外腐用絳珠膏忌用刀針蝕藥若堅腫不消外腐不合虛熱不退形焦體削者為逆不治發頤生顴骨之下腮頷之上耳前一寸三分由手足陽明經客熱或傷寒發表未盡所致初宜貴金丸紺珠丹或衛生散加升麻桔梗黃連如腫痛不減用托裡消毒散如膿出反痛惡寒發熱晡熱者皆氣血虛也宜十全大補湯補之頤腫而連及耳後者宜補腎之虛火經曰腎熱頤先赤也頤腫而連及耳下者當清疏其肝火是耳下則屬手足少陽經也時毒初起狀類傷寒一二日間面鼻耳目焮赤腫痛甚則咽喉頸項俱腫由感四時不正之氣所致或結核有根咽喉閉塞至五七日間神昏喉閉不食不出聲者不治若延至十日外者即不治而亦自能愈矣症有陰陽治有汗下慎用寒涼兼用嚏法脈浮數者邪在表也宜葛根牛蒡子湯脈沉實者邪在裡也宜內疏黃連湯脈沉澀者邪入深也宜漏蘆湯又自少陽經出者腫連耳下引以柴胡自陽明經出者首面大腫引以升麻葛根自太陽經出者腫連耳上引以羌活荊芥防風表裡俱實者宜貴金丸然此症與膏粱積熱不同硝黃非大便祕實者勿用脈洪數浮數者治宜內消衛生散脈滑數者欲作膿也治宜內托如托裡消毒散腫痛焮熱者宜砭去惡血敷以消毒等藥如冬月患此其脈浮緊按之洪緩者乃寒氣鬱熱也宜以苦發之辛散之如托裡溫經湯慎用針砭所謂冬月閉藏用藥多而少針石也鳳眉疽生於眉一名眉發形長如瓜赤痛引腦二目合腫甚則堅痛色黑嘔逆悶亂者危屬手足太陽少陽四經宜灸陽谷穴七壯六日可刺得膿則減否則女子七日死男子二十四日死龍泉疽生於人中形小而異麻癢不時寒熱交作由伏陽攻於心肺虛熱注於三焦也治如疔法或灸百會穴七小壯虎髭毒生於地角一名承漿疽一名頦癰由陽明胃經積熱所致壯者貴金丸下之涼膈散加升麻葛根羌活防風清之或灸百會穴七小壯面部主治方犀角升麻湯治頰瘍並治唇口頰車鬚髮鼻頞等處腫痛諸症犀角二錢五分升麻一錢七分羌活一錢二分防風川芎白芷白附子黃芩各八分甘草生五分水二鍾煎八分食遠服清陽散火湯治骨槽風牛蒡子防風荊芥薄荷黃芩龍膽草黃連貝母水煎食遠服升桔湯治骨槽風並咽喉耳痛升麻桔梗昆布連翹射干甘草等分水煎食遠溫服葛根牛蒡子湯治時毒脈浮數者邪在表也升麻葛根牛蒡子麻黃連翹玄參桔梗甘草等分水二鍾生薑二片煎八分食遠熱服一加貫衆淡豆豉雙解消毒散治大頭風脖子腫黃芩梔子連翹薄荷甘草大黃麻黃羌活白芷防風荊芥射干蒼朮當歸川芎用生薑三片水二鍾煎一鍾食遠熱服托裡溫經湯治時毒在冬月脈浮緊者宜服麻黃二錢防風二錢升麻四錢葛根二錢歸身二錢蒼朮一錢人參一錢白芍一錢五分甘草一錢五分水二鍾先煎麻黃令沸去沫再下余藥煎一鍾溫服蓋被俟汗出則腫自消立消散治大頭風頭面虛腫如泡草烏一兩白芨甘遂各一兩小良薑三錢甘草三錢麝香一錢為末用蒼耳搗汁加醋調勻雞翎蘸掃腫處立消搐鼻通氣散治時毒焮腫咽喉不利者用此取嚏以瀉其毒玄胡索玄參各三錢牙皂川芎各二錢細辛藜蘆草烏各一錢鬧羊花六分為末用紙捻蘸藥送入鼻內取嚏為度每日三次以嚏出膿者必愈無嚏者不治清涼消毒散治面發毒天花粉白芨黃柏山茲菰烏藥雄黃乳香麝香上為末用雞子清和蜜水調敷火醋錠子治面上熱瘡身上熱癤大黃用醋浸曬九次和為錠火酒磨塗黑牛散治痄腮初起壯實者黑牽牛一兩捶碎米醋二鍾煎一鍾露一宿空心溫服二金散治金腮瘡蝕透腮頰者鬱金雞內金等分為末先用鹽湯盥漱淨摻之蒸法治金腮癝毒痄腮久不合口而成漏者用面作井圈圍黏瘡口勿令漏泄次摻護心散於瘡口內再次入藥油於井內令滿用紙條做捻燃之初用一條加至三四條預用絹帕朦臉以防油爆蒸至好肉方痛根有幾處則痛有幾處至大痛時以水濕紙滅燈勿令口吹俟痛稍止再燃如前以油干為度去面井用地骨皮煎湯一碗布蘸湯滴於瘡口內以滴湯盡為度用敷藥敷四圍以珍珠散摻瘡口內黑膏蓋之俟膿干時加象皮未收口內服托裡等藥護心散雄黃三錢珍珠二錢血竭二錢乳香沒藥兒茶象皮龍骨赤石脂煅各一錢麝香冰片各五分共為末聽用又於蒸洗時服三五分立能止痛藥油方黃連黃柏連翹當歸芍藥生地各五分用香油一杯文火煎枯絹濾渣聽用敷藥方薑黃雄黃大黃黃柏黃連等分為末米醋調敷四圍面部應用方神授衛生散紺珠丹托裡消毒散內疏黃連湯十全大補湯貴金丸俱見首卷蟾酥丸拔疔散俱見疔門冰硼散見咽喉門漏蘆湯見腫毒門灸法見首卷灸門黃連救苦湯見項部頸項部經絡項之中屬督脈經項之旁大筋中屬足太陽經大筋之旁耳之後屬手少陽經耳之下屬足少陽經頰下屬手太陽經頰前一寸屬手陽明經挾喉兩旁動脈屬太陽陽明二經項疽生於項之中一名項中疽俗云對口為與口相對也屬督脈經盛陽之火焮赤腫痛者易治根大堅硬者難療平塌神昏者死初起脈洪數有力者紺珠丹衛生散貴金丸梅花五氣丹黃連救苦湯俱可選用並隔蒜灸之或灸天宗穴七壯艾如緑豆大已成者解毒天漿散托裡消毒散已潰者大小保安湯以補元氣加減地黃丸引火歸源外兼敷治或灸神闕穴二七壯此症有頭尾頭向上尾向下形如蜂窠者防毒氣攻心蝕腦又忌見風風入發搐者難療若痰壅毒流兩肩者鮮血暴湧者腹脹譫語者俱不治臥蠶疽生對口之下天柱骨之上治同腦疽天柱疽生天柱骨之間形陷色黑多癢由三焦經鬱憤所致初宜衛生散壯者貴金丸弱者神效栝蔞散已成者八珍湯加柴胡香附及遠志酒甚者肩背拘急嘔逆噁心宜隔蒜灸之以癢止為度或明灸之灸而有泡者順無泡者逆服汗劑得汗可治無汗難醫靈樞經云失治則熱氣下入淵腋前傷任脈內熏肝肺十餘日死所以神昏嘔噦血不止者不治偏腦疽生對口之傍屬足太陽膀胱經蘊熱所致蓋太陽經所司寒水起於巔頂貫項兩傍而順下多冷多沉故多平塌堅硬難潰又易流注初起未成七日以前者用鈹針當頭點入知痛楚方止出其惡血通其瘡竅插蟾酥條直至瘡底每日二條外用膏貼三日後加添插藥內服紺珠丹或蟾酥丸發汗解毒次服托裡大補之藥以回陽氣直至頂根高突腫痛外用神燈照法助陰為陽至七日其瘡四圍裂縫有膿方住插藥輕者九日後脫出或腐化重者至十三日其根自脫如期根深蒂固不能脫者鈹針取之外貼玉紅膏內服大補之藥托之誠轉重就輕移深居淺之良法也如不腫不疼灸亦不痛者尤宜此法治之若前腦疽陽症則不用此法魚尾毒生於後鬢髮際間在偏口之上腦後發之傍治同偏口出血氣喘痰發者難治百脈疽腫繞頸項疼痛身熱不食上氣咳嗽其發引耳不可以腫十五日可刺兒膿者順見血者逆鎖喉毒頸項忽然腫痛如失枕之狀久則紅繞肩背堅硬難消由肥人善飲風熱外侵所致治宜清暑疏風結喉癰生於嗌外正中一名猛疽屬任脈及手太陽少陰三經由憂憤所致宜黃連消毒飲衛生散靈樞經云膿不瀉則塞咽半日死故宜針之出毒服補托之劑雖潰通流出湯水者亦愈一灸少海穴七壯氣癰生於結喉癰之上下夾喉癰生於結喉癰之兩傍二症治同結喉癰一灸靈道穴七壯項部主治方黃連救苦湯腦疽髮鬢發頤及天行時毒初起憎寒壯熱頭面耳項俱腫服之未成者自消已成者速潰黃連黃芩柴胡升麻葛根連翹桔梗川芎歸尾赤芍羌活防風金銀花甘草節等分用水二碗煎八分入酒一杯食遠熱服解毒天漿散腦疽積毒日深堅腫木硬口燥舌乾噁心煩渴六脈沉實有力大便閉結不通者並宜服之石決明生研殭蠶穿山甲防風連翹金銀花羌活乳香黃連當歸尾甘草各一錢大黃三錢天花粉用新鮮未曬者四兩石臼內搗爛投水一碗攪勻取汁去渣用上將花粉汁碗半同藥煎八分入酒一杯空心熱服行三次方用飲食忌煎炒發物回毒銀花散腦疽及諸發陰瘡不起色變紫黑者金銀花二兩黃耆生用四兩甘草生用一兩細酒二十兩同藥入小口砂罐內密封重湯煮三炷香為度取起濾清服之蓋暖患上其瘡漸漸高腫此轉陰為陽吉矣後用托裡藥潰膿如服後不痛不起瘡頭流出黑水者為真陰不治梅花五氣丹腦疽發背諸般疔腫初起寒熱交作筋骨疼痛有似傷風噁心嘔吐但未成膿者並宜服之梅花冰片一錢麝香用當門子一錢辰砂輕粉各一錢二分爪兒血竭乳香沒藥明雄黃各二錢真蟾酥端午日取四錢用男乳調膏上藥各研細末對準分數於端午日辰時制至午時向日為丸如茄子大一時曬乾用川椒二十七粒燈心二十七段同藥收罐內養之黃蠟封口勿泄氣每用時先食美饌令飽用無根水漱淨口再含水一口少頃待溫用蔥白五寸同水嚼爛咽下隨將藥餅一枚放舌下睡於暖處被蓋藥化苦水徐徐咽之瘡勢大者二三餅亦可藥盡其汗即到如淋諸病若失如冬月天寒難汗噙後將蔥湯推之即汗如暗疔人所不及覺者及覺而失治者毒氣入里人便昏沉一中便倒不能依法服藥急用連須蔥白七根煎酒一杯研藥五餅灌下藥氣到心其功如湯潑雪患者即時蘇醒誠外科之奇方也不可忽之大保安湯腦項諸發癰疽惡瘡大毒已潰之後膿水出多氣血虛弱精神短少飲食不思坐臥不寧煩躁不眠晝則安靜夜則發熱及虛陽煩渴等症人參白朮茯苓當歸川芎白芍熟地山藥山茱萸牡丹皮五味子黃耆各一錢熟附子肉桂麥門冬甘草各五分用煨薑三片大棗二枚蓮肉七個水二鍾煎八分食前後服腦疽灸法用騎竹馬法灸之一法用線橫量患人口至兩角為則次用線以黃蠟拖過從患人項上垂下至兩乳頭為則剪之復從患人頸上往後自項垂下貼脊比齊線盡處為則以墨記之再將先比口之則於墨記處兩傍各橫開一側盡處是穴以墨記之用艾於兩傍穴上各灸三壯或五壯其毒自痿而不大發徐徐而愈一灸氣海穴二七壯三里穴各五壯頸項部應用方紺珠丹衛生散貴金丸托裡消毒散加減地黃丸絳珠膏俱見首卷黃連消毒飲見頭部蟾酥丸蟾酥條見疔門敷貼藥首卷參用灸法見首卷灸門腦疽治驗一人項疽十餘日勢甚根連耳項紅腫焮熱脈浮而數用黃連消毒飲二服大勢稍定次用托裡消毒散數服不能腐潰脈浮無力此為元氣損傷止能起發不能為膿易十全大補湯加桔梗白芷倍參末各三錢外用桑柴烘法早晚二次烘之貼紺珠膏數日患者頭面俱腫雙目合縫形狀可畏然後腐潰並作膿出日至數升將及半月加五心煩躁飲食少思此補力不及所致雖變無妨用聖愈湯一服不應又進一服加熟附子二錢方應前症悉除次以人參養榮湯加麥冬五味參術倍至三錢月餘後腐肉連發片片脫下狼狽不堪又恐補不及時每日粥食中用人參三錢幾餐分入同煮食之後元氣漸醒調理四月方瘥一人生偏疽隔蒜灸十五壯知痛乃住失用內藥又四日紫腫木痛便祕脈實以內疏黃連湯加玄明粉二錢通之次用消毒救苦湯二服腫勢仍甚此內毒外發不可再消換托裡消毒散至二十日因患者體肥外肉多緊不作腐潰欲行針開放彼堅執強阻後煩悶昏憒人事不醒乃變症出也隨用鈹針左右耳邊並頂中各開一竅內有膿腐處剪割頑肉寸許放出膿血碗許服健脾養血大補之藥膿似泉流每朝夕藥與食中共參六七錢服至腐化新生又四十日外患者方得漸醒始知人事此症設若禁用針刀不加峻補而得生者鮮矣一人項疽五六日瘡根平散又至五日外瘡勢堅硬根腳開大毒氣已過兩肩流注前項胸乳皆腫嘔吐噁心寒熱不食形勢可畏此時非藥力可及也先用蔥湯洗去舊藥煮拔筒拔提二處出淤血碗許隨用銀針斜斜插入根腳透通患底數處以蟾酥條插入孔內最能解毒為膿總以膏蓋之其走散處以溫藥敷之日漸日消毒收原處兼服內托降火化痰之藥三四日大勢已退內膿已通換服十全大補湯凡堅而不化者照之腐而不痛者取之新肉生遲者培之如是調理三月方瘥一婦年六旬素稟怯弱疽頭如粟喜其形體不肥雖發之逆後必易潰先隔蒜灸之次以蟾酥餅貼灸上四邊以吸毒散敷之收其根內服托裡消毒散數服瘡勢堅硬苦於痛楚豫為脈細數而無力此內虛之故不能解毒為膿以痛為要換益氣養榮湯加角刺白芷三服腫亦漸起用桑木烘法堅亦漸軟膿出稠而不多前方去皂刺白芷加香附倍參耆又數服膿潰潰後痛亦不止再三日腐肉將脫小半用乳香定瘡散一服疼痛退除數十日完口此法要在眼力精巧量病易難腐新遲速補助有無用藥合式然後相量日數並皆決之於前發之必中一婦壯年體胖項生疽頂高根活彼欲內消豫為藥消不能針消則可取鈹針當頭針入六七分至軟肉方住去淤血插蟾酥條服蟾酥丸得大汗而解次日瘡出微膿漸消再服消毒清熱之藥不出十日而安大凡欲消瘡毒先斷根本次瀉毒氣使毒日衰無致內攻為訣一人耳後生疽將半月根腳漸大瘡頭血水穢汙四邊紫黑軟陷無膿面慘鼻焮手冷氣促脈診散大無根此內敗症也不治果卒但犯此症雖山嶽之軀一敗無不傾倒一婦對口自灸念余壯不痛灸疤焦黑平陷如故診之脈微數而無力此內虛症也若假藥力則誤其事用鈹針當頂刺入寸許不知痛亦無血此毒滯而未發也插蟾酥條以膏蓋之每日一次七日後周圍裂縫出膿內服補劑至十四日根脫搽絳珠膏又半月口平摻珍珠散生皮而愈此症不用針攻專假藥力雖不至死豈能得其速愈哉一婦年四旬肥甚患項疽五六日視之肉腫瘡不腫乃頂陷也又兼口燥心煩此邪火內淫也堅硬紫暗此血死毒滯故不作腐潰也根腳散平為真氣內敗不能束毒也六脈洪大為毒氣勝正氣也此太過之症後必無膿軟陷內攻而死辭不治後果歿瘰癧瘰癧結核於頸前項側之間小者為瘰大者為癧連續如貫珠者為瘰癧始起於少陽經次延及於陽明經頰車等處再久之則延於缺盆之下形長如蛤色赤而堅痛如火烙屬三焦經名曰馬刀又甚於癧也此由三焦肝膽三經怒火風熱血燥而生或肝腎二經風熱虧損所致初起寒熱焮痛者此肝火風熱而氣病也用小柴胡湯加膽草梔子芍藥當歸因怒腫痛或發熱者用小柴胡湯加青皮木香桃仁紅花若寒熱止而核不消者此肝火燥而血病也用加味逍遙散以清肝六味地黃湯以滋腎如肝脈弦緊腎脈洪數者由腎水不能生肝也用補中益氣湯六味地黃丸以滋化源如痰盛痞滿右關脈弦者此脾土虛而肝木乘之也用六君子湯加芎歸次仍用補中益氣湯至將潰已潰用神效栝蔞散益氣養榮湯間服之如潰之膿清者須大補之機云此不因膏粱丹毒火熱之變由虛勞氣鬱之所致治宜補形氣開鬱結調經脈瘡自消散不待汗之下之而自愈也是以始終之治惟以補氣血以滋化源慎用追蝕悍怕等藥雖然若至膿稠時必用追蝕等藥一劑癧毒去而瘡口自斂諸癧已消惟一核尚存者必用追蝕藥一服其核自消若氣血壯而脈沉實者即用追蝕藥一服毒一下隨服補劑調理蓋瘰癧之毒莫不有根地膽斑蝥制度有法能使其根從小便中出雖曰悍怕能助王道之治相濟成功是在治者神而明之變而通之然非概用之通論也獨婦人患此者居多蓋因其性急躁其氣怫鬱其心執滯而然也若小兒則內無七情所幹是由外受風熱氣血相搏所致忌用燥毒等藥宜大聖散連翹丸天竺黃丸調其內併兼外治自然獲效有嬰兒落草時項間即有三五枚者緣兒於胞中其母多怒兒稟其氣所致當治其母用藥同前書有風毒熱毒氣毒之異瘰癧筋癧痰癧之殊者俱發於項而相似惜乎未詳豫為癧由內傷所致其形小其發緩無疼痛計以月年毒由外感所致其形大其發暴多腫痛日不待時為異耳治癧則從本門調理治毒則於項部門參考以形而言之生左耳根名蜂窠癧生右耳根名惠袋癧遇怒即腫名氣癧核痛紅腫名血癧筋縮如貫珠者名筋癧小而多癢名風癧繞項生者名蛇盤癧頷紅腫痛名燕窩癧延及胸腋者名瓜藤癧延及遍身紅活易潰者名痰癧生乳旁兩胯軟肉等處名𤷍瘍癧灌注四肢遍身自潰相穿者名流注癧以上諸癧推之動為無根屬陽宜兼外治如後方針灸敷貼蝕腐吸膿等法是也膿稠者易治膿清者難治無膿者不治獨生一個在囟門者名單窠癧一包十數個者名蓮子癧核上堆核者名重臺癧堅硬如磚者名門閂癧形如荔枝者名石癧如柱木者名木癧如黃豆結簍者名鎖項癧如鼠形者名鼠癧以上諸癧推之不動為有根屬陰皆不治之症也切忌針砭及追蝕等藥致難收斂按上症宜究其原施其治稽其形命其名從本引末針灸隨宜方能獲效非易易也瘰癧主治方加味小柴胡湯治肝膽二經部位熱毒瘰癧及一切瘡瘍發熱潮熱並小腹脅股結核囊癰便毒或耳內耳下生瘡柴胡黃芩炒各二錢人參半夏膽草梔子當歸白芍各錢二分甘草六分用生薑三片水二鍾煎八分食遠溫服加味逍遙散治婦人血虛五心煩熱肢體疼痛頭目昏重心忡頰赤口燥咽乾發熱盜肝食少嗜臥及血熱相摶月水不調寒熱如瘧臍腹作痛並治室女血弱榮衛不調痰嗽潮熱肌體羸瘦漸成骨蒸等症當歸白芍白朮茯苓柴胡各一錢薄荷五分甘草六分丹皮七分香附八分有熱加黃芩五分生薑三片紅棗二枚用水二鍾煎八分食遠溫服加味八珍湯治瘰癧虛弱者甚驗白朮一錢五分人參茯苓當歸川芎白芍熟地陳皮貝母桔梗何首烏射干各一錢黃耆八分連翹七分玄參七分金銀花一錢夏枯草二錢山茲菰甘草各五分用水二鍾酒一鍾煎八分臥時服家傳消癧丸天花粉搗爛水浸三日取沉者曬乾用四兩緑豆粉四兩用薄荷葉蒸過香附米童便浸二兩貝母一兩茯苓一兩白朮一兩柿霜四兩牛皮膠三兩牡蠣煅百合山茲菰杏仁各二兩細茶粉草各一兩青黛六錢硼砂三錢白礬二兩上為末煉蜜為丸緑豆大每日二服每服二錢俱白滾水送下消癧單方用蛇遊草南人呼為過山龍北人呼為娘娘拳頭即茜草苗也別名地蘇木秋月採梗葉冬月取子每二斤浸乾燒酒十斤入瓷罐內封口重湯煮三香埋土內七日取酒早晚各飲一二杯未潰者即消已潰者速愈又方甘草四兩生薑取汁四兩二味入四料南酒瓶內取白花菜汁即鮮夏枯草汁搗爛絞汁入瓶以瓶滿為度封口重湯煮一香取出去渣食後服二服即消瘰癧拔根方斑蝥七個去頭足並翅同糯米炒以米黃黑色為度取貓為末聽用用雞蛋一個鑽一孔用銀簪攪勻入斑蝥末於內再攪勻另取雞子殼補口綿紙黏固再用粗紙包七層水濕透聽用取土茯苓四兩擇小而扁者為佳若長而大者名為奶肩有毒故不用加菜豬肉半斤煎湯聽用於五更時將藥蛋用粗粳火煨熟乘熱食之以前土茯苓肉湯送下三日後小腹脹痛以益元散推之如尚未利再飲熱水摧之毒根從小便下形如圓眼如爛肉其根下其癧自消甚驗或以木通滑石青黛之類導之青黛善解斑蝥之毒瘰癧灸法宜灸肘尖七壯三次除根一灸金門穴二七壯一灸脊十一椎對臍是穴灸九壯陵漢章用土炒穿山甲斑蝥等分和艾為炷黃豆大於患處隔蒜灸之或明灸之豫用陽燧錠子於核上灸七壯貼紺珠膏出水些須其核即消馬刀堅硬如石痛引頸項者灸劍巨穴三七壯凡灸後其核不消者須塗蝕藥以除其根腐去其核方能收口如三品一條槍貴金錠子之類瘰癧敷藥用獨核肥皂子擇新到者用好醋浸一宿次日文火煮透搗爛如泥罨腫處發微腫微痛漸消癧瘡吸膿法治癧瘡久潰淋漓不能收口先用木綿做圈圍墊瘡口次用小錫葫蘆或竹筒要三個聽用取乾燒酒斤半大黃一兩煎滾傾入葫蘆內浸滾水中煮酒滾即傾出急合於瘡口上吸取其膿少時取起又將別個葫蘆照樣合之如式輪流合吸五七十次以見鮮血為度次用絲綿燒灰敷口自愈其相連未潰者經此一吸亦隨而愈矣洗癧瘡方破爛頑腐久不收口者麻油煎滾乘熱用綿裹指尖蘸油熱抹患處十數次次用生肌等藥一用雄黃白礬硃砂各一兩真阿魏六錢為末每用三五錢沖滾水二大鐘洗之搽癧瘡單方陳年醬瓜蒂隨瘡口大塞之極痛須忍之半日取出瘡自痊愈一用豬膽汁加輕粉末少許令勻不時塗之瘡痛流黃水久久痊愈一搗馬齒莧敷之一取葛條燒存性為末香油調敷三品一條槍治瘰癧疔毒發背腦疽等症明礬二兩白砒一兩五錢共為末入小罐內炭火煅紅青煙盡白煙起片時約上下通紅住火置地上一宿取出約有淨末一兩加明雄黃二錢四分乳香一錢二分共為細末厚糊調稠搓條如線陰乾凡遇前症有孔者絍入孔內無孔者先用針放孔早晚插藥二次插至三四日後孔大者每插十餘條至七日患孔藥滿足方住以後患處四邊裂開大縫共至十四日前後其疔核瘰癧痔漏諸管自然落下隨用對症藥敷絳珠膏生肌白龍膏貼鼠瘡立驗麻油二十兩大附子二個穿山甲十片杏仁五十粒槐白皮一片浸十餘日煠枯濾去渣入血餘一團蝦蟆一個白花蛇一條徐徐煎化再濾渣淨入飛黃丹十兩成膏加乳香沒藥各二錢紺珠膏瘰癧已潰未潰見首卷膏藥門原膏內倍用阿魏麝香再加蟾酥銅緑大聖散治小兒風毒瘰癧癮疹風丹羌活升麻薄荷防風荊芥玄參黃芩大黃甘草或加連翹等分水煎服連翹丸治小兒瘰癧連翹獨活桑白皮白頭翁丹皮防風黃柏淡豆豉肉桂秦艽各五錢海藻一錢五分為末蜜丸用燈心湯下天竺黃丸治小兒身熱咳嗽氣喘痰壅並急慢驚風今取之治瘰癧痰核其功甚捷南星半夏各二兩天花粉貝母各一兩合一處用薑湯煮過炙乾為末煉蜜丸用燈心湯送下石疽石疽生頸項間堅硬如石皮色不變由沉寒客於經絡氣血凝結而成初起者用艾灸之至五七十壯方止次以麥飯石膏貼之漸漸求愈非若失榮之頑惡也失榮症失榮症生於肩項耳前耳後等處初起如痰核日久漸大堅硬如石推之不動按之不移一年半載方生陰痛氣血漸衰形容削瘦破爛紫斑滲流血水或如泛蓮兼多穢氣愈久愈大越潰越堅此由先得後失六欲不遂隧痰失道鬱火凝結而成乃百死一生之症宜內服和榮散堅丸外貼飛龍阿魏化堅膏雖不獲全愈而不致夭亡誠緩命之至藥也和榮散堅丸治失榮症堅硬如石不熱不紅漸腫漸大者當歸身熟地黃茯神香附白朮人參橘紅各二兩貝母一兩南星一兩遠志一兩酸棗仁一兩柏子仁一兩蘆薈角沉各八錢龍齒一對煅如無用鹿角尖三兩煅代之牡丹皮一兩硃砂六錢為衣上為末煉蜜為丸桐子大每服八十丸食後用合歡樹根皮煎湯送下更須改往從新淡薄安命其中有得愈者十中一二否則難脫然也飛龍阿魏化堅膏治失榮症及乳岩癭瘤瘰癧結毒初起已成但未破者用此貼之用蟾酥丸藥末一料加金頭蜈蚣五條炙黃去頭足末研勻用西聖膏見首卷二十四兩頓化入前末藥攪勻以紅絹攤貼半月一換輕者漸消重者亦可停止常貼可以保後無虞背部經絡脊之中行屬督脈經脊之兩旁各開第二行第三行俱屬足太陽膀胱經上發背生天柱骨之下一名脾肚癰其形橫廣如肚屬足太陰脾經由膏粱積熱所致視其高腫鮮明根腳不過兩肩者順腫平堅硬漸大漸開攻注兩肩胸項者危柴黑平塌下陷者死初起宜解脾經之積熱間服蠟礬丸護心散以防內攻已成者必用托裡為主何則所為托裡則生敗毒則死也中發背生於對心一名對心發由心火妄動熱極而生腫不高尖穴難起發此為毒劃君位最易傷人若前心有紅暈者不治治宜大降心火急疏蘊熱頂用針通隨行拔法務使毒氣內外疏通各從門出庶不內攻方為成守保至十五日後內無變症得膿為解如是期變症漸生堅硬漸大不作膿者死在二十二朝先後若早治十中可保三四蓮子發突如蓮子蜂窠發孔似蜂房二症生於肩顒髀骨或脊或心俞心包等處輕者形長而高腫或偏半背重者形斜而平塌兩脅俱傷又名半身發甚至形長勢大腫潰半身則名竟體發也上搭手生肺俞穴即肩骨動處一名左右串左屬肝右屬肺由痰凝氣滯火鬱而生初宜紺珠丹汗之次以逍遙散清之兼以六郁湯調之潰以八珍湯補之所為郁者開之滯者行之也禁用瘡科攻利等藥灸會陽穴二七壯中搭手生近膏肓穴屬足太陽膀胱經治分陰陽虛實攻補隨宜灸心俞穴七壯艾如緑豆大串疽生背脅間三四處皮色不變或見微紅痛必牽引內實相通故又名老鼠攢又名遊走血脾癰也由積憤所致陰陽二氣疽其形時腫時塌時軟時堅寒熱不時只在一處非若串疽之攻擊也由七情內郁所致酒毒發初發如彈次大如拳堅硬如石麻木不常甚則痛徹五內遍身拘急二便澀滯數日後頭面手足虛腫臟腑瀉痢連珠發連腫三五塊形若貫珠內則百節皆疼小腹脹小便閉陰囊腫由酒色過度所致丹毒發初生細癗浸淫尺余形如湯火所傷由服丹石悍燥之藥所致必多發渴治如蠟礬丸國老膏乃要藥也如色黯神昏脈燥腹脹嘔逆者不治禽疽始發紫色如疹數十塊形如拳打如七日內寒熱口噤者不治按上諸症發出則生內陷則死形雖甚畏雖老弱每能多生形小異常即少壯亦能致斃所為大規只怕不純陽治法何妨瘡勢惡痰注發形如布袋堅硬如石不紅不熱此由伏痰積久而成黃瓜癰形似黃瓜高寸許長尺許一名肉龜皮色不變疼痛引心四肢麻木上二症多不可治夏月暑瘍凡癰疽之症發熱有時為晡甚而旦止也因暑而得者則發熱無時為晝夜不止也然必見暑症如頭目眩暈口舌乾苦心煩背熱肢體倦怠是也外形初起背有紅暈次發腫疼治宜敗毒散加香藿黃連石膏等藥以清之暑熱解則腫自消矣壯實者用槐花末蜂蜜拌成塊黃酒調服亦佳瘴疽因冒山嵐瘴氣積久而成始發黑腫色若靴皮頑痛徹骨按之如石至五七日勢方浮腫色始變青形如拳打寒戰如瘧然必見風候如頭動口偏手足厥逆是也治法宜急破之出清血三五升方有黃膿白汁相合而出其皮不漫仍前脹痛直至色退其勢方愈惟在急追膿毒出外則無害矣産後癰疽夫産後宜扶虛消瘀大補血氣總有諸疾以未治之今患癰者由瘀血凝滯也宜生化湯加連翹一錢花粉一錢甘草八分噁心煩躁加乳香一錢緑豆粉三錢和服忌用敗毒攻利等藥生化湯當歸八錢川芎四錢甘草炙四分薑炭四分桃仁去皮尖研粉用十粒用水碗半煎六分加無灰酒少許和服論背疽夫疽之發於背也在脊之正中者為真發背在脊之兩旁者為搭手其名雖多惟辨其陰陽為訣耳原委症治已載首卷而瘍科獨重於背疽者蓋以背為足太陽膀胱經乃六經之首領乃督脈經之所主乃十二經之統脈也所以發於背者多陰今則復加詳焉腫潰脈症治法初起腫赤痛甚脈洪數而有力熱毒之症也易治漫腫微痛色黯作渴脈洪數而無力陰虛之症也難治不腫不痛或漫腫色黯脈微細此陽氣虛甚也尤為難治初起未發出而寒熱痛疼作渴飲冷此邪氣內蘊也宜衛生散口乾飲熱漫腫微痛此元氣內虛也宜托裡消毒散飲食少思肢體倦怠此脾胃虛也宜六君子湯如未應加以薑桂其有死者乃邪氣盛真氣虛而不能發出也在於旬余之間見之已發出用托裡消毒散而不腐潰急宜溫補脾胃如不應有死者乃真氣虛不能腐潰也在二旬之間見之已潰用托裡藥脫腐生肌如色不紅活瘡口黑暈大而不斂用參附薑桂如不應有死者乃脾氣虛極而不能收斂也在月餘間見之實則瀉虛則癢此陰症陽症之分也惟宜大補陽氣庶可挽回不發者不治潰而不斂者亦不治不腫痛不寒熱脈沉微乃脈病而形不病也忌之色黯漫腫作渴便數尺脈洪數者腎水涸也當歿於火旺之際疽發於髆髀經絡交錯皮薄骨高之處難醫初發頭痛寒熱拘急者表症也用紺珠丹蔥湯化服汗之如焮痛以金銀花散或槐花散清之腫焮作痛寒熱作渴飲食如常者此形氣病氣俱有餘也先用神授衛生散清之次用托裡消毒散解之如腫焮硬痛脈實者貴金丸下之腫硬悶痛發熱煩躁飲冷便閉脈沉實者用內疏黃連湯貴金丸導之欲作膿者用托裡散礬蠟丸外兼敷之背疽因開遲逮二日重若負石熱如𤋲火痛楚倍常脈沉數而有力者此膏粱積熱之變也時雖嚴寒急用清涼飲子加黃連兩許作一服利二三行痛減翌日再一服痛止次則隨症調理數日而愈此經為有假者反之雖違其時必從其症也漫腫微紅微痛食少此形氣病氣俱不足也用托裡散調補之不作膿或膿成不潰為陽氣虛也用托裡散倍加肉桂參耆膿出而反痛或膿清稀者此氣血俱虛也用八珍湯惡寒形寒或不收斂者陽氣虛也十全大補湯晡熱內熱或不收斂者陰血虛也參朮四物湯欲厄作嘔或不收斂者胃氣虛也六君子湯加炮薑芎歸食少體倦或不收斂者脾氣虛也補中益氣湯加茯苓半夏肉赤而不收斂者血熱也四物湯加梔子連翹肉白而不收斂者脾虛也四君子湯加木香酒炒芍藥小便頻數者腎陰虛損也加減八味丸遍身作痛者榮衛虛也十全大補湯癰瘍嘔逆寒傷於胃也溫補之使榮衛充而氣血周貫則毒隨膿出嘔自止矣且易生肌癰痛甚咳逆十餘日水穀不下脈伏如絶者用四君子湯加薑桂三進而瘥腫而不潰脈大而浮此陽氣虛也宜托裡散倍加參耆內熱作渴脈洪大而鼓指此虛火也前方更加肉桂脈症頓退仍用托裡藥而瘥中央肉死此毒氣盛而脾氣虛也用玄珠膏塗之大便不通此胃氣虛而腸不能傳送也小便赤濁此脾土虛而火下陷也雖曰難治惟大補之朝用補中益氣湯夕用加減地黃丸料瘡口出鮮血由脾虛不能攝血也宜十全大補湯加陳皮半夏炮薑瘡口不斂用托裡藥罔效者藥力未及也須用人參五七錢外加附子服之精神頓爽手足自溫不旬日而口合瘡口不斂脾虛也咳嗽不止肺虛也法當補之書云補可去弱人參羊肉令每日食之不徹旬余而瘡斂嗽止瘡口不斂焮腫發熱口乾體倦小便赤澀脈洪數而無力用十全大補湯加麥冬五味子補元氣引火歸原而脈症更甚此藥力未能及也再劑頓退卻去肉桂數劑而瘥背疽不起泄瀉作嘔食少肢厥脈息如無此陽氣虛寒也宜大補藥加桂附而不應者再加附子二劑而瀉愈甚即用大附子一枚薑桂各三錢參耆歸術各五錢作一劑服之腹內始熱諸症悉退背疽服十宣散之類更加喘渴內熱脈大而無力用補中益氣湯加酒芩麥冬五味子而愈背疽服五香十宣等不應更加嘔逆不睡且其素有淋症豫以參耆歸術膏用牛膝煎湯入竹瀝飲之則淋止而思食藥盡四斤膿自湧出外治次第法初起焮痛或不痛及麻木者邪氣盛也隔蒜灸之痛者灸至不痛不痛灸至痛則毒隨火散矣再不痛者則明灸之此未潰以前皆可灸也頂用玄珠膏塗之四畔用敷藥圍之換藥時用文蛤湯洗之初起焮赤腫痛其頭如黍如膿泡五六日間則出頭十數粒漸漸增添者此陽症也用貝葉膏貼之日夜頻換十數次其膿自出痛自減腐自化肌自生不用敷洗始終只此一藥可以收功如元氣虛者或見別症再兼托裡初起不紅腫煩躁悶痛積久不潰五七日後瘡頭無數按之流血無膿再久之其頭成片共爛一瘡其色紫黯其毒內攻此陰症難療頂塗玄珠膏內兼托裡如不應急宜溫補外用神妙拔根法有膿脹痛為膜隔不得出者用針引之瘀腐堵塞者去之更宜豬蹄湯洗之膿稠或痛飲食如常瘀腐自脫者用消毒與托裡兼服之外貼貝葉膏膿不稠不稀微痛飲食不甘瘀腐化遲者用托裡藥外以桑柴火烘之膿清而稀瘡不痛瘀不腐者宜大補以回其陽亦用桑柴烘之凡背疽及髀骨處皮里有筋一層外皮雖潰而內膿不出令人脹痛氣血轉虛變症百出急用針通內兼托裡若待自潰多致不救所謂熱毒中隔內外不通不行針灸藥無全功也此症非氣血壯實者未見其能自潰也附醫案一人年六旬患背疽十日外視其形堅色紫頭如螺子之多堅長尺余根橫半背喜其弓腫光亮熱痛脈洪此得之於膏粱醇酒所致隨用照法其所舍螺子盡欲吐出用抿子刮去流血水鍾許以蔥湯洗淨塗玄珠膏再以黑膏蓋之四圍腫處用敷藥敷之次日如前俟其腐盡深入寸余換搽絳珠膏日漸日長但因其性嗜酒兩月後新肉雖平嬌嫩而不能結皮完口將嫩肉盡行剪去用膏貼數日待肉老平用珍珠散結皮而愈一人年六旬患背疽十二日半紅半腫微熱微痛生於背心之下腎俞之上高低平等廣開八寸根腳泛腫色若水噴頂陷無神似腐非腐脈浮而大重按而虛此瘡利於腫潰不利於收斂辭不治後更醫為五善俱具治至收口如錢未合不數日而變症出四日乃死一人仲夏背生熱癤二十餘處內有一瘡甚小其毒甚大豫曰此非癤比後之發勢有不可測者彼不信更醫又十日形勢內陷敗症齊出復請豫治其人臥於堂以帛蓋瘡上登堂未及兩三步豫即告歸彼曰何也豫曰敗氣滿前死期速矣何必視瘡急備後事可也再七日果卒一人背疽初起入房犯禁患處黑五寸黯暈尺余漫腫堅硬背若負石發熱作渴小便頻數兩耳重聽揚手露體神思昏潰脈沉而細右手為甚便祕念七日計進飲食百餘碗腹內如常衆欲通之豫云所喜者此耳急用大劑六君子湯加附子薑桂三劑瘡始焮痛自後空心用前藥午後用六味丸料加參耆歸術五劑復用活命飲二劑針出黑血甚多瘀膿少許背即輕軟仍用前藥便亦通利繼以大補始獲全安所謂症不在難心契則明方不在多意會則明也腰部經絡與背部同下發背生於脊中前對於臍一名對臍發此症最為險候蓋內腎乃性命之根本也治宜護腎為要腎俞發生兩腰內腎陷肉之間因酒色濕熱者則單生由房勞怒火者則雙發二症如本臟稍有真陰制火則瘡形紅活高腫為膿用人參養榮湯加山萸五味知母黃柏或加乳香沒藥廣膠及加減八味丸以救其源若瘡形紫黑乾枯堅硬不作膿或膿稀傷膜者為真陰內敗死期在十五日前後非下搭手之同類也灸合陽穴五壯下搭手生腎俞之傍十四椎之間一名連腎發由房勞傷腎所致令人口乾寒熱百節俱疼治同下發背若咳嗽嘔噦厥逆不食及膿清腰骨似折者逆先有渴症後患疽者腎水竭也膿穢色黯不痛瘡口張大者脾氣敗也小便如淋痰壅喘促口乾舌裂者脾肺敗也左尺脈洪數者腎無所生也左關脈浮澀者金剋木也秋令尤難俱為不治濕流注亦生腰腎之間但其腫而無頭不變色不作痛三五個月不潰令人食少而肌瘦是也治宜補氣血開鬱結如十全大補湯加香附陳皮數十劑俟元氣稍復方可針之仍倍用參耆加遠志貝母白蘞外以豆豉餅附子餅灸之忌用十宣散流氣飲等藥石疽生腰胯之間腫而無頭皮色不變堅硬如石屬少陰陽明二經積熱所致治同濕流注亦由元氣虛而邪氣固結也若黑陷麻木嘔噦不食神昏脈散而代者死凡惡血停滯治之緩則為流注及為骨疽一婦腰腫兩腿尤甚此瘀血滯於經絡也用桃仁湯二劑稍愈更以沒藥丸而瘥一惡血未盡臍腹刺痛或流入四肢或注股內腫痛者用沒藥丸而病已一因水濕所觸經脈不行而作腫痛者宜服當歸丸纏腰火丹一名火帶瘡俗名蛇串瘡初生於腰紫赤如疹或起水泡痛如火燎由心腎不交肝火內熾流入膀胱而纏帶脈也宜內疏黃連湯清之壯實者貴金丸下之外以清涼膏塗之自愈如失治則纏腰已遍毒由臍入膨脹不食者不治清涼膏用石灰一塊涼水化開加水打溷澄少時取清水一鍾兌香油半鍾打數百成膏加雄黃末少許再打勻用鵝翎蘸掃患處立效一婦年七十腰生一癗作癢異常齊氏曰脈浮數而反惡寒瘡也瘡未潰而脈先弱何以收斂治之無功果歿胸部經絡正中行屬任脈經兩旁各開第二行屬足少陰經第三行屬足腸明經第四行屬足太陰經缺盆疽生於缺盆陷中一名鎖骨疽由胃與三焦二經積熱所致其症寒熱食少腹脹必小水不利初宜隔蒜灸之服蟾酥丸貴金丸而勢退惟小水不利者用六一散利之次服十全大補湯調理此症失治則潰而難斂又名曰蠹疽甘疽生於胸傍高處靈樞云發於膺形如谷實栝蔞苦寒熱急宜去其寒熱不則十日死死後方出膿膻中疽生心窩之上兩乳之間膻為氣海主分部陰陽膻處生疽由氣鬱所致也灸陰谷穴三七壯艾如緑豆大井疽生於心窩初起如豆皮色不變必先肌熱盜汗心煩飲冷舌燥唇焦乃其候也紅腫易治黑陷難療再神昏嘔吐肚脹者七日死灸郤門穴三七壯艾如緑豆大如久潰而不斂亦無痛癢者名穿心冷漏蜂窠疽生胸乳之間由心火熱盛所致宜急導心經之火遲則熱毒攻心難療胃疽生心胸之傍脾發生心窩之下亦傍些二症由炙爆太過所致必人迎脈盛宜清本經之積熱若服藥作嘔飲食不進者不治按上諸症腫潰治法兒後腹部再與首卷腫潰治法參考乳吹乳毒生近乳頭孕婦為內吹胎氣旺也宜清之有兒食乳為外吹又名乳毒由肝氣滯也如乳痛發熱作渴夜甚左關脈洪數者熱入血室也宜小柴胡湯加當歸芍藥膽草梔子乳痛牽臍內熱口辛肋脹者帶脈為患也宜小柴胡湯加黃連梔子青皮或升葛湯乳癰乳疽生於乳房紅腫熱痛者為癰堅硬木痛者為疽由肝氣鬱結胃熱壅滯而成也初起者升葛湯已成者復元通氣散已潰者神效栝蔞散虛者補之十全大補湯乳發乳漏發為乳房焮赤俱腫勢大如癰未成形者消之已成形者托之內有腫者針之以免遍潰諸囊為害防損囊隔致難收斂膿出未盡者慎勿生肌捻入藥錠吸之煎楮葉橘皮湯洗之久不收口時流清水者為漏外用藥線去腐生肌內當大補乳中結核如梅如李雖患日淺亦乳岩之漸也由肝脾虛者用四君子湯加芎歸升麻柴胡由鬱結傷脾者用歸脾湯輕者蔞貝散乳勞乳房結核初如梅子數月不療漸大如雞子串延胸脅破流稀膿白汁而內實相通外見陰虛等症初起宜隔蒜灸之紺珠青貼之蔞貝散消之已成者用栝蔞散調之兼八珍湯加薑炒香附夏枯草蒲公英補之已成者必見陰虛等症兼用六味地黃丸料以培其本乳岩亦乳中結核不紅熱不腫痛年月久之始生疼痛疼則無已未潰時腫如覆碗形如堆粟紫黑堅硬穢氣漸生已潰時深如巖穴突如泛蓮痛苦連心時流臭血根腫愈堅斯時也五大俱衰百無一救若自能清心滌慮以靜養兼服神效栝蔞散益氣養榮湯只可苟延歲月而已初起時宜艾灸核頂次日起泡挑破用鈹針針入四五分插去腐靈藥捻子紙封之至十餘日其核自落用絳珠膏斂口再當保養庶不再發惜乎初時必不肯如是治也按乳頭屬足厥陰肝經乳房屬足陽明胃經外屬足少陽膽經是症也女子多發於乳蓋由胎産憂鬱損於肝脾中年無夫者多有不治男子多發於腹必由房勞恚怒傷於肝腎治宜六君子湯加芎歸柴胡梔子數十劑元氣復而自潰仍痛而惡寒者氣血虛也易十全大補湯加柴梔丹皮兼六味地黃丸若兩目連睫肝脈微弦者前十全大補湯更加膽草乳症諸方升葛湯治乳吹乳毒乳癰乳疽升麻葛根各一錢半羌活防風黃柏南星穿山甲炒半夏各八分鹿角灰二錢大黃二錢用黃酒二鍾蔥頭三個煎八分食遠服熱甚加山茲菰郁加土貝母已成加皂角刺再橘葉麩炒橘紅通草皆要藥也乳毒丸大黃炒三錢連翹白芷獨活各一錢為末用砂糖丸黃酒下盡醉為度一瀉即瘥一用牽牛五錢良薑三錢甘草八分用白酒一鍾水一鍾煎八分服蔞貝散治乳核栝蔞五錢貝母南星連翹甘草各三錢用水二鍾煎八分加酒二分食遠服一加青皮升麻神效栝蔞散見內癰治乳岩久服可絶病根本方去當歸加皂刺一兩六錢半生牛熟名立效散乳癰初起加土貝母金銀花蒲公英有膿少加白芷無膿多加白朮乳癰初起用鮮蒲公英連根葉搗汁酒沖服隨飲蔥湯服之出汗一用鵝翼七根左用左右用右燒灰為末黃酒服致和散治乳岩潰爛膿水不幹者蜂房雄鼠糞川楝子經霜者佳各等分瓦煅存性為末摻之即干下乳方乳汁不通及乳少者王不留穿山甲酥炙豬前蹄七片為末酒下即通一用當歸三錢川芎二錢穿山甲王不留各錢半通草五分用鮮蝦湯煎加白酒鍾許和服一加紅花子五分升麻三分服下乳藥但作脹而無乳乃氣血竭而津液亡也用八珍湯倍參術少佐肉桂多服奏效灰奶用驢胰子炒熟用黃酒食即變好乳回乳湯無兒吃乳致乳汁脹痛者麥芽炒二兩歸尾赤芍紅花牛膝各二錢水煎服外以腳布束緊兩乳以手按揉之一用胡盧巴為末每服二錢酒下二次即降乳岩方玄胡索薏苡仁各五錢黃酒二鍾煎一鍾空心服出汗即驗琥珀丸對症藥也灸肩髃穴足三里穴各二七壯腹部經絡與胸部同幽癰生臍上七寸形如鵝子痛引兩膈發戰咬牙灸築賓穴二七壯嚇癰生臍上四寸一名胃疽微腫不赤內堅如石先寒後熱走痛引臍欲吐不吐甚則咳嗽膿痰脈浮大面赤者不治灸曲池穴七壯毒偏左灸右毒偏右灸左沖疽生臍上二寸由心火熾盛流入腎經宜大補不應者不治臍癰生於臍大如瓜突如瘤屬任脈與胃經此由心經積熱流入大小腸也然臍為神門禁用針灸矧癰舍於內惟葉攻之勿膿為上宜會膿散痛加乳香更宜蠟礬丸多服之臍內出膿四圍堅硬出血水者不治灸陰谷穴七壯築賓穴二七壯小腹疽生臍下一寸五分為氣海二寸為丹田三寸為關元俱為小腹疽橫廣腫痛引背由七情火鬱而成灸箕門穴七壯腹皮癰生於腹隱於皮裡膜外由膏粱火鬱所致其右關脈洪數而腹痛甚是也壯者貴金丸下之發肚生於肚及手肚足肚宜內托散加檳榔木瓜蒼朮腫甚者加桑白皮薑皮茯苓皮五加皮大腹皮喘者加蘇子蘿蔔子白芥子葶藶子車前子緩疽生小腹之側堅硬如石數月不潰寒熱食少肌體尫羸由脾經積滯而成亦寒癰例也論胸腹按上諸症始終宜固胃氣壯元氣使根本堅固以行經活血藥佐之令諸臟腑有所稟而邪自退矣如初起腫硬皮肉不變心煩嘔噦脈沉而實者當疏其內以絶其源用內疏黃連湯利之焮腫作痛邪氣實也宜衛生散外以隔蒜灸之次用托裡散脈遲緊其膿未成用四君子湯加川芎當歸枳殼白芷或托裡散脈洪數其膿已成用托裡消毒散膿成而不潰者氣血虛也十全大補湯溫之膿成脹痛者臥針取之因誤行汗下以致腫而不潰潰而不斂者十全大補湯加乾薑大附子以救之已潰而朝寒暮熱氣血虛也食少作瀉脾腎虛也胸痞痰湧脾肺虛也俱用六君子湯加當歸黃耆候諸症退換十全大補湯調理針孔膿㨮不利毒氣內攻也唇舌青黑臟腑壞也不治瘡口微膿如蟹吐沫者此內潰透膜也不治臍腹小腫大痛者乃下焦蓄血症也脈在左手以四物湯加穿山甲酒煎加童便服之壯實者用桃仁承氣湯下之自愈慎用乾漆硇砂等藥一人腹患流注腫硬不潰脈弱時嘔此陽氣虛弱胃氣虛寒也法當溫補反用敗毒等藥以致身熱脈微豫曰身熱而脈靜脫血而脈實汗後而脈燥者皆逆候也不治後果歿附小兒臍症小兒初生旬日臍忽虛浮赤腫者用大黃牡蠣等分朴硝不拘為末用田螺浸水調敷小便下白即愈一用荊芥煎湯洗之以煨蔥伏地氣貼之即消臍風濕腫用蜂房燒灰摻之臍濕用當歸燒灰為末摻之或青蛤散見三卷面部腋部經絡腋下中間屬手厥陰心包絡及足厥陰肝經腋前屬足太陰脾經腋後屬足少陽膽經下六寸又屬脾之大絡也腋癰生於腋一名夾癰初起皮色不變漫腫無頭日久方疼乃生寒熱此患難消終必作膿多由性躁所致初宜柴胡清肝湯加味逍遙散脈虛病虛者補中益氣湯加羌活俟少可去之膿成脹痛者針之已潰者八珍湯加黃耆陳皮香附此以性情治症不待專於攻毒也始終忌用寒涼亦不宜大熱惟宜溫補灸少海穴七壯或灸間使穴米疽靈樞云發於腋下赤而堅者為米疽砭之勿裹若堅而不潰者為挾癭馬刀及𤷍瘍癧也宜各隨本門治之黯疔生腋下堅硬無頭四肢拘急寒熱大作異於常症者暗疔也治見疔門腋氣俗名狐臭受秉於未形之初腋內有竅濁氣由此而出諸藥鮮能除根故治法不立肋部經絡腋直下髀骨屬足少陽足厥陰二經相火之司也二經之氣不平則風火內搏榮逆血鬱熱聚為腫癰之所由而生也肋脅骨也肋者助也有骨曰肋無骨曰脅肋疽一名夾熒疽兩肋發腫甚則連及肩肘其症在左痛應於右其患在右痛應於左急宜針砭庶免內攻膿多可治無膿不治腫赤痛甚煩躁脈實而嘔者為有餘當下之腫硬不潰脈弱而嘔者為胃虛宜六君子湯加砂仁藿香補之亦有痛傷胃氣而嘔者外感寒邪及穢氣而嘔者雖腫時尤宜助胃壯氣蓋腫時作嘔因毒氣內侵者十有一二濕氣內傷者十有八九二十日不穴者死脅疽初生如李漸大如杯靈樞云發於脅者名曰敗疪敗疪者女子之病也灸之由足厥陰肝經鬱怒所致初宜柴胡清肝湯解鬱瀉火已成者托裡消毒散加香附青皮膿成者針之勿傷內膜已潰者八珍湯加山萸丹皮澤瀉兼滋腎水是症肥胖內實者鮮有是症惟虛勞者患之如破流臭敗稀膿補托不應者死大抵膿血大瀉氣血俱虛法當峻補雖有他症當末治之蓋元氣一復諸症自退也宜灸衝門穴二七壯一誤作痰痞治之罔效數月大如盎高如𨫼堅如石微紅漫腫不甚疼痛者即此症也失治則攻擊成膿形如鼓脹但其肚無青筋而臍不突為異耳淵疽生脅下初起不紅堅硬久則破潰而有聲如嬰兒啼狀用膏蓋之則聲止去膏則聲作宜灸陽陵泉穴二七壯其聲即止瘡即愈內發丹毒生脅下及腰胯間腫痛色赤如霞急宜砭去血內服貴金丸之類汗之如無汗及嘔噦腹脹神昏便閉遍身青紫者不治腋肋主治方柴胡清肝湯加味逍遙散見瘰癧門補中益氣湯八味湯六君子湯托裡消毒散貴金丸灸法俱見首卷下部後鸛口疽生於尻尾高骨尖處一名鋭疽靈樞云發於尻初如魚肫久若鸛嘴由督脈經濕痰流結所致朝寒暮熱夜重日輕潰出稀膿或流鮮血少壯尤可老弱難醫滋陰除濕湯初起者宜此和之川芎當歸白芍熟地各一錢柴胡黃芩陳皮知母貝母各八分澤瀉地骨皮甘草各五分水二鍾薑三片煎八分食前服和氣養榮湯已成不得內消者宜此托之人參陳皮白朮黃耆茯苓丹皮當歸熟地各一錢沉香甘草各五分水二鍾煎八分食前服滋腎保元湯氣血虛弱潰而不斂者宜此補之人參黃耆白朮茯苓歸身杜仲山萸肉丹皮熟地各一錢肉桂大附子甘草各五分水二鍾薑三片棗二枚蓮肉七個食前煎服上症失治久而成漏者宜服先天大造丸見流注門兼服琥珀蠟礬丸見腫瘍門久之自能收斂坐馬癰生於尻尾略上些初起灸膝下外臁橫骨盡處治同鸛口疽臀癰生於臀之中居小腹之後為陰中之陰其道遠其位僻雖屬足太陽膀胱經多血奈氣運不到血亦罕來最難收斂由濕痰凝結而成初起有頭紅熱重墜發熱口乾者用貴金丸利之紺珠膏貼之初起無頭漫腫皮色不變者用紺珠丹托之隔蒜灸之如大勢已退余腫未消者頻煮熱蔥尉之除濕二陳湯調之已成欲作膿者托裡羌活湯痛甚者神授衛生散大勢已退托裡消毒散不消及不潰不斂者脾虛也六君子湯加川芎當歸黃耆脾虛下注者只白朮一味煎飲自消毋以能潰膿為惑不消作渴便淋者陰虛也六味地黃丸加五味子潰而不斂者用生薑煎湯洗之久者以豆豉餅灸之此症自里至表者十有八九從六淫外感入里者百中一二故治宜外發庶免內攻其有軟陷無膿根腳平散而不痛者甚則口乾煩躁譫語痰喘氣粗者由誤服寒涼失於滋補所致也不治書云若無補養之功其禍多在結痂之後是知瘍科以培補元氣為首務也有因患痔敷服寒涼致令攻潰於臀者其脈大而數症則寒熱作渴瘡則膿水清稀些三陰經虧損之症也不治臀癰主治方除濕二陳湯治臀癰上馬下馬等症陳皮半夏茯苓秦艽薏苡仁麥冬甘草等分用生薑一片燈心二十根水煎食遠服內托羌活湯尻臀生癰堅硬腫痛者黃耆一錢五分黃柏酒炒羌活各三錢防風歸尾藁本連翹蒼朮陳皮甘草炙各一錢肉桂三分用水一鍾黃酒半鍾煎八分食前服臀癰應用方紺珠丹貴金丸紺珠膏衛生散托裡消毒散六君子湯六味地黃丸俱見首卷上馬癰生於臀近肛門之右下馬癰生於臀近肛門之左上二症治同臀癰附風疳風疳生於臀腿俗名坐板瘡形如疥癬破流黃水先癢後疼由風寒客於穀道所致宜香白散等藥敷之令毒水出盡即結痂而愈香白散枯白礬輕粉各二錢樟腦一錢共為末濕則乾摻乾用生桐油調敷一用絲瓜皮焙為末燒酒調敷或大蒜瓣燒存性為末摻之或用芫花根煎湯洗之懸癰生於會陰穴在陰囊之後穀道之前初生如松子次大如蓮子數日始發紅熱腫痛大如桃李湧泉疽生於尻前書云腫發太陰狀如伏鼠十日可刺得白膿者順青膿者險赤黑者逆不穴者死穿襠發生窮骨穴即陰器之底也色赤焮腫痛連陰子及腰背肛門灸三陰交穴三七壯跨馬癰生交襠近積線之處按上症皆生於前陰之後後陰之前以其形異而名亦異也屬任脈別絡夾督脈衝脈之會由足三陰虧損多兼志欲不遂之所致輕則成漏重而則隕故麻木黑陷泄瀉嘔噦疲倦者久延穀道內潰臟腑者皆不治古云陽氣亢盛者宜坎離丸取其苦寒能瀉水中之火令陽氣衰則陰自生陽氣衰弱者宜六味地黃丸取其酸溫能生火中之水使陽氣旺則陰自生然此症屬陰精衰弱者十有八九陽氣亢盛者百中一二初起腫痛小便赤澀者先服制甘草一二劑及蒜灸之次服龍膽瀉肝湯已成不得內消者托裡消毒散加穿山甲皂角刺自破或膿脹痛者針之朝服六味地黃丸午服十全大補湯加丹皮澤瀉或再加附子久而成漏者宜國老膏化湯吞蠟礬丸間以豆豉餅灸之久則大附子餅灸之如晡熱煩渴氣喘體倦食少大便溏小便數者脾虛也宜補中益氣湯加茯苓半夏候飲食進諸症減更加麥冬五味子自瘥經云陰虛脾虛也脾為陰土而主生血若誤用知母黃柏苦寒之劑復傷脾肺是絶其源矣懸癰主治方國老膏初起者三二服可消已成者多服自效粉甘草半斤內用無節者四兩劈破用長流水浸透炭火炙蘸水以一盆水盡為度切片另用長流水三鍾無灰酒五鍾煎三分之一如膏一起服之其有節四兩用泉水煎湯洗患處日三次自效已破者三二服合口年久者雖陽潰冀從瘡口出多服亦驗一方加當歸二兩懸癰應用方龍膽瀉肝湯見疳瘡門托裡消毒散六味地黃丸十全大補湯蠟礬丸補中益氣湯俱見首卷臟毒臟毒者乃肛門腫痛也而有內外虛實之殊因厚味勤勞而得者則脈數而有力肛門邊突腫形如李核大便利小水赤甚者肉泛如箍堅痛如錐此為外發易治初宜貴金丸沖生散一煎散之類下之外用金黃散以清涼膏調敷已成脹痛者針之如攻利不應者托之外用神燈照照之磨蟾酥錠塗之其堅硬漸腐俟有膿時用珍珠散倍冰片以豬脊髓調敷因陰虛濕熱下注者則脈數細而虛肛門內結腫刺痛如錐大便虛閉小便淋澀寒熱痰嗽遇夜尤甚此為內發難醫治宜四物湯加知母黃柏天花粉甘草兼六味地黃丸調之五灰散托之俟膿出方安因性急或兼補術大熱而成者必痛連小腹二便乖違串蝕肛門大孔無禁食減作渴因虛勞久嗽而得者必肛門結腫如粟破而成漏瀝盡氣血而亡此二症乃內傷所致非藥能療臟毒主治方一煎散臟毒初起腫痛服之立消當歸尾皂角刺桃仁泥穿山甲炒甘草各二錢黃連一錢五分枳殼檳榔烏藥白芷天花粉赤芍生地各一錢紅花五分玄明粉大黃各三錢用水二鍾浸一宿次早煎一滾空心服之俟行三四次以薄粥補之五灰散臟毒腫痛生於肛門內者蜈蚣穿山甲生鹿角血管鵝毛血餘各煅存性各研末各等分和勻每服五錢空心用黃酒調服灸臟毒及腸風下血不止祕法令患者平立量脊骨前與臍平處是穴於脊椎上灸七壯如年深者更於椎上兩旁各開一寸各灸七壯除根臟毒應用方貴金丸衛生散金黃散神燈照蟾酥餅珍珠散六味地黃丸俱見首卷附穀道生瘡久不愈者內用甘草節為末每服三錢空心生蜜酒調服外以雞內金煅存性為末摻之論痔漏痔漏之症雖瘍醫之事而鄙談之然擇疾而療豈仁者之用心乎豫閲內經惟云因而飽食經脈橫解腸癖為痔蓋為飽食則傷脾土脾土傷則不能榮養肺金肺金失養則肝木無制而生心火侮肺金克脾土於是克所勝而侮所不勝也然飽食而成此症者必有其因其因惟何蓋因飽食之後或暴怒或努力或枯坐或酒色婦人或産難小兒或夜啼等因致使氣血縱橫經絡交錯流注肛門而成此痔矣如其腫者濕也痛者火也癢者風也閉結者燥也惟宜隨其勝者以抑之乃其治也第恐學者未得其詳附以專科趙真子家傳的本再附己意於後稍補缺略云爾二十四痔臟癰痔肛門腫如饅頭兩邊合緊外堅而內潰膿水常流此終身之疾治之無益鎖肛痔肛門內外如竹節鎖緊形如海蜇裡急後重便糞細而帶匾時流臭水此無治法番花痔肛門四邊番出如碗大肉紫黑痛流血水服涼血解毒之藥藥水洗之藥線扎之根未盡者萬憶膏敷三四次除根內服犀角地黃丸一料永不再發蓮花痔狀如蓮花層層疊起有細孔癢痛出膿水數如聖散七八次至痔紫黑色住藥待七八日其痔自落敷粉霜一次去根服槐角地榆丸以去內毒重疊痔生騎縫中間層層疊起乾燥無水只癢而不腫痛搽如聖散日三四次七日痔落不須服藥鉤腸痔肛門內外有痔折縫破爛便如羊糞糞後出血穢臭大痛者服養生丹外用熏洗每夜塞龍麝丸一丸於穀道內一月收功懸膽痔生於臟內懸於肛外時流膿水便痛出血先枯去痔不須收口服血竭內消丸內外痔肛門內外皆有遇大便即出血疼痛用熊膽冰片膏日搽三四次用後方熏洗內痔在肛門之裡大解則出血如箭便畢用手按良久方入服番肛散塞換痔散即番出洗淨敷如聖散五七次其痔紫黑色自落換收口藥收口服收肛散即入或番出時用藥線扎之亦佳服槐角苦參丸或涼血地黃丸前法治之其大便有七八日難解須少用飲食先與患者説明免惑血箭痔與內痔同但無痛癢為異耳若大解則鮮血如箭不問糞前糞後宜灸承山穴內服蝟皮象龍丸氣壯痔肛門側邊有形無痔遇勞苦氣怒酒色則發發則腫脹形若核桃堅硬如石俟氣消毒散則平復如初惟戒氣怒不須醫治沿肛痔周圍皆有痛癢出水搽二仙丹一二次化為黃水用槐花朴硝煎湯洗之服涼血解毒丸三四帖或清金丸半斤則毒盡根除楊梅痔亦周圍皆有形似楊梅只癢不痛乾燥無膿此梅毒將發之候也先服如聖散一劑次服托裡解毒湯十餘劑外搽射糞丹三四次自愈子母痔兩邊相對或大或小時腫時疼頭大根小敷二仙丹內服槐角地榆丸收功雌雄痔亦兩邊相對但一大一小腫痛出膿頭小根大為異耳敷如聖散六七次俟痔落而再醫漏如無漏孔就可收口宜服苦參丸消熱解毒菱角痔狀如菱角左右皆有三四孔一孔通腸流膿水先宜去痔次穿漏孔年久者內有附管用藥丁去管次穿漏收口宜服蠟礬丸干膿收口虛者服十全大補湯六十帖葡萄痔左右如乳頭堆起只癢不痛遇辛苦出水或痔有孔出膿宜先去痔次穿漏孔如不通腸用丁取管收口服蠟礬丸收功核桃痔肛外一邊形如核桃有孔腫痛流膿先用藥線扎去痔次穿漏服蠟礬丸收口石榴痔生穀道前形如石榴破塌疼痛有孔出膿宜先去痔次收口宜服槐角苦參丸櫻桃痔宜先去痔次穿孔服琥珀丸收功牛奶痔先用藥線扎去次點萬憶膏一二次除根雞冠痔亦先扎去敷粉霜一次痔平即可收口雞心痔鼠尾痔俱無痛癢遇辛苦則發不治無害上痔二十四腫形色雖殊而治法則一開載已悉學者宜依次調理不得妄為加減致取不驗至囑痔漏主治方涼血地黃湯治痔腫痛出血歸尾一錢五分生地二錢赤芍一錢黃連炒二錢枳殼一錢黃芩炒黑一錢槐角炒黑三錢地榆炒黑二錢荊芥炒黑一錢升麻五分天花粉八分甘草五分上一劑加生側柏二錢用水二大鐘煎一鍾空心服三四劑則痛止腫消更外兼熏洗熏洗方凡痔腫痛出血及漏毒腫痛俱效地骨皮槐花韭菜根朴硝各二兩白礬五錢蘇葉五錢蔥頭七個用水十五碗煎百沸傾淨桶內令患者坐之四圍遮蓋勿令走氣先熏後洗待痔出黃水為妙清金養榮湯痔漏腫痛大便燥急裡急後重者當歸二錢白芍八分熟地二錢黃連二錢連翹一錢黃芩一錢五分熟大黃錢半枳殼二錢麻仁二錢茯苓一錢天花粉一錢甘草五分用水二鍾煎一鍾食前服忌辛熱等物通聖散痔漏腫痛大便閉結不通防風八錢荊芥赤芍歸尾梔子連翹黃芩白朮各一錢薄荷八分川芎五分甘草五分桔梗八分石膏八錢滑石二錢大黃五錢朴硝三錢每劑加漏蘆一兩生薑三片紅刺七個燈心三十根用水煎服瀉二三次食涼粥止之忌葷腥油膩三五日但有熱毒內結者服此一劑瀉去餘毒次服清金散三四劑退腫止痛清金散黃連三錢枳殼一錢陳皮一皮乳香一錢沒藥五分用水二鍾煎一鍾空心服如腫痛甚者外兼熏洗用番丹敷效十全大補湯氣血不足不能長肉收口者黃耆蜜炙當歸各二錢熟地三錢川芎白芍人參白朮茯苓