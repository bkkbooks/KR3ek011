body:
  text: 卷三分治部下小疵此係頭面小疵及眼耳口鼻喉舌等部位因其症治多岐不可紊亂於大毒之內故另立之以便檢閱頭部頭痛頭瘋頭痛頭瘋多由風火濕痰四氣所致或因梅毒上攻及婦人產後當風梳洗太早並宜天麻餅子新久悉效及魚鰾散無憂散俱可選用若頭仰視深者危里痛搖頭者重頭痛連腦手足冷者死脈則浮滑易愈短澀難醫再如頭痛發熱氣喘而左手脈大於右手者虛也速用參耆歸朮陳皮甘草加大附子佐以茯苓芍藥數劑大汗而愈若以右大為內傷左大為外感寧不誤耶天麻餅子治頭痛頭風及頭目昏眩項背拘急肢體煩痛肌肉蠕動耳鳴鼻塞皮膚頑麻瘙癢癮疹又治婦人頭風眉稜骨痛牙齒腫痛痰逆噁心等症天麻川芎細辛蒼朮防風白芷薄荷甘松白附子甘草草烏川烏二烏湯泡去皮各五錢全蠍三錢食麵打糊為丸菀豆大捻作餅子每服二十三餅食後細嚼蔥湯送下火熱痰痛茶清送下甚者日進二服忌諸般發物魚鰾散治八般頭風魚鰾用裙帶者剪碎用苘麻煎碎同炒胖透去麻為末每服三錢臥時蔥酒調服日輕夜重者血虛頭痛也用當歸一兩酒二鍾煎一鍾調服梅毒頭痛目腫者用本門湯藥內調服蠲痛無憂散治偏頭痛立驗方見諸痛門油風油風則毛髮成片脫落皮膚光亮癢如蟲行者是也由風熱乘虛攻注血不能榮養所致宜神應養真丹服之以培其本海艾湯洗之以治其標神應養真丹治風寒暑濕襲於三陽部位以致血脈不能榮運肌膚虛癢眉發脫落皮膚光亮見股部海艾湯海艾菊花薄荷防風藁本藿香荊芥穗甘松蔓荊子各五錢用水五碗煎入盆內先熏後洗白屑風白屑風生髮內及面目耳項初起微癢久生白屑疊疊飛起脫之又生由肌熱當風風熱之所化也宜祛風換肌丸祛風換肌丸治白屑風紫白癜風頑風頑癬濕熱瘡疥一切癢瘡日久不絕愈而又發者威靈仙石菖蒲大胡麻何首烏天花粉苦參蒼朮牛膝等分當歸川芎甘草減半上為末用新安酒跌丸綠豆大每服二錢白滾湯送下忌發物火酒玉肌散洗白屑風及風濕雀斑酒刺綠豆半升滑石白芷白附子各二錢上為末每用三匙洗面時用之潤肌膏治白屑風油風及禿瘡白斑作癢麻油四兩當歸五錢紫草一錢浸三日文火煠枯去渣入黃蠟五錢溶化傾碗內搽患處禿瘡禿瘡生白痂成個而不相連若𤼏瘡則生黃痂成片有膿為異耳夫頭為諸陽之首而瘡亦屬火乃二陽相灼所致其治法必當解陳莝之積熱導心經之煩躁故宜以防風通聖散俱用酒浸過焙為末每日三服量見大小食後白滾水調服服至頭上有汗出為驗外兼以殺蟲散風等藥搽之若蟲死則癢止風散則發生血潮則斑潤隨用生薑蘸潤肌膏擦之則發生矣忌動風發物麥餞散治禿瘡白痂壘疊癢若蟲行者先用艾葉鴿糞煎湯洗淨瘡痂次用肥豬肉湯洗之良久其蟲自出隨用躑躅花油調麥餞散搽之氈帽戴之隨後作痛發腫忍之三日後其痂漸落其發自生矣戒諸發物躑躅花油方取根四兩搗爛用菜油一碗煠枯去渣入黃蠟少許冷調前藥或用青布蘸此蠟油每日上三五次三日可愈麥餞方用小麥一升炒枯黃色乘熱入缽內和硫黃四兩白砒一兩為細末攪勻待冷取起加煙膠半斤川椒三兩生枯礬各二兩共研細末用時以蔥湯洗淨用麻油調搽油紙蓋扎三日一換三次即愈又治小兒痘風瘡甚效華蓋散用糯米煮爛飯搗如膏隨將禿瘡剃淨將米膏厚罨之其蟲盡入米膏中俟膏自脫發自生矣一用白菀豆為末水調糊頭上一指厚布裹之帶束之俟豆蒸發則覺痛矣去藥亦效鼠蒜膏治白禿及諸瘡疥癬起白痂者鼠糞為末杵大蒜和成膏塗之𤼏瘡由母受胎之日食酸辣海味太過多生此瘡烏雲膏治頭𤼏並坐板膿疥及下部寒濕等瘡松香末為君硫黃末減半和勻香油拌如糊攤南青布條上少半指厚捲成條線扎之再用油浸一日取出刮去余油以火點著一頭下以粗碗接之其布灰陸續剪去取所滴藥油浸冷水內一宿出火毒搽用連蛤散治頭𤼏頭瘡黃連文蛤黃柏白芷等分為末用水調攤於碗內覆於磚上燒艾熏之以黑干為度再研為末清油調敷一用生牛皮燒存性為末陳醋調敷一生於面者用百藥煎五錢生白礬二錢為末香油調敷螻蛄癤螻蛄癤即鱔拱頭其因有二胎中受者小而悠遠生後受毒者大而易愈但其內有衣膜故愈而復發未潰時用紺珠膏貼之膿熟者針之插三品一條槍於孔內化盡內膜自不再發又有不腫而不收口者必風襲之也用敗銅散搽之兼戒口味一擇吉日須午時於北房門檻前側臥耳前有穴名螻蛄穴用麥粒大艾於穴上灸之只一壯即愈敗銅散螻蛄癤已破而不收口者化銅舊罐子為細末用香油調敷紺珠膏見首卷三品一條槍見瘰癧門髮際瘡髮際瘡為生於髮際間也其形如粟如芡實頭白肉赤痛癢相兼甚則狀如葡萄而更痛由風熱上壅所致宜紺珠丹發之或酒製防風通聖散解之生髮內頂平而癢結黃蠟痂者梅瘡也生腦後窩中發癢流汁浸淫者名燕窩瘡治同𤼏瘡紺珠丹見首卷酒製防風通聖散見禿瘡門面部面屬乎諸陽而統屬惟陽明胃也其或胃熱則面熱胃寒則面寒宜升麻湯熱加黃連寒加附子胃有風熱則面浮腫胃有濕熱則面生瘡或面鼻紫色或風刺癮疹宜升麻消毒散及秦艽湯黑龍丸二參湯黃水瘡黃水瘡頭面耳項忽生黃粟破流脂水頃刻沿開多生痛癢由外傷風熱內傷濕熱所致宜升麻清毒散清之鹽湯洗之青蛤散搽之升麻消毒散治面腫生瘡羌活防風升麻白芷桔梗連翹梔子芍藥金銀花甘草牛蒡子如身有瘡加歸尾紅花用水二鍾煎八分食遠熱服外用杏仁去皮尖杵如膏敷之青蛤散治黃水濕熱等瘡蛤粉煅一兩石膏煅一兩輕粉五錢黃柏生五錢青黛三錢上為末先用香油調成塊次加涼水調稀將瘡洗淨薄塗患處二白散治黃水瘡頭𤼏眉𤼏耳蝕羊鬍子燕窠膿窠等瘡鉛粉一兩水調攤碗內艾熏五七次以粉黃色為度加輕粉一兩為末用麻油煠槐枝稍枯去渣取油調敷患處一黃散治症同前黃連一兩為末水調攤碗內艾內加穿山甲一分燒熏以純黑為度加輕粉五錢冰片二分用槐枝煎油調敷或豬膽汁調敷二合散治症同前鉛粉炒槐花炒等分為末聽用老松香一兩銀硃四錢共為末紙捲成條麻油浸透火燃著一頭滴下油藥以器接之用調前藥三次即愈眉𤼏眉𤼏生兩眉間形如疥癬屬肝膽二經熱用柴胡梔子散因乳母食厚味醇酒者加味清胃飲由鬱怒者加味逍遙散母子同服面瘡煎鹽湯浸綿花貼之洗之日五七次一用鯽魚頭燒存性為末醬內清汁調敷面浮腫及陰囊浮腫者使君子肉一兩白蜜五錢炙乾為末每服一二錢米飲調服摩風膏治面遊風毒麻黃五錢羌活一兩防風二錢升麻二錢歸身白檀香白芨各一錢香油五兩浸五日文火煠藥黃即去渣入黃蠟五錢溶化肺風酒刺肺風由肺經血熱鬱滯不行而生酒刺也宜枇杷清肺散或用荷葉煮糊為丸白滾水服外用白礬末酒化塗之枇杷清肺散治肺風酒刺枇杷葉桑白皮鮮者更佳各二錢黃連黃柏各一錢人參甘草各三分用水鍾半煎七分食遠服黧黑斑黧黑斑多生女子之面由血弱不華火燥結成疑事不決所致宜服腎氣丸以滋化源洗玉容散兼戒憂思方可一云風邪入皮膚痰飲漬腑臟則面䵟𪒟又當隨其因而調之也一用密陀僧為細末入乳調敷鹿角尖用酒磨塗之腎氣丸見瘡瘍門玉容散見雀斑雀斑雀斑由水虧不能制火火滯結而成斑也宜六味地黃丸服之用玉容散洗之久久可愈玉容散洗黧黑斑雀斑粉刺功能白麵嫩肌白芷白朮白芨白茯苓白扁豆白細辛白殭蠶白蓮蕊白牽牛白蘞白鴿冀甘松糰粉加白丁香白附子鷹條等分防風荊芥穗羌活獨活減半共末罐收日洗三次一醋浸白朮擦之半月驗六味地黃丸見首卷黑子黑子痣名也由腎氣濁滯於陽分陽氣束結而成也古云面無善痣故宜去之用針挑損搽四白散紙封之三四日自脫用貝葉膏或瑩珠膏生肌兼戒醬醋則愈後無痕四白散點痣去斑糯米三百五十粒巴豆取肉五個用夏布包之扎之取石灰鵝卵大一塊沖滾水一碗泡化以水煮米包成飯取出乘熱加硇砂末一錢杵勻仍加灰水研如糊瓷罐收之聽用鼻慝瘡鼻慝瘡生小兒鼻下兩旁由風熱客於肺也流汁浸淫癢而不痛宜服澤瀉散搽青蛤散見面部澤瀉散治鼻慝瘡澤瀉鬱金梔子甘草等分為末用甘草湯調服羊鬍子瘡羊鬍子瘡生於下頦承漿治同黃水瘡眼部眼胞菌毒菌毒生於眼胞其形如菌頭大蒂小漸長垂出甚者眼中流淚漸至昏矇由脾經蘊熱凝結而成也法以軟綿紙蘸水應胞上少頃用左手大指甲佃於患根右手以鈹針尖頭齊根切下血出不妨預用翠云錠子磨濃塗之其血自止內服涼膈清脾飲仍忌海味煎炒涼膈清脾飲黃芩梔子連翹薄荷赤芍石膏生地防風荊芥各一錢甘草五分用水二鍾燈心二十根煎八分食遠後服翠云錠治菌毒割後塗之亦治爛弦風眼暴赤腫痛杭粉五兩銅綠一兩輕粉一錢共為細末用黃連一兩川米百粒水一碗煎半碗去米再煎至三分和藥作錠陰乾用時水磨如墨令濃以雞翎蘸塗患處治眼厚翳將前藥用黃連八兩煎膏加牛皮膠二錢溶化和藥成錠用無根水磨厚敷眼內片時用水洗淨其翳自起以刀剪去之眼丹眼丹生於眼胞紅熱腫痛由脾胃二經風熱所致若風盛則浮腫易散熱甚則堅腫難消初起宜敗毒黃連丸清之甚者貴金丸下之外貼精豬肉片或塗坎宮錠子俟膿成則針之貝葉膏貼之收口敗毒黃連丸治上下眼丹黃連連翹羌活各二兩菊花二兩防風一兩五錢細辛甘草各一兩上為末煉蜜為丸梧子大每服五十丸茶水下草礬膏粉草二兩皂礬五錢水煎濃汁濾淨渣再煎濃加冰片以雞翎蘸膏頻掃腫處一用精豬肉切片水漂去血貼丹上不時易之坎宮錠子見腫瘍貴金丸見腫瘍附余針眼針眼土疳也小瘡生於眼睫間微者不膿而愈甚者成漏入風則頭面發腫目亦赤疼初起以針刺破即瘥芎皮散治針眼川芎為君青皮減半為末每服二錢煎細茶菊花湯調服外以枯礬末雞子清調敷腫者用南星末同生地黃搗膏貼太陽穴而腫自消眼胞痰核痰核生於眼胞在皮裡膜外其形如豆堅而不疼由痰因火滯也輕者自愈重者變癭漏諸疾初起時用生南星以醋磨濃頻塗患處皮薄者微微撥損以手指甲擠出白粉即愈貼貝葉膏收口見膏藥門眼胞內生椒瘡粟瘡椒瘡粟瘡生眼胞之內由脾胃血熱所致椒瘡則赤堅而難消粟瘡則黃軟而易散今人用燈草竹葉以治標孰若清脾涼血以治本宜菩提露洗之脾番症脾番症乃眼胞番轉如舌抵唇之狀由胃經氣滯血壅皮急絲吊所致宜瀉脾胃之積熱漏睛漏睛為睛內有孔時流膿汁也其名不一如正漏生於風輪初出白膏如痰尚可治久則出青黑膏損及瞳人者不治偏漏生於氣輪者輕流白水重則成膿久而膏枯者不治內漏生於目竅之傍外漏生於肉輪之外此由積熱痰火熏蒸所致陰漏則晝輕夜重宜養血清肝陽漏則夜輕晝重宜清金補氣又在大眥屬心經君火宜補北瀉南小眥屬心胞相火宜於北方中補而抑之也總之目者肝之竅腎者肝之主治宜補腎宣肝為要白薇丸治漏睛出膿白薇一兩防風白蒺藜羌活各三錢石榴皮三錢共為末米糊丸梧子大每服一錢白湯送下解毒丸治漏睛出膿杏仁去皮尖二兩另研梔子十兩大黃五兩為末煉石蜜一斤為丸梧子大每服二三錢茶湯送下大小眼眥出膿大小眼眥出血眼眥出膿者大腸熱也用桔梗芩連木通檳榔茱萸之類眼眥出血者小腸熱也用歸尾赤芍黃連桃仁甘草之類耳部經絡耳者心腎之竅肝膽之經宗脈之所聚也心腎主內如精血不足或聾瞶或虛鳴稟賦弱也六味地黃丸加桑螵蛸或滋陰地黃丸肝膽主外如風熱有餘或脹痛或膿癢邪氣客也柴胡清肝散因血燥者柴胡梔子湯如未應佐以六味丸間服九味蘆薈丸因食積內熱者四味肥兒丸之類柴胡清肝散治瘡毒生於耳前耳後自身外側至足股內側至足或胸乳小腹下等處皆肝膽三焦經風熱柴胡黃芩炒人參各一錢梔子炒川芎各一錢五分連翹桔梗各一錢二分甘草五分水煎食遠服滋陰地黃丸見耳疳門柴胡梔子湯見小兒胎毒瘡瘍九味蘆薈丸見疳瘡門四味肥兒丸耳底疼痛升桔湯治耳內腫痛三陽經風熱也再治面腫牙痛咽喉疳升麻一錢桔梗一錢五分昆布二錢連翹二錢膽草一錢射干一錢五分用水鍾半煎八分食遠服外以軍持露滴之軍持露治耳內痛引腦項者熊膽分許冰片少許涼水五七茶匙化開滴入耳內其冷如冰其痛立止少時傾出三二次全愈或用鐵店石池內磨刀水滴之垂盆草取汁尤佳芍藥散耳痛連頭流膿出血者風熱上壅也赤芍白芍川芎當歸大黃木鱉子甘草各一錢五分水二鍾煎八分食遠服加味涼膈散耳濕腫痛屬少陽相火宜治辛寒黃芩一錢梔子五分連翹二錢薄荷五分甘草一錢朴硝一錢大黃防風各一錢羌活一錢水二鍾竹葉二十片煎一鍾加蜂蜜少許食後服氣閉者加菊花蔓荊子石菖蒲黑疔黑疔生於耳內一點疼如錐刺痛引腮腦破流血水用前升桔湯軍持露等法治之罔效者疔也急服蟾酥丸汗之研蟾酥餅水調滴於耳內立效一灸後谿穴七壯穴見灸門耳疳耳疳者為耳內流出膿水臭穢也書有云出黃膿為聤耳紅膿為風耳白膿為纏耳清膿為震耳名雖有五其源則一由足少陰虛熱者四物湯加丹皮石菖蒲及地黃丸滋補之由手少陽風熱者蔓荊子散交感丹清之若小兒胎熱或洗浴入水作痛生膿者在初生月內者則不必搽藥如治之早則項下結腫任其毒盡自安至月外不瘥者用紅綿散搽之蔓荊子散治耳出膿水蔓荊子桑白皮菊花前胡升麻赤茯苓赤芍藥生地木通甘草炙等分用水二鍾煎八分食遠服滋陰地黃丸治耳內虛鳴膿汁不幹者熟地二兩茯苓八錢山萸一兩菊花八錢丹皮八錢黃柏八錢何首烏黑豆蒸六錢共為末煉蜜為丸梧子大每服二三錢空心淡鹽湯送下交感丹治耳疳氣不宣通遂成聾瞶者香附童便浸炒三錢黃連二錢茯神二錢甘菊一錢桂心一錢共為末每服錢半燈心湯下紅綿散治耳內流膿腫痛已消膿尚不止者枯白礬三錢干胭脂二錢麝香二分共為末罐收先捻綿球絞盡耳內濕膿隨用綿球蘸藥送入耳底自愈一用臘日枯礬入豬膽內陰乾吹用一用杏仁炒黑為末綿裹塞於耳內日三四易一用雞肫皮焙或文蛤末吹之一用人牙煅存性去火毒為末用少許吹耳內一用陳年醬茄蒂擰汁滴於耳內耳衄耳衄者耳出鮮血也由上焦血熱所致若肝脈弦洪者柴胡清肝湯虛火妄動腎脈數而弱者六味地黃丸生地麥冬散總以涼血清心為主外以神塞丸塞之生地麥冬飲治耳出血及鼻衄生地一兩麥冬一兩水二鍾煎八分食遠服神塞丸治耳內出血及鼻衄麝香一分沉香三分白礬一錢糯米五十粒共為末糊丸梧子大薄綿裹之如左耳出血塞右鼻右耳出血塞左鼻如左鼻出血塞右耳右鼻出血塞左耳兩耳出血塞兩鼻兩鼻出血塞兩耳六味地黃丸見潰瘍門柴胡清肝湯見本部耳痔耳痔及耳挺耳蕈俱結於耳之竅內不腫不瞶不痛塞久令人重聽宜梔子清肝湯兼外插藥線於縫內化儘自愈梔子清肝湯牛蒡子柴胡川芎白芍石膏當歸梔子丹皮各一錢黃芩黃連甘草各五分用水二鍾煎八分食後服耳鏇瘡耳鏇者生耳後縫間延及上下如刀裂之狀隨月之盈虛故名月蝕瘡宜川粉散搽之如初生如黍次爛如鴉㗖之狀名鴉㗖瘡用鴉㗖散敷之川粉散治耳鏇及黃水等瘡穿山甲炒鉛粉炒輕粉隔紙微炒等分為末摻干用麻油調敷一用地骨皮煎湯洗淨仍用地骨皮為末摻之乾用香油調敷鴉㗖散治耳鏇等瘡老鴉毛煅灰存性一錢大紅羢燒灰存性一錢白礬枯五分珍珠五分冰片二分輕粉五分黃丹一錢麝香少許上為末摻用耳癢耳癢搔之雖至血出而癢不止者腎風也宜服三因四生散三二服即瘥四生散見腎臟風瘡門耳聾蠟彈丸治耳聾由肺氣虛者山藥炒三兩白茯苓二兩杏仁去皮尖炒二兩五錢為末用黃蠟一兩溶化為丸彈子大鹽湯嚼下少氣嗌乾者用生脈散煎湯嚼下東垣王提督方治暴聾熏一二次三五年者熏五七次全愈多年者不治靈磁石七錢煅珍珠七粒微焙當門子麝三粒為細末蘄艾一錢為粗末次用白綿紙一張鎮熱銅器上用黃蠟五錢遍擦紙上裁為五寸大方塊將前艾均分鋪紙上艾上摻藥捲成筒仍以火烘蠟紙黏牢聽用再用厚紙捲筒如喇叭樣以小口對耳次將藥筒點著吹滅側耳熏之力能隔耳透咽其功甚捷熏畢用艾羢塞耳以避風入鳳珠丹耳聾雞蛋一個開一孔入巴豆一粒去心膜用雙層紙封之與雞抱之以雛出為度取蛋清滴耳內日二次一用鼠膽汁灌入耳內少時令人於耳內視之俟耳竅內有蟲見即以捻子捻蟲頭緩緩扯出其蟲之大小隨年分之新久其蟲一出患人發暈少時即蘇蘇即聰矣此法不問新久雙聾單聾悉驗如兩耳則用二膽治之蟲入耳蟲入耳者以姜擦貓鼻貓尿自出取尿滴耳內其蟲自出而愈諸方皆不及此若用麻油滴之則蟲死而難出矣蟲入耳久之食腦而腦痛者用桃葉為枕蟲自鼻孔內出蟲入耳用雄雞冠血滴之凍耳成瘡凍耳用生薑取汁熬膏塗之忌用火烘湯泡犯之則肉死宜與凍瘡門參考鼻部經絡鼻者肺之竅也五氣入鼻藏於心肺心肺有病而鼻為之不利鼻淵鼻淵者鼻流濁涕黃水腥穢是也又名腦崩腦漏久之令人頭眩虛暈不已經云膽移熱於腦則辛頞鼻淵遇寒而甚者火鬱之為也書云膽與三焦同火治故先宜清上繼以鎮火補水兼理肺肝清上多取乎辛涼如荊芥薄荷甘菊連翹升麻牛蒡子天麻之類鎮火補水如犀角二冬硃砂人參五味子茯苓山藥丹皮甘草之類理肺如桑皮桔梗二冬牛蒡子天花粉竹瀝之類清肝膽如柴胡川芎竹茹棗仁羚羊角之類余治腦漏於對症藥內加檀香片一大撮無不奏效奇授藿香湯治鼻淵致虛痃暈不已藿香連梗葉九錢水一碗煎七分加公豬膽汁一枚和勻食後服重者不過三服即愈或以藿香為末豬膽汁熬膏和丸每服二錢食遠白湯送下久而虛者兼服補中益氣湯六味地黃丸以滋化源天蘿散治鼻淵而兼腦痛者名控腦砂有蟲食腦絲瓜藤近根處三五尺燒存性為末每服二三錢黃酒調服馬兜鈴散治鼻淵馬兜鈴五錢麻黃三錢五味子一錢甘草一錢水二鍾煎一鍾加黑砂糖少許臥時溫服即愈白芨丸白芨末酒糊丸每服三錢黃酒下半月愈鼻鼽鼻淵鼻流濁涕也鼻鼽鼻流清涕也如老人流涕不幹者搗獨蒜敷足心自不再發鼻淵服藥罔效者惟灸上星穴五壯即愈仍服八味地黃丸以滋化源鼻聾鼻聾者為不聞香臭也宜神愈湯以生薑為引水煎服之立驗歌云細芷羌防半芎歸陳桔苓薄荷增三倍煎服氣調勻鼻衄鼻衄者鼻中出血也由肺經血熱妄行治宜涼血然涼血必先清氣氣清血自歸經矣如枳殼連翹清之薄荷玄參散之蒲黃京墨茅根止之再如羚羊清肺散生地麥冬飲加味生脈散皆對症藥也如夏月脈虛身熱大汗口渴者暑熱所逼也黃連香薷飲清之外用青綿線扎兩手中指根再用毛邊紙折十餘層水濕透貼百會穴以熨斗熨之或再用好暖酒十數碗盛盆內踏兩足浸之或搗大蒜於兩足心塗之再神塞丸塞之再以傾銀紫土新罐為末燒酒調敷囟門立止羚羊清肺散治衄血及吐血咳血羚羊角銀柴胡黃連玄參石膏地骨皮梔子歸身白芍川芎生地蒲黃各一錢蘆薈甘草各五分藕節三個用白茅根四兩搗爛入水一碗和絞去渣取茅根汁一碗入藥煎七分加童便一鍾食後服加味生脈散治衄血麥冬五錢人參二錢五味子一錢薑炭三分用水二鍾煎八分食遠服亦可代茶伏龍散治衄血並血崩伏龍肝即柴灶中心燒紅土也為末每用二錢冷水調服即止黃連香藿飲香薷厚朴姜炒白扁豆炒黃連薑汁炒用水煎熟冷服生地麥冬飲神塞丸俱見耳部鼻痔鼻痔生於鼻內形如榴子漸大而下垂令人氣不通暢由肺經濕熱內蒸如朽木而生芝蘭也宜辛夷清肺飲外兼消痔散等藥點之化水而消仍節厚味戒氣怒省房勞庶不再發辛夷清肺飲辛夷六分黃芩梔子麥冬百合知母石膏各一錢升麻三分甘草五分枇杷葉三片用水二鍾煎八分食遠服或加連翹薄荷羌活防風消痔散治鼻痔硇砂一錢輕粉雄黃各三分冰片五分上為細末用草梗咬毛蘸藥點痔上日五七次漸化為水一用白砒三錢安新瓦上上蓋密陀僧末白礬末各二錢煅煙盡為度埋一宿去火毒配苦丁香末等分加麝香四分和勻或加硇砂少許每用少許吹之即流黃水腫消則氣順矣一隻用冰片點之稱驗鼻疔鼻疔生鼻內痛引腦門鼻竅脹塞甚則唇腮俱腫宜蟾酥丸汗之鼻孔內用蟾酥條研末吹之如鼻外發腫用離宮錠子塗之鼻腫如瓶者逆一灸腕骨七壯壯如綠豆大見灸門鼻瘡鼻瘡為鼻孔內乾燥發痛而有瘡也宜洗肺散清之外用油紙捻黏辰砂定痛散送入鼻孔內日三五次立效洗肺散治鼻內生瘡黃芩半夏各二錢天冬麥冬五味子各一錢五分杏仁一錢甘草五分用水二鍾生薑三片煎八分食遠服辰砂定痛散見口部酒皶鼻酒皶鼻者先由肺經血熱內蒸次遇風寒外束血瘀凝結而成故先紫而後黑也治須宣肺氣化滯血使榮衛流通以滋新血乃可得愈麻黃宣肺散治酒皶鼻麻黃麻黃根各二兩頭生酒五壺重湯煮三炷香露一宿早晚各飲三五杯至三五日出膿成瘡十餘日則膿盡膿盡則紅色退先黃後白而愈調榮化滯湯當歸川芎赤芍生地紅花俱酒洗黃芩酒炒陳皮各一錢甘草生五分生薑三片用水二鍾煎八分加酒少許調五靈脂末二錢食後服氣弱形肥者加酒炒黃耆立應黑參丸治酒皶鼻玄參為末用豬膽汁和丸每服錢許食後白滾湯送下外以玄參末仍用豬膽汁調塗鼻上外治諸方硫黃為末以陳糟茄汁調敷一用象牙末或密陀僧或杏仁搗爛俱用人乳調敷唇部經絡經云脾之榮在唇其為病也燥則干熱則裂風則瞤寒則揭是也治宜隨其因而療之忌用追蝕等藥及藥線等法反唇疔鎖口疔反唇疔生於唇里鎖口疔生於嘴角二疔初起如粟堅硬如鐵腫痛麻癢寒熱交作內外治法於疔瘡門參考唇疽唇疽生於唇腫痛有頭甚則寒熱交作由胃經積熱所致宜神授衛生散壯者貴金丸外用離宮錠子塗之神授衛生散貴金丸俱見腫瘍離宮錠子見敷治門一灸犢鼻穴見灸門繭唇繭唇者初生如豆漸大如繭或如番花靈芝等樣腫硬疼痛破流血水久變消渴消中之症由胃中積熱火痰留注所致初起及已成無內症者用麻子大艾灸三壯貼蟾酥餅膏藥蓋之日久漸消有內症作渴者早服加減地黃丸午服清涼甘露飲以滋化源如日久流血不止見形羸虛熱面黑顴紅口乾渴甚者不治清涼甘露飲犀角銀柴胡茵陳石斛枳殼麥冬生地黃黃芩知母枇杷葉甘草各一錢淡竹葉燈心各二十用水二鍾煎八分食遠服加減地黃丸見潰瘍蟾酥餅見疔瘡門唇風唇風生下唇發癢不疼腫裂流水由胃火上攻也宜服滋陰地黃丸外以坎宮錠子一錢加銅青末五分水調塗之滋陰地黃丸治陰虛火燥唇裂如繭熟地山藥山萸五味子麥冬當歸菊花枸杞肉蓯蓉巴戟上等分為末煉蜜為丸如梧子大每服七八十丸空心白滾湯送下口部經絡口瘡脾氣通於口脾和則口能知味又心脈布於舌上脾脈布於舌下故心脾積熱則口舌生瘡甚則腮舌赤腫此實火也治以苦寒如涼膈散又膀胱移熱於小腸隔腸不便上為口糜如灶底燃薪籠中肉腐之象也宜柴胡地骨皮湯或五苓散導赤散合而用之如服寒涼之藥不應者虛火也治以甘溫如發熱飲冷者上焦虛熱也補中益氣湯肢冷腹痛便滑食少者中焦虛寒也附子理中湯八味地黃丸晡熱內熱唾痰便數口乾作渴者下焦虛火也加減地黃丸此從治之法也如小兒又當察面圖部位分臟腑虛實而藥之升麻飲治口內生瘡齒齦肉爛升麻玄參黃連羚羊角黃芩葛根麥冬羌活防風菊花大黃各一錢人參知母炙甘草各五分水二鍾煎八分食遠服甘露飲治口舌生瘡及牙宣齒齦腫爛時出膿血不任涼藥者枇杷葉石斛黃芩麥冬生地甘草炙加枳殼茵陳等分水二鍾煎八分食遠服柴胡地骨皮湯柴胡地骨皮各五錢水二鍾煎八分食遠服辰砂定痛散治口舌生瘡咽喉腫痛軟石膏煅一兩胡黃連末二分辰砂末五分冰片二分共為末收罐內如口內則摻之喉內則吹之日上五七次咽之蟾酥綿治口內生瘡齒齦肉爛蟾酥五分硼砂冰片麝香各一分為細末用溫水半盞化令勻盡入紅綿五分蘸藥汁曬乾再浸俟藥汁盡將綿寸截每用一片貼患處有涎即吐之日三五次抽薪散治口舌生瘡並小兒火眼大附子為末津調敷足心內油紙蓋之絹條扎之一用草烏南星乾薑等分為末醋調敷手心足心一用吳茱萸為末醋調敷腳心一用白礬三四兩沖淡水一盆浸化泡足一用細辛為末醋調敷臍涼膈散治上焦實熱口舌生瘡及咽喉腫痛黃芩梔子連翹薄荷甘草桔梗朴硝大黃水二鍾竹葉二十片煎八分加蜂蜜三匙和服附子理中湯五苓散導赤散瀉丙丁小腸生地木通甘草加竹葉水煎服補中益氣湯八味地黃丸加減地黃丸舌部經絡心開竅於舌而心脈又繫於舌也再肝脈絡於舌本肺脈絡於舌傍是舌屬三經不必專主於心也紫舌脹紫舌脹者舌脹滿口堅硬疼痛由火盛血壅所致又云脾熱則腫滿用衣針扎箸頭上露鋒分許於舌上刺數十刺令其血出紅色者輕紫色者重以溫湯漱口搽冰硼散服涼膈散加牛蒡子荊芥倍梔子梔子瀉火之要藥也或去硝黃一用番木鱉刮去殼咀片含少許即消一用蓖麻子仁研紙捻燒煙燻舌入口即消一云舌長過寸研冰片敷之即收一灸少衝穴痰包痰包生於舌下結腫如瓠光軟如綿甚則塞令滿口由火擊痰飲流結而成宜用鈹針對包上捻之如鑽鑽破出稀涎如雞子清稠黏不斷拭淨搽水調散服二陳湯加黃芩黃連薄荷之類仍忌煎炒火酒等物庶不再發冰硼散治舌脹痰包重舌木舌咽喉腫痛冰片一分硼砂五錢辰砂一錢牙硝一錢為末收用喉生毒加燈草燒灰更效舌衄舌衄為舌上有孔小如針簪大如箸頭其或色黑出血如湧由心火炎上血熱所致宜升麻湯香參丸又云肝壅則血出如湧肝風則舌強升麻湯治舌衄血出如湧升麻小薊根茜根各兩半艾葉七錢五分寒水石三兩為末每服三錢用水一鍾煎七分去渣入生地黃汁一合再煎一二沸溫服或加柏葉香參丸治症同前人參麥冬當歸生蒲黃各五錢生地一兩甘草炙二錢五分上為末煉蜜為丸小彈子大每服一丸每日三四服白滾水化下重舌等症痰氣重齶舌疔舌下生小舌為重舌宜冰硼散搽之舌上生核強硬作痛者為痰氣用衣針點破搽冰硼散服清火消痰之藥舌上齶生瘡形如楊梅外無寒熱內卻心煩者為重齶忌用針刺宜黃連解毒湯加桔梗甘草外兼吹藥舌上生瘡其形如豆堅硬寒熱疼痛應心者疔也宜蟾酥丸含於舌下隨化隨咽或再服三粒以解內毒甚者刺之或灸少衝穴弄舌舒舌弄舌者微露即收也屬心脾經虧損宜溫脾散補之大病後者難醫舒舌者舌舒長良久方收也由心脾積熱宜瀉黃散主之涼膈散見口部黃連解毒湯蟾酥丸見疔瘡門牙齒部經絡當門為齒上屬督脈下屬任脈兩傍為牙上屬足陽明胃經下屬手陽明大腸經夫牙者骨之標而屬腎牙之生如木之栽於土也如腸胃素有濕熱上出於牙齦之間適被風寒或為飲冷所逼則濕熱不得外發而作痛乃陽明病非少陰病也是症以寒為標故外用擦漱之藥宜辛溫取其散寒開鬱以熱為本故內服之藥宜辛涼取其散熱清中如連翹湯之類再火勝則痛必牽扯腮顴加石膏風勝則腫加防風氣勝則長加梔子氣鬱則脹亦加梔子痰勝則木加貝母外以醋漱之去其痰涎瀉其風熱疳慝則黑加使君子肉蟲蝕則蛀加檳榔外以五靈脂湯化漱之以殺其蟲再血虛則齒癢腸胃虛則齒露過於勞則齒浮腎虛則齒豁惟精固則齒堅又當隨其症而用滋補也牙痛連翹湯治一切牙痛隨前症加減黃芩黃連當歸赤芍各一錢五分連翹一錢天花粉玄參各七分枳殼五分用水二鍾煎八分食遠服加味涼膈散治濕熱牙疼腮顴浮腫牽引太陽口熱便秘者依本方加石膏升麻淡竹葉水煎加蜜調服治牙痛久不愈諸藥罔效者只用石膏一兩升麻五錢水煎服效升麻四物湯治血虛牙痛當歸川芎赤芍生地白芷各一錢黃芩一錢升麻五錢蒲公英五錢用水碗半煎八分食遠服珠金丸牙痛內外俱腫狀類傷寒發頤者為搜牙風先以紺珠丹汗之次以貴金丸下之再次用清痰降火之藥調理羌活附子湯治冬月大寒犯腦令人腦牙俱疼名曰腦風麻黃附子各三分羌活蒼朮各五分黃耆一分防風甘草升麻殭蠶黃柏白芷各二分佛耳草用水鍾半煎八分熱服定痛塞耳丹細辛盆硝各一錢雄黃五分牙皂二個為末用大蒜一枚杵和為丸梧子大每用一丸綿裹之如左牙疼塞左耳右牙痛塞右耳良久即止一丸可治數人固齒白玉膏治一切牙疼及齒動搖而不堅固者龍骨一兩陽起石五錢二味火煅通紅淬後藥汁內七次鉛粉一兩珍珠三錢象牙末五錢麝香二錢各末和勻黃蠟三兩溶化濾淨再化俟溫方入前藥和勻乘熱攤紙上如冷燒熱熨斗仰放紙鋪鬥上攤之用時先漱口淨剪小條貼齒根上閉口勿語過宿如失制龍骨陽起石藥汁方殭蠶四十九個防風當歸川芎牙皂青鹽升麻白芷骨皮各五錢細辛藁本各三錢為粗末長流水於砂鍋內桑柴火熬汁去渣再煎汁一碗以淬前藥七次焙乾為末蟾酥丸見疔瘡門綿裹一粒咬痛牙上其痛立止甚者用真蟾酥麥粒大咬之更驗然痛牙即爆落如手取齒根腫痛出膿者名曰風齲及治蟲蝕疼痛干蝦蟆一個燒灰青黛一分蘆薈半分共為末用生地黃煎膏和藥塗之補蛀丹蟲牙痛者研新巴豆和乳香末為丸塞蛀孔內如蟲已去而孔內空痛者只用乳香炙軟塞之落齒方老鼠一枚入硇砂一錢於肚內碗盛密蓋自爛生蛆取蛆炙乾為末用時以刀剔破牙根四圍而後塗之半刻自落牙衄牙衄牙宣為牙縫中出血也若胃經實熱者則血出如湧口必臭而齒不動宜清胃湯甚者調胃承氣湯下之孰若用酒製大黃末三錢以枳殼五錢煎湯少加童便調服下黑糞而愈是治脈洪有力陽明之熱盛也若胃經虛火者宜二參湯及補中益氣湯加黃連丹皮腎經虛者血則點滴而出齒亦悠悠然而痛口不臭而齒動或齒落治宜安腎有火者六味地黃丸無火者八味地黃丸俱加猴姜隨手而應肝氣盛者兼服蘆薈丸俱外兼蒺藜湯玄胡散荔枝鹽等擦之漱之二參湯治牙衄屬虛火者人參玄參各二錢或五七錢水煎服蒺藜湯治牙衄及牙痛根腫動搖者白蒺藜一兩為粗末水二鍾煎一鍾入食鹽一撮漱之玄胡散治牙宣玄胡索生為末用前湯漱過以此敷之荔枝鹽治牙痛牙宣更堅齒明目荔枝一個攢一孔入食鹽七分花椒三分以滿為度紙包泥固炭火煅存性為末早晚擦之補中益氣湯六味地黃丸八味地黃丸俱見潰瘍蘆薈丸見疳瘡門攢齒疳攢齒疳者為牙根肉內鑽出骨尖如刺而作痛也小兒多有之用鈹針刺開好肉取出本牙如出血不止以濕紙換貼二次自止戒厚味其牙復生如舊牙疔牙疔為牙縫中腫起一粒痛連顋項或兼麻癢或破流血水異於常症者疔也用竹籤挑破以見鮮血為度搽拔疔散再以蟾酥丸噙之服之或灸神授穴二七壯牙癰附多骨牙癰為牙床上堅腫疼痛身發寒熱勢盛如常者癰也初宜貴金丸下之蟾酥丸噙之或灸外踝骨尖三壯或刺破搽冰硼散如初時堅腫破流膿水久不收口者多骨也必俟骨尖刺出搖則內動方可取出其口自愈貴金丸見首卷蟾酥丸見疔毒門走馬牙疳走馬牙疳疳者迅速之為也故有鼻疳唇疳舌疳喉疳之稱其症牙根作爛隨變黑腐臭穢難聞由肝胃二經虛火熱極上攻所致宜蘆薈消疳散三黃香黛散以清府熱人參茯苓粥以養胃氣外用手法取去腐肉內見紅肉流鮮血者為吉如頑肉不脫腐黑復生牙落無血穿腮破唇焮腫外發身熱不退臭穢不止用藥罔效者俱為不治蘆薈消疳散蘆薈銀柴胡胡黃連黑玄參牛蒡子羚羊角桔梗梔子石膏各五分薄荷葉四分升麻三分甘草三分用水二鍾淡竹葉十片煎六分食遠服三黃香黛散牛黃黃連大黃酒蒸木香青黛各等分上為末用淡竹葉薄荷煎湯調服人參茯苓粥必先服此以養胃氣人參茯苓為末每用一鍾同米二鍾煮粥食之先用鹽湯漱口洗牙疳方先用麻油通口噙漱覺無油氣吐之如式六七次次以百沸湯入鹽醋漱吐三四次再次以綿胭脂拭乾然後上藥此秘法也再生散治走馬牙疳牙落鼻崩久不愈者土鱉四十九個煅存性山豆根人中白煅辰砂飛各二錢上為細末先割淨腐肉用前法洗淨拭乾摻之七日內長肉如舊大牙散治走馬牙疳爛極者象牙梳油透者煅存性為末加冰片摻之一用螻蛄雄黃黃柏等分為末摻之一用煅烏鴉頭龍骨枯礬赤石脂焙黃鉛粉麝香為末乾摻或用油調牛黃生肌散治牙疳臭爛穿腮者牛黃五分珍珠琥珀人中白胡黃連乳香沒藥各一錢兒茶二錢硼砂五分冰片三分上為末摻用勒馬聽徽散治牙疳臭爛者神驗白砒一分麝香三分青黛飛一兩青綿一根扯碎清油拌勻收之用時先以清米泔水漱口淨次以針尖挑些須塞牙齒根縫內青蓮膏治走馬牙疳白砒一分輕粉一錢青黛二錢乳香一錢麝香五分上為細末用香油調薄攤紙上用捶捶實陰乾收之每於臥時漱淨口拭乾隨瘡大小剪藥封之至曉去藥漱淨吐之三上效咽喉部經絡咽者咽也接三脘以通胃故以咽物喉者候也通五臟以系肺故以候氣有云嗌者即咽之低處也然喉痹則呼吸不利天氣閉塞也咽痛則飲唾不入地氣閉塞也是以喉痹必兼咽嗌痛而咽嗌痛未必兼喉痹也又十二經皆湊於喉而內經獨言一陰一陽結為之喉痹者重於君相二火也又一陰心胞與肝一陽三焦與膽四經皆有相火氣熱則為痹必矣第火有虛實之分喉有緊慢之別緊喉緊喉者其發暴咽喉腫痛痰涎壅盛聲音不出膿水不入由膏粱厚味所致為之實火斯時也不及用藥宜刺少商穴委中穴出紫黑血以瀉其熱噙牛黃點舌丹以消其毒俟稍緩吹以冰硼散服清咽利膈散以清其源痰盛者桐油餞導之牛黃點舌丹治喉風喉痹痰火壅盛並大頭瘟及癰毒等牛黃五分熊膽五分蟾酥三分犀角三分羚羊角三分珍珠三分冰片五分麝香三分沉香五分辰砂雄黃硼砂血竭乳香沒藥葶藶各一錢各為細末稱准和勻乳汁為丸綠豆大金薄為衣每用一丸呷舌下噙化徐徐咽之化盡口內麻以冷水漱口咽之則患處出汗冰硼散治咽腫及口齒腫痛並久嗽痰火咽啞作痛冰片五分硼砂五錢玄明粉五錢硃砂六分共為末日吹五七次金鎖匙治喉風喉閉痰涎壅盛口噤不開湯水不入者焰硝一兩五錢硼砂五錢雄黃二錢白殭蠶一錢冰片二分半各研末和勻吹之痰涎即出或化為水桐油餞治喉閉痰壅呼吸不利湯水難入者用溫湯半碗加桐油三四匙攪勻用硬雞翎蘸油探入喉內連探四五次其痰壅出再探再吐以人醒聲高為度清咽利膈湯治咽喉腫痛痰涎壅盛及乳蛾喉痹喉癰重舌木舌或膈胸不利煩躁飲冷大便閉結等症黃芩梔子連翹薄荷甘草桔梗黃連玄參金銀花牛蒡子防風荊芥各一錢朴硝大黃各二錢一加升麻葛根大青青黛羌活半夏射干山豆根等類水二鍾淡竹葉二十片煎八分加蜜二匙食遠服慢喉慢喉者虛火也其發緩其色淡其腫微其咽乾其便利其脈微細甚則舌生白胎唇如礬色此由憂思太過所致午前痛者補中益氣湯加麥冬五味子玄參桔梗牛蒡子如不應以補中益氣湯加乾薑大附子為引導若夫午後陰虛作痛作渴身熱足冷者腎虛也忌用清涼宜地黃丸料恣意飲之兼用八珍湯補之再如陰虛於下孤陽飛越於上者脈必浮大重取必澀又宜獨參湯細細飲之立驗或灸心俞穴不拘壯數待喉寬即止脈浮大遇勞則甚者脾肺虛膀胱熱也理中湯加山藥山茱萸婦人咽腫色白者月經不調也治宜調榮色微白而腳冷者虛陽上攻也治宜降氣升葛補中湯治咽喉口舌虛火腫痛生瘡升麻葛根赤芍人參桔梗各二錢甘草一錢生薑三片水二鍾煎八分食遠服補中益氣湯六味地黃丸俱見潰瘍喉痹喉痹惡寒者乃寒折熱也治宜發散服涼藥反甚未破者生薑汁漱之痰甚者桐油餞導之微者用醋代之惟醋能消積血也喉症急者刺少商穴太谿穴虎口動脈或灸少衝穴其功甚捷喉痹腫達於外者有膿腫脹不肯針刺者用皂角末取嚏即破離宮錠子塗之即消或皂角末醋調厚敷項外須臾即破血出立瘥或韭菜根和伏龍肝搗敷鄉村皆相似者時氣也宜隨運氣以散之喉痹聲鼾者肺氣將絕也急以參膏或獨參湯漱之卒然如啞吞吐不利寒氣客於會厭也蜜炙附子片含之勿咽古謂喉痹不刺血喉風不倒痰喉癰不放膿乳蛾不針烙皆非治也如針刺無血探吐無痰聲如拽鋸痰喘鼻焮唇反舌卷面青目直自汗自利干痛無痰者皆為不治已潰而腫不消者難治冰莧散治喉癬冰片莧菜根煅灰薄荷黃柏各一錢月石兒茶各一錢五分人中白山豆根胡黃連各二錢枯礬青黛龍骨烏梅肉各五錢上各為末和勻吹用楊梅喉癬加輕粉一錢柿霜一錢白砒五釐棗內去核煨熟用啞瘴喉風啞瘴喉風其症牙關不開口不能言也治同緊喉再用甘草湯漱以解桐油之氣弄舌喉風弄舌喉風亦啞不能言但舌出常以手拿是也急刺少商穴噙蟾酥丸導桐油餞吹金鎖匙服金蟾酥毒丸喉內如松子魚鱗者用大附子片噙之咽之喉內生瘡如黃豆者用烏藥醋磨唅之漱之喉癤喉癤初生如梅核吐之不出咽之不下久之漸上喉節之間宜唅金鎖匙服金蟬解毒丸及四七湯喉瘤喉瘤形如元眼血絲相裹由肺經受熱所致禁用針刀宜益氣疏風湯吹黃連冰麝散鎖喉鎖喉毒生於聽會之端注於懸膺之側形如瘰癧妨礙飲食由心經熱積所致宜清心牛黃丸嬰兒痘逼咽喉嬰兒感冒風熱攻逼咽喉及痘瘡蘊熱上攻咽喉腫痛痰氣不順咳嗽失音者用人參五錢桔梗蜜炙一兩甘草半生半熟三錢水煎服清咽解毒湯治嬰兒出痘咽喉痛者首尾可服山豆根麥冬各一錢牛蒡子玄參桔梗各七分防風五分甘草水煎服
