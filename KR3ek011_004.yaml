不破者藥宜酒煎然必加童便以活其瘀純用酒煎反能作脹同損藥服反能澀祕酒用無灰酒不論赤白跌撲停瘀先利二便不可待祕恐成重疾然下之太過則脈愈堅大妄為瘀滯而更下之因而夭折者多矣損傷忌服草藥服之所生之骨必大不能入臼自然銅雖有接骨之功其性燥宜量用傷輕者勿用無名異為末酒服能散毒血於四肢跌損不可無乳沒惟降真香可代亦可代血竭腫痛乃血瘀所致用熱藥煎湯淋洗瘀腫不消者砭之否則愈後遇天陰作痛忌梨並生冷恐凝血忌食牛肉食則痛不止忌火灸忌見風腸破脂出孔小者以手劈去其脂不可復入入則為害骨斷筋連者不急剪去其筋則浸好肉為不治腸出者令患者手搭醫者之肩隨其左右收起用大麥煮粥取湯洗腸淨以麻油抹手並瘡口即吹通關散取嚏令腸自入用桑皮搓線以雞血塗之再以花蕊石散摻之縫須縫裡皮留外皮開口塗雞血搽生肌等藥如腸損以燈照之有氣射出者不治陰囊破者塗雞子黃油摻金毛狗脊毛以紫蘇葉煎湯洗之內服止痛藥有瘀者用破血藥齒傷動者用蒺藜根燒存性揩之久用自牢眼胞受傷青黑腫痛者用紫金皮用童便浸七日曬乾余處傷者不必制與生地等分為末茶湯調敷腰傷作痛諸藥罔效者白芍赤芍威靈仙乳香沒藥等分為末酒服即減慈救散治跌撲骨折至死但胸前有暖氣者亦效山楂八錢通草三錢降香末穿山甲丹皮各二錢赤芍香附酒炒紅曲陳皮麥芽炒各二錢當歸八分青皮紅花各七分桔梗五分痛加乳香沒藥各一錢用水三碗煎一碗服玉靈丹治跌打損傷香附蘇子各四兩蘇木蘿蔔子桃仁當歸降香紅花枳實青皮各一兩沉香木香官桂各五錢乳香沒藥藿香陳皮檳榔蓬朮白豆蔻各三錢各為末和勻用童便黃酒黑砂糖各一碗合一處煎如膏和藥為丸彈子大每服一丸黃酒化下或用赤砂糖湯化下復元活血湯治墜下脅痛柴胡二錢五分當歸二錢穿山甲炒栝蔞仁紅花各七分桃仁十七個甘草五分大黃三錢水二分酒一分煎一鍾食遠服以利為度五加四靈散治跌撲損傷五加皮骨碎補川續斷葳靈仁各三錢五分陳酒二碗煎一碗服五加三皮散五加皮二兩桂皮一兩綿皮一錢五分良薑五錢砂仁五錢如骨碎加丹皮一兩乳香沒藥血竭各一錢上為末每服三茶匙黃酒調服瓊花散鬧羊花洗淨焙乾為末每服三五分黃酒調服隨飲至醉為度蓋臥避風接骨金丹亦可代杖土鱉陰乾聽用另加乳香沒藥龍骨自然銅煅醋淬七次等分麝香少許共為末每服三分取土鱉一個為末加入和勻黃酒調服先須整骨而後服之否則骨接錯矣一用土鱉象房者佳倒碓蟲俱銀碓內炙各為末每服用鱉末五釐蟲末二釐共七釐和勻安舌下急以黃酒送下一隻用鱉末五七釐燒酒下截血膏敷傷處四圍能化血破瘀止痛消腫天花粉三兩薑黃赤芍白芷各一兩上為末用茶清調敷如傷頭面血出不止者藥塗頸上周圍傷手足者藥塗脛臂周圍傷余處藥塗瘡口周圍能截其血不來如金瘡著水則瘡口如番花者用韭菜汁調敷瘡口四圍次以微火灸之又用早稻煙燻之瘡口水出即愈如無水出即風襲也倍加南星和敷如瘡口肉硬不消者風襲之也加獨活用熱酒調敷如不消風入深也加紫金皮和敷自消跌損瘀血淋漓者嚼三七罨之即止青腫即消整骨麻藥可以整骨可以開取箭頭川烏草烏佛茄子鬧羊花麻黃薑黃等分上為末每服三分茶酒任下甘草湯解又整骨方蟾酥川烏花椒胡椒各一錢五分蓽茇一錢鬧羊花生半夏各六分為末每服半分黃酒下要開大加白酒藥一丸塗患處亦佳四物湯四君子湯六君子湯十全大補湯補中益氣湯俱見首卷加味逍遙散見瘰癧重者折骨傷筋脫臼必兼手法此則另有專門故不贅金瘡金瘡者失血症也如出血太多脈宜虛細為症脈合符故云脈沉小者生浮大者死宜八珍湯十全大補湯補之甚者獨參湯素有熱者兼以涼血因於怒者兼以清肝再煩渴昏憒者補脾筋骨拘攣者滋腎初傷出血即以自己小便淋洗之如傷久欲換敷藥者亦以小便淋洗之功能止痛不潰即見水無礙次用碧螺散黃龍等散摻之如傷久潰爛者七真膏貼之久爛生蛆者礬紅末摻之血出作痛者活血定痛湯破傷風肢厥腹痛者古方玉貞散金瘡神效散文蛤降真香俱炒焦虛加人參等分上為末乾摻傷處須扎緊雞兒王家刀瘡藥龍骨白芨等分為末摻之乾用水調碧螺散絲瓜取皮搭於石灰牆上陰乾為末乾摻乾用水調如經風見水傷處發腫者水調敷之其腫立消二龍散補缺唇救自刎血流如注者敷三時則口合枯礬七錢乳香三錢共末名白龍散枯礬七錢松香三錢共末名黃龍散活血定痛湯治血出作痛紅花乳香各三錢水酒煎加童便服烏金丸治血瘀為患傷處赤腫或攻頭面四肢者每用一丸煎紅花酒化服敗弩筋散治筋被弓弩傷不能屈伸者敗弩筋燒存性秦艽去苗杜仲熟地續斷各五錢當歸大附子炮去皮臍各一兩共為末每服二錢溫酒調服日三次古方玉貞散理刃傷並破傷風生南星防風等分為末每服一錢黃酒下一童被牛傷腸出用桑皮線縫之黃龍散敷之愈數日後肢厥腹痛服此散立驗金瘡中風掣痛並手足不仁者用艾葉揉作團入瓦器內點著上蓋留一孔以孔對患處熏之良久自效瘡口著水肉如番花者著風肉硬不消者用截血膏敷之見跌撲門螻蛄散治中矢在咽喉胸膈不出者鉛子入肉不出者針誤刺肉不出者用螻蛄一個焙為末黃酒調服少時作癢自動自出再用螻蛄末香油調塗瘡口或煎濃汁滴患處如鮮者取腦塗之立出又衣針入腹入肉者用黃蠟靈磁石等分溶合捻如針大以涼水送下藥裹針自大便而下酸棗核數十枚煎湯服針從原孔出外以雙仁杏仁研如泥以車脂調塗傷處自出繡針刺足針已出而作痛者用黃泥罨之又炮創等傷危重幾絶者急剖水牛腹將傷者入牛腹中良久即蘇按此以氣血補氣血之良法也業醫者守一定之方而治無窮之病愧矣八珍湯十全大補湯見首卷七真膏見杖丹門烏金丸杖傷杖傷形傷症也凡夫杖之時用受杖丹等服之能令血不攻心已杖後不問已破未破即服瓊液散力能化瘀除疔止痛消腫而不潰且易於結痂功勝他藥多矣氣質弱者繼之大補以培其元使脾胃健自能營達於下也外則未破者砭之已破者玄珠膏塗之去瘀甚速次以瑩玉膏七真膏等生肌如肉滿而不生皮者青黛珍珠散如刑重肉糜黯腫昏憒者剝黑羊皮乘熱貼之熱童便灌之繼以獨參湯補之代杖散野紅花即小薊半斤用燒酒四斤半浸之曬之以干為度臨刑時絹包三錢含口內咽其汁任刑不知痛代杖湯臨刑時先服土鱉五個焙蘇木乳香沒藥各二錢木耳穿山甲丹皮枳殼蒲黃歸尾木通甘草各一錢酒水煎服如不受杖服靛花水二鍾解之代杖丹治情不由己事出不虞受害一身重刑難免當預服之受刑可忍能保血不攻心乳香沒藥無名異地龍去土木鱉子丁香丹皮肉桂自然銅煅醋淬七次等分一加蘇木上為末煉蜜為丸二錢重臨刑時預服一丸黃酒化下椒鱉丸初杖服之散血消腫輕者不用胡椒二兩土鱉三十個歸尾一兩五錢木耳灰一兩五錢乳香沒藥杏仁桃仁發灰血竭各三錢八分自然銅醋淬七次五分上為末另用胡椒兩半煮汁打糊為丸桐子大每責十板服藥二錢熱酒送下七真膏乳香去油沒藥去油三七焙輕粉兒茶各三錢麝香四分冰片三分上為末罐收聽用遇杖者勿經湯水用白蜜調敷疔自化瘀自散只此一敷不須再換六真膏治一切刑傷各樣癰疽乳香沒藥血竭三七兒茶各三錢樟冰三兩豬脂十二兩碗盛水煮化入藥和勻攤敷瑩玉膏治杖傷消瘀定痛亦治臁瘡豬脂油三兩入白蠟一兩溶化離火入樟冰一兩輕粉五錢冰片三分麝香二分瘡黑者加銀硃五錢為末加入和勻收用黃白散洗杖瘡大黃白芷各兩許水煎濃汁揉洗傷處以癢至痛痛至癢瘀散見紅為度拭乾貼藥一用蔥薑各四兩杵爛揉去血水次貼藥瓊液散見夾傷青黛珍散玄珠膏俱見首卷夾傷夾傷者禁用敷藥膏藥及泥塗等法後必作腫成膿未受刑時預服代杖丹以護心已夾後隨用銀硃或硃砂末用燒酒調敷傷處用一人以十指尖輕啄患者腳底先覺癢次覺痛為止再用一二人以筆管於患者腳面上輕輕趕之助通血脈候傷處凹者突起四圍腫大為度即服瓊液散隨飲至醉為度次日去敷藥只用洗藥日燙三二次次日再服瓊液散則腫易消痛易止矣如復受重刑以至破潰者貼瓊液膏服代杖湯弱者繼之大補使氣血壯自能營達於下則易於收功生肌時易貼六真膏甚捷瓊液散治夾傷拶傷杖傷跌傷並寒濕筋骨疼痛鬧羊花擇去梗蒂蕊葉洗去灰沙曬乾砂鍋內微焙為末每服五分壯者七分先飲酒至半酣次服藥再飲至大醉為度靜臥勿語語則發麻次日午時其麻方解消腫止疼其功甚捷連服三次全愈弱者間一日再服洗杖傷方夾傷腫痛用此洗之透骨草天門冬天靈蓋南星地骨皮陳皮等分象皮切碎倍用水煎浸洗日三二次瓊液膏夾拶所傷立能止疼活瘀鬧羊花紅花蒲黃白芷歸尾各二兩麻油一斤浸藥七日煠枯濾去渣入黃蠟白蠟各一兩溶化稍溫入乳香沒藥末各六錢冰片六分和勻收用代杖湯六真膏俱見杖傷破傷風破傷風者因皮肉破被風寒外襲漸傳入里則寒濕交作口噤咬牙角弓反張口吐涎沫入陰則身涼自汗傷處反為平陷其毒內攻矣宜紺珠丹玉貞散汗之外仍貼玉真散得膿為效如汗後前症不退傷處不高漸醒漸昏時發時止口噤不語者不治玉真散治破傷風牙關緊急角弓反張甚則咬縮牙舌南星防風白芷天麻白附子羌活等分上為末每服二錢熱酒一鐘調服更敷傷處牙緊反張者每服三錢熱童便調服雖內有瘀血者亦愈至於昏死心腹尚溫者連進三服亦可保全風犬咬傷用漱口水洗淨搽之效鎮風散破傷風諸藥罔效危急者及一切豬羊等風魚鰾焙杭粉焙黃皂礬炒紅各一兩硃砂三錢另研上為末每服二錢無灰酒調服外灸傷處知痛為吉豬羊等風發時昏倒不省人事者每服三錢服二次不再發臭靈丹治破傷風及金瘡跌打大蒜一升搗黃酒四升煮一升服之須臾汗出立愈杏仁膏治破傷風發熱紅腫者杏仁去皮研飛羅面等分新汲水調敷紺珠丹見首卷艾熏法見金瘡門截血膏見跌傷門類破傷風類破傷風者由潰瘍膿血大瀉陽隨陰散或筋脈拘攣惡寒惕慉甚者舌強口噤項背反張痰壅便閉汗出發熱此因虛而傳變所致形類破傷風也法當大補氣血諸症自退如果系風症亦宜大補兼以治風可也余每見潰瘍貼膏剪孔而患破傷風者及用斂藥生肌反助餘毒致成敗症者多矣發痙發痙者形類破傷風是以牙緊體強肢搐背反有汗曰柔痙風能散氣也無汗曰剛痙寒能澀血也由潰傷亡血過多所致仲景曰瘡家不可發汗汗之則痙乃敗症也若大補氣血則生誤作風治則殆治如四君六味八珍十全補中逍遙聖愈等湯俱加鉤藤丹皮梔子天麻等藥如未應獨參湯手足冷者加以桂附四君子湯六味地黃丸八珍湯十全大補湯聖愈湯補中益氣湯俱見首卷逍遙散見瘰癧門湯火傷湯潑火傷者患自外來也然熱甚則火毒攻內令人煩躁口乾昏憒而悶絶初傷時用冷燒酒一鍾於無意中望患者胸前一潑被吃一驚其氣一吸一呵則內之熱毒隨呵而出矣如仍作煩悶者取新童便二碗灌之由煙燻欲死者搗水蘿蔔汁灌之外以燒酒蘸洗湯火傷處其冷如冰或以鹽末摻之能護肉不壞然後敷保膚等膏二便祕者四順清涼飲下之慎用冷水井泥浸溻致使熱毒伏於內寒滯束於外因而不救者多四順清涼飲治湯火傷熱毒入里或外被寒涼所汲火毒內攻致生煩悶內熱口乾大便祕實者當歸赤芍羌活防風連翹梔子甘草各一錢大黃炒二錢水二鍾燈心二十根煎八分服保膚膏治湯泡火燒及臁瘡禿瘡大蜂房一個血餘一元香油半斤煠枯濾去渣入黃蠟二兩溶化離火待溫入大黃末二兩朝腦末一兩二味研勻和入任用罌粟膏治湯潑火燒皮肉損爛疼苦焮熱起泡流水者麻油半斤罌粟花三十朵無花以殼代之浸油內煎枯濾去渣入白蠟六錢熬化傾碗內待四邊將凝時下真輕粉細末四錢攪勻坐冷水內用時挑破水泡攤薄紙上貼之清涼等膏治湯潑火燒火藥傷痛不可忍者石灰一升以水化開加水二碗攪混澄清取清汁半碗加香油減半以箸攪打千百下如糊取面上稠者用鵝翎蘸掃傷處一用雞子清一鍾香油半鍾箸打千百下掃之一用石灰末生桐油調敷萊蔔膏治未潰紅腫熱痛者鮮蘿蔔英杵爛罨之腫消痛止凍瘡凍瘡者由寒極氣凝血滯肌死而成也甚則手足耳鼻受冷至不知痛癢者宜置溫處以綿厚裹之或用熱手尉之切忌火烘湯泡犯之則肉死至春月必落宜服內托之藥以助陽氣則腐肉自潰良肉自生外用瑩珠等膏生肌斂口如骨脫筋連者急剪去筋否則浸淫好肉難醫凍耳成瘡生薑自然汁煎膏塗之凍足瘡腫麥草連根葉煎湯洗之每逢冬月原凍處即發者獨勝膏搽之曬之庶不再發獨勝膏遇冬月凍處即發者於六月初六十六二十六日用獨頭蒜杵爛日中曬熱塗於凍發之處即於日中曬乾忌見湯水如式三次永不再發靈異膏治凍瘡湯火瘡杖瘡多年惡瘡鬱金三兩生地二兩粉草一兩豬脂油一斤浸七日煠藥枯濾去渣入黃蠟四兩溶化成膏浸水內久之任用骨哽咽喉及誤吞針鐵哽喉者為誤吞針鐵諸刺諸骨哽於咽喉也微者用薤白煮半熟以線扎之手執線頭將薤白入口微嚼咽之度薤過哽處便牽薤出而哽亦隨薤出矣或用亂麻筋一團搓龍眼大以線穿系留線頭在外湯濕急吞下咽頃刻扯出其針頭必刺入麻中同出如不中即再吞再扯以出為度烏龍針治骨哽於咽下難出者用鐵線燒軟雙頭虛用黃蠟作丸龍眼大裹鐵線頭上外用絲綿裹之推入喉內哽骨處其骨自下矣不下再推誤吞銅物者多食荸薺化堅為軟誤吞鐵骨等物腸中不能轉送覺墜者多食青菜豬脂自然送入大腸從糞同出再諸骨哽喉用玉簪花根八錢各隨所犯之肉為引煎湯服之轉出乃愈竹木刺入肉諸刺入肉外傷之症也軟而淺者以針頭撥出則愈硬而深者搗螻蛄塗之少時即出如刺已出而仍痛者亦以螻蛄塗之愈或以萆麻子仁搗如糊先以絹襯傷處次罨之覺刺出即去之一少加新羯羊糞和敷桂蠟丸桂心為末溶黃蠟為丸置丸於傷處搭濕紙三五層火熁藥化刺即出矣大牙散生象牙末水調敷之立出刺入喉者水調徐徐呷之咬傷人齒之食物無不燖爛下咽由炙爆之毒無不侵襲之也故受其傷則腫痛臭爛異於平常者感牙之毒也初咬時用熱童便浸傷處洗去牙黃汙血貼蟾酥餅以膏蓋之出微膿漸愈如失治則爛痛發胖仍用小便浸洗次用油紙捻點火於傷處熏之良久插蟾酥條膏蓋俟腫消時用蔥白二兩粉草五錢水煎日洗一次換紅黑二膏完口金箔膏貼咬傷四兩豬脂二兩占藤黃半兩釜中煎占黃蠟也風犬咬犬之風也由感肅殺之氣而成如心受之則舌出肝受之則目矇脾受之則流涎肺受之則音啞腎受之則尾拖此五臟之受毒也故經其齧必致傷人初被咬時即服救生散逐血片從小便中出忌諸口味麻物赤豆等百日乃安遲則毒大而小便難出必攻臟腑久則腹脹攻急人聲若犬眼神露白者不治有愈後復犯前禁觸之仍死救生散治犬傷生斑蝥七個去頭翅足杭粉一錢同研為末空心溫酒調服一時許小便行出血片白脂乃惡物也如便痛煎甘草湯飲之自利如毒未盡次早再一服以小便清白方為毒盡一法看其人頂中必有紅髮一根急須拔去以追風散敷之前救生散服之追風如聖散敷風犬咬處以拔其毒細辛防風川烏薄荷草烏川芎白芷蒼朮各一兩雄黃四錢共為末溫酒調敷傷處紙蓋之扎之日換二次風犬咬傷用燈心一把黑豆一合水煎豆熟取湯調救生散服外以炒穿山甲斑蝥等分艾和為炷黃豆大隔蒜灸之此一貫子祕法也灸畢用漱口水洗淨以玉貞散敷之不發無膿見破傷風一用番木鱉一個水磨服之風犬咬傷久而復發者雄黃二錢麝香二分為末酒調灌之得睡勿驚任其自醒利下惡物再進一服驗蟲獸傷黃石公云禽之制在氣如人汗粉犀蟹黃破漆蛇膽寧蛙馬骨驅蟲之類是也何則以其所不勝及其所畏者治之耳如馬咬傷用原打馬的皮鞭燒灰敷之蜈蚣咬傷以手指蘸雞口內涎塗之蠍子螫傷取蝸牛一個搗爛塗之俱能立愈者以此推之非尋類而治者乎犬咬傷搗大蒜敷之久不收口者經布燒灰香油調敷蛇咬傷即飲好醋一二碗使氣不隨血走以繩扎傷處兩頭再次用白芷末五錢水調服少時咬處出黃水水盡則腫消口合而愈一用雄黃五錢五靈脂一兩為末每服二錢溫酒調服仍以此藥敷患處或用神燈照捻子熏之馬咬傷栗子嚼爛敷之毒氣入里者馬齒莧煎湯飲之蜈蚣傷取雄雞倒控少時以手蘸雞口內涎抹傷處其痛立止危者生雞血乘熱灌之蠍子螫取蝸牛一個搗爛塗之立止藤黃青黛雄黃蝸牛蟾酥等分上為末水和成錠水磨塗傷處立止天蛇毒即草間花蜘蛛也人被其傷則腫痛有赤絲纏繞用羊乳飲之藍汁和麝香雄黃末塗之若為靈水所濡則生瘡似癩非癩煮秦皮汁飲之射工傷即樹間雜色毛蟲也人觸著則能放毛射人初癢次痛久則外癢內痛骨肉皆爛諸藥罔效用豆豉加清油搗敷癢處少時則毛出可見去豉用白芷煎湯洗之如肉已爛用海螵蛸末摻之蚯蚓傷誤受其毒則眉髯皆落狀如大風但夜如蚓鳴於身為異耳用鹽湯洗之蠶咬搗苧根汁塗之苧近蠶種則蠶不生取其畏也六畜損傷夏月臭不可近者蛇蛻一兩燒存性蟬蛻五錢青黛五錢細辛二錢五分上為末每服三錢黃酒調服則瘡內蛆化為水蠅不敢落外以寒水石末摻之佳小兒部小兒天真未鑿鮮五發之毒亦無善惡之診其輕小瘡瘍自可淋滌敷貼之所謂頻沐更衣外宣無病不得已而藥之乃下法也然必兼調乳母為確其有大症載前專科無異第以小兒所司者莫如丹毒等類今則獨加詳焉赤遊丹毒丹者受毒於未形之先發病於有生之後由胎養失宜所致預辨之法小兒無故眼生厚眵或眼胞紅暈微有氣喘夜則煩啼此欲發丹之候也急服藍根等藥潛消其毒已有赤腫者即用蕓薹等類外銼其鋒然必兼吮砭洗貼等法治之始獲全效胎熱丹毒初發赤腫光亮遊走遍身者由熱毒之氣極與血相搏而風乘之也故又名之曰赤遊風也初宜升麻葛根湯表之次用百解散驅風散清之甚者大連翹飲如腹脹不乳毒氣入里也紫雪散下之外則吮之砭之淋洗之隨用精豬肉片貼之一時許換藥敷之甚者日換二次三日後身涼腹軟聲清乳哺如常砭處肉活者順反此者逆丹起於腹背流入於四肢者順起於四肢流入於腹背陰囊者逆胎驚丹毒初則面生水豆根腳微紅出沒無定次至頸項丹赤如珠再次延及胸乳間者由孕母受驚傳襲於兒胎也先用四聖散洗目內服之藥照前胎熱如微有痰喘作搐者少加解驚藥食滯丹毒初發赤暈行而緩慢非若胎熱之暴速者此由食滯所致治宜先消其食食滯消而丹仍作者用藥與胎熱藥同吮法砭法丹毒之法急令人用甘草煎濃汁漱口淨隨患處遍吮之使毒各聚一處淋洗之敷貼之自效甚者吮畢隨行砭法如赤暈走徹遍身難以悉砭者令人吮胸背四肢等數處而砭之令微出血以瀉其毒血紅者輕紫者重黑者死或出白汁如珠亮如水晶手黏起絲者重砭畢隨以藥水淋洗之用精豬肉薄片貼之一時許換藥敷之甚者日換敷二次次日如腫未全消再量行砭法洗敷照前第砭時不可刮盡其血血盡則出黃水矣若身弱者有不測之變蓋為血去而氣不能獨居也又兒生百日之內不可砭之以其肌肉不能任也如患在頭令兒倒臥頭要低些用鈹針自下而上偏針挑之出血令毒從頂出不行砭法敷藥同前丹名雖多其源則一總以右法施之自驗砭法見首卷針砭門凡治風丹宜解毒托裡令微通利使元氣內護而排外邪慎用硝黃等大下之劑若夫發散太過則表虛熱赤不退者補中益氣湯加防風白芷寒涼太過則胃虛熱赤不退者異功散加升麻柴胡或兼發搐者四君子湯加升麻當歸鉤藤如丹毒已解發熱作渴不食者七味白朮散主治方升麻葛根湯治丹毒面紅發熱氣急啼叫驚搐等症升麻葛根白芍柴胡黃芩梔子各一錢木通甘草各五分用水二鍾煎一鍾母子同服百解散治一切丹毒升麻葛根赤芍黃芩連翹麻黃薄荷半夏荊芥金銀花甘草水煎母子同服驅風散治紫赤丹毒及諸瘡咽喉腫痛並傷風發熱煩躁鼻塞氣喘痰嗽驚風等症金銀花三錢牛蒡子炒防風荊芥當歸川芎白芍黃芩連翹各八分木通甘草各四分甚加大黃丹毒加麻仁炒研水二鍾煎八分母子同服大連翹飲丹毒發熱痰涎壅盛一切諸瘡痧疹頸項生核或傷風傷寒時行發熱等症連翹牛蒡子防風荊芥穗黃芩柴胡梔子蟬蛻當歸赤芍石膏滑石木通瞿麥車前子甘草等分用燈草二十根水煎母子同服紫雪散治小兒赤遊丹毒甚者毒氣入里肚腹膨脹氣急不乳宜此救之又治傷寒熱燥發狂及外科一切蓄毒在內煩躁口乾恍惚不寧等症升麻寒水石石膏犀角羚羊角各一兩玄參二兩沉香木香各五錢甘草八錢用水五碗煎至一碗濾清再煎滾投提淨朴硝三兩六錢微火慢煎水氣將盡欲凝結之時傾入碗內下硃砂冰片各二錢金箔百張各預研細末和勻將碗頓水內候冷凝成紫雪收用如大人每用一錢小兒用二分十歲者用五分含口內徐徐咽之即效甚者倍服之或用淡竹葉燈心煎湯化服亦佳四聖散治胎受熱毒兩目不開及丹毒眼胞紅暈黃連秦皮木賊燈心棗子等分咀片每用二三錢水一盞煎七分澄清去渣不時洗目淋洗丹毒等方丹毒赤暈漸開或暈有碎瘡者用甘草兩許水一大鐘煎半鍾待溫令乳母滿口含漱徐徐吐淋病處以手掌並指揩洗之勿犯指甲仍與小兒些須飲之只一次則暈不開大矣良久再淋三淋必瘥一用柳葉或桑白皮每取一升用水一斗煎三升於避風處淋洗之日五七次敷丹毒類方蕓薹菜子研末酒調澄清飲之渣塗之或輕粉末杵芫荽汁調稀鵝翎蘸掃患處須臾赤色變白或生癗或自破而愈或景天草杵汁加陳醋塗之或紫檀香一塊水磨汁塗之丹流入腹者杵馬齒莧汁飲之渣敷丹流入陰赤腫出血者用牛膝一兩生甘草五錢水一鍾煎五分加雞子清調伏龍肝末塗之伏龍肝即灶心燒紅之土也胎毒瘡瘍實鑑云初生芽兒一塊血也無形證也無脈有驚即系是胎驚有熱即系是胎熱蓋嬰兒在腹與母一體凡患瘡疾但審乳母之症為確如乳母肝經有熱加味小柴胡湯之類肝經虛熱加味逍遙散之類腎水不能生肝木者六味地黃湯心經積熱者柴胡梔子散心經虛熱者茯苓補心湯膏粱積熱者東垣清胃散脾經鬱熱者錢氏瀉黃散脾經虛熱者錢氏異功散如式治之自能獲效若概用犀角丸化毒丹及外敷寒涼等藥復傷元氣反促其危也柴胡梔子散治三焦及肝膽二經風熱以致耳內作癢生瘡或出水疼痛或胸乳間作痛寒熱晡熱柴胡梔子炒丹皮各一錢茯苓川芎芍藥當歸牛蒡子炒各七分甘草三分水鍾半煎七分服茯苓補心湯治心氣不足氣血不和虛熱瘡瘍酸棗仁炒茯苓各二錢人參一錢五分白朮五味子炒當歸各一錢遠志六分石菖蒲甘草炙各五分上分二三服水煎服東垣清胃散治胃經有熱齒牙作痛或飲冷作渴口舌生瘡或唇口腫痛焮連頭面或重舌馬牙流涎吐舌等症升麻五分生地四分黃連三分丹皮三分歸尾四分水煎母子同服如加柴胡梔子則為加味清胃散錢氏瀉黃散治脾經鬱熱作渴飲冷臥不露睛手足熱遍身黃者宜之藿香葉七錢梔子仁一兩石膏五錢甘草三兩防風四兩上銼同蜜酒微炒香為末水一鍾煎五分澄去渣服錢氏異功散治吐瀉不思食溫中和氣人參茯苓白朮陳皮甘草等分為末每服二錢水一鍾生薑二片棗一枚煎五分服加味小柴胡湯加味逍遙散見瘰癧門六味地黃丸見首卷熱毒瘡瘍熱毒者因膏粱厚味或乳母七情鬱火所致宜宣風毒涼心火解胃熱如加味當歸散牛蒡子湯塗以四黃散一抹金及用四時洗法如結腫焮痛有表症者解表消毒散里症者攻裡消毒散邪在經絡者托裡榮衛湯欲作膿者托裡消毒散膿成不潰者八珍湯宜分始末攻補隨時藥之對症無不愈也加味當歸散順調氣血和解表裡爽利心腹疏理百病及治溫熱停積自利煩躁不寧等症當歸酒洗赤芍各二兩川芎五錢甘草半生半熟大黃半生半炮各一兩麻黃制五錢加黃連升麻葛根丹毒再加連翹荊芥每服三錢薑蔥燈心水煎服丹毒不用蔥牛蒡子湯治傷風發熱煩躁鼻塞氣喘痰嗽驚啼及諸瘡紫赤丹毒咽喉腫痛牛蒡子炒研三兩防風去蘆一兩薄荷葉一兩荊芥穗去梗四兩大黃一兩五錢甘草一兩二錢丹毒加麻仁炒研每服三錢水煎服四黃散治小兒一切熱毒瘡疾燥癢流汁不幹者黃連黃柏黃芩大黃滑石各一兩文蛤去蟲屑五錢上為末清油調塗一抹金治小兒遍身生瘡糜爛燥痛流水不幹者多因風化蟲結於皮膚浸淫不已治以殺蟲藥是究其源也藜蘆洗淨焙蛇床子去土黃丹水飛各一兩硫黃赤石脂白礬枯黃柏五倍子去蟲各五錢輕粉五兩五錢各為末研勻加生豬脂再杵如膏塗抹患處或清油調塗解表消毒散治小兒瘡毒腫高焮痛便利調和脈浮洪而有表症者黃耆上部酒拌炒中部米泔水浸炒下部鹽水拌炒一錢五分升麻葛根赤芍玄參牛蒡子炒研麻黃去節甘草各五分連翹一錢更看分野加以引經手少陰加細辛三分足少陰加獨活七分手太陰加桔梗白芷各五分足太陰加蒼朮七分手厥陰加柴胡七分足厥陰加柴胡青皮各五分手太陽加藁本五分足太陽加羌活七分手陽明加白芷五分足陽明加升麻葛根各七分手足少陽經俱加柴胡七分用水一鍾生薑二片蔥白一根煎七分服攻裡消毒散治小兒瘡瘍腫硬痛深大便祕結脈沉實而有里症者牛蒡子炒研連翹當歸白芍各一錢大黃一錢五分芒硝五分甘草七分栝蔞連皮子鋸切三錢用水一鍾煎七分服未利再服托裡榮衛湯治小兒瘡毒外無焮腫內亦便利調和知邪在經也黃耆炒一錢紅花一錢蒼朮米泔炒柴胡連翹羌活防風歸身甘草炙黃芩人參各一錢桂枝七分用水一鍾酒半鍾煎八分服四時洗惡瘡法春用柳條荊芥夏用棗葉槐枝秋用苦參冬亦苦參隨兒大小量用三二兩煎湯洗之垂癰附重舌重齶重齒垂癰小兒初生五七日間喉里舌上有物如蘆籜盛水狀如懸癰以綿裹長針留鋒粟許刺出青赤黃汁一刺止如未消次日又刺三刺自消刺後用鹽湯洗之摻一字散甚者服金朱散如生於舌下者為重舌生於頰裡及上齶者為重齶生齒斷者名重齒皆刺敷如前一字散治垂癰重舌重齶重齒硃砂硼砂各五分朴硝冰片各一字上為末用蜜少許調刷口內金朱散治胎驚壯熱傷寒伏熱上焦虛熱及重舌赤眼口鼻生瘡等症天竺黃馬牙硝甘草炙各五錢鬱金五錢水煮蟬蛻十四個洗去土硃砂五分麝香少許上為末每服三五分蜜湯調下胎風胎風者小兒初生身如湯潑火傷之狀由孕母厚味太過所致令母服清胃散逍遙散清其氣或嬰兒亦飲少許焮赤發熱者胃火也用石膏粉敷不焮赤者胎母脾虛也粳米粉敷之兒大者由臟熱內蒸濕氣外襲所致則名玉爛瘡也宜金黃散蜜水調敷逍遙散見瘰癧門清胃散見胎前瘡瘍胎赤胎赤者初生月里肌膚忽然發赤如丹由胎熱所致宜清母熱外以藍葉末塗之與赤遊丹門參考又初生浴兒洗目不淨則眼邊赤爛至長不瘥亦名胎赤宜二金散洗之二金散治胎赤眼黃連黃柏等分為粗末乳浸一宿焙乾每用少許綿裹用荊芥湯浸時時洗之胎瘤胎瘤者初生頭背胸乳間腫起如梅如李如饅頭者乃胎中瘀滯也候滿月外方可刺之出赤汁而安內服五福化毒丹臍瘡臍突臍瘡因水濕傷臍所致久不愈則發搐由風邪外襲也恐變風癇用干蝦蟆燒灰敷之或加枯礬或再加龍骨或舊綿燒灰當頭末等分加麝香少許摻之臍突者腫赤虛大也由胎母失養兒受積熱所致宜調其母清其熱不必敷治恐反為害如旬日外忽腫如吹不赤捻動微響或驚悸作啼者宜白芍藥湯加薏苡仁外以外消散敷之白芍藥湯治臍突及冷疝腹疼白芍藥一兩澤瀉五錢甘草一錢二分薄桂去粗皮三錢為粗末每服二錢水一鍾煎六分空心服臍下痛加鉤藤生薑食鹽外消散治臍突叫啼及感濕熱陰器膚囊浮腫者大黃牡蠣各五錢朴硝二錢為末用田螺洗淨再以清水半碗養之過宿取水調藥塗之其螺仍放水中勿害方效陰器膚囊腫者車前子煎湯候冷調敷陰腫陰腫者為陰囊腫大也古謂之脫囊由久坐陰濕之地為風寒所襲也間有怒叫氣閉結聚於下者桃仁丸主之若寒氣客於厥陰少陰者則陰囊腫痛腹痛冷汗引縮二子入腹痛止方出謂之內吊烏梅散勻氣散主之有陰莖全縮不見或不縮而陰囊腫大光亮不燥不疼者肝腎氣虛也橘核煎湯調勻氣散主之囊腫及四肢俱腫二便不利者膀胱蘊熱風熱相乘也三白散主之女兒陰戶腫脹者心熱相傳也木通散導赤散或五苓散用薏苡仁車前子煎湯調服俱外敷立消散桃仁丸治坐感陰濕或因怒氣閉桃仁七錢五分去皮尖麩炒微黃丹皮白蒺藜微炒去刺桂心各五錢牽牛頭末二錢五分為末蜜丸黍米大每服十丸黃酒送下烏梅散治腹痛臍下痛疝氣等症烏梅肉玄胡索粉甘草半生半炙各五錢鉤藤沒藥乳香各二錢五分為粗末每服二錢用水一鍾煎七分服勻氣散治氣滯不和冷疝腹痛桔梗二兩炒陳皮去白一兩砂仁茴香各五錢粉草炙四錢白薑炮二錢五分為末每服五分或一錢如調氣用滾水下如腹痛疝痛用燒鹽湯下三白散治囊腫肢腫及大小便不利桑白皮白朮白醜半生半熟陳皮去白木通去皮甘草炙各一錢水煎服立消散治膀胱久受熱毒以致陰器膚囊赤腫脹痛赤小豆赤芍藥枳殼商陸風化硝各五錢俱不見火曬為末用柏葉煎湯候冷調塗臘茶散治陰囊生瘡疼痛出水久不愈者臘茶文蛤各五錢膩粉少許為末先用蔥椒煎湯洗之次以香油調敷或紫蘇葉煎湯洗之及紫蘇末摻之託之地龍散治陰囊腫大甘草煎汁調地龍末塗之脫肛脫肛者肺實熱則祕結肺虛寒則脫出用補中益氣湯加羌活白芍煨薑主之又緋紅作痛者血虛有熱也佐以丹皮四物微紅作痛者氣虛有熱也佐以丹皮四君再審手足指熱屬胃熱指寒屬胃寒宜消息之積熱者升麻一兩條芩六錢水煎服蛤硝散洗脫肛文蛤四兩水五碗煎湯入朴硝四兩通手淋洗至水冷方止若覺熱痛用熊膽加冰片水化塗之或用收肛散見痔漏門一用荔枝核為末托之一用陳年醬蘿蔔片托之一用坎宮錠子塗之肛門作癢肛門作癢蟲也視其下唇內必生小白瘡或耳之前後結小核如貫珠者是也書云下唇有瘡蟲蝕其肛宜九味蘆薈丸服之外以雄黃銅緑等分為末摻之蘆蒼丸見府症門遺毒遺毒者初生如點次成爛斑甚則口角眼眶面鼻及穀道等處俱傷由乳母傳染者輕父母遺體者重初生時用井水調白礬令母口含水吮之一吸一換使毒聚一處磨紫金錠塗之破爛者用黃柏蜜炙為末摻之乾用香油調搽內以人中黃末每用分許每日五七次煎土茯苓湯調服或服二黃散再與痘里夾瘡門參考二黃散治小兒遺毒牛黃七分胡黃連山茲菰各二錢甘草一錢五分上為細末每服三二分蜜湯調服紫金錠葡萄疫葡萄疫者形如青紫葡萄大小不一頭面身體隨處可生由感四時不正之氣鬱於皮膚乃腑症也初起服羚羊角散清熱涼血久則牙根出血邪傳入胃也服胃脾湯滋益其內如牙腐爛者於牙疳門參考羚羊角散羚羊角牛蒡子防風麥門冬知母玄參黃芩各八分甘草一分水鍾半淡竹葉十片煎七分服胃脾湯沙參白朮陳皮茯神遠志麥冬各六分五味子甘草各五分水煎服有汗去沙參加人參黃耆痘里瘡瘍痘里夾癭結於頸項或生耳後腋下形如桃李棗瓜身烙煩渴由痰氣凝結所致治在審日期之先後視元氣之厚薄紀男女之大小範時令之寒暑庶幾免紊亂之愆痘初起即發癭者治宜托裡消痰解毒如木通桔梗解毒而徹關鎖惡實生地除梟而祛榮炎甘草清理諸邪蟬蛻祛風闢毒芍藥泄諸經之鬱火荊芥散陽明之風邪如是之藥缺一不可若芩連等藥及耗爍之劑俱不宜用痘發在三四日而癭作者則毒隨痘泄毒隨痘灌自可挽全而無害宜服三消散倘斯時紅腫將膿一潰則元氣泄而痘焉能克灌乎七八日之期急用黃耆衛元湯補之痘至七八日克灌時而發癭者沖和飲子主之是痘黃蠟色而作癭者服保元兼以消毒雖潰無妨三消散治痘發至三四日而作癭者半夏當歸茯苓甘草木通紅花生地芍藥牛蒡子天花粉蟬蛻燈草水煎服黃耆衛元湯治痘發三四日而癭潰者宜此補之黃耆人參當歸紅花芍藥桔梗甘草防風水煎服沖和飲子治痘至七八日而發癭者人參黃耆麥門冬芍藥柴胡防風荊芥白茯苓白朮桔梗連翹當歸天花粉水煎服痘里發丹由內熱之極也宜生地牛蒡子芍藥甘草木通荊穗其毒自消腫痛加柴胡羌活頭頂盛者毒湊於上焦也宜炒黃連柴甘車前梔子等類外以化斑湯浴之慎服寒藥及用豬膽京墨冰片等塗抹之類痘里夾瘡宜紫蘇荊芥煎湯浴之隨用升麻黃耆為君芍藥生地白朮為臣羌活防風為佐甘草薑蠶蟬蛻為使此準則也若楊梅瘡如皂角子仁肥疳瘡如松香輕粉黃丹雄黃俱不可用痘夾損傷宜拱元散人參黃耆伏鳳雛當歸紅花芍藥蟬蛻防風甘草一加橘紅生地土鱉以補其內用文蛤棕灰罨之收斂其外若損而未破者蝦蟆皮貼之痕闊弗收者白芨白蘞象皮末摻之慎用峻利及敗血等藥如湯火傷者忌敷涼藥痘疔俗謂之賊痘生於五六日之間或三五枚六七枚雜於諸痘之間其色紫黯甚則黑硬於右有此以致諸症蜂起不能灌膿甚至不救由熱毒勢甚並結之也有中心黑陷四畔突起戴漿者有中心戴漿四畔干陷焦黑者有頭戴白漿自破潰爛者有水泡溶溶易破者有血泡色紫易破者有瘡頭針孔漿水自出者以上數症生於四肢身溫音清浮高而潤者輕生於腰腹身熱音啞深陷而焦者重看疔祕法天庭承漿黑陷男應陰囊女應陰戶兩顴兩頤有黑陷應在腰下人中有黑陷應在臍下太陽有黑陷應在腿足耳上有黑陷應在手足輕則黑陷重則疔也捲簾疔生於舌根小如黑豆大似葡萄令兒舌卷喉痛急用銀鉤鉤破盡淨惡血隨以苦茶漱口搽龍宮丹冰片硼砂青黛黃連薄荷荊芥炒殭蠶為細末吹用火珠疔生鼻孔內闐塞噴火面赤眼紅用鉤鉤破用黃連膏加冰片滴鼻內服瀉金散犀角牛蒡子桔梗芍藥生地紅花紫蘇甘草煎服忘汲疔生於眼沿封蛤腫脹煩熱面紫治宜挑破用瓦蔥搗爛罨之豢虎疔生於耳內於會膿之時宜挑破搽拔疔散燕窩疔生於腋下腫硬面赤譫語如在左腋潛注則右體之痘沉伏失色右則反之宜銀針挑破去其根用拔疔散服消毒飲子牛蒡子犀角芍藥生地紅花甘草木通茯苓連翹燈心水煎服注命疔生兩足心於痘期里腫硬如錢如豆如椒有紫筋直透足股挑之去血淨用田螺水調冰片點之次用慎火草浸脹緑豆搗爛敷之透腸疔生肛門旁在六七朝腫痛如錐挑之煎金銀花防風湯冷洗之次用輕粉珍珠冰片白蘞末塗之內服黃連解毒湯驪龍疔生尿孔內於五六朝身熱譫語眼翻肢厥腹脹小便閉是也急用蟾酥牛黃銀珠冰片麝香研末次用黃連細茶濃煎候冷取半匙調藥用細軟稻心蘸藥送於孔內內服木通敗毒散痂後痘疔潰見筋骨者密陀僧二錢赤石脂膩粉黃柏杭粉炒伏龍肝血竭各一錢飛丹八分發灰五分乳香沒藥各三分冰片半分有臭氣加阿魏三四分為極細末摻之外用膏藥蓋之內服人參敗毒散加穿山甲蟬蛻連翹痘爛身無完膚膿水浸淫黏拈衣被者用茶葉揀去梗入滾水一煠即撈起再揀去梗濕鋪床上上鋪草紙一層令兒臥之一夜則膿干此祕訣也痘爛生蛆及夏月諸蟲咬傷臭穢不堪者用蛇蛻一兩燒存性蟬蛻用水洗淨焙之青黛飛各五錢細辛二錢半為末每服三錢酒下仍以生寒水石細末摻之則蟲化為水蠅亦不敢近蛆痘形化氣化兼之也先哲云蛆痘不死以其梟毒盡化於外也用經霜艾葉野薄荷煎湯洗之或紫蘇甘草煎湯洗之或用艾熏之其蛆自去禁用雄黃礬石等藥痘痂不脫久之必成瘢陷用生蜜蘇合油二味調勻敷痂沿處其痛立止其痂速脫無蘇合油以線雞油代之痘痂落後其面瘢或赤或黑用四白滅瘢散臨臥搽之至曉洗去自然白瑩更不得早見風日經年不滅如瘡瘢凸者熱毒未盡也解毒防風湯外用蜆子肉水塗之如瘡瘢凹者脾胃虛也人參白朮散加黃耆主之四白滅瘢散搽面皯效用白芷白附子白殭蠶鷹屎白密陀僧等分為末清蜜水調搽滅瘢散治瘢黯或凸或凹者韶粉一兩輕粉一錢為末豬骨髓熬熟調敷痘後癰痘癰發於收靨之後由毒氣留藏於經絡虛處或關節動處輕者止生結核腫癤甚者頭項胸背盡皆流注難醫由實熱者用赤芍甘草節連翹桔梗之類上引升麻葛根下引檳榔牛膝更助以貝母忍冬栝蔞白芷寒熱加芩柏散瘀加蘇木紅花便閉加大黃氣血虛者身涼不渴慎用苦寒反傷中氣兼服保元湯為要外用馬齒莧杵汁豬脂石蜜共熬成膏塗之或天麻子肉搗松香末為膏貼之膿者針之潰者煅海巴兒摻之乾用油調射干黏子湯治痘疹後癰疽瘡毒鼠黏子二錢射干升麻甘草各五分水一鍾煎六分服痘風瘡痘風瘡先則細瘡作癢次沿成片脂水浸淫由痘後遇風所致宜麥餞散搽之兼避風戒口甚者瘙癢浸淫肌無完膚而成痘癩急用十全大補湯大補氣血苦參丸清熱解毒二方合而服之外塗滅瘢救苦散麥餞散小麥一合炒枯黃色乘熱入鉢內和硫黃四錢白砒一錢為末攪勻待冷加煙膠八錢川椒三錢枯礬二錢共末和勻先用蔥湯洗淨麻油調搽油紙蓋孔三日一換三次愈苦參丸苦參一兩白蒺藜胡麻牛蒡子各五錢甘草二錢五分為末酒糊為丸竹葉湯送下滅瘢救苦散密陀僧滑石各二兩白芷五錢上為末濕則乾摻乾用白蜜調敷痘後疳蝕瘡毒壅肌肉內透筋骨外連皮膚時痛出血日久不瘥宜十全大補湯搽綿繭散綿繭散痘後便膿痘後便膿熱毒入於大腸也宜四物湯加黃芩黃連枳殼荊芥穗或黃連解毒湯加生地上痘症自有專科因其形有外科之名又似屬外科也採録數條以備參考云爾煉取諸藥法升打靈藥固罐封口法固罐法近少陽城罐以雙耳茶葉罐代之將罐烤熱搗大蒜於罐外遍擦之再烤再擦如式三四次次以薑醋入罐內溫之煮之以干為度次用黃土二分煤灰一分雜以馬毛以鹽水和之固罐一指厚為則陰乾聽用封罐口法入藥畢蓋鐵盞用鐵絲絆畢用石膏無名異等分食鹽減半俱煅過為極細末醋調成膏次加炭火三二塊於盞內燒盞熱以筆蘸藥周圍塗之隨干隨藥以口平為率一用生石膏生白礬食鹽三味等分為末水調塗之如前煉玄明粉法冬至後用潔淨朴硝十斤用水一斗五升白蘿蔔五斤打碎同硝入鍋內煮化候湯滾足撈去蘿蔔將竹絲箕以綿紙二層攤鋪箕內架在新缸上將硝湯徐人箕內候折再添以湯濾盡為度將缸搭在天並露三日其硝結在缸邊傾去余水瀝乾為止將硝取下再用砂鍋頓炭爐上將硝一碗化開煎滾以銅匙鏟攪將成凝結時鏟入小魚酢罐內上空寸許再下硝煉如此已畢每一罐下用三丁品字樣釘入土地上留寸半在外將罐浮頓釘頭上用瓦片蓋口周圍用段磚砌百眼爐圍繞離罐寸半許將著炭安入爐內四圍底火頂火一概相護候罐硝紅為度次日取出硝來預用大綿紙攤在潔淨陰土地上將硝碾細用絹篩篩在紙上一錢厚再不許多將門闥俱已關閉不許與人見之三日後其硝自然復活色白如粉輕虛成片將鉢盛收紙蓋之上再用亂紙寸許以收潮氣庶不凝結此品最能降火化痰清利臟腑怪症服之可蠲狂燥用之即愈搜除百病安斂心神況此服之不傷元氣惟久病瀉痢者不宜大人每服三四錢小兒五分至一錢皆可俱用白滾湯或蔥湯空心化服候行二三次隨飲稀粥自然爽健精神調和臟腑津液頓生百病如失又煅過硝石六兩加硃砂三錢青黛一錢冰片一錢五分共研細末照前篩紙上再用紙蓋一層四邊以戒尺壓緊勿令走氣候三日外取起密收又名陽春紫雪最治失心忘志顛癇健忘小兒急驚大人異症每服五分至一錢俱用淡竹葉燈心湯化服屢有奇效不可盡述玄明粉乃神仙保命服食每一斤加生熟甘草末一兩蔥湯化服二三錢令人悅澤容顏輕身耐老矣鍊金頂砒法用鉛一斤小罐內炭火煨化投白砒二兩於化煬鉛上煉煙盡為度取起冷定打開金頂砒結在鉛面上取下聽用煉硝石法用潔淨朴硝半斤罐內炭火熔化煎乾煅紅住火冷定取出即成硝石罐收聽用利實火不利虛火也取蟾酥法用蟾不拘大小其酥俱有用闊銅鑷鑷蟾眉稜高肉上微緊拔出酥來凝聚鑷里多則括下陰乾聽用其取過之蟾避風二日仍送青草圃中自然不傷其生如取之便見風下水俱成破傷風顛沛而死取金汁法用大毛竹一連二節用刀劈去外青一半用磚扎節中沉入大糞池內一年後取起以長流水浸一日取起鑽開節孔內蓄糞清瓷罐收貯凡遇有中砒毒河魨傷寒陽毒發狂疔瘡痧症毒氣入里煩躁口乾渴欲飲水脈大有力者並宜此藥製附子法大附子一兩之外方用隨數幾枚以童便浸淹三寸每日換便浸至夏三冬五再換童便煮盡二香為度去皮臍線穿陰乾或日中曬硬亦可收藏聽用制寒食麵法用白麵一斤外再以面半斤調稠厚捍成薄片二塊將前面包合於中周圍捏緊合口於清明正日蒸熟挂透風處陰乾用麵包藏勿受潮濕越久越效制炒諸藥法前方諸藥未注炮炙如人食肴饌不用烹炮也是以凡藥必尊雷公炮製入藥乃效今開於後人參潤色明亮堅實為上輕匏不堪天門冬湯泡去心麥門冬去心生地黃酒浸熟地黃酒蒸白朮米泔浸炒蒼朮米泔浸炒黃耆蜜水拌炒甘草消毒生用補托炙熟酸棗仁炒研遠志湯泡去心微炒五味子炒研肉蓯蓉去鱗酒洗牛膝酒洗破故紙炒當歸酒洗白芍微炒黃色白蒺藜去刺玄參去根香附童便浸炒柴胡去蘆黃芩酒炒黃連解毒生用止嘔薑汁拌炒龍膽草酒炒知母鹽水拌炒栝蔞仁去殼去油貝母去心陳皮去白桔梗微炒防風去蘆乾薑炒黑附子童便浸煮半夏薑汁水煮川烏湯泡去皮草烏湯泡去皮尖巴戟湯泡去心微焙南星煨有為末入牛膽內者威靈仙去根仙茅米泔浸蒸去皮三稜湯泡澤瀉蒸大黃實人生用虛人炙用海藻酒洗昆布酒洗切絲牡丹皮去骨王不留行炒碾牛蒡子炒碾連翹去梗碾金銀花去梗葉牽牛生用炒用地骨皮去梗肉桂去粗皮茯苓去匏粗皮枸杞子去蒂琥珀布包捶碎燈心同碾研如面細山梔碾炒焦黃柏鹽水拌炒山茱萸去核杜仲鹽水拌炒斷絲桑皮蜜水拌炒辛夷去蒂乳香去油為末沒藥去油為末枳殼麩皮炒厚朴薑汁製炒巴豆去油為霜皂莢去皮弦子煨五倍子去蛀末炒蓮肉泡去皮心山楂去核桃仁泡去皮類杏仁泡去皮尖微炒芒硝湯者提淨石膏煅碾末雄黃透紅明亮硫黃去腳硇砂淨明潔白硼砂白色透明砒霜白色明亮者有生煨兩用自然銅醋煅七次黃丹水飛炒紫龍骨生用煅用牛黃輕虛色黃麝香去毛皮犀角鎊末羚羊角鎊末龍齒煅存性蜂蜜煉去白沫蟬蛻去土斑蝥川米炒去翅足殭蠶去絲微炒全蠍酒洗去毒蜈蚣炙去頭足蚯蚓翻去腹土田螺去殼曬乾牡蠣煅研石決明煅珍珠豆腐內煮數滾布包捶碎同燈心碾末人中白煅研以上藥品凡本書內應用制炒炮炙者録之不炮炙者未録
