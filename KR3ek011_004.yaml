body:
  text: 卷四不分部位大毒不分部位為隨處可生也以其不按穴次故另分之內癰總論夫癰腫生於背外者看俞穴而內癰生於腹內者則看募穴矣宜各隨募穴以分其經如其穴隱隱痛而不已視其肉微起者癰也肉不起者疽也而本經之脈必滿而實但疑似之間以點陰膠法試之陰膠即久用甑中氣垢也用少許於口中即知臟腑所起直達至住處知痛足可醫也雷公云知瘡所在口點陰膠或以生豆漿飲之不嫌生氣者癰也或將患人兩手扶起過頭忽然脅下吊痛過心者癰也再吐痰於水中沉者是膿癰也脈數身無熱內有癰也浮緊在表沉實在裡不浮不沉知為在經緊則主痛脈緊而數其膿未成緊去而數其膿已成又滑數實促者下之芤遲虛弱者補之長而緩者易治為胃氣盛也短散結代補而不應者不治初起者外兼灸法尤良用獨蒜切片三錢厚安穴上灸之三壯一易以灸至不痛為率其毒自消若內毒已潰者及肝膽部位者生於臍者惟宜服藥攻之禁用針灸總治法穴在心膈之分者屬上焦氣分宜神效栝蔞散之類穴在腹肋之分者屬中下二焦氣血之分宜薏苡仁湯之類肚中腫起只一點痛而不移者肚癰也會膿散腹痛如錐手不可近六脈洪數者陽疱毒也加味貴金湯內癰已久敗膿腥穢臍腹冷痛者懷忠丹心胸有孔久不愈者漏也補漏丹內癰主治方神效栝蔞散治內癰腦髭背腋諸毒瘰癧便毒乳癰乳疽乳勞乳岩等症悉效大栝蔞一個子多者佳子少者用二個當歸五錢甘草四錢沒藥三錢乳香一錢用黃酒二碗煎八分服或去當歸加皂角刺一兩六錢半生半熟炒名立效散與原方兼服之尤佳服將愈加參耆芎術以培其元薏苡仁湯治內癰腸癰腹痛脹滿不食小便澀滯婦人産後多有此症但疑似之間便可服之薏苡仁三錢栝蔞仁三錢丹皮二錢桃仁泥二錢一加白芍一錢水二鍾煎一鍾溫服會膿散治肚癰內癰未潰自消已潰者膿從便下黃耆歸尾穿山甲炒大黃各一兩白芷六錢蜂房一個重六七錢者酒浸瓦焙六次連翹二錢蜈蚣大者七條酒浸瓦焙二次上為末每服三五錢無灰酒調服再多飲以助藥力如背疽加羌活脅癰加柴胡乳症加升麻各隨經絡加引經藥五七分酒煎服藥尤佳加味貴金湯治陽疱毒腹痛如錐手不可近六脈洪數者大黃白芷殭蠶穿山甲貝母用水二鍾煎一鍾食遠服懷忠丹治內癰久潰膿血腥穢臍腹冷痛兼治婦人白帶腥穢不堪者立驗單葉紅蜀葵花根四兩白芷二兩枯白礬一兩白芍一兩為末熔黃蠟四兩為丸梧子大每服三十丸空心清米湯送下推下膿血令盡次服大補之藥以培其元忌發物補漏丹治心胸有孔久不愈者及胃癰井疽肝癰心瘻等症鹿茸去毛酥炙大附子炮去皮臍食鹽等分為末煮棗肉為丸梧子大每服三十丸空心黃酒送下肺癰肺癰之發必先中府穴隱痛不已穴在乳上三肋間初則寒熱咳嗽項強不能轉側脈滑而數久則肢腫咳腥臭膿痰甚則胸膈脹滿呼吸不利食少脈洪自汗視其身涼脈細膿血交黏痰色鮮明飲食知味者順手掌皮粗脈洪氣急顴紅鼻焮嘔噦不食汙膿白血如米粒者逆脈洪滑身熱者難瘥脈細身涼者易治若潰後短澀者生洪大者死孟冬兩尺浮洪孟春兩寸洪數惟夏月可慮肺癰由外感風寒未經發瀉所致者多故肺癰必先解表宜參蘇飲外受風寒咳嗽喘急者小青龍湯胸脹氣喘身腫面浮者葶藶大棗湯胸膈痛脈芤者瘀血也四順散加丹皮紅花瘀血吐出其痛自止發熱煩渴引飲脈洪數而無力者加減八味丸加麥冬大劑服之再以人參五錢麥冬二錢五分五味子二錢水煎代茶飲之因房勞丹石消爍腎水者腎氣丸金液戊土丹勞傷夜熱脈微數者日飲童便三五次朝服人乳間服金鯉湯咳嗽喘急氣短小便短澀者參耆補肺湯體倦食少者參朮補脾湯蓋諸氣本乎肺肺氣治則病已再面白當補肺脾面赤當補肺腎若專攻其毒脾腎愈虛而有不誤者則鮮矣灸合谷穴七壯再灸腎俞穴三七壯肺癰主治方小青龍湯此解表疏風行氣取膿之劑半夏一錢二分乾薑炮細辛麻黃肉桂芍藥甘草炙各一錢五分生薑五味子蜜拌炒一錢水二鍾煎八分食遠熱服葶藶散炙爆飲酒太過喘急脹滿不臥咳吐濁痰甜葶藶栝蔞仁薏苡仁桑白皮桔梗升麻葛根各一錢甘草炙五分用生薑三片水二鍾煎八分食遠服四順散治肺癰吐膿咳嗽氣急心煩熱壅者貝母紫菀桔梗各一錢五分杏仁七分甘草七分水二鍾煎八分食遠服金鯉湯治肺癰已成未成胸中隱痛咯吐膿血者金色活鯉魚一尾約四兩重者連鱗剖去腸肚勿經水摻貝母末一錢於肚內線扎用白色童便半碗浸之重湯頓以魚眼突出為度取起去鱗骨將肉仍入便內頓熱食之飲之一日一枚其功甚捷人參補肺湯咳嗽喘急短氣吐膿發熱作渴小便短澀或腎水不足虛火炎上痰涎壅盛者人參黃耆白朮茯苓陳皮當歸各一錢熟地一錢五分山萸二錢山藥二錢丹皮八分麥冬七分五味子甘草炙各五分生薑三片膠棗二枚水二鍾煎八分食遠服參耆補脾湯治咳吐膿涎中滿不食由脾氣虧損者人參白朮各二錢黃耆三錢五分茯苓陳皮當歸各一錢麥冬七分桔梗六分甘草炙五分升麻三分五味子四分用生薑三片膠棗二枚水煎食遠服九制草靈丹治肺癰肺痿又能止嗽化痰及腸風痔漏槐角子十斤側柏葉三斤冬至後取者佳陳皮十斤枸杞一斤合一處黃酒洗入甑內蒸透曬乾再用酒浸透蒸之如式九蒸九曬足為末煉白蜜為丸梧桐子大每服一二錢空心白滾湯送下肺癰單方太乙膏三五錢水一茶鍾頓化通口服之則膏入肺三二服即愈若為丸服則入腸胃矣故不驗醃芥菜滷貯壇內封固埋地內二十年為佳十年者亦效每飲一小杯三二次立瘥蒲公英俗呼山芥菜取根瓷器刮去粗皮石臼杵爛絞汁用無灰酒或白酒漿沖服立效肺癰應用方加減八味丸腎氣丸俱見首卷金液戊土丹見脫疽小腸癰小腸癰之發必先關元穴隱痛不已穴在臍下三寸初起發熱惡風脈芤而數腹急腫痛大便墜小便澀久則腹脹下淋轉側有水聲者內癰成也由飽食負重或醉飽入房或産難弩力或暴急奔走致令氣血壅遏周旋失度凝滯而成如失治則流注關節變為敗症矣初起小腹殷痛儼似奔豚小便淋澀者薏苡仁湯加大黃下之如已成腹痛脹滿不食小便淋者薏苡仁湯主之如腹痛重按則止時時下膿者毒未解也牡丹皮湯並太乙膏主之如下後膿多者梅豆湯和之如面白食少氣血虛也加減地黃湯十全大補湯加丹皮五味子補之腸癰宜灸兩肘尖各百壯艾如緑豆大則大便下膿血立愈腸癰為病不可驚驚則腸斷凡坐臥轉側俱宜徐緩飲食宜少宜軟爛大宜滋補固其元氣脈則左寸洪數又云跗陽脈滑而數知當屎膿古為膿從臍出者不治惟大補之亦有效者一人腸癰誤治腹脹如鼓診其脈細數而有力視其腹臍下一塊光亮大熱腹內不時腸鳴知為癰也令備淨桶一個入滾水半桶蓋之聽用隨以薏苡仁湯加酒大黃三錢徐徐服之待腹覺痛扶坐桶上膿下如湧其痛立減隨大補之而愈一人誤作脹治致毒內攻腹痛連陰陰器腐爛色敗無膿水流臭穢燥熱口乾不治果歿一婦腹如懷孕疼痛不止余用川芎當歸炒蒲黃炒吳茱萸炒五靈脂紅花水煎服下血塊鬥許而愈腸癰主治方牡丹皮湯治腸癰冷症腹濡而痛重按則止時時下膿者牡丹皮桃仁泥薏苡仁白芷人參黃耆茯苓當歸川芎白芍各一錢官桂甘草各五分木香三分水二鍾煎八分溫服加味地黃湯治腸癰潰後淋漓不已或精神減少飲食無味自汗盜汗等症熟地山藥山茱萸白茯苓丹皮人參等分黃耆倍之用煨薑三片大膠棗二個水二鍾煎一鍾空心服梅豆湯治腸癰下後膿多者薏苡仁二合黑豆百粒烏梅一個水煎熟取湯一大鐘入阿膠一錢生蒲黃一錢再煎服天丁散治腸癰內癰已有膿者皂角刺一兩酒水煎服則膿下薏苡仁湯見前內癰十全大補湯大腸癰大腸癰之發必先天樞穴隱痛不已穴在臍旁二寸右邊痛甚脈則右寸洪數治與內癰及小腸癰同法胃癰胃癰之發必先中脘穴隱痛不已穴在臍上四寸令人咳吐膿血寒熱如瘧由寒氣隔陽熱聚胃口所致以寒氣逆於胃故胃脈沉細以陽氣不得上升故人迎緊盛脈遲芤澀者瘀血也牡丹皮湯下之脈洪數者膿成也赤豆薏苡仁湯排之膏粱之人初起者宜清胃射干湯體倦氣喘作渴小便頻數者肺氣虛也補中益氣湯加山茱萸山藥五味子麥門冬或兼加減八味丸再夏月以生脈散代茶飲之是症以壯氣助胃為主佐以前藥不可專攻其毒胃癰主治方丹皮湯治胃癰腸癰腹腫痞堅按之即痛脈遲而緊者膿未成也宜此湯下之丹皮一錢栝蔞仁一錢桃仁泥二錢朴硝二錢大黃五錢水二鍾煎一鍾去渣入硝再煎數滾不拘時服赤豆薏苡仁湯治胃癰脈洪數者膿已成也宜此排之赤小豆薏苡仁炒防己甘草五分水二鍾煎八分食遠服射干湯治癰瘡腫痛脈洪實數者射干犀角升麻玄參黃芩麥冬大黃各一錢梔子五分加竹葉芒硝為竹葉芒硝肺胃二經藥也水煎服以利為度應用方補中益氣湯生脈散加減地黃丸脾癰脾癰之發必先章門穴隱痛不已穴在乳下右脅端與內癰腸癰同法肝癰肝癰之發必先期門穴隱痛不已穴在直乳二肋間不容旁一寸五分令人兩胠滿臥則驚不得小便由憤鬱氣逆所致初宜栝蔞散或柴胡清肝湯調之潰後用六味丸八珍湯滋陰托裡此肝心火盛而虛中有熱也禁用溫補藥及針灸等法柴胡清肝湯治肝癰初起脅痛柴胡一錢五分黃芩一錢人參一錢梔子一錢五分川芎一錢連翹一錢桔梗一錢甘草五分水二鍾煎八分食遠服栝蔞散見內癰六味地黃丸八珍湯見潰瘍門心癰心癰之發必先巨闕穴隱痛不已穴在心窩下敝骨下一寸實胃經之募也發則寒熱身痛面赤口乾飲水由酷飲嗜熱物所致宜升麻葛根湯以清胃清心丸以退火清心丸黃連一兩茯神五錢赤茯苓五錢為末煉蜜為丸梧子大每服百丸米飲送下升麻葛根湯腎癰腎癰之發必先京門穴隱痛不已穴在脅下季脅間實膽之募也發則脅下至小腹滿由房勞過度外挾寒邪所致惟八味地黃丸相宜禁用寒涼等藥八味地黃丸見首卷三焦癰三焦癰之發必先丹田穴隱痛不已穴在臍下二寸實膀胱之募也治與小腸癰同法疔瘡症治大疔者釘也如丁之釘也其形小其根深隨處而生不拘穴次凡初起如疥形粉刺如小泡疙瘩癢痛發麻遊走不定寒熱噁心但其稍異於常者疔也書云見其小異則當大驚故宜虛心辨認隨其形色緩急用藥得法庶保無虞遲則走黃變異莫測俗云走馬看疔勢不容緩也是症多感於肅殺乖戾之氣或畜惡尸忤之變故有朝發夕死隨發隨死五七日不死一月半月而終死者此在歲運之順逆五臟虛實而然也再以形色而言之如初起至四五日間由白色而至青紫色內無七惡等症者為順初起似疔非疔灰色頂陷如魚臍如蚤斑青紫黑泡軟陷無膿至六七日間孔深臭穢無膿內見七惡等症者為逆若疔瘡出膿形如蜂窠者易愈再以部位而言之生於頭項胸背者急生於手足骨節間者緩一疔之外別生一小瘡名曰應候如疔之四圍赤腫而不散漫者名曰護湯如疔之四旁多生小瘡者名曰滿天星有此者緩無此者急再以禁忌而言之疔毒由蘊熱而生忌投辛熱之藥恐反助其邪忌敷寒涼之藥恐逼毒攻內又初起無頭及未潰時忌貼膏藥輕者聚毒成膿甚者毒必攻內惟在已潰見膿時用之呼膿長肉以避風寒耳初潰時忌用生肌藥恐毒未除則反增潰爛再疔生於頭項之間肝膽腎三經部位再火日火疔俱不宜灸犯之必為倒陷或為走黃再飲食忌酒並雞魚海味冷水起居忌氣怒房勞諸香犯之必致反覆若一月內無房勞者則瘡口平坦無胬肉為徵再以用藥次第而言之如初起時寒熱拘急脈緊而數者為在表先服蟾酥丸次用紺珠丹汗之如發熱口乾便閉脈沉而實者為在裡先服蟾酥丸次服貴金丸下之如無表裡症者邪在經也先服蟾酥丸次服無憂散清之如煩熱神昏乾嘔者邪氣內攻也菊花煎湯送蠟礬丸托之如手足冷六脈絶者由毒氣閉固元氣不能宣通也先服蟾酥丸隨服木香流氣飲宣之如神昏煩躁腫黯不痛者由敷涼藥所致也服蟾酥丸托之能追毒出腠理而為汗疔毒誤灸煩躁譫語者逼毒內攻也解毒清火湯疔毒走黃頭面發腫煩悶欲死者疔毒復生湯潰後餘毒未盡五心煩熱者人參清神湯針後出膿時氣虛驚悸者內托安神湯攻利太過以致發渴脈大而虛者補中益氣湯汗後汗不止熱不退瘡不疼便不利者及汗下後口噤痰湧自汗搐捺者再有誤刺出血過多沿腫焮大不已者皆為真氣虛也俱宜十全大補湯倍用參耆歸術甚者加大附子余按此症初不解毒後不大補欲其得生者鮮矣再以外治而言之如疔毒有頭紅腫熱痛者用菊花根梗並葉杵爛敷之如漫腫無頭根活者及疔毒走黃別處結腫者俱用離宮錠子塗之如疔頑惡推之而根不動者必用挑法以斷其根否則必致走黃書云疔瘡先刺血內毒宜汗瀉禁灸不禁針怕綿不怕鐵誠挑疔之密訣也再以疔毒有名者而言之如火焰疔發於心多生於唇口手掌指節間初起紅黃小泡癢痛麻木繼則寒熱頭暈心煩紫燕疔發於肝多生於手足肋脅間初生紫泡破流血水三日後串臂潰筋繼則眼紅甲青神昏舌強黃鼓疔發於脾多生於口角腮顴眼胞等處初起黃泡光硬麻庠繼則寒熱乾嘔吐逆白刃疔發於肺多生於手指鼻竅胸臆等處初起白泡癢痛腐爛繼則咽焦氣急毛聳鼻焮黑靨疔發於腎多生於耳竅腰腹軟處初起黑斑紫泡痛徹骨髓繼以軟陷驚悸目露指青上五疔取形色部位而屬五臟也古書又有火疔形如灸瘡水疔形如水泡氣疔起泡而軟石疔堅硬如石腐疔頂陷而潰魚臍疔狀若魚臍茱萸疔中凹而邊突鹽膚疔大如匙面黑點起黍爛疔大如匙面潰流膿水刀膁疔狀如薤葉形長寸許浮漚疔亦如薤葉形長而曲瓜藤疔延漫無數芝麻疔形似芝麻忌食麻油麻子疔似麻子稍黑始末皆癢三十六疔形如黑豆日生一個滿數者不治釘腦疔生太陽穴及眼邊魚尾疔生小眼角外眉疔生於眉赤面疔生於顴頰疔生頰骨尖處鼻疔生鼻內其痛連腦黑疔生耳內腫痛連腮髭疔生於髭龍泉疔生於人中虎鬚疔生於唇下反唇疔生於唇內鎖口疔生於嘴角牙疔生於牙根豬疔圓小瘡口有油牛疔圓小瘡口無油羊疔形長而白狗疔形長而赤驢馬疔三角形頂有黑點蛇頭疔生於指頂蛇眼疔生於甲旁蛇背疔生於指背蛇腹疔生於指肚蛇節疔生於指節冷疔生於足根正考見足部此外又有紅絲疔生於手有紅絲入腋入腋者不治生於足有紅絲入腹入腹者不治生於唇有紅絲入喉入喉者不治宜於紅絲盡處刺斷搽離宮錠子次於原處挑之搽拔疔散內服蟾酥丸暗疔先發寒熱拘急腋下堅腫無頭或陰囊腫痛睪丸突兀如箸頭者是也內疔先發寒熱腹痛數日間忽然腫起一塊如積者是也二症不用挑法先以蟾酥丸含化令盡涼水漱去毒涎再用三丸嚼蔥白三寸裹藥溫酒送下蓋臥出汗稍時無汗再飲酒催之或用霹靂火法佐之必令大汗次服紺珠丹和之或用貴金丸下之自愈若牙關緊急者取蟾酥丸三五粒蔥頭研化灌之俟稍蘇治如前法羊毛疔身發寒熱狀類傷寒但前心後心有紅點如蚤斑者是也視其斑黑色者為老淡紅者為嫩取深紅者用衣針於斑上挑出羊毛前後心各挑五七個用黑豆蕎麥粉塗之即時汗出而愈一法用明雄黃二錢青布包扎蘸熱燒酒於前心擦之自外圈入內其毛即奔後心再於後心擦之其羊毛俱拔出於布上埋之忌茶水一日挑法密訣用竹籤於毒頂上十字剖開其毒堅硬如鐵者為順先出紫黑血再挑至鮮血出以知痛為止填拔疔散令滿以膏藥蓋之過三二時撥去舊藥易以新藥若藥干無水不痛者此挑法未斷疔根也再深挑之必以上藥知痛藥濕水流為率若初起失治以至走黃則身面漫腫原瘡無迹神昏不食者險急尋原起處挑之如瘡口磁實出紫血或鮮血敷藥知微痛服藥見稍效者十中可保二三若瘡口綿軟刺之如瓜瓤出淡血水而不知痛者百無一生矣此法有轉重就輕之功起死回生之效今人不識其症不知其治妄以王道自居反加訾毀嗟嗟誤人性命可勝計哉余痛惜此特剖而明之疔瘡主治方蟾酥丸治疔瘡發背腦疽乳癰附骨臀腿等疽一切惡症及瘡不痛或麻木或嘔吐甚則昏憒此藥服之不起發者即起發不痛者即痛痛甚者即止昏憒者即蘇嘔吐者即解未成者即消已成者即潰真有回生之功乃惡症中至寶丹也蟾酥二錢酒化輕粉五分枯白礬寒水石煅銅緑膽礬乳香沒藥麝香各一錢雄黃二錢硃砂三錢蝸牛二十一個上為末稱準於端午日午時在淨室中先將蝸牛研爛再同蟾酥和研稠黏方入各藥共搗極勻丸如緑豆大每服三丸用蔥白五寸患者自嚼爛吐於男左女右手心包藥在內用無灰熱酒一茶鍾送下被蓋如人行五六里出汗為效甚者再進一服內消散栝蔞一個皂刺一兩金銀花大黃生薑甘草各五錢白芷二錢用黃酒二碗煎八分服解毒清火湯治疔毒誤灸逼毒內攻煩躁譫語者玄參桔梗知母石膏升麻梔子麥冬木通大青葉人中黃各一錢便祕加大黃悶亂加燒人糞用淡竹葉燈心各二十根水煎服疔毒復生湯治疔毒走黃頭面發腫毒氣內攻煩悶欲死者牛蒡子牡蠣皂角刺金銀花梔子天花粉木通地骨皮乳香沒藥殭蠶大黃等分脈實便祕者加朴硝用磨刀針鐵漿水一鍾黃酒一鍾煎一鍾服行一二次即蘇又出汗即生無汗即死人參清神湯治疔毒潰後餘毒未盡五心煩躁精神恍惚睡臥不寧者人參黃耆白朮當歸茯苓遠志陳皮麥冬骨皮各一錢柴胡黃連各五分糯米一撮用水二鍾煎八分食遠服內托安神湯治針後出膿時元氣虛弱睡臥驚悸不寧或毒未盡流入心竅致生健忘者人參黃耆白朮茯神麥冬玄參陳皮各一錢棗仁炒研五味子石菖蒲遠志各五分用水二鍾煎八分入硃砂三分和勻食遠服拔疔散治疔毒甚者挑後填此真有回生之功勿輕忽之硃砂硇砂白礬食鹽二味各用鐵鏽刀燒紅煅之等分上為細末瓷罐收之聽用須擇丁日午時制之疔毒紅熱腫痛杵鮮菊花葉敷之其冷如冰或坎宮錠子塗之若漫腫不赤及走黃結腫者用離宮錠子塗之二錠見敷治門疔毒頭暈麻癢心煩者用野菊花根杵汁半碗白酒沖服或花葉根梗取四兩白酒煎送琥珀蠟礬丸三錢一用生藍葉酒煎服心煩作嘔者取生黃豆水浸磨漿每服碗許令吐之得吐則心涼霹靂火助內疔出汗之法也鵝卵石燒紅安鐵杓內杓安桶內以醋淬於石內令患者將患處覆桶上衣蓋勿令泄氣氣微再添紅石加醋淬之以腫處汗出為度疔毒應用方立應紺珠丹貴金丸蠲痛無憂散琥珀蠟礬丸補中益氣湯十全大補湯離宮錠子坎宮錠子灸曲池穴俱見首卷木香流氣飲見流注門多骨疽多骨疽一名剩骨一名朽骨由瘡瘍久潰氣血不能榮於患處骨從瘡口而出也無論腮齶牙床腿膊手足等處但腫痛日久不潰諸藥不應者即此症也細骨由毒氣結聚化成大骨由受胎時精血交錯乃三陰經虧損之所致蓋腎主骨宜腎氣丸十全大補湯人參養榮湯先補脾腎次用艾附餅子灸之卻散寒邪接補榮氣則腐骨自脫瘡口自斂矣如骨已出腫仍不消者骨未出盡也仍內用大補外以神燈照之蠟餅灸之則朽骨自出出盡方愈再膿白而清稀者朽骨初脫肉深難取膿白而稠者朽骨將出肉淺可取取出之骨煅而存性加入生肌散內以還其原則收口甚速應用方腎氣丸十全大補湯人參養榮湯艾附餅子神燈照法黃蠟餅蒸法蠟餅灸法生肌散俱見首卷流注流者行也由氣血壯自無停息之機注者住也乃氣血衰是有凝滯之患其形漫腫無頭皮色不變毋論穴次隨處而生此症所受之因不同則先後之治亦異矣如腠理不密外邪客之者立應紺珠丹汗之房勞為寒氣所襲者桂附八珍湯加木香溫之鬱結傷脾榮氣不從者歸脾湯加香附青皮散之跌撲損傷瘀血凝滯者散血葛根湯逐之産後惡露不盡流注經絡者通經導滯湯導之暴怒傷肝胸膈不利者方脈流氣飲調之傷寒汗後餘邪未盡者人參敗毒散解之解後尚有潮熱榮衛返魂湯加升麻葛根川芎紫蘇獨活如無潮熱者只加獨活水煎和之上乃治初起將成之法也外俱紺珠膏貼之服藥一服至三四服其中有可消者十中五六如服前藥不得內消者法當大補氣血培助脾胃溫暖經絡通行關節如木香流氣飲調中大成湯十全大補湯俱加熟附子香附培助根本則未成者自消已成者自潰已潰者自斂而終無殘敗破漏不斂之虞且如腫處有膿宜急開之庶免內壞務使余腫俱要出膿內熱方退慎用寒涼克伐內消等藥及火針之法起自缺盆流於天樞穴者為氣毒流注有九個者不治生於肩背堅硬如石者為之痰注生腦後形似蜂窠者為蜂窠流注流於兩肩者不治通用榮衛返魂湯千金指迷丸消之一切流注宜灸梁丘穴七壯流注之症俗稱曰馬𤷍如走散流注曰瓜藤馬𤷍骨節內痛曰嗍骨馬𤷍脊骨髀骨間三五枚者曰過脊馬𤷍生於尾骶骨者曰殺著馬𤷍踝骨腫痛曰鎖腳馬𤷍骨交接處腫痛曰接骨馬𤷍入股者不治流注主治方榮衛返魂湯治一切初起流注赤芍木通白芷何首烏枳殼小茴香烏藥當歸甘草水一鍾酒一鍾煎八分服初起堅硬如石者加川芎獨活麻黃蔥頭汗之胃寒生痰加半夏鬱熱生痰加桔梗補加附子瀉加大黃食少加白豆蔻肺癰肚癰加忍冬藤此乃內癰之神藥也五香連翹等藥只調陽而不和陰則氣耗血凝肌必不活內托十宣等藥只和陰而不調陽則血旺氣衰疾必再作惟此方救壞症活死肌弭患於未萌之前拔毒於既愈之後扶胃本而不傷元氣惟在隨時加減之耳桂附八珍湯房欲後陰虛受寒致令腫塊或遍身腿腳疼痛肉桂五分大附子人參白朮白茯苓當歸川芎白芍炒熟地各一錢木香甘草各三分用生薑三片紅棗二個水二鍾煎八分食遠服散血葛根湯跌撲損傷瘀血凝滯結成流注身發寒熱者葛根升麻羌活防風川芎半夏桔梗各一錢白芷蘇葉細辛香附紅花甘草各八分蔥頭三個生薑三片水二鍾煎八分服通經導滯湯産後敗血流注經絡結成腫塊疼痛者香附枳殼陳皮紫蘇川芎當歸赤芍熟地丹皮紅花牛膝各一錢獨活五分甘草節五分水二鍾煎八分加酒二分食遠溫服木香流氣飲流注瘰癧及鬱結為腫或氣血凝滯通身走注作痛或心胸痞悶咽嗌不利腹脅膨脹嘔吐不食上氣喘急咳嗽痰盛或四肢面目浮腫者並效川芎當歸紫蘇桔梗青皮陳皮烏藥黃耆枳實茯苓防風半夏白芍各一錢甘草節大腹皮木香檳榔澤瀉枳殼各五分下部加牛膝生薑三片紅棗二個水煎服調中大成湯潰後膿水清稀飲食減少不能生肌收斂者人參二錢黃耆白朮茯苓歸身白芍丹皮陳皮山藥各一錢肉桂八分大附子八分遠志霍香砂仁各五分煨薑三片膠棗二個水二鍾煎八分食遠溫服先天大造丸風寒濕毒襲於經絡初起皮色不變漫腫無頭或陰虛外寒侵入初起筋骨疼痛日久遂成腫痛潰後膿水清稀久而不愈漸成漏症者紫河車一具酒煮搗膏熟地黃四兩酒煮搗膏人參仙茅浸去赤汁蒸熟去皮搗膏何首烏去皮用黑豆同煮搗膏肉蓯蓉去鱗並內膜酒浸搗膏枸杞白朮茯苓歸身牛膝菟絲子黃精各二兩巴戟肉骨碎補去毛微炒破故紙炒遠志各一兩廣木香青鹽各五錢丁香三錢黑棗肉二兩上為末煉蜜為丸梧子大每服七十丸空心溫酒送下此丸能補一切氣血虛羸勞傷內損及男婦久無嗣息者並有奇驗千金指迷丸治一切結痰半夏四兩薑製白茯苓二兩枳殼二兩麥麩炒風化硝三錢為末河水煮糊為丸詳見症治粗評痰門流注串毒初起單方楊樹內蟲或桑樹內蟲絞汁大人用無灰酒小兒用白酒漿沖服琥珀膏敷流注及瘀血頑痰結成腫塊者一次即消錦紋大黃為末搗大蒜調敷即痛一二時無妨至次日去藥發斑或起泡挑破流水用月白珍珠散摻之即干或用西聖膏貼之以消余腫流注應用方立應紺珠丹見首卷歸脾湯見瘰癧門紺珠膏見首卷五香流氣飲見結核癭瘤夫癭瘤者由五臟邪火濁氣瘀血痰滯各有所感而成非正病也且癭者陽也色紅而高突或蒂小而下垂瘤者陰也色白而漫腫而無痛癢之苦然症而各有五筋瘤屬肝色紫而堅青筋盤曲如蚓治宜養血舒筋如清肝蘆薈丸血瘤屬心皮膚纏隱紅絲軟硬間雜治宜涼血抑火如芩連二母丸肉瘤屬脾色不變軟如綿不寬不緊治宜行痰開鬱理中如順氣歸脾丸氣瘤屬肺亦色不變軟如綿但其隨喜怒而消長治宜清肺和榮如通氣散堅丸骨瘤屬腎色黑皮緊高堆如石貼骨不移治宜補腎行瘀破堅利竅如調元腎氣丸上五瘤俱宜復元通氣散兼以蠟礬丸甚捷癭者筋骨呈露血癭者赤脈交結肉癭者皮色不變氣癭者隨喜怒而消長石癭者堅硬不移此五癭也初起元氣實者海藻玉壺湯六軍丸久而元氣虛者琥珀黑龍丹十全流氣飲選而服之自然縮小漸漸消磨若久而膿血崩潰滲漏不已者不治癭瘤總訣如初起者根腳浮淺而不堅實已成者膿潰而腫消已潰者膿稠且根縮而皮緊潰後者氣體平和飲食如故皆為順候若初起時則根散而陰痛已成時則堅強而痰嗽已潰時則流血水腫仍不消痛仍不止皆為逆候再潰後腫硬更增敗腐不脫涴氣噁心者死再生於耳後有頭痛症者不治瘤者留也毋論大小不可妄取不可輕去不為無理故忌用刀針多致危殆然亦有可刺者如粉瘤色如紅粉多生於耳項前後及下體者由痰氣凝結而成宜鈹針破去脂粉插三品一條槍數次以內膜淨自愈黑砂瘤多生於臀腿腫突大小不一以手攝起內有黑色是也刺出黑砂有聲或黑粉軟硬不一插藥如前再以膠瘤蟲瘤蛔瘤發瘤隨處而生者悉難枚舉惟在認之的確刺插同前如有四五枚者先刺一二枚覺有昏憒由泄氣之過也余瘤停止服補中益氣湯數劑外以膏藥蓋之五七日患者健則漸漸破之補之若前云瘤者不可去之則又膠柱矣癭瘤主治方清肝蘆薈丸治肝氣鬱結為瘤遇怒則痛川芎當歸白芍生地各二兩青皮蘆薈昆布海粉黃連甘草節牙皂各五錢上為末打神麯糊為丸梧子大每服八十丸隨病上下白滾湯送芩連二母丸治心火妄動逼血沸騰外受寒涼所致黃芩黃連知母貝母川芎當歸白芍生地熟地地骨皮羚羊角蒲黃各等分甘草減半上為末用側柏葉煎湯打寒食麵為丸梧子大每服七十丸燈心湯送下或作煎劑用亦佳順氣歸脾丸治思郁傷脾結為肉瘤陳皮貝母香附烏藥當歸白朮茯神黃耆棗仁遠志人參各一兩甘草炙木香各三錢上為末用合歡樹根皮四兩煎湯煮老米糊為丸梧子大每服六十丸食遠白滾水送下通氣散堅丸治憂鬱傷肺氣濁為瘤陳皮半夏茯苓膽南星貝母人參枳實香附石菖蒲天花粉川芎當歸桔梗海藻黃芩炒等分上為末用荷葉煎湯跌丸菀豆大每服一錢食遠燈心生薑泡湯送下調元腎氣丸治房勞憂恐腎氣虛衰骨無榮養所致生地酒煮搗膏四兩茯苓山藥山茱萸丹皮各二兩麥冬人參當歸身地骨皮澤瀉龍骨各一兩木香砂仁各三錢黃柏鹽炒知母童便炒各五錢上為末用鹿角膠四兩老酒浸化加蜂蜜四兩同煎滴水成珠和藥為丸梧子大每服八十丸空心溫酒下忌白蘿蔔燒酒房勞海藻玉壺湯治癭瘤初起腫硬未破者先斷厚味大葷次宜清心絶欲海藻昆布陳皮青皮半夏貝母川芎當歸連翹甘草節獨活各一錢海帶五分水二鍾煎八分分上下服活血散癭湯癭瘤日久無痛癢者氣血弱也川芎白芍當歸熟地陳皮半夏茯苓人參丹皮各一錢紅花昆布甘草節木香各五分青皮肉桂各三分用水二鍾煎八分分上下服服後飲酒一小杯六軍丸治癭瘤已成未潰不論新久並效蜈蚣去頭足蟬蛻全蠍殭蠶炒去絲夜明砂穿山甲等分上為末神麯糊為丸粟米大硃砂為衣每服三分食遠酒下忌大葷煎炒日漸可消琥珀黑龍丹治癭瘤不問新久但未穿破者宜服琥珀一兩血竭二兩京墨五靈脂炒海帶海藻南星薑炒各五錢木香三錢麝香一錢各為細末研勻煉蜜為丸每丸重一錢金箔為衣曬乾密收每用一丸熱酒一杯隨病上下化服十全流氣飲治憂鬱傷肝思慮傷脾致脾氣不行逆於肉裡乃生氣癭肉瘤皮色不變日久漸大者陳皮赤茯苓烏藥川芎當歸白芍各一錢香附八分青皮六分甘草五分木香三分生薑三片紅棗二個水煎隨症上下服消瘤神應散山茲菰海石昆布貝母各等分為末每服五錢白滾水調服旬日可消灸癭瘤法灸肘尖二七壯一灸間使穴二七壯一諸癭灸肩髃穴男灸左十八壯右十七壯女灸左十七壯右十八壯一面生贅瘤以艾灸十壯用硫黃醋磨塗紙上剪如灸瘡大貼之再以膏蓋俟癢捻出膿汁如緑豆粉即愈一人面瘤形如棋子先以衣針微刺瘤頂分許連刺三四針次以生薑切片貼瘤上貯艾於薑上灸七壯隨出清水些須即消少半過一二日再灸三四次全消消瘤二反膏癭瘤瘰癧結核通用先用甘草煎濃膏筆蘸塗瘤四圍待乾再塗凡三次次以大戟芫花甘遂等分為末以醋調另用筆蘸藥塗其中不得近著甘草處次日則縮小些又以甘草膏塗四圍比先小些中塗照前自然漸漸縮小而消矣縛瘤法治癭瘤根蒂小者用之亦可扎痔桑白皮刮細芫花倍之入罐內醋煮一炷香取出搓線扎一夜即落次用龍骨訶子細茶等分為末敷斂瘡口枯瘤方治初起未破者根蒂小者白砒硇砂硼砂輕粉雄黃黃丹乳香沒藥各一錢田螺大者去殼三枚曬乾切片斑蝥二十個共為細末用糯米粥調和捏作小棋子樣曬乾聽用先灸瘤頂三壯以藥餅貼之次以水調黃柏末敷蓋藥餅候十日外其瘤自然枯落次用斂口藥斂瘤方治癭瘤枯落後用此搽貼自然生肌收口血竭輕粉龍骨象皮海螵蛸乳香各一錢雞蛋十五個煮熟用黃熬油一小鐘調前藥末聽用先用甘草湯洗淨以雞翎蘸藥塗之膏藥蓋之每日早晚各敷洗一次癭瘤應用方復元通氣散見耳門三品一條槍見瘰癧門蠟礬丸見首卷補中益氣湯見首卷結核結核生於皮裡膜外如果中之核堅而不痛由火氣熱鬱者但令熱散其腫自消如連翹丸由濕痰流注者宜行氣化痰如五香流氣飲千金指迷丸服之而反甚者肝火血燥也潰而不愈者虛也俱宜補中益氣湯六味地黃丸以滋化源間用蘆薈丸以清肝火婦人多由鬱怒虧損肝脾或胎産失調所致如結於項側耳之前後胸脅部位寒熱腫痛者屬膽經風熱柴胡清肝湯加鉤藤倍用梔子結於肉裡皮色不變日晡發熱者屬血虛肝火加味逍遙散加膽草結於肢節或纍如貫珠者亦屬肝火由血燥筋攣所致八珍湯加柴胡梔子鉤藤再以六味地黃丸佐之時發而時消者氣滯而痰結也宜歸脾湯六君子湯兼以海藻丸佐之經云形傷痛氣傷腫是以忌用行氣破血等藥以傷元氣小兒項側結核如癧堅而不潰者三焦病也忌用苦藥以通大便宜柴胡通經湯如面黃肌瘦食少者無辜疳也用金蟬丸數服不消按之轉動軟而不痛者內有蟲如粉急針出之否則蟲隨氣化內蝕臟腑為不治結核主治方海藻連翹湯治諸般結核痰核瘰癧馬刀癭瘤陳皮去白半夏茯苓膽星連翹黃芩酒炒黃連酒炒柴胡升麻殭蠶炒牛蒡子炒三稜酒炒莪朮酒炒昆布海藻羌活防風川芎桔梗夏枯草用生薑薄荷水煎食後服或加酒煮大黃皂刺五香流氣飲結核痰核及陰毒流注金銀花二兩殭蠶連翹羌活獨活栝蔞仁小茴各一兩五錢藿香五錢丁香一錢木香沉香甘草各一錢上分為十劑水煎隨上下服如為丸緑豆大雄黃五分為衣滾水下消核湯治痰核金銀花天花粉山藥各一錢五分蒲公英夏枯草海石粉南蒼朮前胡各一錢用水二鍾煎八分食遠服結核在於乳者用南星貝母連翹甘草等分栝蔞倍之青皮升麻減半水煎加酒服結核在於小腹下痛不可忍者由陽明濕熱傳入太陽也必惡寒發熱宜梔子桃仁山楂枳殼等分水煎入薑汁服柴胡通經湯小兒項側結核柴胡黃芩牛蒡子連翹三稜歸尾甘草各三分紅花黃連各少許水煎熱服二白散敷痰核消腫南星貝母等分為末雞子清和米醋調敷結核應用方補中益氣湯六味地黃丸八珍湯六君子湯俱見首卷柴胡清肝湯加味逍遙散歸脾湯俱見瘰癧門蘆薈丸見疳瘡門楊梅瘡夫梅瘡言形也和黴瘡言濕也時瘡言時氣乖變邪氣湊襲之也綿花瘡言綿綿而難絶也總由濕熱邪火之化而有精氣二者之殊精化由欲染者重氣化由傳染者輕精化者肝腎二經受毒其患先從下部見之筋骨多疼小水淋瀝其形大而且硬氣化者脾肺二經受毒其患先從上部見之皮膚作癢筋骨不疼其形小而且干精化者毒在骨髓未透肌膚宜金蟬解毒丸下之以瀉骨髓之毒氣化者毒在皮膚未經入里宜紺珠丹蔥酒煎服洗浴汗之以解皮膚之邪壯實者服一劑散以解表裹之邪次服加味遺糧湯調理虛弱者服蟾酥丸三二服使邪毒透於肌表次用歸靈內托散如或誤用熏藥火氣鬱遏難出致令頭脹骨疼紅點滿面者先用黃連解毒湯二劑以瀉其火次服蟾酥丸如前法調理服至筋骨不疼瘡根淡白內毒已解方用點藥輕者百日重則半載方始全愈又男犯房勞女逢經至則服藥罔效欲其速愈者必內服一劑散以敗其勢然須密室避風寒忌冷水犯之筋骨作疼食宜淡咸則血凝難愈食鵝生風食牛生癬不可不慎之也如不遵此法妄用熏條擦藥哈吸等法而不成後患者鮮矣楊梅主治方透骨搜風散筋骨疼痛未見形已見形悉效透骨草白花者陰乾羌活獨活紫葡萄生芝麻白糖六安茶小黑豆核桃肉槐子生薑各一錢五分紅棗三枚用水三鍾煎一鍾露一宿空心熱服蓋臥出汗避風三劑自愈楊梅一劑散元氣壯者服之一汗一下其功甚捷麻黃一兩大黃七錢威靈仙八錢金銀花羌活白芷蟬蛻皂角刺穿山甲各五錢防風三錢共一劑用山羊肉斤許河水煮熟取清湯二碗黃酒一碗煎一碗令患者空心先將熱羊肉同酒淡食之令飽隨服藥蓋臥出汗避風加味遺糧湯治楊梅初起筋骨疼痛及已潰未潰延綿不已並楊梅風毒誤服輕粉癱瘓骨疼不能動履川芎當歸防風木瓜薏苡仁木通金銀花白蘚皮威靈仙蒼朮各一錢甘草五分皂莢子五個切片微炒仙遺糧二兩人參瘡久氣虛者加水二碗煎八分量病上下煎服輕者一月可退深者百日可痊忌牛肉燒酒海腥煎炒生下疳時預服此藥免其不發梅瘡歸靈內托散治楊梅瘡不問新久但元氣弱者即宜服此當歸川芎白芍熟地薏苡仁人參白朮天花粉白蘚皮金銀花木瓜防己各一錢威靈仙六分牛膝下加五分土茯苓二兩甘草五分用水三鍾煎二鍾作二次隨病上下服之其渣再煎服元氣虛者參歸倍之毒氣盛者金銀花倍之倍加蒲公英外以麥冬五錢薏苡仁五錢土茯苓一兩煎湯常服以代茶筋骨痛酒方鬧羊花根皮八錢五加皮歸身各四兩威靈仙二兩玄參牛膝各二兩甘草五錢上各咀片入絹袋內用乾燒酒二十斤封入壇內重湯煮三香埋七日任飲葷腥過口楊梅瘡熏洗方蓮房瓦松川椒蒜瓣陳艾朴硝槐枝甘草用水半桶煎百十滾傾入淨桶內令患者坐桶上以被圍之先熏後洗汗出為度楊梅疹子熏洗方緑豆二升水煮將熟傾入淨桶內熏洗如前楊梅發於陰囊肛門等處熏洗方土鹼十餘塊打碎入淨桶內沖滾水半桶坐熏如前立時清爽三五次結痂而愈婦人生於玉門腫痛者用燒煤土沖水坐洗如前碧雲散楊梅瘡已服藥至根腳不紅瘡勢已退者石膏煅輕粉各一兩銅緑膽礬各五錢共為細末罐收濕瘡乾摻干瘡用公豬膽汁調點一日一次三日自干而愈又方杏仁四十九粒去皮尖去油為粉銀硃二錢輕粉五錢兒茶四錢冰片二分麝香一分共為末豬膽汁調搽一方只用紅粉摻之鵝黃散梅瘡潰爛成片膿穢多而疼甚者宜之石膏煅輕粉黃柏炒等分共為末乾摻即可生疤再爛再摻毒盡即愈此解毒止痛收干之要藥瓊花膏貼楊梅瘡並結毒筋骨疼痛及一切腰腿疼痛諸毒惡瘡鬧羊花根皮一兩五錢五加皮歸身各二兩威靈仙一兩防風荊芥玄參天花粉各一兩五錢甘草一兩真麻油三斤浸煎如法用鉛粉收膏退火毒七日任用攤貼其煎膏火候見首卷膏藥門紫砂生肌散治梅瘡腐淨時用此生肌硃砂四錢入銅杓內安火上上蓋紅炭數塊炙硃砂紫色為度輕粉二錢冰片二分上為細末每用些須摻於患處以前瓊花膏蓋之如瘡收至小孔而不收者每藥末一錢加陳壁土炒象皮末一分護面散初發時服表藥恐上攻頭臉服此則頭面不出用自頂心發或女人發煅存性明雄黃各九分和勻分三服一日服完每服用麻油半酒鐘調藥黃酒沖服服後服表毒藥護從丸發瘡時令侍從人服之不致傳染川椒五錢雄黃五錢杏仁一百粒去皮尖共為末燒酒打飛羅麵糊為丸桐子大空心服十餘丸白滾湯下救劫湯楊梅瘡時誤用熏藥毒氣入內以致吐血不止及成爛肉者用生薑半斤取汁飲之即解淨肌湯楊梅愈後遍身發瘰如癩癢不可忍者及中粉毒側柏葉五錢好醋一鍾煎五分服十六服全愈或神應養真丹如眉發脫落者用側柏葉酒浸九蒸九曬煉蜜丸桐子大每服三五十丸每日三服黃酒下百日愈醒皮湯洗鵝掌風並多年頑癬防風荊芥金銀花皂角刺蛇床子貫衆芫花白蘚皮鶴蝨草苦參各五分用水十碗煎四碗去渣湯洗俟皮肉和軟用後方搽之烘之透骨丹治前症用此烘之青鹽大黃輕粉兒茶膽礬銅緑雄黃枯礬皂礬各五分杏仁七個麝香一分冰片五釐共為細末用蘇合油調勻擦患處以炭火烘之以透為度五七次愈一方木鱉子萆麻子大風子輕粉斑蝥為末薑醋調搽白蘚皮湯楊梅瘋癬及鵝掌風白蘚皮海風藤各三兩金銀花白茯苓肥皂子肉苦參各二兩五加皮漢防己鴨腳花根蟬蛻各一兩豬牙皂角皂角刺薏苡仁各一兩五錢土茯苓四兩上分十劑水三鍾煎一鍾服每日空心食雄豬肉三四兩忌發物角皂皮丸楊梅瘋癬及鵝掌風皂角樹根皮四兩當歸二兩黃耆一兩五錢陳艾一兩人參一兩麻黃三錢共為末煉蜜為丸桐子大每服五七十丸土茯苓湯下楊梅應用方金蟬解毒丸紺珠丹見首卷蟾酥丸黃連解毒湯見疔瘡門神應養真丹見股部倒發梅毒夫楊梅倒發者由初發時誤用水銀等劫藥之所致也夫劫藥者如擦五心擦動脈及吸氣觀燈聞香薰被等法並服輕粉粉霜靈藥等丸如是等治至三四日內則悍燥之性上攻齒齦所以牙浮口臭腥穢難聞七日滿足即瘡痂盡落則僥幸而安矣孰不究輕粉粉霜靈藥銀硃等類治雖殊皆水銀之升煉者也譬如麥而作種種麵食名雖殊皆麥之所造者也令患者誤受此毒含藏於骨髓之中沉潛於關竅之內久之逢虛則發發則筋骨疼痛隨處結腫次則破爛甚則損筋傷者塌腦崩梁穿喉蝕目手足拘攣苦楚一生遺毒數代情關一錯禍起百端或有云再服再痊更不悟愈劫愈重嗟嗟乎如是等治非關患者之不明實由醫者之所贈也若夫以王道之法治之必先審其受病之原觀其發病之所壯實者以解毒為主虛弱者必兼補為規一切諸症各有次第宜隨後方調理雖至重者百日自痊永無後患慎勿妄求速效仍取自誤倒發主治方瓊花輔骨湯治筋骨腫疼新久悉效當歸連翹防風威靈仙五加皮白蘚皮皂角刺豬牙皂角白蘞明天麻牛膝各一錢白豆蔻七分鬧羊花三分木香一分共一劑用土茯苓四兩煎湯四碗取湯二碗煎藥八分五更時服渣再煎臥時服一月可痊忌發物避風並房勞綿子乳香湯治風毒疼痛不可忍者綿花子炒研取仁倍用金銀花何首烏白蘚皮薏苡仁防風荊芥當歸川芎白芍茯苓檳榔牛膝木瓜防己乳香沒藥俱減半甘草少許土茯苓量用用水煎服三二服見效十餘劑霍然陰陽二氣散治結毒筋骨疼痛夜重晝輕喜熱手揉捻者用出山黑鉛一兩入杓內火化鉛溶入杏仁四十九粒炒焦去杏仁入硫黃些須於鉛上用槐枝攪之俟硫煙盡又入硫些須攪炒如前以硫黃三兩完為率仍俟硫煙盡其鉛成灰每用鉛灰二錢配乾薑末二錢和勻用黃酒一大壺入大蔥五七根煮蔥爛取酒調藥服之再儘量飲之蓋暖出汗一香盡粉毒隨汗出其痛即止如未全愈過三日再一服除根避風寒皂角樹皮湯治結毒潰爛筋骨疼痛皂角樹根皮切片用炭灰同醋拌炒黃色每用一兩加金銀花威靈仙牛膝豨蘞草木瓜各三錢防風荊芥連翹白蘚皮苦參地骨皮當歸各二錢用酒三碗水二碗煎三碗聽用土茯苓羊肉各四兩酒二碗煎七分露一宿兌前藥內每日空心服一碗四日服完十劑全愈加味五寶丹治楊梅瘋毒筋骨疼痛破腦崩鼻蝕陽爛嗓肺傷口臭及癩癬鵝掌風身面出紅黑白斑並小兒遺毒珍珠豆腐煮三錢琥珀三錢鐘乳石煅為細末人乳浸飯上蒸過用四錢五分辰砂為末飛二錢五分冰片一錢加牛黃二錢五分山茲菰二錢五分海參二錢五分一加麝香五分舊琉璃多年璃璃燈燒存性為末用二錢如補鼻祖長陽道前古方五味加制胎元一具重生蟹腳焙末七分服如法一每丹一兩配飛羅面五錢如下部易真緑豆粉五錢如中部則飛面豆粉各用二錢半每服三分每日五服土茯苓湯調下每日用土茯苓一斤隨症加飲煎湯五碗每服一碗為率今人減用或只半斤故治症不驗傷鼻加辛夷三錢咽喉腐爛加升麻三錢桔梗二錢玉莖腐爛加真殭蠶三錢牙皂二錢上部加白芷一錢胸腹加白芍藥一錢下部加牛膝一錢四肢加羌活金銀花蒲公英各二錢服前丹作嘔者生薑五錢取汁煮鯽魚食之以助胃氣二便澀滯不通者用百草霜二錢井花水調服即解制胎元法干胎元大者一具用粉甘草人參各五錢水三鍾煎鍾半塗抹胎元炙汁盡為度次用砂鐔一個入石膏末少半鐔入胎元於中再入石膏以滿鐔為度封口用金粟火煨一宿取出胎元如烏金紙色為佳白色者不用補鼻祖法用油紙以甘草水煮過於好人鼻子上印一塑子合患者鼻上外以膏藥蓋之俟長完去紙用皮硝煎湯洗鼻三二次則見風不痛通隘不二散治結毒發於咽腐爛疼痛湯水難入者硫黃一錢靛花一分為細末用涼水一酒鍾調服即止外吹紫粉人中白散或用紅粉塗之甚者內服前五寶丹即以五寶丹吹之結毒入巔頂致頭疼脹痛如破者鵝不食草川芎各一兩青黛一錢為末令患者噙水一口以蘆筒取藥吹左右鼻內取嚏為效內服天麻餅子或用魚鰾苘麻炒為末每服三錢煎蔥酒調服瘡毒塞鼻不通者葫蘆殼燒灰鐘乳石膽礬冰片等分為末吹入鼻內出黃水日吹三二次三二日即通結毒破爛不收口者硃砂雄黃銀硃各三錢水銀一錢五分先取黑鉛一錢溶化入水銀於內如泥共研勻用紅棗肉二十個搗和為餅分作十個每日用一餅安小口罐內燒煙對患處熏之周圍遮蓋勿令泄氣三日三丸即愈紫金膏結毒潰爛頑硬膿水淋漓及頑臁等症礬紅松香等分為末香油調敷先用蒼朮一兩川椒三錢水煎熏洗畢敷藥蓋油紙再以絹條扎緊三日一換紫靈藥治結毒及咽喉唇鼻腐爛臭穢日甚者水銀一兩硃砂雄黃硫黃各三錢共藥入罐內升打如常火候見首卷生肌門腐爛諸症靈藥五錢輕粉五錢和勻摻用咽爛者用靈藥一錢人中白二分研勻吹用小兒遺毒見第四卷小兒門結毒應用方二子解結湯見疳瘡門貝葉膏紅粉俱見首卷石癰石疽腫堅如石癰則微紅而疽則皮色不變久不作膿由深寒客於經絡者宜服黃耆丸初宜艾灸三五十壯若生於面頰者則不宜灸用麥飯石膏敷之由脾氣鬱結榮氣不從所致者宜致和丸服之久服全消黃耆丸治因寒氣客於經絡者黃耆炙二兩大附子去皮臍薑汁浸透切片火煨炙以薑汁一鍾盡為度七錢菟絲子酒浸蒸大茴香炒各一兩共為末酒打糊為丸每服一錢每日二服空心食前黃酒送下致和丸治因菀結不舒所致白朮二斤陳皮一斤同炒共為末用大棗二斤生薑半斤煮半日去薑取棗肉合原汁為丸緑豆大或桐子大每服一二錢早晚各一服米湯下或酒下麥飯石膏治癰疽惡毒消腫生肌麥飯石二兩煅醋淬十二次鹿角四兩泥固煅黃色白蘞一兩為末用陳米醋調如稀糊水煙起魚眼泡取起塗腫處痼發痼發多生手足腰腿伸縮之處其形漫腫其色淡紅憎寒發熱由天時外感所致初起者紺珠丹汗之已成者托裡消毒散托之已潰者如潰瘍補之紺珠丹托裡消毒散俱見首卷瘭疽瘭疽一名蛇瘴初出紅點次變黑色小者如黍如豆大者如梅如李腫痛應心腐筋爛骨膿如小豆汁今日去明日復滿愈而復發為異耳此川廣煙瘴地面有之初起蟾酥餅貼之膏藥蓋之寒熱者蟾酥丸汗之紅腫遊走者離宮錠子塗之潰後食少乾嘔者補中益氣湯加黃連麥冬補之補而不應出清水穢汁者不治南人呼為榻著毒喜著十指治與脫疽同法或灸百壯內飲藍青汁等以去其熱紅絲遊走者於盡處灸三壯自愈或用蠟礬丸加麝冷酒下多服取瘥消瘴膏治瘭疽瘴疽鯽魚一尾血餘雞子大一團豬汁油一斤煎枯去渣加黃蠟一兩溶化成膏塗之蟾酥餅蟾酥丸俱見疔門離宮錠子補中益氣湯俱見首卷疣音休疣一名枯筋箭手太陽虛則生疣薛又為疣屬肝膽少陽經風熱血燥或肝客淫氣所致蓋肝熱水涸腎氣不榮故精亡而筋攣也宜地黃丸滋腎水生肝血為善若用蛛絲纏螳螂蝕艾著灸輕者可愈重者必多致誤此症與結核相同有大如黃豆小若黍米拔之如絲者有觸碎如斷束縷扯之則長縱之則縮後兩鬢髮白點者有初如赤椹用雜敷藥翻張如菌又用腐蝕焮大如瘤者有腹內一塊攻擊作痛凝為血鱉治之後手背結一塊長寸許形如鱉再又肢節如豆大者甚多泥鱉生子發於外者有肛門周生小顆如鼠奶大小不一者有婦人患此月經不行者種種異類惟六味地黃丸補中益氣湯逍遙散歸脾湯等藥益養榮氣久之悉愈六味地黃丸補中益氣湯俱見首卷逍遙散歸脾湯俱見瘰癧門不分部位小疵此皆小症不可紊亂於大毒之內故另分之無名腫毒無名腫毒者以其隨處而生不按穴次不可以命名也皆由風邪寒熱客於經絡之所致但其因風邪內作者則無頭無根因氣血相搏者則有頭有根因風寒而成者則腫堅而色白風熱毒而成者則腫焮而色赤治法有表症者散之有里症者下之外兼敷貼等藥總不外乎首卷腫瘍之例並宜參考灸曲池穴甚效穴見首卷灸門漏蘆湯治癰疽疔腫不問陰陽初起者及初潰紅腫尚未消盡者並濕爛疥瘡等毒漏蘆一錢五分紫花地丁荊芥當歸連翹薄荷白芷升麻各一錢麻黃三錢大黃二錢生甘草四分水二鍾煎八分食遠溫服蓋衣取微汗渣再煎溫服次日麻黃用二錢大黃用錢半甘草用六分溫服第三日則麻黃大黃甘草各用一錢溫服如其紅腫尚未消盡照第三日方再三二服無不愈者是方也如不欲汗則麻黃少用溫服之如大便不實及不欲下者則少用大黃不用亦可隨病上下在食前食後服如便毒服利藥正氣傷皮厚未穿者服此一汗不砭而穿飛騰神駿膏治癰疽腫毒瘰癧鼠瘡麻黃去節淨用一斤杏仁泡去皮尖砂鉢內研如泥入水再研澄去濁腳防風去蘆四兩地骨皮去骨四兩甘草四兩燈草一大把黑鉛一塊木鱉子肉十四個頭髮一大團洗淨共入大銅鍋內入水二桶炭火煎減半取汁渣再煎二次絹濾淨並一處復將燈草頭髮黑鉛同汁煎至成膏去此三味再煎稠收罐內香甜久貯不壞每服三錢熱酒調服隨飲至醉為度蓋臥出汗避風一日次日食豬蹄補之此方於初起時及將潰時服之神驗軍門立效散治癰疽諸毒對口附骨疽等皂角刺三錢炒熱入乳香五七分炒香化再入天花粉三錢甘草節一寸長九個川椒三十粒黃酒二鍾煎一鍾溫服未成者即散已成者即潰已潰者不宜服一用皂刺三錢乳香七分花粉一兩甘草節二錢炒制如法酒煎服治紅腫焮痛便祕者甚捷壺公妙劑散一切諸毒乳癰便毒筋骨疼痛不問新久悉皆神驗穿山甲炒胡盧巴槐花黑醜頭末當歸等分為末每服五錢用溫酒調成塊挑入口內隨用溫酒送下隨飲幾杯以助藥力榮衛返魂湯赤芍木通白芷何首烏枳殼烏藥當歸各一錢小茴香五分甘草三分水一鍾酒一鍾煎八分溫服初起堅硬如石者加川芎麻黃獨活蔥頭水煎熱服出汗胃寒生痰者加半夏鬱熱生痰者加桔梗久不愈食少色痿者涼藥太過也去木通加當歸倍加陳皮厚朴甚者再加白豆蔻肺癰腸癰內癰等症倍加忍冬藤此藤治內癰之神藥也補加大附子利用酒大黃隧痰失道陽少陰多者加升麻以除其寒久潰無膿時流薄血壤肉如絮胬肉如突者宜之外用枯礬朴硝末滲之忌用刀針蝕藥老弱者患於上部去木通恐導虛下元氣血盛者減當歸多能生血恐再結不已泄瀉者先服蠟礬丸米湯下瀉止再服腰痛經年不愈者加萆薢玄胡索腳氣加檳榔木瓜穿山甲熱痰咳嗽加紫蘇疝氣嘔逆加木香此藥救壞症活死肌弭患於未萌之前拔毒於既愈之後扶胃本而不傷元氣更不分經絡但漫腫堅硬不紅不痛者用之悉驗托裡溫經湯治寒覆皮毛郁遏經絡熱伏榮中不得伸越聚毒腫痛惡寒發熱或相引肢體疼痛者麻黃防風蒼朮白芷升麻葛根人參當歸白芍甘草再服去麻黃防風加牛蒡子連翹麻黃苦溫防風辛溫發散者也升麻苦平葛根甘平專陽明解肌者也血留則痛歸芷辛溫破血散滯濕盛則腫蒼朮苦溫瀉腠裹之邪參草甘溫白芍酸寒調中托裡水煎熱服蓋臥之使陽氣伸而汗出其腫自消去麻防加蒡翹其痛自止加減栝蔞散治內癰腦疽背腋諸毒瘰癧便毒乳疽乳岩等症未成者即消已成者速潰大栝蔞一個子多者佳少者用二個杵爛當歸三錢沒藥二錢乳香一錢甘草三錢金銀花五錢生薑五錢用無灰酒二碗煎一碗服將潰者加皂角刺五錢乳癰腦疽加蒲公英土貝母各五錢潰後用參耆補之滌風散尉風腫痛疼羌活防風白芷吳萸細辛官桂芫花當歸芍藥各五錢為粗末赤皮蔥連須切碎半斤用釅醋拌勻炒熱帛包於瘡上尉之稍冷易之以痛止為率移險散南星白芨草烏黃柏各二兩文蛤炒一兩為末調如糊隨血圍匝如牆壁可移險處就不險處南星白芨白蘞白芷貝母等分水調此藥敷前圍藥之內提起內毒制之有理葫蘆化毒丹治一切腫毒熱癤大黃黃柏遠志等分為末用豬膽汁和成錠雄黃為衣陰乾用時以米醋磨如墨以鵝翎蘸藥頻塗患處醒肌膏治腫毒惡瘡及風氣腫疼鶴膝風冷濕痛腰痛腳氣痛婦人産後受風經絡冷痛廣膠四兩用蔥薑取汁各一碗浸膠過宿文火煎膠化入硫黃末一兩草烏末一兩蔥粉一兩薑粉一兩煎成膏再加蟾酥一錢麝香四分乳香二錢沒藥二錢各末和勻頓滾水內刷絹帛上貼之以熱鞋底尉之俟痛止變麻木則死肌活矣一刷皮紙上用時隨大小剪貼尉之宜與首卷牛膠蒸法參考取薑蔥粉法蔥薑各杵汁三二碗薄鋪瓷器內曬乾成粉滲雪膏治一切風熱攻注頭面四肢腫痛朴硝二升於臘月中入新瓦罐內沖熱水令滿攪勻挂簷下俟硝滲出罐外陸續收之用人乳調敷瑞龍膏敷一切腫毒對口乳癰便毒紅腫焮痛者不問未成已成悉驗鮮鯽魚大者一尾鮮山藥如魚長一條去皮先將魚入石臼內杵爛次入山藥再杵如泥量加冰片和勻攤敷腫處綿紙蓋之黃酒潤之凡腫毒已成者如純陽症則孔似峰窠用貝葉膏貼之日換七八次善能止痛呼膿生肌完口更無黏連之苦半陽半陰症者則漫腫無頭微紅微熱用紺珠膏貼周圍腫處中留頂塗玄珠膏再以黑膏蓋之則余腫自消膿從孔出內服托裹之劑純陰症者內服辛熱大補之劑外用神妙拔根方以疏其毒以上諸方俱見首卷丹毒丹毒者為肌表忽然變赤如丹塗之狀也經曰少陰司天客勝則丹疹外發及為丹熛然二症亦有紅白乾濕癢痛之殊故用藥則分表裡補瀉之異如色赤而干發熱作痛者為丹毒屬肝心之火宜化斑解毒湯色白而濕爛流黃水癢痛不時者為風丹屬脾肺濕熱宜除濕胃苓湯癢而搔之起塊成餅成片皮色不變者為冷膜故天陰則劇風中亦劇晴暖則減身暖則瘥由風邪外襲熱鬱於肌膚也宜藿香正氣散發之外以枳殼煎湯浴之忌用風藥再如丹毒由胃氣虛極致令虛火遊行於外者又宜補以降之用人參五錢當歸白朮各一錢五分水煎服之又如女子十五歲而經脈未通者多發丹疹此由血有風熱乘之也治宜涼血虛則補之慎投風藥化斑解毒湯治二焦風熱上攻致生火丹延及遍身而作癢痛玄參知母石膏黃連牛蒡子人中黃升麻連翹各一錢甘草五分水二鍾淡竹葉二十片煎八分服除濕胃苓湯治脾肺濕熱致生火丹作爛疼痛者防風蒼朮白朮赤茯苓陳皮厚朴豬苓梔子木通澤瀉滑石各一錢薄桂甘草各三分水二鍾燈心二十根煎八分服藿香正氣散治冷膜由風寒外襲者藿香白朮白芷桔梗紫蘇陳皮半夏大腹皮茯苓厚朴甘草水二鍾生薑三片紅棗二個煎八分服蕓薹菜方治丹毒蕓薹菜子一兩黃酒一鍾和研濾去渣煎四五沸溫服之一杵蕓薹菜葉敷之乾者為末水調敷之柏葉散治丹毒癢痛並效側柏炒黃黃柏大黃各五錢赤豆三錢蚯蚓糞韭菜田內者佳五錢輕粉三錢為末新汲水調敷一搗大蒜厚塗之干則易之赤白遊風遊風者為肌膚倏然焮赤腫痛遊走無定由風熱壅滯榮衛不宣則善行而數變矣較之丹毒只紅腫起粟而不走故與遊風為異耳其風熱者則色赤宜小柴胡湯加防風連翹清之內熱甚者紫雪散下之腫勢甚者砭之風寒者則色白宜荊防敗毒散散之再血熱者四物湯加柴胡梔子丹皮胃虛者補中益氣湯加防風羌活肝腎虛熱者宜加味逍遙散六味地黃丸以滋化源則火自息風自定癢自止矣誤用祛風辛熱之藥復傷元氣則容風內淫血隨火化反為難治赤腫遊入腹者不治宜與小兒赤遊風門參考有因過飲燒酒而得者飲冷米醋一二杯即解此又是似而非也宜細辨之荊防敗毒散補中益氣湯六味地黃丸俱見首卷加味逍遙散小柴胡湯俱見瘰癧門癮疹癮疹者生小粒靨於皮膚之中憎寒發熱遍身瘙癢經云勞汗當風薄為郁乃痱痤熱微色赤熱甚色黑由痰熱在肺治宜清肺降痰解表如消毒飲子有可下者大柴胡湯虛者補中益氣湯或總以加味羌活散治之疹屬少陰君火斑則無頭焮腫於外屬少陽相火自吐自利身溫身涼者吉忌敷涼藥首尾慎下若便閉者微利之故凡癮疹瘙癢疙瘩丹毒等症皆宜涼血潤燥如加味逍遙散加味小柴胡湯慎用風藥復傷元氣反致筋攣若愈後肌生白屑搔之如帛所隔者氣血虛也十全大補湯或灸曲池穴見灸門加味羌活湯治風寒暑濕外搏肌膚發為癮疹憎寒發熱遍身瘙癢或赤或白甚則心迷悶亂口苦咽乾羌活前胡各一兩人參桔梗甘草炙枳殼川芎天麻茯苓各五錢蟬蛻去頭薄荷各三錢上為末每服三四錢生薑三片水一鍾煎七分去渣溫服羽液膏治斑疹風癢不止白礬五兩童便一升黃酒三合合煎如稀糊以棉帛蘸藥擦之立消補中益氣湯十全大補湯俱見首卷加味小柴胡湯加味逍遙散俱見瘰癧門諸癢諸瘡痛癢皆屬於火又云風盛則癢蓋為風者火之標也凡風熱客於皮膚作癢起粟者治宜疏風如換肌丸苦參丸等若風熱內淫血虛作癢者又當涼血潤燥如逍遙散柴胡湯之類也神仙換肌丸治皮膚風熱如蚤蝨叮咬癢不可忍者蟬蛻焙殭蠶焙防風片芩酒炒何首烏各一兩梔子酒炒八錢白芷八錢荊穗七錢羌活七錢地膚子五錢上為末酒糊為丸緑豆大每服三二十丸茶清送下苦參丸治風疹遍身癢痛難忍涎多不寐者苦參一兩為末用皂角二兩水一升揉濾取汁石器煎成膏和丸桐子大每服二十丸溫水送下四生丸治渾身麻癢或麻痹不仁或生斑疹或外臁血風頑瘡骨節痛不能履地龍去土殭蠶炒白附子五靈脂草烏去皮尖炮等分為末米糊丸桐子大每服三四十丸茶清送下二味消毒散治遍身起瘰作癢用此乾擦之自止明礬一兩雄黃五分共為末遍身癢如蟲行者用鹽一斗水一石煎七斗澄清洗之三五次愈用茵陳湯煎汁洗之加味通聖散治風餅風丹作癢防風川芎當歸白芍白朮甘草連翹薄荷梔子桔梗麻黃石膏滑石荊芥黃芩朴硝大黃蟬蛻枳殼用水二鍾煎八分熱服一用鹿角磨酒熱服煎鳳仙花科洗之蛇床子湯狼毒膏俱見腎囊風三因四生散見腎藏風瘡羽液膏見癮疹諸痛諸痛之為症也有各門之所未備其立方也有各門之所未載今匯之於一以便採用庶無遺失蒼朮復煎散治寒濕相合腦痛惡寒心煩腹悶脈沉而遲項背腰脊髀骨脛膝等痛蒼朮四兩水二碗煎二鍾去渣入黃柏三錢羌活柴胡升麻藁本白朮澤瀉各五分紅花少許再煎至二鍾服蠲痛無憂散治一切腫毒痛筋骨痛頭風痛風寒濕痹遍身疼痛腳氣痛風及大麻風等症蒼朮米泔水浸焙半夏薑汁浸焙穿山甲陳土炒川烏黑豆酒煮去皮尖草烏生薑汁煮苦食麻油煠浮當歸酒洗甘草各二兩麻黃三兩威靈仙一兩鬧羊花醋浸炒黃色四兩各製為末和勻每服五七分至一錢無灰酒調服再飲以醉為度蓋臥出汗立驗避風尋痛丸治遍身走注疼痛並一切腫毒疼痛五靈脂草烏炮杏仁各一兩沉香木香各五錢麝香一錢上為末酒糊為丸桐子大每服二十丸溫黃酒送下如治腫毒杏仁易桃仁沉木易乳沒各等分燒酒下桑皮飲治皮膚痛不可以手按者桑白皮二錢乾葛柴胡黃芩玄參各一錢地骨皮天門冬麥門冬各一錢五分木通甘草各五分用水二鍾生薑三片蔥頭一個煎一鍾熱服出微汗槐花散治皮膚痛雖蒼蠅飛上即痛者槐花炒為末每服三錢溫黃酒調服魚鰾散治遍身痠軟作痛者腰痛魚鰾四兩香油煠黃為末每服五錢溫黃酒送下威靈仙桂湯治産後經風痛不可忍並痢後風威靈仙肉桂木香乳香沒藥各二錢水二鍾煎八分服六合散治一切腰疼羌活獨活大茴香小茴香杜仲當歸各二錢用黃酒一碗浸露一宿次早空心去渣溫服立愈一用紅姑娘一個炙乾令焦為末黃酒下鵝實散治脅痛疝氣痛鵝眼枳實焙小茴香炒各為末等分和勻每服二錢用小黑豆同艾葉炒熱沖黃酒於內去渣調前末藥食前服之立止不龜手膏治冬月手背裂痛豬脂油四兩入白蠟二兩溶化離火加白芷升麻一錢豬牙皂一錢丁香五分麝香二分為細末入前油蠟內和勻先用蔥湯洗手淨拭乾烘手熱取前膏一塊於手心內搓之令手掌油潤去藥則隻手於火上烘之搓之以油干為度則裂痛立愈更且滋潤肌膚勝裂口藥多矣大麻瘋大麻瘋癘瘋也由水枯火盛秉天地肅殺之氣所致形雖見於皮毛瘋毒積於臟腑上而下者為順下而上者為逆漸來可治頓發難醫必先麻木不仁次發紅斑再次浮腫破爛無膿再久之熱濕生蟲攻蛀臟腑如蟲蝕肝則眉落蟲蝕心則目損蟲蝕脾則唇反蟲蝕肺則聲嘶蟲蝕腎則耳鳴足底穿為之五敗又皮死麻木不仁肉死割截不痛血死內潰成瘡筋死指節脫落骨死鼻梁崩塌為之五不治夫瘋之中人也必從虛入故須絶情欲必壅滯經絡故須食清淡必先麻痹故須用疏通如麻黃桂枝之類是也今則初以紺珠丹汗之次以蘆薈丸清熱殺蟲通用神應養真丹加白花蛇等分久服可愈然諸痹諸瘡不得舍六味丸八味丸六君子湯十全大補湯補中益氣湯等以培補之再造丹治大麻瘋生漆松香各半斤和勻盛瓦盆內入大蟹七隻如小者倍之此盆一個埋半截於土內日曬之以柳枝攪之夜則蓋之二十一日俱化成水取起聽用雄黃半斤飛七次蛇蛻七條川烏草烏俱薑汁浸泡人參天麻各二兩上為末用蟹漆汁為丸聽用初用麻黃蘇葉各半斤防風荊芥各四兩煎湯一桶沐浴浸洗換新衣服丸藥三錢黃酒送下再飲至醉蓋臥出汗汗乾脫去衣於空地焚之另換新衣至午再服三錢酒下至醉用夏枯草蒸熱鋪席下臥之不取汗次日沐浴服藥至醉鋪夏枯草臥照前將舊衣舊草取出焚之如此七日其病盡出如豆如瘡再服一七瘡俱脫殼五七日全瘥真至聖藥也終身忌螃蟹並狗肉再造散治大麻瘋眉落腳爛底穿者苦參八兩半油炒乾漆一兩甘草五錢穿山甲炒二兩上為末每服五分用鮮蟹二隻杵爛取汁加酒調服日進二服至十日則長肉生眉梧桐葉散臭梧桐葉同卷的陰乾為末初服七分每日加一分至錢四分為率又每日退一分至七分為率俱用無灰酒調服避風初一服則小便如油至四服渾身骨響至八服汗出如泉冷至十二服麻木處有紅點則知痛癢至十五日發斑如雲片以瓷鋒砭出黑血仍用梧桐葉末摻之愈忌食鹽醬母豬牛羊燒酒麵食房勞一切發物白茅藤酒治大麻瘋並三十六種瘋白茅藤根於石臼內杵粉每用粉四兩糯米一斗蒸飯做酒或每酒一升用藥三兩煮服以醉為度何首烏酒何首烏四兩生地熟地歸身歸尾穿山甲蝦蟆各一兩川烏草烏五加皮松針側柏各四錢用黃酒一斗同入鐔內封固重湯煮三炷香埋暗七日時時服之令醺醺然作汗避風加減地黃丸治大麻瘋將愈服此以培元氣熟地四兩山藥山萸茯苓丹皮五加皮杜仲牛膝金銀花遠志各二兩豬腎四個紫河車一具共末煉蜜為丸梧子大每服百丸空心淡鹽湯送下紺珠丹見腫瘍蘆薈丸見疳瘡神應養真丹見股部癩瘋癩瘋亦由犯肅殺之氣所致有烏癩白癩之殊蓋烏者皮毛變黑癢如蟲行或如癮疹結核手足頑麻針刺不痛腳如拘肘如縛眼見物如垂絲心常恐怖言語及食時出氣而鳴若白者皮色變白四肢頑疼肉如針刺手足緩縱背膂拘急鼻生息肉瞳生白沫目暗聲嘶身熱心煩為異耳豨蘞膏丸治癩瘋作癢及癱瘓豨蘞草杵汁煎膏和豨蘞草末為丸每服三錢黃酒送下老弱者用人參蘇木煎膏量用數匙和酒送丸藥松漆丸治癩瘋麻瘋紫雲瘋漆樹頭瓦焙四兩松節醋炒九次一兩五錢皂角刺燒酒炒九次一兩各為末和勻酒糊丸胡椒大每服錢許早晚二服茶清送下七日見效藥儘自愈二聖不老丹治癩瘋麻瘋眉發脫落側柏葉酒浸九蒸曬白松香煮煉九次等分上為末煉蜜為丸梧子大每服二錢每日三服蜜湯送下大黑神膏治諸癩遍身生瘡及多膿血川烏川芎升麻防己黃柏黃連藜蘆各五錢巴豆杏仁各十四粒亂髮雞子大一團豬脂二斤煎藥溶化為度去渣雄黃雌黃胡粉白礬各末五錢松脂雞子大一團上為末入油內攪勻收瓷器內先以熱鹽湯洗淨次搽藥日三次勿令入口搜風順氣丸治三十六種瘋七十二般氣瘋氣腳氣惡瘡下注上熱下虛腰腿疼痛四肢無力一應男婦老幼不問虛實並宜常服潤三焦和五臟調腸胃除風濕療癱瘓言語謇澀理腸風便血除根大黃酒浸九蒸曬五兩火麻仁微火焙去殼獨活郁李仁滾水浸去皮枳殼麩炒檳榔車前子酒炒菟絲子酒煮山藥牛膝酒浸山茱萸去核酒浸各二兩加羌活一兩上為末煉蜜為丸梧子大每服三十丸茶酒任下早晚各一服癧瘍瘋癧瘍瘋生於頸項胸腋之間其色紫而點點相連且無痛癢若白駁瘋形如雲片為異耳威靈仙散治癜瘋囊瘋紫雲瘋頭瘋歷節瘋破傷瘋皮膚瘋癢有疥癬瘰癧腫毒威靈仙酒拌九蒸九曬為末每服二錢酒下或米糊為丸服惟忌茶麵松漆丸豨蘞膏丸搜風順氣丸俱見癩瘋白駁瘋白駁瘋生於頸面延及遍體其色駁白亦無痛癢形如雲片宜先刮患處至燥痛取鰻魚脂敷之三上自效內服浮萍丸蒼耳膏等或可奏效浮萍丸治一切瘋麻瘋頭瘋癜瘋瘋疹此藥味辛氣寒輕清入肺達膚出汗與麻黃同功浮萍取紫背大者置篾墊上安水盆上曬乾為末煉蜜為丸彈子大用豆淋酒下豆淋酒法黑豆半升炒煙起衝入好酒三升浸一周時去豆取酒送藥蒼耳膏治諸瘋瘋濕四肢拘攣一切瘡疹蒼耳鮮者連根帶葉取五七十斤洗淨切碎入大鍋內煮爛取汁絹濾過再熬成膏瓷罐盛之用時以桑木匙挑一匙於口內噙之然後用黃酒送下有回生之功服後於有瘋處出小瘡如豆粒此瘋毒出也刺破出汁盡自愈紫白癜瘋癜瘋俗名汗斑也紫因血滯白因氣滯皆由熱體被瘋濕所侵留於腠理搔之起皮而不痛此從外來治宜汗之如紺珠丹松漆丸浮萍蒼耳之類再灸夾白穴擦八葳靈散自當獲效非若白駁瘋之難療也八威靈散治擦紫白癜瘋大附子一錢川烏草烏各一錢雄黃硃砂各五分紅砒四分硫黃三分麝香二分共為細末用雞子清調稀漿小麻布手巾二條陰乾用河水薑汁米醋三味和一處以藥手巾蘸濕擦患處待行動汗出時擦之夏月治尤佳灸夾白穴法先以墨塗兩乳頭次令兩手直伸夾之染黑處是穴灸二七壯或針刺出血亦愈浮萍茯苓丸治紫白癜瘋浮萍一茯苓半上為末煉蜜為丸梧子大每服三二錢黃酒下紺珠丹見腫瘍松漆丸見癩瘋蒼耳膏見白駁瘋論諸瘡諸瘡者以其隨處而生不按穴次不可以命名也經云諸瘡痛癢皆屬心火諸濕腫滿皆屬脾土是中濕熱相合潰敗肌膚而成瘡也然有淺深表裹之異治有汗下補瀉之宜如瘡在皮膚者則當因其輕而揚之汗之浴之以散膚腠之邪外以殺蟲潤燥等藥敷之瘡在肌肉者則當因其重而減之清之涼之以瀉經絡之熱外以化膿生肌等膏熁之瘡在巔頂者則當因其上而射之用寒涼藥以酒浸之灸之更以風藥升而上之外以殺蟲解熱等藥敷之明些三者其於治瘡思過半矣救苦黃耆散治一切惡瘡端午日合尤佳黃耆當歸芍藥天花粉甘草各一兩五錢金銀花二兩栝蔞一對熟地量用皂角刺為引上為粗末瓷罐密收之每服五錢用無灰酒一升或酒水各半入瓶內封口重湯煮藥氣透出為度取出澄清飲之洗諸瘡藥方二兩枯礬四兩椒半斤野菊一斤硝七分分開煎數滾一日一換洗三遭淫濕疥癩頑臁癬膿血風瘡一概拋一用苦參大腹皮水煎洗碧螺膏貝葉膏俱見首卷翻花瘡翻花瘡瘡口內肉突出翻如菌翻如菌也且無痛苦由潰瘍血燥生風所致損流鮮血久則虛人治宜滋肝補血益氣培元如逍遙散歸脾湯之類外摻貴金散或烏梅煅灰敷之或馬齒莧煅灰豬脂調敷甚者用銅緑鉛粉等分香油調敷一人患穿踝疽形翻突如剖破石榴但其色紅而不豔余以銀針於肉珠上遍刺之流紫黑血共約碗許隨以玄珠膏塗之黑膏蓋之次日縮小大半又如前刺三日三刺消完方露瘡口內服大補湯丸以培元氣外摻生肌藥方能收口逍遙散歸脾湯貴金散俱見瘰癧門玄珠膏生肌散貝葉膏俱見首卷疥瘡疥者微疾也亦從臟腑而生然必先出於手何則疥云吾不根而生不母而成稟陰陽氣育濕熱化形蓋手掌乃太陰濕土所主手心屬太陽相火所司此無情而化有情如腐草為螢朽麥為蝶之意也其形有五如多癢少痛為蟲疥屬肝宜蘆薈丸火鬱者逍遙散焮赤細粒為砂疥屬心宜涼膈散犀角飲子久則酒蒸黃連丸黃泡脹痛為濕疥即膿疥屬脾宜蒼朮膏升麻和氣飲膿清色淡不腫為水疥屬腎宜六味地黃丸加味逍遙散碎粒抓之起皮為乾疥屬肺宜搜風順氣丸久則天門冬膏蜜湯下諸疥宜灸曲池穴間使穴各二七壯疥生於頭面胸背者氣血虛也十全大補湯加金銀花何首烏牛蒡子則胸背之瘡先愈便利熱湯脾肺虛熱也竹葉黃耆湯飲冷作痛脾熱也清熱消毒飲體倦食少脾虛也補中益氣湯晡熱內熱及寒熱者肝虛也加味逍遙散六味地黃丸盜汗少寐脾郁也加味歸脾湯逍遙散地黃丸發熱盜汗腎虛也六味地黃丸犀角飲子治心經細粒砂疥犀角屑石菖蒲木通玄參赤芍甘菊花甘草赤小豆炒用水二鍾生薑三片煎八分服酒蒸黃連丸治砂疥黃連十二兩用黃酒五鍾煮乾為末米糊為丸梧子大每服二錢滾白水下蒼朮膏治膿濕疥南蒼朮十斤切片砂鍋內水煮減半取汁再加水煮如前以術無味為度並汁一處用小鍋再煎如干一寸加汁一寸煎成膏加蜜四兩空心滾白湯調服升麻和氣飲治膿疥及熱腫脹痛大便閉者升麻葛根蒼朮桔梗各一錢五分陳皮枳殼茯苓白芷當歸赤芍各一錢乾薑甘草各五分大黃量用生薑三片水煎食遠熱服加味補中益氣湯治膿疥而無完膚者黃耆二錢人參白朮當歸各一錢五分粉草一錢炙陳皮七分柴胡升麻各五分蒼朮一錢防風玄參各八分黃連黃芩黃柏各五分水二鍾生薑三片紅棗二枚煎八分食遠溫服涼血四物湯治膿疥寒熱腫脹作痛者血虛也當歸川芎赤芍生地蘇木連翹黃連防風各一錢甘草五分水二鍾煎八分食遠服黃耆化毒湯治乾疥瘙癢見血無膿者黃耆生五錢連翹二錢防風當歸何首烏白蒺藜各一錢水煎服能化毒生膿如日久不幹再加白朮二錢茯苓一錢以燥之蒼朮湯熏洗膿窠等疥南蒼朮片一斤水一鍋煎至八分去渣取汁浸洗久之次取渣置炭火於鬥內加朮於火上焚之以手架鬥上熏之上以綿帛蓋之勿令泄氣立驗熏疥方核桃一個油者更佳劈兩半取仁加膠棗肉一個水銀二分研勻入殼內合口糊紙條封縫二層用時取紅炭置爐內將藥桃安火上不住撥轉令桃殼遍黑火將入內時將爐入被內令患者曲膝駕被熏之以絹帛護陰囊塞被頭露頭面候煙盡取出次日其疥更盛由內毒盡發於外也避風二日照前再熏一個則瘡結痂絡續脫愈至重者不過三個熏疥餅子銀硃三錢桑木炭五錢紅棗肉二十一個共搗如泥分六丸曬乾每用一丸熏被又方水銀一錢藝香一兩紅棗肉十個細茶末一錢共研勻分六餅每早用爐盛炭火入藥一餅熏被至晚去爐臥之三日三餅十日全愈如無藝香好安息香二十枝代之合掌丸大風子肉六錢油核桃肉六錢水銀四錢天麻子肉二十粒番打麻末一錢樟腦六錢枯礬一錢細茶末二錢麝香一分苦食生用四個研末共搗為丸彈子大搽如常法如疥多取一二丸入滾水內化開用絹帛蘸洗三二次甚佳疥靈丹治五疥八癬經久不愈者大風子肉一兩五錢油核桃仁二十個杏仁二兩川椒末五錢木鱉子肉一兩五錢水銀五錢樟腦七錢枯礬五錢豬脂油一塊共搗千杵如泥聽用須搔破搽之臭靈丹搽乾疥立效如膿疥挑破搽之微痛三次愈硫黃末一兩油核桃一兩水銀一錢生豬脂油一兩搗勻任用烏頭黃爛瘡雷丸二十一個大風子五個杏仁五個蛇床子二錢硫黃一錢蒲黃川椒枯礬各一錢上為末用豬膽汁調敷硫黃錠子治一切疥癬及坐板等瘡硫黃溶化碎醋內九次每用一兩配白礦五分樟腦一錢黑鉛一錢化投入水銀一錢共研勻欲紅色加硃砂一錢欲黑色加百草霜一錢再研勻火化傾入銅盆內成片以刀界成塊收用用時取一塊以香油磨濃塗之製衣法治小兒遍體生瘡真柏油化塗舊絹衣上與兒穿之次日蟲出別以油衣換之以蟲盡為度煮衣法阿魏二錢川椒三錢苦參甘草節荊芥穗各五錢入絹袋內水煮數十滾取小兒著體衣入內浸之陰乾著之三日一換一用藁本煎湯浴兒浣衣解熏藥砒藥等毒法凡中是毒則陰囊腫脹裂痛不可忍者用黃泥水洗之塗之一用雞子清一個加香油三分之一打百十下令勻以鵝翎蘸掃患處其冷如冰其痛立止及治湯火傷火藥傷多制塗之神妙莫測諸藥不及此蘆薈丸見疳瘡門加味歸脾湯逍遙散見瘰癧門涼膈散見咽喉門搜風順氣丸見癩瘋門六味地黃丸十全大補湯竹葉黃耆湯清熱消毒散補中益氣湯俱見主治諸方門諸癬癬發於肺之瘋毒若疥則屬於脾之濕熱矣總不外乎風熱濕蟲四者相合而成其形有六搔之起屑者為乾癬有汁水者為濕癬不知痛癢者為風癬即頑癬堅厚如牛領之皮者為牛皮癬白點相連者為馬皮癬輪廓全無縱橫不定者為刀癬戴院使云瘡有惡瘡癬有頑癬疥有疥癆噆膚煩擾不當專用外敷必須內宣其毒方可除根然體虛者忌投風燥之藥復傷元氣如發癢時勿以指搔取苧麻線繃緊於癢處刮之雖破而血出無妨常用此法則蟲隨線下取蟲淨癬自愈矣誠勿藥之奇方也或發癢時用針刺百餘下出盡毒血隨用鹽湯浸洗內服表散之藥出汗除根經云濕淫於內其血不可不砭至於敷抹之藥如芍藥藜蘆或草烏白芨或甘草芫花每用一反加輕粉兒茶酒調搽之如掃世稱川槿皮癬之聖藥也且難得真者須用露水磨塗今人用泉水故多罔效諸癬宜灸間使穴吹花癬生於面初起㾦癗作癢漸成細瘡女子多有之由風熱積鬱久之恐變風症治宜清心火除肺風外以羽白散搽之逸風瘡生則遍身作癢狀如癬疥此由風氣逸於皮膚也治宜汗之久之恐變風癩風癬復煎散當歸川芎生地玄參羌活荊穗各一錢蔥白三根淡豆豉五六十粒共一劑外用浮萍四兩水煎湯二碗去渣入藥再煎至一碗熱服出汗避風清熱消風散苦參酒浸九蒸曬炒黃二錢金銀花蟬蛻去翅足土炒全蠍土炒皂角刺豬牙皂荊芥穗防風各一錢蔥白七根水酒各一鍾煎一鍾熱服忌發物加味八珍湯治風癬癢如蟲行人參白朮茯苓甘草當歸川芎白芍生地防風白芷殭蠶白蘚皮桂枝少用麻黃少用蔥白三根生薑二片水二鍾煎八分服有蟲者兼服蠟礬丸烏術丸治諸癬久不愈者蒼朮八兩為末用生薑十二兩取汁加童便拌術曬當歸二兩草烏四兩為末用蔥白四兩取汁拌烏成餅陰乾白芷四兩共為末酒打糊為丸梧子大每服五十丸酒水任下四聖不老丹血燥者宜此再兼服六味地黃丸松香為末水煮香沉為度傾入冷水內如式七次用十兩茯苓甘菊柏子仁各四兩共為末煉蜜為丸梧子大每服八十丸空心鹽湯下或酒下二合丸治身面一切惡癬苦參酒浸炒淨末八兩白蒺藜去刺酒泡炒黃淨末四兩黑醜炒取頭末二兩共一處和勻外用皂角一斤去皮弦用河水浸揉取濃汁砂鍋內煎成膏和藥為丸或少加蜂蜜梧子大每服二錢酒水任下洗癬方藜蘆苦參各二兩五錢草烏皮硝槐枝各三錢水八碗煎六碗去渣再入雄黃末雌黃末各一錢五分先熏後洗以不癢為度少時再洗數次可愈又歌云苦參鐵線透骨草椒艾川烏茶葉幫地骨七椿俱半兩蛤硝三倍水煎湯蜀契花洗方回回骨契根莖枝葉俱用或又鮮或干取三二棵切碎水煎露一宿煎熱熏洗白硃砂散治頑癬並鵝掌風硃砂雄黃象皮煅硼砂各一錢蟾酥五分白硃砂煅二錢上為細末用真生桐油調搽患處以火烘之癢止為度遍身頑癬如癩者燒豬糞熏之烘之鵝掌瘋燒鴿糞熏之烘之半橘元青露治一切癬陳皮二錢元青三十個即斑蝥也燒酒半斤共入瓶內浸二七日取汁搽癬上頻塗勿令乾以患處覺熱痛為則隨起白泡破流清水水淨結薄皮三二日脫愈甚者三二次除根不發馬蹄膏治一切癬白馬蹄煅存性為末預取馬齒莧杵爛加水煎成膏調前末搽之一用鮮絲瓜葉於患處擦之羽白散治面上吹花癬並錢癬白礬半生半熟為末黃酒調化以鵝翎蘸掃患處甚者枯礬末二兩朝腦一錢為末醋調敷一用葛條燒灰存性為末燈窩油調敷一先抓破取谷樹汁搽之痤痤者瘡癤也大如酸棗赤腫而有膿血宜羊角散服之葫蘆化毒丹塗之羊角散治痤及癝毒赤斑羊角連內骨燒存性為末每服三錢黃酒調服葫蘆化毒丹見腫毒門痱痱者先如水泡作癢次變膿泡作疼經云汗出見風乃生痤痱由肺熱脾濕所致宜涼血消風散涼血消風散治熱瘡痱子瘡疥癮疹赤斑當歸生地知母石膏苦參牛蒡子蟬蛻胡麻防風荊芥蒼朮各一錢木通甘草各五分水二鍾煎八分服洗藥白金散虎杖豌豆甘草各四五錢水煎淋洗水冷拭乾以滑石粉摻之令遍次日即驗棗葉可煎洗朴硝可沖洗鵝黃散痤痱作癢抓之損後作痛者緑豆粉一兩滑石五錢黃柏三錢輕粉二線為末撲之㾦癗㾦癗者狀如麻豆搔之成瘡由汗出見風所致宜秦艽湯黑龍丸服之二參湯洗之秦艽湯治㾦癗秦艽一錢五分麻黃防風升麻枳殼犀角鎊牛蒡子黃芩玄參甘草各一錢水二鍾煎八分黑龍丸治㾦癗上攻頭面者京墨羌活薄荷葉蔓荊子獨活各一兩川芎甘草炙荊芥穗防風南星薑製草烏生殭蠶炒白芷白附子炮梔子川烏炮去皮各一兩上為末煉蜜丸一錢重每用一丸細嚼茶