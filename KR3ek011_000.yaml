body:
  text: 跋醫自軒岐而始原無內外科之分蓋緣本於運氣之有司天則有主客加臨之遷迭臟腑之有虛實則有淫勝郁復之乖變用藥之有氣味則有逆從反正之權衡是醫者一也至於唐宋之間分立一十三科意在學難盡述使人各治一科如水陸之殊途矣第瘡瘍雖曰外科而其本必根於內且多針灸去腐完肌之技似治外較難於治內耶近之世重內而輕外者由近之醫棄內而治外是捨本而從末也予暇中殫精采掇參素問靈樞之奧旨搜古今名賢之確論匯為一書名曰外科大成直陳本末一目瞭然猶星辰之有躔度河漢之有源流庶不致輕人命於草菅焉今大成梓完尚有內科症治粗評相繼鐫發因書予平昔之所見者著之云爾愧菴生陽子祁坤跋
