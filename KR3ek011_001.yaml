body:
  text: 卷一總論部癰疽之脈粵稽炎農御世而醫之名始立夫醫者濟世之統名也名雖一而實有內外科之異也科之分有內外蓋因人之疾有內外故也因其疾以命醫神而明之則因內可以推外由外可以測內精微之理豈易言哉胡為乎今之重於內者精其內而瘡科或有所遺專於外者精其外而方脈或有未諳斯二者誠未合乎中庸之道不幾失先正之薪傳乎故惟仁者之心深長周密思欲兼之而無遺內遺外之憾者必先以脈為首務也靈樞經云見其色知其病命曰明按其脈知其病命曰神嗟嗟神其難言也夫誠以病在臟腑不能以告人而脈告之脈不能以接人而指接之則是脈也者乃天真委和之氣非圖可狀非言可傳維在人之會心而已獨不見王叔和之脈經乎王忠父之脈旨乎李瀕湖之脈學戴同父之刊誤等書乎寓之於目悟之於心措之於指運之於意於是乎病之淺深無不彰明較著也哉是以診脈之道不易精也因其不易精而竟忽之其誤天下也多矣爰採脈學歌訣辨脈之形象並遴外科腫潰脈法辨症之順逆顏之卷首聊補學者上達之功云爾脈歌浮浮如木在水中浮浮大中空乃是芤拍拍而浮是洪脈來時雖盛去悠悠浮脈輕平似捻蔥虛來遲大豁然空浮而柔細為濡脈散似楊花無定蹤腫瘍為虛為風潰瘍為虛宜補沉沉幫筋骨自調勻伏則推筋著骨尋沉細如綿真弱脈弦長實大是牢形腫瘍為邪氣深潰瘍為遺毒在內遲遲來一息至惟三陽不勝陰氣血寒但把浮沉分表裡消陰須益火之源脈來三至號為遲小駛於遲作緩持遲細而難知是澀浮而遲大以虛推腫瘍為寒為虛潰瘍亦為寒為虛數數脈息間常六至陰微陽盛必狂煩浮沉表裡分虛實惟有兒童作吉看數比平人多一至緊來如數似彈繩數而時止名為促數見關中動脈形數脈為陽熱可知只將君相火來醫實宜涼瀉虛宜補肺病秋深卻畏之腫瘍為熱數而洪者欲膿潰瘍為病進數甚者難醫滑滑脈如珠替替然往來流利卻還前莫將滑數為同類數脈惟看至數間腫瘍為熱為痰潰瘍為熱為虛為邪氣未退澀細遲短澀往來難散止依稀應指間如雨沾沙容易散病蠶食葉慢而艱參伍不調名曰澀輕刀刮竹短而難微似杪芒微耎甚浮沉不別有無間腫瘍為氣實氣滯潰瘍為血虛為脈病相應虛舉之遲大按之松脈狀無涯類谷空莫把芤虛為一例芤來浮大似慈蔥腫瘍宜內托潰瘍宜大補實浮沉皆得大而長應指無虛愊愊強熱蘊三焦成壯火通腸發汗始安康實脈浮沉有力強緊來彈索轉無常須知牢脈幫筋骨實大微弦更帶長腫瘍為邪氣太盛潰瘍為邪氣不退長過於本位脈名長弦則非然但滿張弦脈與長爭較遠良工尺度自能量腫瘍為有餘宜內消潰瘍為氣治則易愈短兩頭縮縮名為短澀短遲遲細且難短澀而浮秋喜見三春為賊有邪干腫瘍為元氣不足潰瘍為大虛宜大補洪脈來洪盛去還衰滿指滔滔應夏時若在春秋冬月分升陽散火莫狐疑洪脈來時拍拍然去衰來盛似波瀾欲知實脈參差處舉按弦長愊愊堅腫瘍為熱盛宜宣熱拔毒壯實者下之潰瘍為邪氣盛藥之不退者難愈微微脈輕微瞥瞥乎按之欲絶有如無微為陽弱細陰弱細比於微略較粗腫瘍為虛服藥漸充者佳潰瘍亦為虛若微而勻者為脈病相應緊舉如轉索切如繩脈象因之得緊名總是寒邪來作寇內為腹痛外為疼腫瘍脈浮緊發熱惡寒或有痛處是為癰疽潰瘍主氣沉滯為有外寒緩緩脈阿阿四至通柳梢嫋嫋颭輕風欲從脈里求神氣只在從容和緩中腫瘍為虛潰瘍為有胃氣為脈病相應芤中空傍實乃為芤浮大而遲虛脈呼芤更帶弦名曰革血亡芤革血虛虛腫瘍為血虛潰瘍為脈病相應弦弦來端直似絲絃緊則如繩左右彈緊言其力弦言象牢脈弦長沉伏間腫瘍主血氣不和為痛潰瘍為血虛雙弦為賊邪侵脾加數則危矣革革脈形如按鼓皮芤弦相合脈寒虛女人半産並崩漏男子營虛或夢遺牢弦長實大脈牢堅牢位常居沉伏間革脈芤弦自浮起革虛牢實要詳看腫瘍為邪盛潰瘍為邪氣不退濡浮而柔細知為濡沉細而柔作弱持微則浮微如欲絶細來沉細近於微弱弱來無力按之柔柔細而沉不見浮陽陷入陰精血弱白頭猶可少年愁腫瘍宜托裡潰瘍為脈病相應宜補散散似楊花散漫飛去來無定至難齊産為生兆胎為墮久病逢之不必醫散脈無拘散漫然濡來浮細水中綿浮而遲大為虛脈芤脈中空有兩邊腫瘍為氣虛不收潰瘍獨見者死細細來纍纍細如絲應指沉沉無絶期春夏少年俱不利秋冬老弱卻相宜細為氣聚血少有此症者逆伏伏脈推筋著骨尋指間才動隱然深傷寒欲汗陽將解厥逆臍疼症屬陰腫瘍為陰中伏陽邪潰瘍為陽伏陰中為內蝕為流注浸淫難治宜溫補動動脈搖搖數在關無頭無尾豆形團其原本是陰陽摶虛者搖兮勝者安動主痛陽動汗之陰動溫之促促脈數而時一止此為陽極欲亡陰三焦鬱火炎炎盛進必無生退可生腫瘍為熱為病進潰瘍為熱不退漸進者死結結脈緩而時一止獨陰偏勝欲亡陽浮為氣滯沉為積汗下分明在主張腫瘍為氣結潰瘍為氣不調則危代動而中止不能還復動因而作代看病者得之猶可療平人卻與壽相關數而時止名為促緩止須將結脈呼止不能回方是代結生代死自殊途兩動一止三四日三四動止應六七五六一止七八朝次第推之自無失腫潰俱不利脈數不時見當生惡瘡脈數身無熱內有癰膿脈數應當發熱而反惡寒若有痛處當發癰脈浮而數焮腫在外宜先托裡恐邪入內脈沉而實宜先疏通以絶其源脈不浮不沉無內外症知其在經宜和榮衛脈數發熱而痛者發於陽脈不數不發熱而痛者發於陰癰脈宜洪大而數若沉緊者死疽脈宜沉而實若浮洪而散者死癰疽無脈者氣閉也宜行氣其脈自見癰疽之源人身之氣血與天地同流人身之經絡與晝夜同度苟或六淫之感七情之傷飲食不時房勞不節致使陰陽乖錯榮衛蘊結而成癰者總不出於三因故以三因首例外因運氣癰疽有四一曰火熱助心為瘡瘍經曰少陰所至為瘍疹又云少陰司天熱氣下臨肺氣上從甚則瘡瘍又云少陰司天之政補之氣寒乃始陽氣鬱炎暑將起中外瘡瘍又云少陽所至為瘡瘍又云少陽司天之政風熱參布太陰橫流寒乃時至民病寒中外發瘡瘍初之氣候乃太溫其病膚腠中瘡二之氣火反郁其病熱鬱於上瘡發於中三之氣炎暑至民病膿瘡又云太陽司天之政初之氣氣乃太溫肌腠瘡瘍此皆常化病之淺也又云少陰司天熱淫所勝甚則瘡瘍又云少陰司天客勝甚則瘡瘍又云少陰之復病痱疹癰疽痤痔又云火太過曰赫義其病瘡疽血流又云火鬱之發民病瘡瘍癰腫此是邪變病之甚也二曰寒邪傷心為瘡瘍經曰太陽司天寒淫所勝血變於中發為癰瘍病本於心又云太陽司天之政三之氣寒氣行民病寒反熱中癰疽注下又云陽明司天之政四之氣寒雨降民病癰腫瘡瘍是也三曰燥邪傷肝為瘡瘍經曰木不及曰委和上商與正商同其病支發癰腫瘡瘍邪傷肝也又云陽明司天燥淫所勝民病瘡瘍痤癰病本於肝是也四曰濕邪瘡瘍經曰太陰司天濕氣變物甚則身後癰又云太陰之勝火氣內郁瘡瘍於中流散於外是也上四條天行時氣也此由外感故曰外因然外來之因則肌肉血脈筋骨受之其見症多寒熱交作筋骨疼痛及濕痰流注風濕風溫時毒等類治宜發之如蒼朮復煎散紺珠丹之類經云汗之則瘡已使榮衛通行邪氣不得干於內也又云陽氣者開闔不得寒氣從之乃生大僂又云此寒氣之種八風之變四時之病以其勝者治之此亦外因也內因經云氣宿於經絡與血俱澀而不行壅結為癰疽不言熱之所作而後成癰者為由七情內鬱而成或兼竭力房勞陰虛所致又云形樂志苦病生於內此由內傷故曰內因然內傷之因則五臟受之其見症瘡多堅硬根蒂深固二便不調飲食少進外軟內堅平陷無膿表實裡虛毒多難出治宜托裡以培其本禁用驅熱拔毒汗下之劑書云才得腫痛參之脈症但有虛弱便與滋補氣血無虧可保終吉經云肺乘肝則為癰又云腎移寒於肝癰腫少氣脾移寒於肝癰腫筋攣此臟腑之變亦屬內因也臟腑之變乃八風之變皆寒癰例也其形堅硬如石或皮不變色或捻之不痛治宜溫補以回其陽如參附耆術之類是也不內外因經云膏粱之變足生大疔又曰榮氣不從逆於肉理乃生癰腫榮氣胃氣也蓋飲食入胃先輸於脾而朝於肺腑百脈次及於皮毛先行陽道下歸臟腑而氣口成寸矣夫膏粱之變者則榮氣太過不能走空竅而行皮毛反行陰道逆於腠理而生癰腫此肌肉實滯而然也飲食之虧者則榮氣不及不能走空竅而充皮毛短而不盈凝於腠理而生癰腫此肌肉虛澀而然也或兼房勞不節者則腎水虧損腎水虧損則反從濕化而上行其瘡多生於胸背書言大疔者癰之最重者也此不屬內外兩因故曰不內外因然不內外因則脾腎二經受之外無六經之形症內無便溺之阻隔治宜審症脈之虛實辨形色之順逆知所從來用以補瀉如榮氣太過者治宜大瀉以奪氣壅如貴金丸排膿散之類榮氣不及者治宜大補以滋氣少如異功散十全大補湯之類真陰虧損者治宜托裡補虛如神效托裡散內固黃耆湯之類禁用五香等藥復損其陰其有瘰癧痰注氣痞癭瘤之屬生於肉裡膜外者亦屬不內外因也治以養氣血調經脈行痰開鬱健胃和中之法為善癰疽之別癰發於六腑為表為陽為熱為實其發迅暴如燎原之火故熱痛高腫侵長廣大皮薄光軟以澤多有椒眼或作便閉發渴發逆以拒之由正氣內固不能下陷是以五臟終不傷也疽之發於五臟為里為陰為冷為虛其發停蓄如陶室之火內消骨髓故無熱無腫無痛形如㾦癗色淡而堅甚則如牛領之皮見七惡逆症者死七惡逆症歌見後陽中之陰者似熱非熱雖腫而虛赤而不燥痛而不膿浮而復消外盛而內腐其人多肥肉緊而內虛也陰中之陽者似冷非冷不腫而實赤微而燥痛而有膿外不盛而內煩悶其人多瘦肉緩而內實也陽症變而為陰者草醫涼劑之過也陰症變而為陽者大方熱藥之驟也然陽變為陰為猶可返於陽也其症多生陰變為陽為不久復歸於陰矣其症多死陽症有熱則氣血行而生肌陰症無熱則氣血滯而不斂故云有熱無熱為生死之訣觀此則知癰疽有陰陽表裡虛實之分而無大小之別也第恐猶有未悉者再續陰陽善惡生死順逆等歌內消內托虛實等治使一見了然庶無舛誤癰疽陽症歌癰疽不論上中下惟在陰陽二症推發背雖有正與偏要取高低兩樣看純陽初起必焮腫更兼身熱有微寒頂如尖字高突起腫似彎弓根有盤七日之間多焮痛二七之期膿漸漫動息自寧食知味二便調勻無瀉干腫消膿潰精神爽脫腐生新氣血完五善自然臻並至七惡全無半點干痛便隨膿減腫退自肌寬新肉已生紅豔豔腐皮自斂白漫漫一身多爽快五臟盡和歡此屬純陽俱易治百人百可保全安癰疽陰症歌純陰初起不知瘡粟米之形疙瘩僵不紅不腫不知痛少熱少焮少提防七朝之後身體倦瘡根平大喜澆湯頂不高兮根不活色不光兮腐不瓤陷軟無膿空結聚脈浮散大細飛揚飲食不餐身戰戰嘗湯止許意忙忙瘡上生衣如脫甲孔中結子似含芳膿多臭穢身難便舉動愴惶韻不長瘡形成紫黑面色變青黃精神昏憒多鼾睡言語無人自發揚口乾多舌強痰喘定身亡此屬純陰俱不治百人百可到泉鄉癰疽半陰半陽症歌陰陽之症兩相交生死同兼事可招微熱微寒微赤腫半昏半爽半平高脈來雖數多無力飲食雖餐便不消腫而不潰因脾弱潰而不腫為膿饒大便多沸小便數上身有汗下身焦五善雖兼有七惡未全逃口渴喜茶腸腹痛面浮饜飲足心高心煩不穩睡神亂怕音焦投方應病方為妙陰轉為陽漸可調心真造化爾命堅牢逢之任是神仙手半死餘生定莫逃癰疽五善歌心善精神爽言清舌潤鮮瘡疼兼不渴睡醒得安然肝善身輕便因煩自不煩指頭紅活色坐起覺平康脾善唇滋潤衾幃蘭麝香凡餐俱有味膿厚更肥黃肺善聲音響無痰韻更長肌膚多滑潤大便自尋常腎善誠為要水深火自降口和兼不渴小水得稀長癰疽七惡歌一惡神昏憒心煩舌上干瘡形多紫黑言語自呢喃二惡腰身強目睛邪視人瘡頭流血水驚悸是肝迍三惡形消瘦膿清臭穢生瘡形多軟陷脾敗不知疼四惡皮膚槁聲嘶韻不長痰多兼喘急鼻動肺將亡五惡成消渴隨飲即隨干形容多慘黑囊縮腎家端六惡身浮重腸鳴嘔厄頻大腸多滑泄臟腑並將傾七惡瘡倒陷形如剝鱔同四肢多冷逆汙水自流通善屬腑症病微邪淺更能慎起居節飲食則勿藥亦愈惡屬臟症多因元氣虛弱或汗下失宜胃氣受傷或寒涼克伐以致邪氣愈實也法當純補胃氣多有可生者宜於潰瘍主治諸方內對症施治此外更有潰後發熱惡寒作渴或怔忡驚悸寤寐不寧牙關緊急或頭目赤痛自汗盜汗寒戰咬牙手撒身熱脈洪大按之如無或身熱惡衣欲投水中其脈浮大按之微細衣厚仍寒此氣虛極傳變之惡症也手足逆冷肚腹疼痛泄瀉腸鳴飲食不入吃逆嘔吐此陽氣虛寒氣所乘之惡症也有汗而不惡寒或無汗而惡寒口噤足冷腰背反張頸項徑強此氣血虛極變痙之惡症也俱急用參耆歸朮附子以救之間有得生者不可因其症惡遂棄而不治癰疽生死法初生如粟里可容谷外面如麻里大如瓜外面如錢里可容拳起勢大終無害未老先白頭無膿軟陷休瘡從疙瘩起有膿生方許腫潰氣昂昂不治自安康根高頂又高八十壽還饒焮腫易腐爛任大終無恙瘡高熱焮疼雖苦必然生瘡軟無神氣應補方為益肉腫瘡不腫必竟生疑恐膿穢不進食泄瀉黃泉客瘡色豬肝紫無膿必定死綿潰不腐爛內怕葡萄嵌仰臥不知疼陰症命難生腐盡有敗氣笑里終生祟根散瘡平塌神仙無治法久病目露神必竟命難存面忽似塗脂十日後分離敗中有紅肉雖重生門路新肉如板片不食終須變手足皮枯槁血敗生難保唇白眼無神腹脹瀉將傾醃氣不滃氣雖重多生意眼眶黑氣濃癰疽怕此逢房中香馥馥是病終為福瘡熱身微熱輕病何須說生死此中求片言一可決察形色順逆法凡閲人之病必先視其形色而後與脈病相參誠識於始以決其終百無一失矣曷言之陰病見陽色腮顴紅鮮陽病見陰色指甲呈青此二者俱死又身熱脈細唇吻反青目珠直視者死面如塗脂色若土黃油膩黑氣塗抹者死唇舌乾焦鼻生煙煤眼神透露者死形容憔悴精神昏短身形縮小者死喘粗氣短鼻焮睛露語言譫妄者死循衣摸床遺尿失禁撮空者死頭低項軟眼視無神吸吸短氣者死皮破無血肉綻爛班麻木不知痛庠者死齒黃色如煮豆唇白反理無紋耳黑枯焦不聽人中縮而坦平口張氣出無回閉鼻煽相隨呼吸行汗出如珠不散痰若膠而堅凝出血紅如肺色指甲彎而滯青神昏神浮神亂神離緇衣生滿面黑氣慘天庭逢之都沒命法在此中評內消內托法內消消者減也於初起紅腫結聚之際施行氣活血解毒消腫之劑必分之以虛實如脈症俱實者汗利之脈症俱虛者滋補之次分部位佐以引經消毒之藥使氣血各得其常則可內消也再如熱渴便閉邪在裡也則疏導之寒熱焮痛邪在表也則發散之無表裡症邪在經也則和解之內托托者起也已成之時不能突起亦難潰膿或堅腫不赤或不痛大痛或得膿根散或膿少膿清或瘡口不合者皆氣血虛也主以大補佐以活血祛毒之品或加以芳香行其鬱滯或加以溫熱御其風寒如托裡消毒散隨時加減之候膿出腫消腐淨用參耆歸朮大補之甚加附子使氣血滋茂則新肉易生是為內托也又云治癰以寒是為內消治疽以熱是為內托內消內托乃正治從治之義也虛實症治法腫潰諸症須辨虛實隨行補瀉若或稍差關係甚大假如腫起堅硬膿稠者瘡疽之實也腫下軟慢膿稀者瘡疽之虛也瀉利腸鳴食少嘔吐手足並冷脈弱皮寒小便自利或小便時難大便滑利聲音不出精神不爽者悉臟腑之虛也大便硬小便澀飲食如故腸滿脹悶肢節疼痛口苦咽乾煩渴身熱脈大神昏者悉臟腑之實也膿水清稀瘡口不合聚腫不赤肌寒肉冷自汗色脫者氣血之虛也腫高色赤寒熱疼痛膿稠壯熱頭目昏重者氣血之實也頭痛鼻塞目赤心驚喉舌生瘡煩渴飲冷睡語咬牙者上實也精滑便利腰腳沉重睡臥不寧者下虛也肩項不便四肢沉重目視不正睛不了了食不知味音嘶聲敗四肢浮腫者真氣虛也焮腫痛甚日久不潰寒熱往來二便淋祕心神煩悶者邪氣虛也又曰真氣奪則虛邪氣盛則實諸庠為虛諸痛為實脈微細軟者為虛洪大而數者為實也脈症俱虛虛則補之和其氣托裡也脈症俱實實則瀉之導其氣疏利也脈症俱緩緩則治本用平和之藥徐治之也主治之法如腫高焮痛者神授衛生散解之次用托裡消毒散漫腫微痛者用托裡散如不應加薑桂膿出反痛氣血虛也宜八珍湯不作膿不腐潰陽氣虛也宜四君子湯加歸耆肉桂不生肌不收斂脾氣虛也宜四君子湯加芍藥木香惡寒憎寒陽氣虛也宜十全大補湯加薑附晡熱內熱陰血虛也宜四物湯加參術欲嘔作嘔胃氣虛也宜六君子湯加炮姜自汗盜汗五臟虛也宜六味丸加五味子食少體倦脾氣虛也宜補中益氣湯加茯苓半夏喘促咳嗽脾肺虛也宜補中益氣湯加五味麥冬欲嘔食少脾胃虛也宜人參理中湯腹痛泄瀉脾胃虛寒也宜附子理中湯小腹痞足脛腫脾腎虛也宜十全大補湯加山藥山茱萸泄瀉足冷脾腎虛寒也宜十全大補湯加附子熱渴淋祕腎虛陰火也宜加減八味丸喘嗽淋祕肺腎虛火也宜補中益氣湯加減八味丸大凡怯弱之人不必分其腫潰惟宜先補胃氣或疑參耆滿中或泥於氣質素實或為有痰勿服補劑或間有用者又加發散敗毒等藥致使聽補不償聽損多致有誤殊不究瘡瘍之作緣陰陽已虧膿血既瀉元氣已憊斯時也不行溫補將何以恃書云才得腫痛參之脈症見有虛弱便與滋補氣血無虧可保終吉此古今不易之確論也經絡大略人生之有經絡猶地理之有界分治病不知經絡猶捕盜不知界分其能無誅伐無過之咎乎岐黃問答以經絡為主惟經絡一明然後知症見何經用何經之藥以治之瞭然無謬如古之善射御者自有得心應手之妙焉假如腹之中行系任脈一經開兩傍系足少陰腎經又開兩傍系足陽明胃經又開兩傍系足太陰脾經此皆在腹中者其乳之在上在傍系手太陰肺經手少陰心經手厥陰心包絡經也又開兩傍則在兩肋系足厥陰肝經又肋之後背之傍系足少陽膽經其脊之兩傍各兩行系足太陽膀胱經若脊之中行系督脈一經手之外廉系手三陽經手之內廉系手三陰經足之外廉系足三陽經足之內廉系足三陰經頭乃手足六陽經所會如耳前後系手足少陽經顴之上下系手足陽明經兩眥傍系手足太陽經其鼻之上行仍系督脈一經又凡各經支別交會與夫足三陰皆循喉嚨挾舌本又足厥陰隨督脈會於巔雖未得備陳分寸起止實乃十四經之大略也內經所謂分肉者正指此耳至於奇經八脈亦皆有起止病患也假如肋痛便知其為肝經不分內外男婦大小皆可識症用藥稍近後便知其為膽經則又當隨症加減矣由些言之則凡十四經所在皆可類推也陀云癰疽之作其行也有處其主也有歸如心之發於喉舌肺之發於皮膚脾之發於肌肉肝之發於筋肋腎之發於骨髓是也陰毒發於下陽毒發於上腑之發於外臟之發於內發於下者得之緩發於上者得之速感於腑者易治感於臟者難療故內曰壞外曰潰上曰從下曰逆近骨者多冷久而不愈化血生蟲蟲則多庠少疼或先庠後疼近膚者多熱久而不愈傳氣成漏漏則多疼少癢或不疼不癢發於虛處者多險發於節而相應者不治應為內外通潰也手足十二經有氣血多少之分歌曰多氣多血君須記手經大腸足經胃多氣少血有六經三焦膽腎心脾肺多血少氣心胞絡膀胱小腸肝所異治以氣多者行其氣血多者破其血氣少者難於起發補托之血少者難於收斂滋養之雖然厥陰經有相火難治少陽經有相火而更難治故足少陰當作氣血兩虛治也用藥之道如東垣之處方矧有兼風兼痰兼濕兼氣兼血兼陰虛等症病本不同治當求備較之世俗圖人形瘡樣而不分經絡者大相徑庭矣十二經補瀉藥品手少陰心經補當歸生地黃茯神遠志酸棗仁麥門冬柏子仁山藥蓮肉圓眼肉人參紅藍花瀉黃連枳實木香貝母天竺黃鬱金赤茯苓玄胡索溫石菖蒲藿香沉香木香桂枝麻黃涼連翹丹參石蓮子梔子犀角牛黃硃砂石膏引經獨活細辛燈心圓眼手厥陰心包絡經補人參黃耆肉桂沉香菟絲子破故紙瀉大黃芒硝梔子烏藥溫大附子肉桂乾薑沉香川芎白豆蔻柏子仁烏藥涼黃連梔子丹皮柴胡薄荷滑石引經柴胡桂佐之川芎青皮手太陽小腸經補石斛牡蠣甘草梢瀉木通赤茯苓車前子紫蘇羌活藁木檳榔大黃瞿麥溫巴戟天茴香烏藥砂仁益智仁涼滑石木通梔子茅根車前子豬苓澤瀉芒硝引經羌活藁本黃柏足厥陰肝經補當歸熟地黃酸棗仁阿膠木瓜沙參薏苡仁枸杞子菟絲子山茱萸白朮蓮肉甘草蒺藜瀉白芍藥赤芍藥柴胡青皮枳實青黛羌活木賊甘菊蒲黃桃仁蔓荊子常山五靈脂益母前胡溫木香肉桂香附子涼黃連黃柏胡黃連龍膽草草決明牛黃羚羊角車前子甘菊花地榆引經川芎行上青皮行下柴胡烏梅足少陽膽經補當歸酸棗仁山茱萸五味子瀉柴胡青皮黃連白芍藥川芎貝母栝蔞鉤藤天竺黃溫乾薑肉桂陳皮半夏涼黃連黃芩柴胡竹茹甘草引經川芎行上青皮行下柴胡足太陰脾經補人參白朮茯苓甘草白芍藥山藥蓮肉白扁豆木瓜蒺藜當歸黃耆薏苡仁芡實陳皮大棗圓眼肉瀉枳實大腹皮山楂麥芽神麯半夏南星檳榔三稜萊蔔子升麻防風石膏豬苓玄胡索桑寄生溫砂仁白豆蔻藿香破故紙黑乾薑官桂大附子蘇葉肉果木瓜蒼朮吳茱萸丁香涼黃連玄明粉竹瀝連翹大黃引經白芍麻黃大棗蓮肉足陽明胃經補人參白朮黃耆石斛山藥蓮子芡實薏苡仁糯米白糖瀉枳實厚朴大腹皮前胡三稜莪朮檳榔大黃石膏礞石溫肉桂肉果大附子砂仁藿香半夏蒼朮白豆蔻川芎香附乾薑涼葛根知母石蓮子梔子滑石竹茹胡黃連引經葛根升麻白芷手太陰肺經補人參沙參黃耆麥冬阿膠五味子紫菀百部知母款冬花木瓜山藥茯苓蒺藜瀉防風蘇梗羌活前胡生薑桑白皮蘇子橘紅石膏杏仁貝母栝蔞南星枳殼薄荷白芥子白芍玄胡索葶藶鼠黏子萊蔔子香薷荊芥溫乾薑生薑半夏白豆蔻縮砂木香藿香桂枝香附麻黃涼枯芩竹葉竹瀝童便羚羊角馬兜鈴山梔天門冬玄參桔梗藕節枇杷葉玄明粉地骨皮引經白芷升麻蔥白生薑手陽明大腸經補蓮肉糯米白砂糖薏苡仁粟殼木香肉豆蔻龍骨牡蠣瀉大黃芒硝枳實桃仁檳榔蔥白麻仁溫人參乾薑半夏肉桂吳茱萸涼黃芩槐花大黃地榆胡黃連連翹石膏秦艽引經葛根升麻白芷足少陰腎經補杜仲菟絲子蒺藜破故紙山茱萸山藥石斛巴戟天人參白朮當歸熟地枸杞五味牛膝龜板淫羊藿何首烏鱉甲鹿茸鹿角龍骨牡蠣續斷肉蓯蓉韭子覆盆子瀉澤瀉豬苓知母玄胡索甘草茯苓木通溫大附子桂心破故紙黑乾薑縮砂仙茅沉香涼黃柏知母丹皮天門冬地骨皮山梔玄參竹瀝引經獨活肉桂牛膝鹽酒足太陽膀胱經補龍骨續斷益智仁橘核瀉豬苓澤瀉滑石車前子木通瞿麥茯苓溫茴香烏藥沉香山茱萸桂枝麻黃縮砂涼膽草石蓮子防風羌活蔓荊子茵陳葶藶大黃黃柏石膏引經藁本羌活黃柏手少陽三焦經補人參黃耆白朮藿香瀉柴胡枳殼枳實青皮山慈菰溫大附子厚朴乾薑沉香涼連翹滑石膽草地骨皮引經柴胡川芎青皮散品凡藥之性輕虛者諸臟腑皆能發散是以不屬經絡也羌活獨活升麻防風荊芥細辛藁本麻黃秦艽防己牛蒡子香薷夏枯草山豆根五靈脂射干青蒿蔥白頭漏蘆蟬蛻走品凡藥之體重濁者諸臟腑皆能走瀉是以不屬經絡也川烏草烏三稜莪朮威靈仙穿山甲葶藶海藻昆布五加皮撫芎常山青黛巴豆益母草桑寄生針砭灸烙烘照蒸拔等法疽之發也所患者惟內攻與外潰耳蓋毒不能外發勢必內攻急宜護膜以托裡不能中出勢必旁潰必外兼針灸等法以提其毒此外科之首務也針法夫用針者譬之救火火在屋下必穴其頂不爾則延褻盡焚之矣故曰毒氣中隔內外不通不行針灸藥無全功又曰血實者決之先診其脈緊而數者其膿未成緊去但數者其膿已成若膿未成而用針氣血已瀉膿反難成膿已成而不針潰壞愈深瘡口難斂次輕按熱痛者膿淺而稠重按微痛者膿深而稀按之不痛俱硬者瘀血也俱軟者濕水也再按之陷而不起者膿未成按之軟隨手而起者膿已成按之四畔俱軟者膿大成矣手法針鋒宜隨經絡之橫豎不則難於收口部位宜下取便於出膿腫高而軟者在肌肉針四五分腫下而堅者在筋脈針六七分腫平肉色不變者附於骨也針寸許毒生背腹肋脅等處宜扁針斜入以防透膜之害入針在好肉之處則磁實而難進針至膿潰之處則虛軟而無阻針既透膿即視針口必有膿意如珠斯時也欲大開口則將針斜出欲小其口則將針直出所謂迎而奪之順而取之也隨以綿紙捻蘸玄珠膏度之使膿會齊三二時取出捻則膿水速干矣瘡口貼呼膿膏四圍敷潰膿散元氣虛者必先補而後針膿一出則諸症悉退若膿出反痛腫仍不消或煩躁嘔逆者胃氣虛也治宜大補之神妙拔根法凡背疽腦疽陰症者初起不腫高不焮熱灸之不疼者必致壞人於十日以前用鈹針當頭插入至知痛方止出其惡血通其瘡竅隨用蟾酥條插入直至孔底服蟾酥丸紺珠丹發其大汗如元氣虛者隨以內托之藥大補之每日插二條以膏蓋之三日後加添插藥其根高腫作痛外用神燈照法桑根灸法助陰為陽插換七日其瘡裂縫流膿至十三日其根自脫如日多根深蒂固不能脫者鈹針取之玉紅膏搽之不脫者自脫不斂者自斂如半月後不作膿腐者用鈹針品字樣三孔開之不問深淺以知痛為住隨用藥筒拔法拔之視其膿血鮮明謂氣血交黏用藥可痊若紫黑氣穢謂氣敗血衰神仙難醫若拔後大膿當出而反少必內有頑膜宜取去寸余雖微痛血出無妨隨用兩手輕重得宜從瘡根焮處漸漸捺至中間剪去膿管聚膿自然湧出以黃厚為吉其膿日漸多者為輕反此則為慮矣又有不宜針者如疽生於筋脈及骨節臍門並癭瘤再結核推之不動者俱不宜針冬月閉藏水冰地折只宜用藥托裡而少針石者蓋謂善行水者不能注冰善穿地者不能鑿凍善用針者亦不能取四厥也所為寒致腠理以苦發之以辛散之如托裡溫中湯之類也蜞針一法為開門放毒之捷徑然恐竭於外不能及於內即皮膚之疾恐血去而氣不能獨居也禁之針委中穴法治癰疽發背紅腫疼痛及腳膝風濕疼痛即柱杖跛足者針之有功又中風痰厥牙關緊急不知人事者針之立效其法令患者雙手倚壁上雙腳挺直用三角鈹針將紙扎只露半米粒許尖頭針時以中指抵住針頭看委中穴有細青紫脈皆是濕毒惡血看準於紫脈上刺之凡青脈俱刺任出黑血無妨看血出淡黃色方以紙輕手按片時以小膏藥貼之三四日不可洗浴放血後令人將圓棍於手足腰背腿上如轅刮面即棄杖而行百發百中針家不宜出血惟腫偏宜出血也針少商穴法治喉風喉痹顒額顒音容大頭也懸癰乳蛾等症危急者刺之立驗穴在大指端內側去爪甲角一韭葉許白肉際間用三稜針刺出紫血立瘥此穴能泄諸臟之熱但不宜灸內托黃耆丸治誤傷經絡白膿赤汁逗流不止者黃耆生八兩當歸三兩肉桂木香沉香乳香各一兩為末用緑豆粉四兩生薑自然汁煮糊丸桐子大每服四五十丸白湯下砭法扁鵲云病在血脈治宜砭石此舉素問血實者決之也非止丹毒及紅絲疔走散但見紅腫色赤遊走不定者或時毒瘀血壅盛等症並宜砭之忌其太深內經所謂刺皮無傷肉也法用細瓷器擊碎取有鋒芒者一塊用箸一根劈開頭夾之縛之用二指輕捺箸梢以瓷鋒對患處懸寸許再用重箸一根頻擊箸頭令毒血遇刺皆出如丹毒敷貼見小兒赤遊丹毒門參考至次日腫未全消再量行砭之以腫消紅散為率灸法灸乃開結破硬之法蓋火性暢達引拔內毒有路而發外也凡瘡之初起七日以前隨毒勢之大小灸艾壯之多寡如赤腫紫黑者取蒜片三錢厚置瘡頂上著艾灸之三壯一換蒜片初灸覺痛以不痛似癢為止初灸不痛以知痛庠為止初灸全然不覺痛癢宜去蒜明灸之方能速潰艾數宜多有漫腫無頭者以濕紙覆其上視其先干處置蒜灸之兩三處先干兩三處齊灸之有一點白粒如粟四圍紅腫如錢者即於白粒上灸之有陰瘡日數多者艾炷不及其事以蒜搗爛鋪於瘡上艾鋪蒜上灸之蒜敗再易以知痛甚為效癰疽流注鶴膝風等每日灸二三十壯頑疽陰瘡痼發等艾數必多宜先服護心散以防火氣入內灸小兒先將蒜置大人臂上燃艾候蒜溫即移於小兒毒上易艾照前凡腫瘍初起用此灸之一不開大二不內壞三易收口誠瘍科之首法也如七日以後毒已成形宜隨經絡取穴次灸之或騎竹馬法灸之或用錠子藥餅蠟餅等類灸之至真要論云陽氣湊襲寒化為熱熱盛則肉腐為膿是毒乃寒邪所傷艾火攻之求其本也經曰陷者灸之陽症似不必灸也頭為諸陽之首凡生瘡腫由亢陽所致灸之必加大腫痰動必死腎俞穴發瘡由腎水枯竭而成灸之則火爍其源黑陷則死有元氣素虛瘡不高腫體倦神昏脈空虛浮散數而不鼓此內無真氣抵當火力灸之必昏潰而死世云艾火不傷人非通論也凡灸先用蒜片擦穴則著艾不落灸瘡不發則疾不除用蔥艾薄荷煎湯洗之灸瘡已發潰爛疼痛者用桃柳枝胡荽黃連煎湯洗之灸瘡出血用百草霜罨之灸瘡不收口用槐枝蔥白煎湯洗之瓦松陰乾為末摻之灸瘡貼膏宜頻換使膿血出多而疾速愈騎竹馬灸法治諸發背及痔漏腸風是症由心火留滯而生此穴乃心脈所過之處灸之則心火調暢血脈通流其毒頓減其法男左女右於患人曲池穴起用薄篾一條量至中指尖與肉平齊截斷次令患者騎竹馬兩人前後扛起離地五寸兩傍扶定以前篾豎馬上從尾骨貼脊量至篾盡以墨記之兩邊各開同身寸一寸五分盡處是穴各灸二七壯取穴法手太陰肺經少商穴此穴宜刺不宜灸入前針法手陽明大腸經曲池穴治胃疽及上部疔腫發背渾身瘡毒風刺癮疹頑疥小兒丹毒並癰瘓四肢拘攣歷節風穴在肘外輔屈肘兩骨中以手拱胸紋盡頭陷者是穴三間穴治蜂窠疽穴在手次指本節後內側陷中又名少骨穴肩髃穴治乳癰乳毒乳岩穴在肩端兩骨罅間陷者宛宛舉臂取之有空是穴一名肩井穴足少陽陽蹺之會三里穴治乳症膝症穴在膝眼下三寸䯒骨外臁內兩筋間舉足取之偏歷穴治顴疔穴在手腕中後三寸陷中足太陰脾經衝門穴治脅癰穴去大橫五寸在府舍下橫骨端約中動脈商丘穴治陰疽穴在足內踝下微前陷中箕門穴治腹癰穴在魚腹上越筋間陰股內動脈應手是穴大敦穴治魚口在足大指端指甲里三毛中三陰交穴治鶴膝襠疽穴內踝上三寸骨下陷中膝頂穴治鶴膝風腳氣此祕法也諸書不載足陽明胃經神授穴治牙癰二穴隨人大指上直去骨罅處起用患人手一跨此祕法也缺盆穴治鬢疽瘰癧穴在肩下橫骨陷中伏兔穴治鬢疽穴在膝上六寸起肉正跪坐而取之一云膝蓋上七寸以左右各三指按捺上有肉起如兔之狀故名之脈絡會也犢鼻穴治唇疽膝痛穴在膝臏下䯒骨上俠解大筋陷中是穴形如牛鼻梁丘穴治流注穴在膝上二寸兩筋間踝骨穴治疽著五指及霍亂轉筋此祕法也手厥陰心胞絡經胞絡乃包裹心之肉也郤門穴治胸疽穴在掌後去腕五寸間使穴治肘癰腋腫癭瘤疥癬穴在手掌後三寸兩筋間陷中內關穴治鋭疽瘰癧合谷疔蛇頭疔穴在掌後去腕二寸兩筋間合谷穴治魚肚疔注節疔穴在大指次指合紋盡處陷中手少陽三焦經四瀆穴治魚腮穴在肘前五寸外臁陷中天井穴治瘰癧石榴疽癝毒魚腮五痔癮疹穴在肘外大骨後肘上一寸輔骨上兩筋又骨陷中刺肘拱胸得之會宗穴治肩疽髎疽穴在臂腕後三寸空中一寸腋門穴治藥疽穴在手小指次指間陷中握拳取手少陰心經少衝穴治喉癰舌疔舌腫穴在手小指內臁端去爪甲角如韭葉又名經始穴靈道穴治氣癰穴在掌後一寸五分少海穴治臑疽並瘰癧不問腫潰及臂痛不能伸齒齦痛爛齒寒頭痛胸風腋疽一名曲節穴在肘內臁後大骨外去肘五分陷中屈手向上取之神門穴治兌疽穿骨疽穴在掌下鋭骨端陷中少商穴治喉症宜針忌灸見針門心俞穴治喉毒懸癰穴在背第五椎兩傍各開一寸五分手太陽小腸經支正穴治侵腦疽穴在腕後五寸陽谷穴治鳳眉疽穴在手外側腕中兌骨下陷中後溪穴治黑疔穴在手小指外側本節後陷中捏拳取之腕骨穴治鼻疔穴在手外側腕前起骨下陷中天宗穴治頂疽穴在秉風后大骨下陷中肩貞穴治肩風穴曲脾下兩骨解間肩顒後陷中掌後五寸五分治馬口瘡祕法足厥陰肝經陰包穴治咬骨疽穴在膝上四寸股內臁兩筋間拳足取之看膝內側必有槽中膝關穴治透腦疽穴在犢鼻下二寸傍陷中中都穴治陰疽腸癖頑疝穴在內踝上七寸䯒骨中蠡溝穴治玄疽穴在足內踝上五寸章門穴治氣癖穴在直季脅肋端臍上二寸兩傍九寸側臥屈上足伸下足舉臂取之一云肘尖盡處是膝下外臁橫骨治鸛口疽坐馬等癰祕法足少陽膽經劍巨穴治馬刀穴在掌後三寸二分祕法肘尖穴治瘰癧三次除根取穴令患者端坐叉手平胸肘後突出尖骨是灼艾人須立於患人後因穴在後面內側小尖骨尖以指按之患處痠麻方是真穴此乃大肘尖之傍小肘尖仰手與小指對直者是也按此骨尖小指即麻為驗此穴與肩尖穴多取不真惟此取法最確故重表而出之宜珍之勿忽金門穴治瘰癧穴在掌後三寸五分祕法陽陵泉穴治淵疽此穴筋之會也專治筋病穴在膝下一寸䯒外臁陷蹲坐取懸鐘穴治附骨疽穴在足外踝上三寸動脈中膝眼穴治鶴膝風穴在膝頭骨下兩傍陷中環跳穴治腿股風居髎二穴認真攻委中毒血更出盡愈見醫科神聖功穴在脾樞中側臥伸下足屈上足以左手摸穴右手搖撼取之足少陽太陽之會也居髎穴在章門下八寸三分監骨上陷中居髎在跳上一寸灸則筋縮足少陰腎經陰谷穴治心口疽穴在膝下內補骨後大筋下小筋上屈膝取之按之應手築賓穴治幽癰赫癰穴在內踝上腨分中足太陽膀胱經風門穴治玉枕疽又能宣通背上諸陽熱氣一名熱府穴穴在背骨第二椎下陷中間兩傍相去脊同身寸各開一寸五分正坐取之各灸七壯心俞穴治發背穴在五椎下兩傍各開一寸五分委陽穴治五發穴在足小膕中外臁兩筋間屈伸取之一云在承扶下一寸六分屈伸取之承扶在尻臀下陷紋中兼騎竹馬法灸之會陽穴治腎疽血崩穴在膝約紋中央下三寸崑崙穴治附陰疽風疹風熱冷脾穴在足外踝後跟骨上陷中細脈動應手任脈經此經會陰而行腹百會穴治龍泉疽虎髭毒穴在巔頂中直平耳尖督脈經此經會陽而行背神闕穴治對口穴在兩手兌骨間亦祕法也烙法陽燧錠子古有烙法今罕用之蓋使患者駭然亦懼粗工之誤用耳余以陽燧錠子代之治癰疽發背一切諸毒未成者立消已成立潰已潰立穿更易於收斂並灸瘰癧便毒蛇頭疔痞塊及風寒濕氣疼痛等症悉皆神驗勿忽陽燧錠子方蟾酥硃砂川烏草烏各五分直殭蠶一條各為末和勻用石硫黃一兩五錢置碗內微火燉化入前蟾酥等末攪勻離火再入當門子麝香二分冰片一分攪勻即傾入濕瓷盤內速蕩轉成片俟冷取收瓷罐內用時取甜瓜子大一塊要上尖下平先用紅棗肉擦灸處黏藥於上用油燈草火點之灸五壯或七壯九壯畢即飲米醋半酒鍾隨用小膏藥貼之出黃水些須其毒即消如風氣痛者用箸子於骨縫中撳之痠痛處於墨記灸之如腿痛膝痛於鬼眼穴灸之再肩擔成瘡於腫處各灸一壯立瘥黃蠟灸法凡癰疽發背諸毒惡瘡先以濕面隨腫根作圈高寸余實貼皮上勿令滲漏圈外圍布數重防火氣烘膚圈內鋪蠟屑三四分厚次以銅漏杓盛炭火懸蠟上烘之令蠟化至滾再添蠟屑隨化隨添以井滿為度皮不痛者毒淺灸至知痛為度皮痛者毒深灸至不知痛為度去火杓即噴冷水少許於蠟上俟冷起蠟蠟底之色青黑此毒出之徵也如漫腫無頭者以濕紙試之於先干處灸之初起者一二次即消已成者三二次速潰久潰頑硬者即於瘡口上灸之蠟從孔入愈深愈妙其頑腐瘀膿盡化收斂甚速一法灸頑瘡臁瘡亦作面圈圍瘡口次取黃蠟隨瘡井大捻錢厚一餅蓋瘡口上上鋪艾令滿著火艾著蠟化滲入瘡口內先癢後痛俟艾燼盡去之則瘀腐盡化如鎖口未盡挑去之則新肉生矣若犯房勞必須再灸桑柴火烘法背疽初起腫痛重若負石堅而不潰者用之能解毒止痛消腫散瘀出毒水即能內消若潰而不腐新肉不生疼痛不止者用之補陽氣散餘毒生肌骨移深居淺用新桑樹根劈成條或桑木枝長七寸劈如指粗一頭燃著吹滅用火向患處烘片時火盡再換每次烘三四枝每日烘三二次以腫潰肉腐為度若腐已去而新肉生遲者則於瘡四畔烘之凡陰瘡瘰癧流注臁瘡惡瘡久不愈者俱宜烘之書云火有拔山之力惜乎治者之不用耳神燈照法治發背初起七日前後未成者自消已成者自潰不起發者即發不腐者即腐誠良法也用硃砂雄黃血竭沒藥各一錢麝香四分為末每用三分綿紙裹藥為捻長七寸麻油浸透灼火離瘡半寸許自外而內周圍徐徐照之火頭向上藥氣入內瘡毒隨火解散自不內侵臟腑初用三根漸加至四五根候瘡勢漸消漸減熏後隨用敷藥如已潰大膿瀉時不必用此其敷藥原方草藥難覓余用豨蘞草一味代之將草杵爛加陳小粉再加食鹽少許研如糊敷半寸厚留口比瘡暈大三二分為率瘡口用大蔥葉以滾水泡熟扯開貼之如干及有膿用豬蹄湯潤之洗之一法前方加輕粉二錢殭蠶三錢露蜂房十個作捻熏照如前照畢用真生桐油調銀硃如膏貼之再熏照冷疔結毒漏蹄風等症各録本門條下牛膠蒸法癰疽發背痔漏惡瘡頑臁跌撲等症用牛皮膠熬至稀稠得所攤毛頭紙上每用一塊貼瘡腫上次用釅醋煮軟布二塊乘熱罨膠紙上蒸之稍溫再易直至瘡癢膿出將盡即濃煎貫衆湯洗去膠紙貼膏次日照前直至膿盡瘡干為度隨用生肌散貼膏次日換膏仍前蒸洗藥筒拔法陰發背於十五日前後堅硬不潰不膿不得外發必致內攻乃生煩躁重如負石非此法拔提毒氣不出誠有回天之功為瘍醫者不可缺也法用鮮菖蒲羌活獨活紫蘇蘄艾白芷甘草各五錢連須蔥二兩用清水十碗煎數十滾聽用次用鮮嫩竹一段長七寸徑口一寸二三分一頭留節劃去青留白厚約分許靠節鑽一小孔以杉木條塞之放前藥水內煮數十沸取筒傾出藥水仍浸藥汁內候用次用鈹針於瘡頂上一寸內品字放開三孔深入寸許將藥水盆置患人榻前取筒傾去藥汁乘熱急合瘡眼上撳緊自然吸住待片時藥筒已溫拔去塞孔木條其筒自落倒筒內之物於器內視其膿血相黏鮮明紅黃者可治純是敗血稀水氣穢紫黑者不治此家傳屢驗之法勿忽之如陽瘡則不必用此恐傷氣血慎之論症治次第凡看大瘡先以見標日為始至今幾日看瘡與日期可否次看受病之源出何部位屬何臟腑再辨陰陽老幼並氣血之盛衰再次方診脈之虛實順逆以決其終虛實凡毒先視其頂高起者為氣盛根束者為血盛又視其色暈要交會分明為元氣盛而邪無散慢也高腫者屬陽原無深毒治宜托裡以速其膿忌用內消反難作潰漫腫平塌者元氣本虛急宜溫補催毒出外忌用汗下庶無變症初起頂平根散色黯微腫不熱不疼身體倦怠者逆已成腫堅色紫不作膿不腐潰惟口乾多煩躁者逆已潰皮爛內堅不潰腫仍不消痛仍不減心煩者逆潰後膿水清稀腐肉雖脫新肉不生色敗臭穢者死初起元氣未虛症脈俱實者治當迎刃而解若懼悍怕定不能決於危急之時惟在中病則已所謂藥不瞑眩厥疾不瘳久病元氣虛者縱有餘症壞症又當先固其本而後調之和之散之所謂勢孤則守本立而道生也經云督脈經虛從頂出膀胱經虛從背出陽明經虛從髭出是知瘡瘍諸毒由虛而出也治惟藉熱以發之雖陽症熱痛亦宜溫藥稍助微涼以濟之斯為穩當腫瘍諸症不論首尾但見腫赤煩躁引冷便閉作渴脈洪實數者為之五實此邪氣在裡治宜攻利如內疏黃連湯之類以杜其源如身涼肢冷瀉利腸鳴嘔吐食少脈細者為之五虛此元氣不足治宜滋補如托裡消毒散十全大補湯之類以培其本五實者雖在嚴寒之時必用大苦寒之藥瀉其陽以救其陰五虛者雖在盛暑之時必用大辛熱之藥散其陰以回其陽經云用寒遠寒用熱遠熱有假者反之雖違其時必從其症又云治病必察其下為時下之宜也順逆初起七日之前或已灸之後未服他藥者宜蟾酥丸或紺珠丹汗之如汗之不出由毒氣盛表裡閉密之故則外兼神燈照法桑柴烘法能使已成者自潰不脫者自脫助湯劑合表裡以成功烘後以膏蓋頂上提膿拔毒以御風寒其根腳發腫又在敷貼之力以束根本若潰後者則用鐵桶膏圍束瘡口庶不開大如陽瘡腫痛七日以後自有黃色稠膿相黏膏上每日用蔥湯洗之換膏貼之其正膿出在十一日前後如未經灸者內膿將結之際皮厚無頭而難穿者用玄珠膏塗頂上黑膏蓋之三五日膿從毛孔吸出久之列界其腐成片而落其內肉已平則換生肌藥已潰而瘀腐不去者塗之去腐如割且無痛苦勝他藥多矣然必賴內托之功方獲捷效毒至十日以外瘡雖不腐而紅腫焮痛者由元氣不能充足或失於補托或誤用寒涼或蓋覆不暖所致治宜托裡大補以得膿為效若瘡口出黑血遍身汗出乃補托之徵也如期不作腐潰形尚堅硬乃瘡根閉固為陰陽相半之症必用神妙拔根法不致內攻倘內有膿又便易出又以十五日至二十一日為期過此外者縱有稀膿誠難歸結若無膿為純陰不治故陽瘡以十四日為關陰瘡以二十一日為節斯時務要膿出勢定不可過釀候膿出方自腐脫腐脫方自生肌生肌方自收斂收斂方自瘡平此瘡之關節次第也如期不得膿者後必多變用藥之法初起以散腫內消為主已潰以排膿斂毒為主膿盡以去腐內塞為主腐盡以生肌敷痂為主此治瘡之定例也標本夫症之有標本如五運為本六氣為標五臟為本六腑為標初病為本傳病為標元氣為本病氣為標治宜本而標之如有嘔吐泄瀉食少不寐等症宜先治之所謂內症愈而外症易瘥是標而本之也仍兼外治標使治宜如腫瘍初起審症處方必以一藥為標使如神授衛生散用金銀花當歸蒼朮復煎散用蒼朮十全大補湯用夏枯草蠟礬丸用菊花湯通聖散用漏蘆之類每用一兩煎湯復煎群藥其應如響此飛霞子之祕訣也溪云阿膠飲牛膠丸屬金屬土補肺氣實大腸壯胃止瀉黃蠟丸入大腸有補國老膏化毒行經遠志酒金銀花酒皆有補性歸血歸心善用者以之配入腫瘍之散結潰瘍之補虛亦奏捷效宜觸類而長之可也又如諸毒生於巔頂者諸藥俱宜酒浸酒炒酒煎酒服為使為因所為在上者因而射之也論治書云汗之則瘡已為外有六經之形症內無便溺之阻隔飲食如故清便自調知不在裡也左脈洪緩關脈帶弦外感客邪也故宜汗之使榮衛通邪氣去矣如冬月寒致腠理必用辛溫之劑以托之如托裡溫中湯紺珠丹之類又云助表不以取汗為功為蟾酥硃砂雄黃等解毒之類乃取汗之峻劑也又云瘡家雖不疼痛不可發汗汗之則痙為無表症也即有表症然亦不可大汗大汗則表虛不膿後必難治汗出不利小便汗止則陽氣復小便自利也腫瘍時見五實者為邪氣在裡宜寒涼藥攻利之如內疏黃連湯之類次以托裡排膿之藥補之潰瘍時雖有口乾便閉等症由內亡津液所致必脈細而數口和而干食少喜熱乃虛火也惟補氣血養津液健脾胃則二便自和庶無變症如小便閉雖腫瘍時不必豬苓澤瀉以導水惟用參耆歸芍及托裡消毒散消息之自效瘡瘍面赤火鬱也發之見風脈風症者散之大便燥急者潤之鬱冒者為昏迷也俱宜汗之以上之症慎不可下是以瘡瘍惟在閉而不結通而不瀉為規瘡瘍作嘔不問已潰未潰惟以脈實而數喜飲冷者為毒氣內攻下之脈弱而喜溫者為陽氣不足補之身熱而欲衣者熱在皮毛寒在骨髓溫之身不熱而欲去衣者寒在皮毛熱在骨髓清之寒熱虛實皆能為痛止痛之法殊非一端如熱毒焮痛者下之便閉作痛者導之瘀血作痛者和之更以桑柴烘之寒邪作痛者溫散之濕腫強痛者滲導之燥搐攣痛者滋潤之勞而作痛者益之膿脹作痛者針之膿出反痛者虛也補之瘀腐蝕痛者去之穢氣觸痛者和之風寒逼痛者溫散之隨症施之其痛自止不必拘拘於乳沒也又瘡瘍不可不痛不痛為胃氣虛極也不治不可大痛兼煩悶者不治再麻癢者更為惡候腫時不食為痛傷胃氣潰後痛止自能食也垣云瘡瘍食肉反補胃氣乃自棄也此禁之膏粱丹石之變非藜藿及虛弱者之通論也若脾胃弱者即有所禁忌亦當少與之不與則逆其胃氣反不思食禁忌之要在生冷傷脾硬物難化肥膩滑腸惟宜斟酌與之可也又服藥後忌飲冷水犯之效遲膿必再作藥忌用藥之法如執權衡若大勢已退仍用悍怕之藥為誅伐無過失內經之旨矣如敗毒散有表症者宜之多則損氣流氣飲氣結胸滿者宜之多則敗血內補十宣散在冬月可助內托之功能移深居淺然燥榮瀉衛之藥太多在夏月及虛之甚者勿用五香散腫瘍時用之似有暢達之理潰瘍時用之則犯重虛之戒護心散能解丹石之毒若不因此及老年病深症憊者禁用柳酥等丸皆有砒硇之輩乃取汗之峻劑也治初起寒熱拘急疼痛脈沉細者為毒氣內陷也宜用若身熱脈洪及已潰者禁與玉樞丹為下毒之藥無取膿之功而體虛者已成者勿用垣云一經受病止責其一經不可干擾余經如流氣飲通行十二經則諸經皆為所損矣禁之辨症辨暈非腫痕也真暈生於瘡口之旁如紅筋之狀乃鋭毒也三二暈猶可四五暈難醫辨舌舌紅濕潤如常者吉青黃赤白黑胎者重乾燥碎裂疼痛者死辨內陷始則高腫至十數日內外忽平塌者此內攻之候也急宜托裡論潰瘍腫瘍之作由胃氣不從既已潰時則氣血不足故托裡者必養脾助胃蓋為潰由胃氣腐化斂由胃氣榮養法當純補之也如發熱惡寒膿多自汗作痛者十全大補湯虛熱少睡飲食不甘者黃耆人參湯皮寒虛熱咳嗽有痰者托裡清中湯四肢倦怠肌肉消瘦面黃氣短者人參養榮湯膿多心煩食少發熱不睡者聖愈湯脾虧氣弱身涼脈細大便溏瀉者托裡溫中湯飲食不甘噁心嘔吐者香砂六君子湯脾虛下陷食少虛熱間作者補中益氣湯腎虛作渴不能相制心火者加減八味丸煩熱作渴起居如常者胃火也竹葉黃耆湯再如潰時虛弱甚者參朮膏八仙糕陽虛自汗食少者人參膏或六君子湯加木香砂仁甚者加大附子泄瀉腸鳴胃虛嘔逆者參苓白朮散加豆蔻山藥木香柿蒂脾虛下陷冷瀉及肛門重墜者補中益氣湯加山藥山萸五味子隨症增損觸類而長之也論膿肥人膿多如少是肉未腐瘦人膿少如多是肉敗壞也膿出多身大熱不休者難治蓋毒之得膿如傷寒之得汗汗已而反大熱者為壞傷寒矣膿成體弱者必先補之如出膿一碗須服參三錢元氣虛弱更須大補若損大補小尚生變症況無補乎故云若無補養之功其禍多在結痂之後先出稠白膿次流桃花膿再次流淡紅水方為膿盡生肌之兆膿腐作臭者惟補氣血腐盡則臭自止忌用止臭藥論血瘡口出血或漸大而不斂者氣不守血也故云潰而出血不作膿者死論瘡口肉赤而不斂及膿多而帶赤者為血虛有熱宜八珍湯加丹皮肉黯而不斂者為陽氣虛寒宜十全大補湯加白蘞瘡口皮白綻而不收者及久不合口肉多膿少者再瘡無血色四圍血暈不散者皆由風寒外襲或涼藥太過致使氣血不潮俱用參耆補之桂附溫之艾湯滌之神燈照之桑柴烘之瘡口開大膿清不生肌者裡虛也峻補之恐生變症再瘡口開大由七情房勞穢氣所致者用白鹽皂角燒存性為末發熱茶清調敷不發熱薑醋調敷四圍立效由砒硇蝕藥所致者用皮硝靛花水敷瘡口緊硬貼膏無膿者風毒也蠍蚣散摻之見去腐門瘡口發癢用細茶食鹽湯洗之或以細鹽摩口四圍自止肉雖長其色紫者遺毒也地榆湯活血散敷之瘡口已合誤犯房勞或暴怒復崩潰者仍助氣血瘡口易收乃熱毒所致必防流注之患生肌肌肉者脾胃之所主收斂遲速由氣血之盛衰惟補脾胃此內治也腐不盡不可以言生肌驟用生肌反增潰爛務令毒盡則肌自生加以生肌藥此外治也肌生如榴子紅豔或有白膜為善若肌白而平且無紋理或膿清穢氣為毒連五臟氣血枯竭也危驗膜潰瘍驗膜用軟薄綿紙封瘡口令患者用意呼吸之紙不動者未透膜也忌用嚏法恐鼓破膜不救症變陽症變而為陰者草醫涼藥之過也於十一日之前未有膿時投溫中健脾之藥如不應為純陰不治至十五日之後已出膿時投托里溫中湯及十二味異功散輕者十全大補湯倍加參耆桂附以救之須得瘡熱作痛膿出食進身溫脈起為吉所為原本於陽者故生陰症變而為陽者大方熱藥之驟也雖得微腫微紅微痛微膿終不似真陽紅活亦不得稠厚黃膿其瘡不久復歸陰矣所為原本於陰者故死主治方腫瘍主治方神授衛生湯治癰疽發背腦疽對口丹瘤瘰癧惡毒疔瘡濕痰流注及外科一切瘡症但未成者即消已成者即潰能宣熱散風行瘀活血解毒消腫疏通臟腑且藥性平和功效甚速誠外科首用方也羌活八分防風白芷穿山甲土炒研沉香紅花連翹石決明煅各六分金銀花皂角刺歸尾甘草節花粉各一錢乳香五分大黃二錢酒拌炒脈虛便利者不用水二碗煎八分病在上部先服藥隨後飲酒一杯病在下部先飲酒一杯隨後服藥以行藥勢內消活雪湯治發背並五臟內癰尻臀諸腫大小腸癰肛門臟毒初起但未出膿堅硬疼痛不可忍者並服青皮陳皮乳香沒藥連翹黃耆當歸甘草節白芷射干天花粉穿山甲貝母白芍金銀花皂角刺各八分木香四分大黃二錢水酒各一碗煎至八分量病上下食前後服之內疏黃連湯治癰疽腫硬發熱作嘔大便祕澀煩躁飲冷噦啘心煩舌乾口苦六脈沉實有力此邪毒在臟也急宜服此以內除之使邪氣不得傳變經絡木香黃連山梔當歸黃芩白芍薄荷檳榔桔梗連翹各一錢甘草五分大黃二錢水二茶鍾煎八分食前服加蜜二匙亦可立應紺珠丹治癰疽疔毒對口發頤風濕風溫濕痰流注附骨陰疽鶴膝風症左癰右瘓口眼喎斜半身不遂氣血凝滯遍身走痛步履艱辛偏墜疝氣偏正頭痛破傷風牙關緊閉截解風寒無不應效茅朮八兩全蠍石斛明天麻當歸甘草炙川芎羌活荊芥防風麻黃北細辛川烏湯泡去皮草烏湯泡去皮尖何首烏各一兩明雄黃六錢上為細末煉蜜丸彈子大每藥一兩分作四丸一兩作六丸一兩作九丸三等做下以備年歲老壯病勢緩急取用預用硃砂六錢研細為衣瓷罐收貯如惡瘡初起二三日之間或癰疽已成至十朝前後但未出膿者狀若傷寒頭痛煩渴拘急惡寒肢體疼痛噁心嘔吐四肢沉重恍惚悶亂坐臥不寧皮膚壯熱又治傷寒四時感冒傳變疫症但惡寒身熱表症未盡者俱宜服之用連須大蔥白九枝煎湯一茶鍾將藥一丸乘熱化開通口服盡被蓋出汗為效如服後汗遲再用蔥白湯催之後必汗如淋洗漸漸退下覆蓋衣物其汗自收自斂患者自然爽快其病如失但病未成者隨即消去已成者隨即高腫潰膿如諸疾無表症相兼不必發散者只用熱酒化服此方原載於諸風癱瘓門豫每用之發散瘡毒其功甚捷故移録於此詳觀此方治腫瘍甚效者何也凡瘡皆起於榮衛不調氣血凝滯乃生癰腫觀此藥性專發散又能順氣搜風通行經絡所謂結者開之況瘡毒又乃日積月纍結聚所發苟非甘溫辛熱發泄以汗疏通安能得效所謂發散不遠熱正合此方之意無謬也服後避風當食稀粥忌冷物房事孕婦勿服雙解復生散治癰疽發背諸般腫毒初起憎寒發熱四肢拘急內熱口乾大小便祕宜此藥發表攻裡並效荊芥防風川芎白芍黃耆麻黃甘草五分薄荷山梔當歸連翹滑石金銀花羌活人參白朮各八分大黃芒硝各二錢水二碗如表症甚者加姜三片蔥頭二莖里症甚者臨服加生蜜三匙和服此發表攻裡為雙解藥也內消散治癰疽發背對口疔瘡乳花百種無名腫毒一切歹瘡此藥能令內消化毒為黑水從小便而出勢大者雖未全愈亦可轉重就輕移深居淺金銀花知母貝母天花粉白芨半夏穿山甲皂角刺乳香各一錢水酒各一碗煎八分隨病上下食前後服之留藥渣搗爛加秋芙蓉葉細末一兩白蜜五匙同渣調敷瘡上一宿自消重者再用一服忌口效清熱消風散治癰疽諸毒瘡腫已成未成之間外不惡寒內無便祕紅赤高腫有頭焮痛宜服此藥和解之防風川芎當歸黃芩白芍天花粉金銀花連翹紅花柴胡蒼朮陳皮黃耆角刺各一錢甘草五分水二茶鍾煎八分食遠服婦人加香附童便炒以上七方癰疽七日以前瘡勢未成形體壯實表裡之症相合者宜服病退即已如過七日以後形勢已成便宜用後托裡等藥催毒在外以速其膿禁前表下之藥損傷元氣致生多變矣內固清心散治癰疽發背對口疔瘡熱甚焮痛煩躁飲冷有此症者可預防毒氣內攻當服此藥庶不變症茯苓辰砂人參玄明粉白豆蔻甘草乳香明雄黃各二錢冰片一錢真豆粉二兩上為細末每服一錢五分蜜湯調下不拘時候護心散治瘡毒內攻口乾煩躁噁心嘔吐者宜用此藥真豆粉一兩乳香淨末三錢硃砂一錢甘草末一錢上共研極細每服二錢白滾湯調服早晚二次琥珀蠟礬丸治癰疽發背已成未膿之際恐毒氣不能外出必致內攻預服此丸護心護膜散血解毒未潰能消已潰即合並治粉瘤瘰癧痰核及遍身瘡如蛇頭楊梅結毒痔漏鼻痔能祛毒化膿生肌補漏白礬一兩二錢黃蠟一兩雄黃一錢二分硃砂一錢二分琥珀一錢另研蜂蜜一錢臨入或再加滴乳石二錢土貝母六錢麻油二錢上為末將蠟溶化離火候四邊稍凝時入藥攪勻乘熱搓成粗條懸火上烘軟丸之安豆大罐收或以硃砂為衣每服三錢白滾水黃酒任下甚者早晚各進一服癰疽勢甚者將白礬末入蜂房孔內令滿紙包泥固煅黃色為末和蠟為丸熱毒甚者用嫩槐枝三十寸分三次入蠟內煠枯去枝取蠟和礬等為丸痛不可忍者加乳香沒藥各一錢膿出不幹者加苧麻灰五錢諸毒先吃蔥一口隨用黃酒下或蔥湯下只瘡上出汗消腫止痛疔毒用菊花一兩煎湯下肺癰蜜湯下咳嗽臥時淡薑湯下虛者人參五味子湯下泄瀉米湯下托裡消毒散治癰疽已成不得內消者服此以托之未成者可消已成者即潰腐肉易去新肉易生此時不可用內消泄氣寒涼等藥致傷脾胃為要人參黃耆白朮茯苓川芎金銀花當歸各一錢白芷皂角刺甘草桔梗各五分脾弱者去白芷倍用人參水二鍾煎八分食遠服排膿內托散治癰疽腦項諸發等瘡已潰流膿時宜服人參白朮當歸各二錢川芎白芍黃耆陳皮茯苓各一錢香附肉桂各八分甘草五分白芷項之上加三分桔梗胃之上加五分牛膝下部加五分姜三片水二鍾煎八分食遠服乳香定痛散治癰疽發背諸毒疔瘡疼痛不可忍者或未成者速散已成者速潰敗腐膿毒不假刀砭其惡毒自然脫下及治打撲傷損筋骨疼痛並宜服之乳香沒藥各五分黃耆人參甘草歸身川芎白芍陳皮熟地黃粟殼去筋膜蜜炒各一錢水二鍾煎八分隨病上下服之神功內托散治癰疽腦項諸發等瘡至十四日後當腐潰流膿時不作腐潰更兼瘡不高腫脈細身涼者用當歸二錢人參白朮黃耆各一錢五分大附子陳皮茯苓白芍川芎各一錢穿山甲八分甘草炙木香各五分煨姜三片大棗二枚水二鍾煎八分食遠服透膿散治癰疽諸毒內膿已成不穿破者服之即破黃耆四錢川芎三錢當歸二錢皂角刺一錢五分穿山甲炒末一錢水二鍾煎一鍾隨病上下服之或加酒一杯服竹葉黃耆湯治癰疽發背諸般疔腫表裡熱甚口乾大渴者黃耆甘草黃芩川芎當歸白芍人參半夏石膏麥冬各八分生地一錢淡竹葉十片燈心二十根生薑三片水二鍾煎八分食遠溫服回陽三建湯治陰疽發背初起不疼不腫不熱不紅硬若牛皮堅如頑石十日外脈細身涼肢體倦怠皮如鱉甲色似土朱粟頂多孔孔孔流血根腳平散軟陷無膿又皮不作腐手熱足涼者俱急服之大附子人參黃耆當歸川芎茯苓枸杞陳皮萸肉各一錢木香甘草紫草厚朴蒼朮紅花獨活各五分皂角樹根上白皮二錢煨姜三片水二碗煎八分入酒一杯隨病上下食前後服之用綿帛蓋暖瘡上預不得大開瘡孔走泄元氣為要愚按凡背疽屬陰者皆由臟腑先壞而內毒不得發越於外也舊有用雞冠剪血滴於疽上者有醋煮雄艾敷用者豬腦熱藥敷圍者神燈火氣灼照者此數法皆陰疽之用豫雖常用未見其實但陰疽不起者如樹木之根壞強力培植枝葉而終無發生之理豫常據理用藥固有得其生者十中三四譬如先要疏其稼土通其地脈助其根本回其陽氣此四者缺一不可用蒼朮厚朴茯苓陳皮疏其土川芎當歸紫草紅花通其脈人參黃耆枸杞山萸助其本附子木香甘草獨活回其陽如此用之但根本內有一脈未絶之氣服之俱可得其生又驗其手足溫暖瘡便發熱漸作焮腫復生疼痛色暗得活堅硬得腐胃氣得回此是藥之效驗必在三服中應之為吉外兼照法接助回陽此通治陰疽之大法也黍米寸金丹二名返魂丹三名再生丸四名追命丹五名延壽丹六名來蘇丸七名知命丸八名得道丸此方昔出異人所傳常有暴中急症忽然卒倒者斡開牙關研灌三丸其人即活又能治發背腦疽遍身壅腫附骨癰疽等症初起憎寒壯熱四肢倦怠沉重者毋分表裡老幼輕重並宜服之麝香五分乳香沒藥雄黃烏金石狗實輕粉各一錢蟾酥硇砂各二錢黃蠟三錢狗膽一個乾用白粉霜三錢鯉魚膽陰乾三個白丁香四十九粒金頭蜈蚣七條全者酥炙黃色頭胎男乳一合上為末將黃蠟乳汁熬成膏和藥為丸緑豆大大人三丸小兒一丸病重者五丸冷病用蔥湯熱病用新汲水送下蓋臥避風出汗為度諸病如失後食粥調理潰瘍主治方十全大補湯治潰瘍發熱或惡寒或作痛或膿多或膿清或自汗盜汗及遍身流注瘰癧便毒諸瘡久不作膿或膿成不潰潰而不斂若氣血不足之人結腫未成膿者宜加陳皮香附半夏連翹服之自消人參黃耆白朮當歸白芍川芎熟地茯苓肉桂各一錢甘草炙五分水二鍾姜三片棗二枚煎八分食前服八珍湯治潰瘍諸症調和榮衛順理陰陽滋養氣血進美飲食和表裡退虛熱為氣血俱虛之大藥也當歸川芎白芍熟地白朮人參茯苓各一錢甘草炙五分水二鍾姜三片棗二枚煎八分食前服補中益氣湯治瘡瘍元氣不足四肢倦怠口乾發熱飲食無味或飲食失節或勞倦身熱脈洪大而無力或頭痛而惡寒或聲高而喘身熱而煩俱宜服此黃耆一錢五分甘草炙人參當歸白朮各一錢升麻柴胡陳皮各三分麥門冬六分五味子五分炒水二鍾姜三片棗二枚煎一鍾空心熱服人參養榮湯治潰瘍發熱惡寒或四肢倦怠肌肉消瘦面色痿黃岌岌短氣飲食無味不能收斂或氣血原不足不能收斂若大瘡愈後多服之不變他症白芍一錢五分人參陳皮黃耆桂心當歸白朮甘草各一錢熟地五味子茯苓各八分遠志五分水二鍾姜三片棗二枚煎八分食遠服人參黃耆湯治潰瘍虛熱不睡食少或穢氣所觸作痛者黃耆人參白朮麥冬歸身蒼朮甘草陳皮升麻神麯各五分五味子五分炒黃柏酒拌炒三分水二鍾姜三片棗二枚煎八分食遠服內補黃耆湯治癰疽發背諸瘡已破後虛弱無力體倦懶言精神短少飲食無味自汗口乾脈澀不睡並效黃耆人參茯苓川芎歸身白芍熟地肉桂麥門冬遠志各一錢甘草五分水二鍾姜三片棗二枚煎一鍾食遠服托裡清中湯治癰疽脾胃虛弱咳嗽痰氣不清飲食少思者人參白朮桔梗陳皮半夏茯苓各一錢麥門冬五味子甘草各五分水二鍾姜三片棗二枚煎八分食遠服托裡和中湯治癰疽中氣虛弱飲食少思腫不消潰不斂者半夏白朮人參茯苓陳皮煨姜各一錢木香甘草各五分水二鍾姜三片棗二枚煎八分食遠服托裡建中湯治癰疽元氣素虛或因寒涼傷脾損胃飲食少思凡餐無味或作嘔泄瀉等症急服以健中氣人參白朮茯苓各二錢半夏炮姜各一錢甘草五分熟附子八分水二鍾煨姜三片棗二枚煎八分不拘時服托裡溫中湯治癰疽陽弱陰寒脈虛身冷或瘡為寒變反致不疼或膿水清稀心下痞滿腸鳴腹痛大便微溏食則氣短嘔逆不得安臥時發昏憒者服之白朮茯苓木香丁香各五分半夏陳皮羌活益智仁乾薑炮人參白豆蔻甘草各一錢大附子二錢水二鍾姜三片棗一枚煎八分不拘時服方與舊不同豫制此嘗治癰疽陰症及雜症陽氣脫陷與寒氣逼陽於外者發熱煩躁口乾作渴投以薑附之類其津液頓生煩熱頓退其應如響聖愈湯治潰瘍膿水出多氣血虛極脈細空而無力以致心煩不安眠睡不寧或五心煩躁等症並服熟地生地川芎人參各五分歸身黃耆鹽水炒各一錢作一劑水二茶鍾煎八分食遠服保安大成湯治潰瘍元氣素虛精神怯弱或膿水出多神無所主以致睡臥昏倦六脈虛細足冷身涼便溏或祕胸膈或寬不寬舌雖潤而少津口雖食而無味瘡弦不緊肉雖微紅總由不足大補堪題人參白朮黃耆蜜水拌炒各二錢茯苓白芍陳皮歸身甘草大附子山萸肉五味子各一錢木香砂仁各五分水二鍾煨姜三片去皮大棗三枚煎八分食遠服服至精神回手足暖脾胃醒肉色紅為度上數症乃元氣虛脫已欲變壞之病非此不回也獨參湯治潰瘍膿水出多氣血虛極或惡寒或發熱或自汗冷汗或手足指甲青冷或身冷脈細並宜人參二兩切片作一劑水二鍾棗十枚煎一鍾徐徐服之若煎至稠厚即為膏矣作三次用好溫酒化服亦可香砂六君子湯治潰瘍脾胃虛弱噁心嘔吐或飲食不思等症人參白朮茯苓陳皮半夏各一錢甘草藿香砂仁各五分姜三片棗二枚水二鍾煎八分食遠服清震湯治潰瘍脾胃虛弱或誤傷生冷或氣惱勞役或入房夢遺致火邪乘入中脘乃生厄逆急服之益智仁陳皮半夏茯苓人參甘草香附各一錢柿蒂二十四個澤瀉三分熟附手足冷者用一錢姜三片棗二枚燈心二十根水二鍾煎八分不拘時服如身熱口乾便燥火厄者加黃連五分醒脾益胃湯治潰瘍脾胃虛弱過傷飲食生冷以致胸膈不寬四肢面目浮腫及小水不利等症並宜服之人參陳皮茯苓半夏山藥白朮各一錢蒼朮厚朴澤瀉麥芽木香山楂蘇子豬苓各五分老黃米炒黃一錢水二鍾姜三片燈心二十根煎八分食前服托裡定痛散治癰疽潰後血虛疼痛不可忍者宜服之甚效歸身熟地乳香沒藥川芎白芍肉桂各一錢粟殼泡去筋膜蜜炒二錢水二鍾煎八分隨病上下食前後服之神應異功散治潰瘍陰盛陽虛發熱作渴手足並冷脈虛無力大便自利至飲沸湯而不知其熱者必服木香官桂當歸人參茯苓陳皮白朮各一錢半夏丁香肉豆蔻大附子厚朴各五分水二鍾姜五片棗三枚煎八分不拘時服此方癰疽陰症凡雜症陽氣脫陷與寒氣逼陽於外者發熱煩躁口乾作渴投以薑桂附子之類津液頓生煩熱頓退其應如響人但不習而察之參朮膏治癰疽發背等症大膿後氣血大虛急宜用此上好人參半斤切片用水五大碗砂鍋內慢火熬至三碗將渣再煎汁一碗共用密絹濾清復熬稠厚瓷碗內收貯聽用云片白朮六兩淮慶熟地六兩俱熬同上法以上三膏各熬完畢各用瓷碗盛之頓入水中待冷取起蓋勿泄氣如患者精神短少懶於言動短氣自汗者以人參膏三匙白朮膏二匙地黃膏一匙俱用無灰好酒一杯燉熱化服如脾氣虛弱飲食減少或食不知味或已食不化者用白朮膏三匙人參膏二匙地黃膏一匙好熱酒化服如患者腰膝痠軟腿腳無力皮膚手足粗澀枯槁者用地黃膏三匙人參白朮膏各二匙化服如氣血脾胃相等無偏勝負者三膏每次各二匙熱酒化服此膏用於清晨並臨睡時各進一次自然強健精神頓生氣血新肉易生瘡口易合任瘡危險勢大膿多者可保終無變症夏炎天熱恐膏易變分作二次熬用亦好愈後能服鬚髮變黑返老還童以上諸方功難及此八仙糕治癰疽脾胃虛弱精神短少飲食無味食不作飢及平常無病久病但脾虛食少嘔泄者並妙人參山藥茯苓芡實蓮肉各六兩糯米三升粳米七升白糖霜二斤半白蜜一斤上將人參等五味各為細末又將糯粳米亦為粉與上藥末和勻將白糖和蜜湯中煬化隨將粉藥乘熱和勻攤鋪籠內切成條糕蒸熟火上烘乾瓷器密貯每日清晨用白湯泡用數條或乾用亦可但遇知覺飢時隨用數條甚便服至百日輕身耐老壯助元陽培養脾胃妙難盡述胃愛丸治潰瘍脾胃虛弱飲食諸味不喜用過開胃進食之藥不效者此脾崩之象宜服之食進為吉云片白朮一兩鮮白者米泔浸去澀水切片曬乾同麥芽拌炒淮慶山藥一兩肥大上白者切片用男乳拌濕候潤透曬微焙上白茯苓一兩切一分厚咀片用砂仁二錢同茯苓合碗內飯上蒸熟只用茯苓清河人參一兩制畢曬乾共為細末白豆蔻三錢陳皮用陳老米先炒黃色方入同炒微燥勿焦六錢蓮肉去皮心切片五錢小紫蘇蜜拌透曬乾微蒸片時連梗葉切片五錢甘草炙三錢上共為細末用老米二合微焙碾粉泡荷葉湯打糊丸梧子大每服八十丸清米湯下不拘時服二神丸治癰疽脾胃虛弱飲食不消大便溏泄必服之破故紙四兩微炒香色肉果肥大者二兩生用用大棗四十九枚老生薑四兩切片水浸棗姜煮至水乾為度取棗肉為丸桐子大每服七十丸清米湯空心送下及治尋常腎虛脾泄俱效加減八味丸治癰疸已發未發口乾作渴舌乾黃硬者宜服茯苓山藥丹皮各四兩山萸肉五兩澤瀉蒸三兩五味子炒三兩肉桂六錢熟地搗膏酒煮八兩上共為末煉蜜丸如梧子大每服二錢空心服鹽湯送下尋常酒服亦可此又滲濕潤燥藥也紅鉛造化丹治癰疽元氣不足軟陷不起發或已發覆被風寒內外所侵以致瘡毒下陷變為陰塌不痛者急宜服此亦可轉陰為陽返出毒氣復腫為吉紅鉛三錢人參茯苓山藥各一兩甘草炙枯礬各五錢辰砂寒食麵各七錢五分麝香八分冰片六分乳香二錢用頭生男乳每盤內用一小鐘曬乾共收用之上各研精細方為一處共再細研用白蜜二兩再同頭生男乳一大杯慢火重湯內用瓷碗燉蜜滴水不散為度候稍溫和入前藥軟硬得宜丸龍眼核大金箔為衣瓷罐收用或以蠟固亦妙每用一丸好熱酒一杯化藥食遠服之用厚綿帛覆暖患上其熱如蒸瘡必復起作痛乃此丹之效也諸症嘔吐怔忡瀉痢屢藥不瘥異症並效大率心經之病石菖蒲肝經之病用遠志脾經之病用生薑肺經之病麥門冬腎經之病五味子各隨五經之症用五引煎湯化服其應如響修合時務要端午天醫黃道日為佳以上二十四方治癰疽已潰至於收斂正病雜病變症壞症此四者俱在其中選用毋得錯亂以保終吉若不遵此法妄設他說別以奇方祕法治之終致多變但潰後氣血根本無有不虧傷者大抵補怯扶羸理勞續損皆不出於前方此外無法也腫瘍主治方附余神授衛生散治癰疽發背腦疽丹瘤瘰癧惡毒疔瘡濕痰流注及外科一切瘡症不問陰陽表裡虛實但未成自消已成者即潰將潰者餘毒自去新血自生功效甚速誠外科首用之方也羌活白芷穿山甲炒石決明煅乳香沒藥大黃生各一兩沉香五錢加防風蟬蛻殭蠶各五錢各為末和勻每服五錢用歸尾一兩黃酒二碗煎八分調服預用金銀花一兩煎湯一小碗隨用漱口咽下蓋臥汗下任其自然此若虛家藏之密方也非彼祕而不傳但方貴乎平易異則觸目如兵貴用正兵奇則駭人然正兵常也奇兵變也余不敢祕亦不混於前另録之用正用奇存乎其人耳雙解貴金丸治背疽諸毒木悶堅硬便閉脈沉實者大黃一斤白芷十兩為末水丸每服三五錢五更時用連須蔥大者十餘根黃酒一碗煮蔥爛取酒送藥蓋臥出汗過三二時行一二次立效此宣通攻利之劑也濟之以蔥酒力能發汗故云雙解弱者隨用生料四君子湯補之老人虛人每服一錢用人參加生薑煎湯送下過一時再一服得睡上半身得汗睡覺則已一腫毒初起腫痛不可忍者用紅花穿山甲炒各五錢歸尾三錢黃酒二鍾煎一鍾調阿魏五分麝香五釐服一腫瘍發於陰處及乳癰等症用穿山甲炒三兩牛皮膠炒五兩為末酒丸每服三四錢黃酒送下未成者即消已成者自斂一腫瘍已潰不穿及內癰等症用皂角刺一兩黃耆五錢甘草二錢乳香一錢黃酒煎服一癰疽腫毒有死血陰毒在中則不痛用遠志酒飲之敷之則痛有憂怒等氣積而內攻則痛飲之敷之則止或蘊熱在內熱逼人手不可近飲之敷之必涼或氣血虛寒潰而不斂及七情內郁者治之必愈法用遠志泔水浸去心為末每用五錢黃酒一鐘調之澄清飲之渣敷患處余每以此酒調對症藥服渣敷之更佳對口初起不問偏正用蛇蛻一條燒灰酒服即消復元通氣散乳癰腹癰腫毒便毒耳痛耳聾由諸氣閉塞者青皮四兩陳皮四兩穿山甲二兩甘草三兩半生半熟連翹一兩栝蔞仁二兩金銀花一兩或末或丸每服二錢黃酒調服越鞠丸治牙疼齒痛口舌生瘡或胸膈痞滿嘔吐吞酸或腹脹腿痠等症由六郁所致者多故用之悉效蒼朮炒神麯炒香附山楂梔子炒撫芎麥芽炒等分為末糊丸桐子大每服七十丸白湯送下腫瘍敷貼類方初起時腫高赤痛者宜敷涼藥乃撲火之義也然亦不可太過過則恐變為陰漫腫不紅熱似有頭而不痛者宜敷溫藥乃引火就燥之義也經云發表不遠熱敷熱藥亦發表之意凡調敷藥須多攪則藥稠黏敷後貼紙必須揌碎則不崩裂不時用原汁潤之蓋借濕以通竅干則藥氣不入更添拘急之苦凡去敷藥必看毛孔有汗意者為血脈通熱氣散也反此者逆如意金黃散治癰疽發背諸般疔腫跌撲損傷濕痰流毒凡頭時腫漆瘡火丹風熱天泡肌膚赤腫乾溼腳氣婦女乳癰小兒丹毒凡外科一切諸般頑惡腫毒隨手用之無不應效誠為瘡家良便方也黃柏色重者大黃薑黃各五斤天花粉上白十斤白芷三斤紫厚朴陳皮甘草蒼朮天南星各二斤以上共為咀片曬極乾燥用大驢磨連磨三次方用密絹羅廚篩出瓷壇收貯勿令泄氣凡遇紅赤腫痛發熱未成膿者及夏月火令時俱用茶湯同蜜調敷如微熱微腫及大瘡已成欲作膿者俱用蔥湯同蜜調敷如漫腫無頭皮色不變濕痰流毒附骨癰疽鶴膝風症等病俱用蔥酒煎調如風熱惡毒所生患必皮膚亢熱紅色光亮形狀遊走不定者俱用蜜水調敷如天泡火丹赤遊丹黃水漆瘡惡血攻注等症俱用大藍根葉搗汁調敷加蜜亦可湯潑火燒皮膚破爛麻油調敷具此諸引理取寒熱溫涼制之又在臨用之際順合天時洞窺病勢使引為當也二青散治一切焮熱紅腫熱痛陽毒未成者即消青黛白芨白蘞白薇白芷白蘚皮朴硝水龍骨黃柏各一兩天花粉三兩大黃四兩青露即芙蓉葉三兩為末用醋蜜調敷如已成者則敷四圍留頂貼替針膏回陽玉龍膏治背疽陰病不腫高不焮痛不發熱不作膿及寒濕流注鼓風久損冷痛痹風諸濕腳氣手足頑麻筋骨疼痛及一切皮色不變漫腫無頭鶴膝風等但無皮紅肌熱者一概用之俱有功效草烏三兩炒軍姜三兩煨赤芍炒白芷南星煨各一兩肉桂五錢上制畢共為細末熱酒調敷此藥有軍薑肉桂熱血生血既生既熱恐不能散而為害故有草烏南星可以破惡氣祛風毒活死肌除骨痛消結塊回陽氣又有赤芍白芷足以散滯血住痛苦加以酒行藥性攻通氣血雖十分冷症未有不愈者誠為寒灰之焰枯木之春大抵病冷則肌肉陰爛不知痛癢其有痛者又多附骨之痛設若不除則寒根透髓尋常之藥固莫能及矣坎宮錠子治焮赤紅熱腫痛諸毒並痔京墨一兩熊膽三錢胡黃連兒茶各二錢冰片一錢麝香五分牛黃三分上為末用豬膽汁為主加生薑汁大黃水浸取汁釅醋各少許相兌和藥成錠用涼水磨如墨以筆蘸藥塗之離宮錠子治一切皮肉不變漫腫無頭腫毒疔毒京墨一兩蟾酥膽礬血竭各三錢硃砂二錢麝香一錢五分上為末用涼水調成錠涼水磨如墨照前法塗之絳紅膏治一切腫毒已成悉效先用加味神燈捻照畢次用真銀硃為末以真生桐油調攤如膏貼之二味消毒散治熱癤痱痤疥疹風濕癢瘡白礬一兩明雄黃二錢上為末茶清調化鵝翎蘸掃患之癢痛自止痱粟自消鐵桶膏治將潰已潰時根腳走散不收束者文蛤微炒一兩白芨五錢銅緑五錢明礬四錢膽礬三錢輕粉二錢鬱金二錢麝香三分上為末收之聽用用陳米醋一碗杓內文火煎至一小鐘起金色黃泡為度待溫入藥一錢攪勻燉溫用新筆蘸塗根上綿紙蓋之自生皺紋漸收漸緊再不開大一用石青一兩銅緑五錢硼砂五錢白靈藥五錢上為末次用阿膠一兩以黑鉛三斤夾碎水四碗煎半碗入阿膠再煎成膏人藥成錠重二錢用人乳磨塗一用銅緑一兩硼砂一兩以阿膠膏成錠用乳香煎湯磨濃新筆蘸塗初起者塗一圈消一圈已潰者先用椒茶湯洗如瘡口已完皮肉未老燒艾熏之馬齒莧膏發背諸毒莧一握酒煎或水煮冷服自能出汗一服退熱去腐三服良愈再杵莧敷之楊梅愈後遍身如癩喉硬如管者取莧碗粗一握酒水煎服出汗多年頑瘡臁瘡頑痛不收口者杵莧敷之取蟲一日一換三日後腐肉盡見紅肉珠時換生肌藥收口婦人臍下生瘡痛癢流水連及二陰者用莧四兩青黛一兩研勻敷之丹毒加藍根搗敷唇緊面腫者搗汁塗之濕癬白禿取石灰末炒紅用莧汁熬膏調勻塗之三十六種風瘡取莧一石水二石一釜煮之澄清納黃蠟三兩再煎成膏塗之服之洗滌類方洗有蕩滌之功使氣血疏通以舒其毒則易於潰散而無壅滯也凡腫四肢溻漬之在腰腹背淋之在下部浴之如用藥二兩以水二升煎升半用布帛或棉蘸洗稍涼再易之日用三五次甚者日夜不住以腫消痛止為度如已潰時及拔筒後先去舊藥用方盤靠身於瘡下放定隨用豬蹄湯以軟絹淋洗瘡上併入孔內輕手捺淨內膿庶敗腐宿膿隨湯而出以淨為度再以軟帛疊七八重勿令太乾帶湯覆於瘡上兩手輕盈旋按片時帛溫再換如此洗按四五次流通氣血解毒止疼去瘀脫腐此手功之要法大瘡不可缺也洗時冬月要猛火以逼寒氣夏月要明窗以御風寒若不慎此輕則有妨收口重則必變純陰蓋用豬蹄湯者使毒聞腥而速腐耳腐未淨敷玄珠膏腐已淨敷玉紅膏俱以黑膏蓋之如四邊根已消則不必用箍藥更加大補得宜其功更遠瘡一月不治則有蟲用艾煎湯投白礬三錢洗之為艾性能殺蟲也瘡由氣血冷不收口者用艾煎湯洗之更燒艾熏之為艾性辛熱以助陽氣也未潰之前及已照之後用蔥艾湯洗之文蛤散治腫瘍焮痛不問已潰未潰洗之腫寬痛減文蛤三五兩打碎去蟲蔥白十八根水煎淋洗豬蹄湯已潰流膿時用此消毒氣去惡肉回死肌潤瘡口散風消腫腐盡則已當歸白芷羌活甘草赤芍黃芩蜂房等分上為粗末先將獖豬前蹄一使水六碗煮蹄軟為度去面上油並湯下濁腳取清汁入藥一兩煎數十沸絹濾去渣候溫用軟絹淋洗背疽輕易者用此以代前湯當歸白芷獨活甘草各二錢蔥頭五個水二碗煎用一陰瘡黑陷而不痛者用艾絨一斤硫黃雄黃各五錢為末同艾水煮半日水將干取艾出搗爛溫敷患處再煮再易十餘次以知痛則生不知痛出紫血者死然必內服大補回陽之藥助之以成功一瘡腐臭穢者用蛇床子二兩皮硝一兩水煎洗之一用白礬四兩雄黃一兩為末用兩許滾水沖洗軍持露治潰瘍腐盡見新肉珠時用此洗之以助生肌乳香沒藥兒茶輕粉等分為末每用三五錢水煎黃色洗之或豬蹄湯煎洗尤佳膏藥類方紺珠膏治一切癰疽腫毒流注乳毒瘰癧痰核並跌撲損傷風寒濕痹骨節冷疼再頑臁血風等瘡及頭痛牙痛心腹痛腰腿痛火眼咳嗽五疳下痢等症悉驗制麻油四兩煎滾入制松香一斤文火化柳枝攪候化盡離火入細藥末二兩三錢攪勻即傾水內拔扯數十次易水浸之聽用跌撲腫毒瘰癧等症但未破者再加魏香散隨膏之大小患之輕重每加半分至三二分為率已破者則另加生肌散然此膏貼破瘡少痛未若於黑膏內加生肌散為妙而有毒深膿不盡者及頑瘡對口等症雖潰必用此膏獲效未破者貼之勿揭揭則作癢痛亦勿揭能速於成膿患在平處紙攤貼患在彎曲轉動處絹帛攤貼跌撲腫毒疼痛等症貼本處臁瘡及臀腿寒濕等瘡先用茶清入白礬少許洗淨貼之刻日見效風寒咳嗽貼背心頭痛貼太陽穴牙疼塞牙縫內火眼貼魚尾小兒疳痢丸緑豆大神麯為衣每服三二十丸米湯下內癰等症用蛤粉為衣服便毒痰核多加魏香散癧瘡再加銅青鱔攻頭癬毒驗制油法每麻油一斤用當歸木鱉子肉知母細辛白芷巴豆仁文蛤打碎山茲菰打碎紅芽大戟續斷各一兩槐枝柳枝各二十八寸入油內浸二十一日煎枯去渣取油聽用余察朝鮮琥珀膏多續隨子此方宜加之制松香法擇片子淨嫩松香為末十斤次取槐柳桃桑芙蓉等五樣枝各五斤銼碎用大鍋水煮濃汁濾淨再煮一次各收之各分五分每用初次汁一分煎滾入松香末二斤以柳槐枝攪之煎至松香沉下水底為度即傾入二次汁內乘熱拔扯數十次以不斷為佳候溫做餅收之餘香如法此原方也但煎膏其色缺紅豔再加蘇木同五枝煮之膏內細藥方乳香沒藥俱去油血竭各五錢輕粉麝香各二錢明雄黃四錢為細末加入膏內用魏香散膏面摻用乳香沒藥俱去油血竭等分阿魏麝香減半為末罐收聽用生肌散俟腐盡生肌用此人參龍骨赤石脂乳香沒藥血竭輕粉各二錢貝母三錢珍珠一錢冰片一錢一加白蠟二錢為末罐收聽用亞聖膏治一切破爛諸瘡並楊梅粉毒象皮一兩蛇蛻二錢驢甲一塊穿山甲六錢血餘三錢蟬蛻四錢木鱉子七個雞子清三個艾柳榆槐桑枝各二十一寸麻油三斤浸七日煎如常法濾去渣每淨油一斤入黃丹七兩煎成膏入黃蠟五錢化勻再加乳香兒茶沒藥各三錢五靈脂五個煅牡蠣五錢血竭五錢成膏出火毒任用絳珠膏治潰瘍去腐定痛生肌麻油十兩雞子黃十個血餘五錢天麻子肉八十一粒白蜜蠟三兩黃丹飛二兩乳香沒藥輕粉珍珠血竭兒茶各三錢硃砂二錢冰片一錢麝香五分乳岩加銀硃一兩上將油煠血餘化麻子肉枯去渣入蠟候化離火少時入黃丹攪勻再加細藥和勻收用瑩珠膏治潰瘍去腐定痛生肌並梅瘡杖瘡臁瘡下疳豬脂油十兩白蠟三兩溶化離火俟溫入輕粉樟冰各一兩五錢上為末攪勻俟稍凝再入冰片一錢末攪勻成膏罐收聽用先用甘草苦參各三錢水煎洗淨貼膏杖瘡用荊川紙攤極薄貼之熱則易之其疔瘀即散疼痛立止楊梅瘡加紅粉三錢頑瘡乳岩加銀硃一兩臁瘡加水龍骨三錢或龍骨四錢生肌玉紅膏此膏專治癰疽發背諸般潰爛棒毒等瘡用在已潰流膿時先用甘草湯甚者用豬蹄藥湯淋洗患上軟絹挹淨用抿腳挑膏於掌中捺化遍搽新腐肉上外以亞聖膏蓋之大瘡早晚洗換二次內兼服大補脾胃暖藥其腐肉易脫新肉即生瘡口自斂此乃外科收斂藥中之神藥也白芷五錢甘草一兩二錢歸身二兩爪兒血竭輕粉各四錢白蠟二兩紫草二錢麻油一斤先用當歸甘草紫草白芷四味入油內浸三日大杓內慢火熬藥微枯色細絹濾清將油復入杓內煎滾下血竭化盡次下白蠟微火亦化先用茶鍾四枚預燉水中將膏分作四處傾入鍾內候片時方下研極細輕粉每鍾內投和一錢攪勻候至一伏時取起不得加減致取不效玄珠膏治腫瘍將潰塗之膿從毛孔吸出已開針者用捻蘸送孔內呼膿瘀腐不淨塗之立化木鱉子肉十四個斑蝥八十一個柳枝四十九寸或加驢甲片三錢草烏一錢麻油一兩浸七日文火煠枯去渣入巴豆仁三兩煎豆黑傾於鉢內研如泥加麝香一分攪勻入罐內收用碧螺膏治下部濕瘡疥癬並結毒痰串癧瘡松香取嫩白成片者佳為末篩過用銅盆以豬油遍擦之入水至滾入香不住手攪之以香沉底為度即傾冷水內拔扯百十次以不斷為度麻油三兩煎滴水成珠入松香一斤文火溶化看老嫩取起離火住滾徐徐入糠青膽礬各淨末五錢以柳枝左攪以勻為度如老加熟豬油二三錢用緑紙薄攤此方灶用土柴用桑器用銀煮用水煎用火取五行之理也貝葉膏治癰疽發背一切潰爛諸瘡麻油一斤入血餘雞子大一團文火煠化去渣離火入白蠟二兩溶化候溫用綿紙剪塊三張三張於油蠟內蘸之貼瓷器幫上用時揭單張貼患處日換八九次力能定痛去腐生肌其功甚速希勿忽之麻藥類方瓊酥散服之開針不痛蟾酥一錢半夏六分鬧羊花六分胡椒一錢八分川烏一錢八分川椒一錢八分蓽茇二錢上為末每服半分黃酒調服如欲大開加白酒藥一丸整骨麻藥開取箭頭服之不痛川烏草烏胡茄子鬧羊花倍用麻黃薑黃等分上為末茶酒任下甘草水解外敷麻藥川烏尖草烏尖生南星生半夏各五錢胡椒一兩蟾酥四錢一加蓽茇等分一加細辛為君共為末用燒酒調敷候麻木任割不痛去腐類方書云腐不盡不可以言生肌若誤用生肌藥則反增潰爛但潰而不痛者乃其徵也又云毒盡則肌自生是知有腐不可不速去也腫毒已成皮厚不穿者內服透膿散外塗玄珠膏仍以黑膏蓋之則膿從孔竅中滲出三五日毒頂分界成片而落其大膿已盡而內肉已平神妙莫測陽症立驗而必賴內托之功毒深不能收斂者以紙捻蘸玄珠膏送入瘡口內易於收斂不致成漏杖疔塗之瘀腐立化治癬加天麻子同煠調蘆薈末塗之禿瘡加花椒數粒牙皂杏仁各七個艾少許同煎如法去腐靈藥水銀一兩火硝二兩食鹽三錢枯礬三錢三味炒燥硃砂八錢雄黃三錢白砒三錢硼砂三錢一加硇砂三錢共為末入泥固罐內蓋盞封口架三釘上砌百眼爐先底火二寸點香一枝中火一枝頂火一枝隨以水擦盞勿住香畢去火次日取升上者用發背未破加花粉已破加乳香沒藥疔瘡初起加蟾酥腫毒加鵝管石醋調敷爛瘡加黑附子囊癰爛加貝母瘰癧破加發灰皂角白芨水調敷疳瘡加滑石魚口加皂角結毒加光粉滑石臁瘡加輕粉黃丹跌撲加文蛤百草霜乳蛾走馬疳耳腮等俱用茶調蛇咬加南星川椒蟲咬加雄黃蠍蚣散瘡口緊硬貼膏無膿者風毒所勝也全蠍蜈蚣木香為末摻之膏藥蓋之生肌類方凡大毒潰爛內毒未盡若驟用生肌則外實內潰重者逼毒內攻輕者反增潰爛雖即收口其於旁處復生大疽是知毒未盡不可驟用生肌藥也只以貝葉膏貼之頻換俟生肉珠時方用生肌藥如元氣弱者須當大補以培其元生肌定痛散潰爛紅熱腫痛有腐者用此化腐定痛生肌生石膏為末用甘草湯飛五七次每兩加硼砂五錢辰砂三錢冰片二分為末摻之定痛生肌散潰爛紅熱腫痛無腐者用此定痛生肌石膏煅一兩乳香血竭輕粉各五錢冰片一錢有水加白芷龍骨各一錢不收口加雞內金炙一錢為末摻之冷瘡不收口者乾薑為末摻之覺熱如烘平肌易愈諸瘡發癢用枯礬乾薑末摻之細茶食鹽煎湯洗之腐盡生肌散乳香沒藥血竭兒茶三七各二錢冰片一錢麝香二分熱加黃連一錢腐加輕粉一錢有水加龍骨煅一錢欲速收口加珍珠一兩或加蟹黃二錢法取團臍蟹蒸熟取黃曬乾收用為末摻用或以前七味加豬油半斤黃蠟兩許稍溫用綿紙拖膏貼癰疽破爛等瘡若杖傷則三七倍之一用鮮鹿腿骨紙包灰火內煨之以黃脆為度如黑焦色則無用矣為細末摻之生肌甚速月白珍珠散新肉已滿不能生皮及下疳腐痛並湯火傷痛珍珠一錢青缸花五分輕粉二兩為末摻用下疳腐爛豬脊髓調搽一用雞子清傾新瓦上曬乾取清為末摻用五色靈藥黑鉛六錢溶化入水銀二兩結成砂子枯白礬枯皂礬火硝各二兩食鹽五錢同炒乾研細入鉛汞再研不見星為度入泥固罐內封口打火三香不可太過不及冷過宿取出罐口上靈藥其白如雪約有二兩為火候得中如打紫者加硫黃五錢黃者加明雄黃五錢紅者用黑鉛九錢水銀一兩枯礬二兩火硝三兩辰砂四錢雄黃三錢升打火候如前凡升打靈藥硝要炒燥礬要煅枯一方共用燒酒煮乾炒燥方研入罐一法凡打出靈藥加石膏倍之和勻復入新罐內打一香任用不痛生肌白靈藥家傳密訣歌鉛粉易山鉛官硼易皂礬硝礬汞不易火候亦如常固罐法封口法見四卷末倒打靈藥法先將硝礬水銀共研以不見星為度次用泥固罐子煨微熱入藥一角文火頓化勿令起泡至干又下一角少時又下至完下食鹽少許慢火煨至礬枯成陀為度將罐倒合於平底大碗內以罐底高碗沿二指為度用紙條封口次用泥固二指許又次以沙填滿以碗口平為則取碗坐於大水盆內水與碗口平為則次取紅炭砌罐底四圍及底上煅一香去火冷定取出罐四旁及碗底靈藥約有一錢五六分聽用此法始終全在慢火性燥有誤紅粉治一切頑瘡及楊梅粉毒喉疳下疳痘子等立驗水銀白礬火硝各一兩一錢硃砂三錢三分以鍋煨熱取起入白礬一沸見清入硝一沸見清入硃砂一沸見定取出研末入鍋內下水銀蓋碗封打如法一方用水銀一兩焰硝一兩炒乾為末用四錢五分白礬一兩煅枯四錢五分硃砂一錢為末次用篩過淨香爐灰二三斤鹽滷水四五斤聽用取中樣新鐵鍋一口以磚架起安硃砂末於鍋中如蓮子大為度次取硝礬末研勻蓋硃砂上用等盤輕輕按硝礬如銀底樣周圍如茶鐘口大次將茶鍾蓋之如口外有硝礬即吹去之將鍾揭起用筷子在硝礬中間輕輕點一小窩用茶匙挑水銀入窩內仍將先覆茶鍾蓋之次取前香灰用鹽滷水調干稀得所先將手按茶鍾勿令動隨將濕灰周圍塗過只留鍾底在外用石壓之次鍋下發火燒三香二文一武不時視香灰如稍有白色即用棕蘸滷水於灰上刷之為澆水三香完離火過宿用斧從旁輕輕鑿開取茶鍾用黃紙包收臨時刮用粉霜必以硃砂色為度如紅黃為嫩上瘡必疼須再封打一香一先用硃砂末急性子各一錢五分於鍋內炒煙盡去藥拭淨入硝汞升打如法為之淨鍋一用煅石膏赤石脂各二兩為末鹽水調之封口次以香爐灰蓋之更佳一初打出紅粉用綿紙包好入小南青布袋內用緑豆水或槐花八兩甘草一兩煎湯懸胎煮一二百沸取袋埋黃土內一日夜去火毒及硝礬之氣下疳嚼細茶罨三次次摻之即愈楊梅痘子點之即愈楊梅喉疳用新筆蘸粉點之即愈楊梅粉毒用麻油四兩黃蠟一兩溶化成膏離火候溫入紅粉一錢攪勻綿紙攤貼一日一換立驗潰瘍外治附余腫瘍初潰或已開針恐針口易合隨用綿紙捻蘸玄珠膏插之或用黃蠟化開入香油少許作捻如疔須裹線一條為心將蠟捻插入針口內留線頭在外以膏蓋之次日換插如前瘡口腐肉不出者用綿紙做捻取捻毛頭於腐上絞之絞住瘀肉徐徐拔出如未淨再取之次塗玄珠膏如腐已淨塗絳珠膏四圍腫處貼紺珠膏瘀膿壅腫不出者搗大蒜調松香末敷之瘡已潰爛中有黑疔突兀如筋頭堅痛不可忍者用紫絳真香銼豆大炒焦黑為末摻疔上其四圍潰處用蘭雪散摻之黑膏蓋之三二次則疔盡去次換生肌藥頑腐不去壯實者用生南星末加冰片摻之膏蓋過宿去腐如井隨換生肌等藥虛弱者用人參末摻之過宿洗之三二次腐肉自脫且易收斂瘡口胬出如蛇頭者有四著風著水著怒著手擠皆能致之風邪乘襲者補中益氣湯加防風天麻風寒凝滯者十宣散加羌活天麻肝火血燥生風者加味逍遙散加羌活天麻如小兒其母肝火生風者加味小柴胡湯次用加味逍遙散加漏蘆天麻更外兼尉法或用烏梅煅存性加輕粉少許摻之即收有番花如石榴者用銀針於朱上刺去黑血三五次即收平復頑瘡疔瘡臁瘡杖瘡久不生肌者瘡有膜也用玉簪花根於石臼內杵爛敷之扎緊三日一換五七次愈瘡不收口因於虛者須大補之外用人參珍珠等分為末摻之即痂凡生肌藥必用人參湯浸過曬乾再用人乳浸過其功神捷瘡雖收口而皮嫩外惡風寒者用小米煮飯乘熱盛碗內以絹帛罩之覆於患處蒸之三五次愈瘡潰時誤入毒水或誤入刺至骨腫痛者用皂角子七個大幹蝦蟆一個胡椒十五粒入鍋內瓦蓋文火煅煙盡取出為末先用溫水洗淨拭乾摻之膏蓋良久毒水盡出有刺者自見一用黃丹蛤粉等分炒變色摻之誤入一切毒水及皂角水驢馬尿糞以致疼痛者用糯米粉砂糖各三兩生甘草一分為膏貼之毒水自出馬汗入瘡腫痛者用馬鞭子取手執處燒灰存性為末和諸膏塗之或豬脂和塗或用冬瓜皮陰乾為末敷瘡久臭爛生蛆者海參為末摻之或皂礬為末摻之則蛆化為水背瘡繃縛法已潰流膿時不問冬夏宜絹帛四五層罨膏上外再用綿布見方八寸四角以蛇皮細帶貯之蓋絹上將帶扎在前胸繃實瘡上庶暖氣不泄易於腐潰洗時預備二繃更換內肉不合法腐盡結膿痂時內肉不黏連者用軟綿帛七八層放患上以絹扎緊將患睡實數次自黏一片如生成者如患口未完搽玉紅膏自平家傳西聖膏方家傳西聖膏治男婦小兒遠年近日五勞七傷左癱右瘓手足麻木遍身筋骨疼痛咳嗽痰喘瘧疾痢疾痞疾走氣遺精白濁偏墜疝氣寒濕腳氣及婦人經脈不調赤白帶下血山崩漏並跌打損傷一切腫毒瘰癧頑瘡結毒臭爛筋骨疼痛不能動履者貼之悉驗當歸川芎赤芍生地熟地白朮蒼朮甘草節陳皮半夏青皮香附枳殼烏藥何首烏白芷知母杏仁桑皮金銀花黃連黃芩黃柏大黃白蒺藜梔子柴胡連翹薄荷威靈仙木通桃仁玄參桔梗白蘚皮豬苓澤瀉前胡升麻五加皮麻黃牛膝杜仲山藥益母草遠志續斷良薑藁本青風藤茵陳地榆防風荊芥兩頭尖羌活獨活苦參天麻南星川烏草烏文蛤巴豆仁芫花以上各五錢細辛貝母殭蠶大風子穿山甲各一兩蜈蚣二十一條蒼耳頭二十一個蝦蟆七個白花蛇地龍全蠍海桐皮白芨白蘞各五錢木鱉子八兩桃柳榆槐桑楝或杏楮或椿七枝各三七寸血餘四兩用真麻油十三斤浸之春五夏三秋七冬半月日數畢入大鍋內慢火煎至藥枯浮起為度住火片時用布袋濾淨藥渣將油稱准將鍋展淨復用細絹濾油入鍋內要清淨為美投血餘慢火熬至血餘浮起以柳棒挑看似膏溶化之象方美熬熟每淨油一斤用飛過黃丹六兩五錢徐徐投入火加大些夏秋亢熱每油一斤加丹五錢不住手攪俟鍋內先發青煙後至白煙疊疊旋起氣味香馥者其膏已成即便住火將膏滴入水中試軟硬得中如老加熟油若稀加炒丹少許漸漸加火務要冬夏老嫩得所為佳掇下鍋來攪挨煙盡下細藥攪勻傾水內以柳棍摟成塊再換冷水浸片時乘溫每膏半斤拔扯百轉成塊又換冷水投浸用時取一塊銅杓內溶化攤用細藥開後乳香沒藥血竭各一兩輕粉八錢潮腦二兩龍骨二兩赤石脂二兩海螵蛸五錢冰片麝香三錢雄黃二兩共為末加入前膏內五勞七傷遍身筋骨疼痛腰腳痠軟無力貼膏肓穴腎俞穴三里穴痰喘氣急咳嗽貼肺俞穴華蓋穴膻中穴左癱右瘓手足麻木貼肩井穴曲池穴三里穴遺精白濁赤白帶下經脈不調血山崩漏貼陰交穴開元穴痢疾水瀉貼丹田穴瘧疾男貼左臂女貼右臂腰疼貼命門穴疝氣貼膀胱穴頭風貼風門穴心氣疼貼中脘穴走氣疼貼章門穴寒濕腳氣貼三里穴胸腹脹悶貼中脘穴噎食轉食亦貼中脘穴痞疾先用面作圈圍痞塊上入皮硝兩許紙蓋尉斗尉熱去硝貼膏再尉出汗至腹內覺熱方止跌打損傷及諸毒諸瘡俱貼患處凡內外諸症貼之必用熱布尉之疥癬疹癩等症貼臍尉之汗出為度血瘕痞疾加阿魏馬齒莧膏各二兩貼之立驗阿魏化腐去滯須以水頓化傾入膏內離火攪之煎去水氣次下細藥紬絹攤膏用雞子清漿過布攤膏用松香黃蠟塗過狗皮攤膏用水洗去硝氣油紙攤膏用甘草湯或加槐枝煮過攤用表綿紙法用杭州毛頭每麥面一斤加白礬核桃大一塊打稀糊量加小粉表之則軟白而且不蔭油油紙法用天麻子仁數粒鉛粉錢許研爛入桐油碗許打勻綿花蘸刷令遍與不油紙相間鋪之壓之須頻揭換不黏一以生桐油熟豬油平兌如法附余調理須知凡人無病時不善調理而致生百病況既病之後若不加調攝而病豈能得愈乎其調治有法初起病以先看病者元氣虛實次看瘡之陰陽險否然後用藥調治當攻即攻可補便補不可因循耽誤以致變態不虞也且患者又當安定心神相忘諸念毋使愴慌乃保神氣不得變亂也再順天時假如夏熱坐臥不可當風忌置水於榻前床下冬寒須避起居常要溫和非柴火不可開瘡看視常有寒侵致生多變又未潰之先毒氣內作倘有口乾渴症者涼物須當少少與之以滋蘊熱至潰膿之後生冷硬物一概禁之不然傷脾損胃膿必難成致瘡軟陷又難收斂飲食須當香燥甘甜粥飯隨其喜惡毋餐過飽宜少宜熱宜濃方無停滯又得易化故也如大瘡潰後氣血兩虛脾胃並弱必制八仙糕早晚隨食數餅以接補真元培助根本再熬參朮膏如患者脾胃俱虛飲食減少胸膈不寬飲食無味者用白朮膏三匙人參膏二匙清米湯空心化服喜飲者酒化亦可若精神短少昏沉多睡自汗勞倦懶於動作者用人參膏三匙白朮膏二匙亦酒化服如肌膚粗澀面蒼不澤或大便血少虛祕以及皮乾發槁者同地黃膏各二匙和服或飲陽春酒更妙其功強健精神頓生氣血開胃助脾潤肌榮骨此二藥功甚非小大瘡不可缺之實非草藥之比病者當信用之乃無更變虛視者又多反覆不常故有易愈難愈之態實在乎得此失此之規也雜忌須知凡病雖在於用藥調理而又要關於雜禁之法先要灑掃患房潔淨冬必溫幃夏宜涼帳庶防蒼蠅蜈蚣之屬侵之牛犬腥羶醃臘熏藏之物俱能作渴生干瓜果梨柿菱棗生冷等類又能損胃傷脾雞鵝羊肉蚌蛤河豚蝦蟹海腥之屬並能動風發癢油膩煎炒烹炙鹹酸厚味等件最能助火生痰赤豆蕎麵動氣發病惱怒急暴多生痞滿飲食太過必致脾殃瘡愈之後勞役太早乃為羸症入房太早後必損壽不避風寒復生流毒不戒口味後必瘡癢無度大瘡須忌半年小瘡當禁百日此誠為知命君子也試知百病死生法死生非神聖不能洞其機關疾病無明醫亦不能決其凶吉匪則使人疑惑決斷不常豫異授呂祖一枝梅真仙方也不敢私祕一例刊注以傳概世云呂祖一枝梅治大人男婦小兒新久諸病生死難定之間用藥芡實大一餅貼印堂之中點官香一枝香盡去藥以後一時許藥處有紅斑暈色腫起飛散謂紅霞捧日病雖危篤其人不死如貼藥處一時後無腫無紅皮肉照舊不變謂白雲漫野病雖輕淺終歸冥路小兒急慢驚風一切老幼痢疾俱貼之紅腫即愈此方用之可預知生死硃砂三錢銀硃一錢五分五靈脂三錢麝香三分萆麻仁五分雄黃巴豆仁各五錢不去油上各研細於端午日淨室中午時共研加油胭脂為膏瓷盒收藏勿使受潮變質臨用豆大一丸捏餅貼印堂中其功立見用過餅送入河中
